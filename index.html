<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://www.gstatic.com https://apis.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net; font-src https://fonts.gstatic.com; connect-src https://firestore.googleapis.com https://identitytoolkit.googleapis.com https://www.googleapis.com;">
  <title>Mathagram — Learn Math & Science, Your Way</title>
  <link rel="icon" href="assets/lighthouse/logo.svg">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/lighthouse.css">
  <style>
    .hero {
      min-height: 70vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 80px 24px 64px;
    }
    .hero-title {
      font-size: 4rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--color-primary), var(--color-primary-dark));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 16px;
    }
    .hero-subtitle {
      font-size: 1.35rem;
      color: var(--color-text-secondary);
      margin-bottom: 40px;
      font-weight: 500;
    }
    .hero-actions {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
    }
    @media (max-width: 768px) {
      .hero-title {
        font-size: 2.5rem;
      }
      .hero-subtitle {
        font-size: 1.1rem;
      }
    }
  </style>
</head>
<body>

  <!-- Lighthouse loading overlay -->
  <div id="lighthouse-loading" class="lighthouse-loading">
    <img src="assets/lighthouse/logo.svg" class="lighthouse-icon" alt="Mathagram">
    <div class="beam"></div>
  </div>

  <!-- Navigation -->
  <nav class="nav">
    <div class="container">
      <a href="/" class="nav-logo">
        <img src="assets/lighthouse/logo.svg" alt="" width="32" height="32">
        <span>Mathagram</span>
      </a>
      <div class="nav-links">
        <a href="learn.html">Learn</a>
        <a href="courses.html">Courses</a>
        <a href="leaderboard.html">Leaderboard</a>
        <a href="login.html" data-auth="login">Login</a>
        <a href="login.html" data-auth="signup">Sign Up</a>
      </div>
    </div>
  </nav>

  <!-- Hero -->
  <section class="hero">
    <h1 class="hero-title">Mathagram</h1>
    <p class="hero-subtitle">Learn math &amp; science, your way</p>
    <div class="hero-actions">
      <a href="login.html" class="btn btn-primary">Get Started</a>
      <a href="courses.html" class="btn btn-outline">Browse Courses</a>
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <div class="footer-logo">
        <img src="assets/lighthouse/logo.svg" alt="" width="24" height="24" style="display:inline-block;vertical-align:middle;margin-right:6px;">
        <span>Mathagram</span>
      </div>
      <div class="footer-links">
        <a href="terms.html">Terms of Service</a>
        <a href="privacy.html">Privacy Policy</a>
        <a href="https://linktr.ee/Rehaan_rashid">Contact</a>
      </div>
      <p class="footer-copy">&copy; <span id="year"></span> Mathagram.org — All Rights Reserved. Built by Rehaan Rashid</p>
    </div>
  </footer>

  <!-- Scripts -->
  <script type="module">
    import { initNav } from './js/nav.js';
    initNav('');
    import { initLoadingAnimation } from './js/lighthouse.js';
    initLoadingAnimation();
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>

</body>
</html>
