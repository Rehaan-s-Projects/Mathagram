<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Learner Profile — Mathagram</title>
  <link rel="icon" href="/assets/lighthouse/logo.svg">
  <link rel="stylesheet" href="/css/global.css">
  <style>
    .profile-container { max-width: 560px; margin: 48px auto; padding: 0 24px; text-align: center; }
    .profile-card { background: var(--color-white); border-radius: var(--radius-lg); box-shadow: var(--shadow-lg); padding: 40px 32px; }
    .profile-avatar { width: 88px; height: 88px; border-radius: 50%; margin: 0 auto 16px; }
    .profile-card h2 { font-size: 1.5rem; font-weight: 800; margin-bottom: 4px; }
    .level-badge { display: inline-block; padding: 4px 14px; border-radius: 20px; background: linear-gradient(135deg, var(--color-primary), var(--color-primary-dark)); color: var(--color-text); font-size: 0.85rem; font-weight: 600; margin: 8px 0 20px; }
    .stats { display: flex; justify-content: center; gap: 32px; margin-bottom: 28px; }
    .stat { text-align: center; }
    .stat-value { font-size: 1.5rem; font-weight: 700; color: var(--color-text); }
    .stat-label { font-size: 0.8rem; color: var(--color-text-muted); }
    .focus-btn { padding: 10px 28px; font-size: 0.9rem; font-weight: 700; border-radius: 999px; border: 2px solid var(--color-primary); background: transparent; color: var(--color-primary); cursor: pointer; transition: all 0.2s; margin-top: 8px; }
    .focus-btn:hover { background: var(--color-primary); color: #fff; }
    .focus-btn.focused { background: var(--color-primary); color: #fff; }
    .posts-section { text-align: left; margin-top: 28px; }
    .posts-section h3 { font-size: 1.1rem; font-weight: 700; margin-bottom: 12px; }
    .user-post { background: var(--color-bg); border: 1px solid var(--color-border); border-radius: var(--radius); padding: 14px 18px; margin-bottom: 10px; }
    .user-post-text { font-size: 0.9rem; line-height: 1.55; color: var(--color-text); white-space: pre-wrap; word-wrap: break-word; }
    .user-post-meta { font-size: 0.72rem; color: var(--color-text-muted); margin-top: 6px; }
    .not-found { padding: 60px 24px; text-align: center; color: var(--color-text-muted); }
    .not-found h2 { font-size: 1.5rem; margin-bottom: 8px; color: var(--color-text); }
    .back-link { display: inline-block; margin-top: 20px; padding: 10px 24px; background: var(--color-primary); color: #fff; font-weight: 700; border-radius: var(--radius); text-decoration: none; font-size: 0.9rem; }
    .joined-date { font-size: 0.78rem; color: var(--color-text-muted); margin-bottom: 16px; }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="container">
      <a href="/index.html" class="nav-logo">
        <img src="/assets/lighthouse/logo.svg" alt="" width="32" height="32">
        <span>Mathagram</span>
      </a>
      <div class="nav-links">
        <a href="/courses.html">Courses</a>
        <a href="/learning-post.html">Posts</a>
        <a href="/login.html" data-auth="login">Login</a>
      </div>
    </div>
  </nav>

  <div id="profileContent" class="profile-container">
    <div style="padding:60px; text-align:center; color:var(--color-text-muted);">Loading profile...</div>
  </div>

  <footer class="footer">
    <div class="container">
      <p class="footer-copy">&copy; <span id="year"></span> Mathagram.org — All Rights Reserved.</p>
    </div>
  </footer>

  <script type="module">
    import { initNav } from '/js/nav.js';
    import { onAuthChange } from '/js/auth.js';
    import { db } from '/js/firebase-config.js';
    import { collection, query, where, getDocs, limit } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

    document.getElementById('year').textContent = new Date().getFullYear();
    try { initNav('/'); } catch(e) {}

    function esc(str) {
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    // Extract name from URL
    const pathParts = window.location.pathname.split('/').filter(Boolean);
    const rawName = pathParts[pathParts.length - 1] || '';
    const displayName = decodeURIComponent(rawName).replace(/_/g, ' ');
    const container = document.getElementById('profileContent');

    if (!displayName) {
      container.innerHTML = '<div class="not-found"><h2>No Profile Specified</h2><a href="/learning-post.html" class="back-link">Back to Posts</a></div>';
    }

    const LEVELS = [
      { level: 1, xp: 0, title: 'Spark' },
      { level: 2, xp: 50, title: 'Beam' },
      { level: 3, xp: 150, title: 'Glow' },
      { level: 4, xp: 300, title: 'Flare' },
      { level: 5, xp: 500, title: 'Radiance' },
      { level: 6, xp: 800, title: 'Beacon' },
      { level: 7, xp: 1200, title: 'Lighthouse Keeper' },
      { level: 8, xp: 1800, title: 'Lighthouse Master' }
    ];

    // Wait for auth to be ready, then load profile
    onAuthChange(async (user) => {
      if (!displayName) return;
      try {
        // Find user by displayName
        let userDoc = null;
        const q1 = query(collection(db, 'users'), where('displayName', '==', displayName), limit(1));
        const snap1 = await getDocs(q1);

        if (!snap1.empty) {
          userDoc = snap1.docs[0];
        } else {
          // Case-insensitive fallback
          const qAll = query(collection(db, 'users'), limit(200));
          const snapAll = await getDocs(qAll);
          const searchLower = displayName.toLowerCase();
          snapAll.forEach(d => {
            if (!userDoc && (d.data().displayName || '').toLowerCase() === searchLower) {
              userDoc = d;
            }
          });
        }

        if (!userDoc) {
          container.innerHTML = `<div class="not-found"><h2>Learner Not Found</h2><p>"${esc(displayName)}" doesn't exist on Mathagram.</p><a href="/learning-post.html" class="back-link">Back to Posts</a></div>`;
          return;
        }

        const uid = userDoc.id;
        const data = userDoc.data();
        const color = data.color || 'blue';
        const xp = data.xp || data.totalXP || 0;

        let current = LEVELS[0];
        for (const l of LEVELS) { if (xp >= l.xp) current = l; }

        const joinedDate = data.createdAt ? new Date(data.createdAt).toLocaleDateString('en-US', { month: 'long', year: 'numeric' }) : '';

        container.innerHTML = `
          <div class="profile-card">
            <img class="profile-avatar" src="/assets/avatars/${esc(color)}.svg" alt="">
            <h2>${esc(data.displayName || 'Learner')}</h2>
            <span class="level-badge">Level ${current.level} — ${current.title}</span>
            ${joinedDate ? `<div class="joined-date">Joined ${joinedDate}</div>` : ''}
            <div class="stats">
              <div class="stat"><div class="stat-value">${xp}</div><div class="stat-label">Total XP</div></div>
              <div class="stat"><div class="stat-value">${data.focusers || 0}</div><div class="stat-label">Focusers</div></div>
              <div class="stat"><div class="stat-value">${data.streak || 0}</div><div class="stat-label">Day Streak</div></div>
            </div>
            <div class="posts-section" id="userPosts"><h3>Recent Posts</h3><p style="color:var(--color-text-muted); font-size:0.85rem;">Loading posts...</p></div>
          </div>`;

        // Load posts
        try {
          const pq = query(collection(db, 'posts'), where('uid', '==', uid), limit(20));
          const pSnap = await getDocs(pq);
          const postsDiv = document.getElementById('userPosts');
          if (pSnap.empty) {
            postsDiv.innerHTML = '<h3>Recent Posts</h3><p style="color:var(--color-text-muted); font-size:0.85rem;">No posts yet.</p>';
          } else {
            const posts = [];
            pSnap.forEach(d => posts.push(d.data()));
            posts.sort((a, b) => {
              const ta = a.createdAt ? (a.createdAt.toDate ? a.createdAt.toDate() : new Date(a.createdAt.seconds * 1000)) : new Date(0);
              const tb = b.createdAt ? (b.createdAt.toDate ? b.createdAt.toDate() : new Date(b.createdAt.seconds * 1000)) : new Date(0);
              return tb - ta;
            });
            const catLabels = { question: 'Question', tip: 'Study Tip', progress: 'Progress', discussion: 'Discussion' };
            let html = '<h3>Recent Posts</h3>';
            posts.forEach(p => {
              const time = p.createdAt ? new Date(p.createdAt.toDate ? p.createdAt.toDate() : p.createdAt.seconds * 1000).toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) : '';
              html += `<div class="user-post"><div class="user-post-text">${esc(p.text)}</div><div class="user-post-meta">${catLabels[p.category] || p.category || ''} &middot; ${time} &middot; ${p.likes || 0} likes</div></div>`;
            });
            postsDiv.innerHTML = html;
          }
        } catch(e) {
          const pd = document.getElementById('userPosts');
          if (pd) pd.innerHTML = '<h3>Recent Posts</h3><p style="color:var(--color-text-muted); font-size:0.85rem;">Could not load posts.</p>';
        }

      } catch(e) {
        container.innerHTML = `<div class="not-found"><h2>Error Loading Profile</h2><p>Please <a href="/login.html">log in</a> to view learner profiles.</p><a href="/learning-post.html" class="back-link">Back to Posts</a></div>`;
      }
    });
  </script>
</body>
</html>
