<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Mathagram</title>
  <link rel="icon" href="assets/lighthouse/logo.svg">
  <link rel="stylesheet" href="css/global.css">
  <style>
    .auth-container { max-width: 480px; margin: 48px auto; padding: 0 24px; }
    .auth-card {
      background: var(--color-white); border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg); padding: 40px 32px;
    }
    .auth-card h1 {
      text-align: center; font-size: 1.75rem; font-weight: 800;
      margin-bottom: 24px; color: var(--color-primary-dark);
    }
    .tab-switcher {
      display: flex; gap: 8px; margin-bottom: 28px;
      background: var(--color-bg); border-radius: var(--radius); padding: 4px;
    }
    .tab-btn {
      flex: 1; padding: 10px 16px; font: 600 0.925rem var(--font-sans);
      border: none; border-radius: 8px; cursor: pointer;
      background: transparent; color: var(--color-text-secondary);
      transition: background 0.2s, color 0.2s;
    }
    .tab-btn.active { background: var(--color-white); color: var(--color-text); box-shadow: var(--shadow-sm); }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; font-size: 0.875rem; font-weight: 600; margin-bottom: 6px; }
    .form-group input {
      width: 100%; padding: 10px 14px; font: 0.925rem var(--font-sans);
      border: 2px solid var(--color-border); border-radius: var(--radius);
      background: var(--color-bg); transition: border-color 0.2s;
      box-sizing: border-box;
    }
    .form-group input:focus { outline: none; border-color: var(--color-primary); }
    .auth-card .btn-primary { width: 100%; padding: 12px; font-size: 1rem; margin-top: 8px; }
    .auth-card .btn-primary[disabled] { opacity: 0.6; cursor: progress; }
    .error-msg {
      display: none; color: #ef4444; font-size: 0.85rem;
      margin-top: 12px; text-align: center; line-height: 1.45;
    }
    .error-msg.show { display: block; }
    .forgot-row {
      text-align: center; margin-top: 14px;
      font-size: 0.88rem; color: var(--color-text-secondary);
    }
    .forgot-row button {
      background: none; border: none; padding: 0; font: inherit;
      color: var(--color-primary); font-weight: 700; cursor: pointer;
      text-decoration: underline; margin-left: 4px;
    }
    .forgot-status { display: block; margin-top: 6px; font-weight: 700; }
    .google-btn {
      width: 100%; padding: 10px 14px;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      background: var(--color-white); color: var(--color-text);
      border: 2px solid var(--color-border); border-radius: var(--radius);
      font: 600 0.95rem var(--font-sans); cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }
    .google-btn:hover { background: var(--color-bg); border-color: var(--color-primary); }
    .google-btn svg { width: 18px; height: 18px; flex: 0 0 18px; }
    .divider {
      text-align: center; color: var(--color-text-muted);
      font-size: 0.78rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.08em; margin: 18px 0;
      position: relative;
    }
    .divider::before, .divider::after {
      content: ''; position: absolute; top: 50%; width: 30%;
      height: 1px; background: var(--color-border);
    }
    .divider::before { left: 0; }
    .divider::after  { right: 0; }
    .color-picker { margin: 18px 0 8px; }
    .color-option.selected { border-color: #1a1a2e !important; }
    .pw-wrap { position: relative; }
    .pw-wrap input { padding-right: 56px; }
    .pw-show {
      position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; padding: 4px 6px;
      font-size: 0.78rem; color: var(--color-text-secondary); font-weight: 700;
    }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="container">
      <a href="/" class="nav-logo">
        <img src="assets/lighthouse/logo.svg" alt="" width="32" height="32">
        <span>Mathagram</span>
      </a>
    </div>
  </nav>

  <div class="auth-container">
    <div class="auth-card">
      <h1>Welcome</h1>

      <div class="tab-switcher">
        <button class="tab-btn active" data-tab="signin">Sign In</button>
        <button class="tab-btn" data-tab="signup">Sign Up</button>
      </div>

      <!-- ─── SIGN IN ─────────────────────────────────────────────────── -->
      <div id="tab-signin" class="tab-content active">
        <button type="button" class="google-btn" id="google-signin-btn">
          <svg viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
          Continue with Google
        </button>
        <div class="divider">or sign in with email</div>
        <form id="signin-form" novalidate>
          <div class="form-group">
            <label for="signin-email">Email</label>
            <input type="email" id="signin-email" required autocomplete="email">
          </div>
          <div class="form-group">
            <label for="signin-password">Password</label>
            <div class="pw-wrap">
              <input type="password" id="signin-password" required autocomplete="current-password">
              <button type="button" id="signin-show" class="pw-show" aria-label="Show password">Show</button>
            </div>
          </div>
          <button type="submit" class="btn btn-primary" id="signin-submit">Sign In</button>
          <p id="signin-error" class="error-msg"></p>
          <div class="forgot-row">
            Forgot your password?
            <button type="button" id="forgot-btn">Reset it &rarr;</button>
            <span id="forgot-status" class="forgot-status" aria-live="polite"></span>
          </div>
        </form>
      </div>

      <!-- ─── SIGN UP ─────────────────────────────────────────────────── -->
      <div id="tab-signup" class="tab-content">
        <button type="button" class="google-btn" id="google-signup-btn">
          <svg viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
          Sign up with Google
        </button>
        <div class="divider">or sign up with email</div>
        <form id="signup-form" novalidate>
          <div class="form-group">
            <label for="signup-name">Display Name <span id="nameCharCount" style="font-size:0.75rem;font-weight:400;color:var(--color-text-muted);">(3-13 chars)</span></label>
            <input type="text" id="signup-name" required autocomplete="name" maxlength="13" minlength="3" pattern="[A-Za-z0-9]{3,13}" title="Letters and digits, 3-13 characters">
          </div>
          <div class="form-group">
            <label for="signup-email">Email</label>
            <input type="email" id="signup-email" required autocomplete="email">
          </div>
          <div class="form-group">
            <label for="signup-password">Password (min 6 chars)</label>
            <input type="password" id="signup-password" required minlength="6" autocomplete="new-password">
          </div>
          <div class="color-picker">
            <p style="font-weight:600;margin-bottom:12px;">Choose your color</p>
            <div style="display:flex;gap:10px;flex-wrap:wrap;">
              <button type="button" class="color-option selected" data-color="blue"   style="width:48px;height:48px;border-radius:50%;border:3px solid transparent;cursor:pointer;background:none;padding:0;"><img src="assets/avatars/blue.svg"   style="width:48px;height:48px;border-radius:50%;"></button>
              <button type="button" class="color-option"          data-color="green"  style="width:48px;height:48px;border-radius:50%;border:3px solid transparent;cursor:pointer;background:none;padding:0;"><img src="assets/avatars/green.svg"  style="width:48px;height:48px;border-radius:50%;"></button>
              <button type="button" class="color-option"          data-color="orange" style="width:48px;height:48px;border-radius:50%;border:3px solid transparent;cursor:pointer;background:none;padding:0;"><img src="assets/avatars/orange.svg" style="width:48px;height:48px;border-radius:50%;"></button>
              <button type="button" class="color-option"          data-color="purple" style="width:48px;height:48px;border-radius:50%;border:3px solid transparent;cursor:pointer;background:none;padding:0;"><img src="assets/avatars/purple.svg" style="width:48px;height:48px;border-radius:50%;"></button>
              <button type="button" class="color-option"          data-color="cyan"   style="width:48px;height:48px;border-radius:50%;border:3px solid transparent;cursor:pointer;background:none;padding:0;"><img src="assets/avatars/cyan.svg"   style="width:48px;height:48px;border-radius:50%;"></button>
              <button type="button" class="color-option"          data-color="pink"   style="width:48px;height:48px;border-radius:50%;border:3px solid transparent;cursor:pointer;background:none;padding:0;"><img src="assets/avatars/pink.svg"   style="width:48px;height:48px;border-radius:50%;"></button>
              <button type="button" class="color-option"          data-color="gray"   style="width:48px;height:48px;border-radius:50%;border:3px solid transparent;cursor:pointer;background:none;padding:0;"><img src="assets/avatars/gray.svg"   style="width:48px;height:48px;border-radius:50%;"></button>
            </div>
          </div>
          <button type="submit" class="btn btn-primary" id="signup-submit">Create Account</button>
          <p id="signup-error" class="error-msg"></p>
        </form>
      </div>
    </div>
  </div>

  <footer class="footer">
    <div class="container">
      <p class="footer-copy">&copy; <span id="year"></span> Mathagram.org — All Rights Reserved. Built by Rehaan Rashid</p>
    </div>
  </footer>

  <!--
    ─── SIMPLE LOGIN SCRIPT ────────────────────────────────────────────────
    Bare minimum: import Firebase Auth, listen to the form submit, call
    signInWithEmailAndPassword, redirect on success, show error on failure.
    No localStorage gates. No math challenges. No probing. No timeouts.
    Nothing else gets between you and Firebase.
  -->
  <script type="module">
    import { initNav } from './js/nav.js';
    initNav('');
    import {
      signInWithEmailAndPassword, createUserWithEmailAndPassword,
      GoogleAuthProvider, signInWithPopup, sendPasswordResetEmail, updateProfile
    } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
    import { doc, setDoc, getDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
    import { auth, db } from './js/firebase-config.js';

    document.getElementById('year').textContent = new Date().getFullYear();

    // ─── Tab switching ────────────────────────────────────────────────
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
      });
    });

    // ─── Color picker (sign-up) ───────────────────────────────────────
    let selectedColor = 'blue';
    document.querySelectorAll('.color-option').forEach(b => {
      b.addEventListener('click', () => {
        document.querySelectorAll('.color-option').forEach(x => { x.classList.remove('selected'); x.style.borderColor = 'transparent'; });
        b.classList.add('selected');
        b.style.borderColor = '#1a1a2e';
        selectedColor = b.dataset.color;
      });
    });

    // ─── Show/hide password ───────────────────────────────────────────
    const pwInput = document.getElementById('signin-password');
    const pwShow  = document.getElementById('signin-show');
    pwShow.addEventListener('click', () => {
      const shown = pwInput.type === 'text';
      pwInput.type = shown ? 'password' : 'text';
      pwShow.textContent = shown ? 'Show' : 'Hide';
    });

    // ─── Friendly error mapper ────────────────────────────────────────
    function friendly(err) {
      const c = (err && err.code) ? String(err.code) : '';
      if (/wrong-password|invalid-credential|invalid-login-credentials|user-not-found/.test(c))
        return 'Email or password is incorrect. If you signed up with Google, use "Continue with Google" above. Otherwise click "Reset it →" below.';
      if (/too-many-requests/.test(c))      return 'Too many attempts. Please wait a few minutes, or use "Reset it →".';
      if (/invalid-email/.test(c))          return 'That email address is not formatted correctly.';
      if (/user-disabled/.test(c))          return 'This account has been disabled.';
      if (/email-already-in-use/.test(c))   return 'An account with that email already exists. Sign in instead.';
      if (/weak-password/.test(c))          return 'Password is too weak — use at least 6 characters.';
      if (/network-request-failed/.test(c)) return 'Network error. Check your internet connection and try again.';
      if (/popup-closed-by-user|cancelled-popup-request/.test(c)) return 'Sign-in cancelled. Try again when ready.';
      return (err && err.message ? err.message.replace(/^Firebase:\s*/,'').replace(/\s*\(auth\/[^)]+\)\.?\s*$/,'').trim() : 'Sign-in failed. Please try again.');
    }

    // ─── SIGN IN — the WHOLE thing ────────────────────────────────────
    const signinForm   = document.getElementById('signin-form');
    const signinBtn    = document.getElementById('signin-submit');
    const signinError  = document.getElementById('signin-error');
    signinForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      signinError.classList.remove('show'); signinError.textContent = '';
      const email    = document.getElementById('signin-email').value.trim().toLowerCase();
      const password = document.getElementById('signin-password').value;
      if (!email || !password) {
        signinError.textContent = 'Please enter both email and password.';
        signinError.classList.add('show'); return;
      }
      signinBtn.disabled = true;
      const orig = signinBtn.textContent;
      signinBtn.textContent = 'Signing in…';
      try {
        await signInWithEmailAndPassword(auth, email, password);
        // Success. Navigate. That's it.
        window.location.assign('/profile.html');
      } catch (err) {
        signinError.textContent = friendly(err);
        signinError.classList.add('show');
        signinBtn.disabled = false;
        signinBtn.textContent = orig;
      }
    });

    // ─── Google sign-in (one button, one handler) ─────────────────────
    async function googleAuth() {
      signinError.classList.remove('show');
      try {
        const provider = new GoogleAuthProvider();
        const { user } = await signInWithPopup(auth, provider);
        // Create a Firestore profile if one doesn't exist yet
        const ref = doc(db, 'users', user.uid);
        const snap = await getDoc(ref);
        if (!snap.exists()) {
          await setDoc(ref, {
            displayName: user.displayName || 'New Learner',
            email: user.email, color: 'blue', xp: 0, createdAt: serverTimestamp()
          });
        }
        window.location.assign('/profile.html');
      } catch (err) {
        signinError.textContent = friendly(err);
        signinError.classList.add('show');
      }
    }
    document.getElementById('google-signin-btn').addEventListener('click', googleAuth);
    document.getElementById('google-signup-btn').addEventListener('click', googleAuth);

    // ─── Forgot password ──────────────────────────────────────────────
    const forgotBtn    = document.getElementById('forgot-btn');
    const forgotStatus = document.getElementById('forgot-status');
    forgotBtn.addEventListener('click', async () => {
      const email = document.getElementById('signin-email').value.trim().toLowerCase();
      forgotStatus.style.color = ''; forgotStatus.textContent = '';
      if (!email) {
        forgotStatus.style.color = '#b91c1c';
        forgotStatus.textContent = 'Type your email above first.';
        document.getElementById('signin-email').focus(); return;
      }
      const orig = forgotBtn.textContent;
      forgotBtn.disabled = true; forgotBtn.textContent = 'Sending…';
      try {
        await sendPasswordResetEmail(auth, email);
        forgotStatus.style.color = '#166534';
        forgotStatus.textContent = '✓ Reset link sent to ' + email + '. Check your inbox.';
        forgotBtn.textContent = 'Sent ✓';
      } catch (err) {
        forgotStatus.style.color = '#b91c1c';
        forgotStatus.textContent = friendly(err) || 'Could not send reset email.';
        forgotBtn.disabled = false; forgotBtn.textContent = orig;
      }
    });

    // ─── Sign up ──────────────────────────────────────────────────────
    const signupForm  = document.getElementById('signup-form');
    const signupBtn   = document.getElementById('signup-submit');
    const signupError = document.getElementById('signup-error');
    const nameInput   = document.getElementById('signup-name');
    const nameChar    = document.getElementById('nameCharCount');
    nameInput.addEventListener('input', () => {
      nameInput.value = nameInput.value.replace(/[^A-Za-z0-9]/g, '').slice(0, 13);
      const len = nameInput.value.length;
      nameChar.textContent = '(' + len + '/13)';
      nameChar.style.color = (len >= 3) ? '#22c55e' : '#ef4444';
    });
    signupForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      signupError.classList.remove('show'); signupError.textContent = '';
      const name     = nameInput.value.trim();
      const email    = document.getElementById('signup-email').value.trim().toLowerCase();
      const password = document.getElementById('signup-password').value;
      if (!/^[A-Za-z0-9]{3,13}$/.test(name)) {
        signupError.textContent = 'Name must be 3-13 letters/digits.';
        signupError.classList.add('show'); return;
      }
      signupBtn.disabled = true;
      const orig = signupBtn.textContent;
      signupBtn.textContent = 'Creating account…';
      try {
        const { user } = await createUserWithEmailAndPassword(auth, email, password);
        await updateProfile(user, { displayName: name });
        await setDoc(doc(db, 'users', user.uid), {
          displayName: name, email, color: selectedColor, xp: 0, createdAt: serverTimestamp()
        });
        window.location.assign('/profile.html');
      } catch (err) {
        signupError.textContent = friendly(err);
        signupError.classList.add('show');
        signupBtn.disabled = false;
        signupBtn.textContent = orig;
      }
    });
  </script>
</body>
</html>
