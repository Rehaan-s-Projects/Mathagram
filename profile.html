<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile — Mathagram</title>
  <link rel="icon" href="assets/lighthouse/logo.svg">
  <link rel="stylesheet" href="css/global.css">
  <style>
    .profile-header {
      background: linear-gradient(135deg, var(--color-primary-dark) 0%, var(--color-primary) 100%);
      padding: 48px 24px 80px;
      width: 100%;
    }
    .profile-container {
      max-width: 600px;
      margin: -60px auto 0;
      padding: 0 24px 48px;
      text-align: center;
      position: relative;
    }
    .profile-card {
      background: var(--color-white);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      padding: 90px 32px 40px;
      position: relative;
    }
    .profile-avatar-circle {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      overflow: hidden;
      position: absolute;
      top: -70px;
      left: 50%;
      transform: translateX(-50%);
      border: 5px solid var(--color-white);
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
      background: var(--color-white);
      z-index: 2;
    }
    .profile-avatar-circle img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      display: block;
    }
    .profile-card h2 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .level-badge {
      display: none;
    }
    .stats {
      display: flex;
      justify-content: center;
      gap: 32px;
      margin-bottom: 28px;
    }
    .stat {
      text-align: center;
    }
    .stat-value {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--color-text);
    }
    .stat-label {
      font-size: 0.8rem;
      color: var(--color-text-muted);
    }
    .course-progress-section {
      text-align: left;
      margin: 28px 0;
    }
    .course-progress-section h3 {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 12px;
    }
    .lesson-list {
      list-style: none;
      padding: 0;
    }
    .lesson-list li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid var(--color-border);
      font-size: 0.9rem;
    }
    .lesson-grade {
      font-weight: 600;
    }
    .lesson-stars {
      color: var(--color-xp);
    }
    .profile-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-top: 24px;
    }
    .profile-actions .btn {
      min-width: 140px;
    }
    .no-progress {
      color: var(--color-text-muted);
      font-size: 0.9rem;
      padding: 16px 0;
    }
    .color-option-profile {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 3px solid transparent;
      cursor: pointer;
    }
    .color-option-profile.selected {
      border-color: #1a1a2e !important;
    }
    @media (max-width: 600px) {
      .profile-header {
        padding: 36px 24px 70px;
      }
      .profile-container {
        margin-top: -50px;
      }
      .profile-card {
        padding: 80px 20px 28px;
      }
      .profile-avatar-circle {
        width: 120px;
        height: 120px;
        top: -60px;
      }
      .stats {
        gap: 20px;
      }
    }
  </style>
</head>
<body>

  <!-- Navigation -->
  <nav class="nav">
    <div class="container">
      <a href="/" class="nav-logo">
        <img src="assets/lighthouse/logo.svg" alt="" width="32" height="32">
        <span>Mathagram</span>
      </a>
      <div class="nav-links">
        <a href="/">Courses</a>
        <a href="learning-post.html">Posts</a>
        <a href="profile.html" class="active">Profile</a>
      </div>
    </div>
  </nav>

  <!-- Big Profile Header -->
  <div class="profile-header"></div>

  <!-- Profile -->
  <div class="profile-container">
    <div class="profile-card">

      <!-- Avatar (overlaps header) -->
      <div id="profile-avatar" class="profile-avatar-circle"></div>

      <!-- Name & Level -->
      <div id="name-box" style="margin-bottom:12px;">
        <input type="text" id="profile-name-input" maxlength="13" minlength="13" pattern="[A-Za-z]{13}" placeholder="Your Name" title="Only characters A-Z and a-z, exactly 13 characters" style="width:100%; max-width:320px; padding:14px 20px; font-size:1.3rem; font-weight:800; text-align:center; border:2px solid var(--color-border); border-radius:var(--radius-lg); background:var(--color-bg); color:var(--color-text); font-family:inherit; outline:none; transition:border-color 0.2s;">
        <div style="display:flex; justify-content:center; align-items:center; gap:8px; margin-top:6px;">
          <span id="nameSaveStatus" style="font-size:0.72rem; color:var(--color-text-muted);"></span>
        </div>
      </div>
      <div id="level-badge" class="level-badge"></div>

      <!-- Color Picker -->
      <div id="color-picker" style="margin-bottom:20px;">
        <p style="font-weight:600; font-size:0.85rem; margin-bottom:10px; color:var(--color-text-secondary);">Change your color</p>
        <div style="display:flex; gap:10px; flex-wrap:wrap; justify-content:center;">
          <button type="button" class="color-option" data-color="blue" style="width:44px; height:44px; border-radius:50%; border:3px solid transparent; cursor:pointer; background:none; padding:0; transition:border-color 0.2s;"><img src="assets/avatars/blue.svg" style="width:44px; height:44px; border-radius:50%;"></button>
          <button type="button" class="color-option" data-color="green" style="width:44px; height:44px; border-radius:50%; border:3px solid transparent; cursor:pointer; background:none; padding:0; transition:border-color 0.2s;"><img src="assets/avatars/green.svg" style="width:44px; height:44px; border-radius:50%;"></button>
          <button type="button" class="color-option" data-color="orange" style="width:44px; height:44px; border-radius:50%; border:3px solid transparent; cursor:pointer; background:none; padding:0; transition:border-color 0.2s;"><img src="assets/avatars/orange.svg" style="width:44px; height:44px; border-radius:50%;"></button>
          <button type="button" class="color-option" data-color="purple" style="width:44px; height:44px; border-radius:50%; border:3px solid transparent; cursor:pointer; background:none; padding:0; transition:border-color 0.2s;"><img src="assets/avatars/purple.svg" style="width:44px; height:44px; border-radius:50%;"></button>
          <button type="button" class="color-option" data-color="cyan" style="width:44px; height:44px; border-radius:50%; border:3px solid transparent; cursor:pointer; background:none; padding:0; transition:border-color 0.2s;"><img src="assets/avatars/cyan.svg" style="width:44px; height:44px; border-radius:50%;"></button>
          <button type="button" class="color-option" data-color="pink" style="width:44px; height:44px; border-radius:50%; border:3px solid transparent; cursor:pointer; background:none; padding:0; transition:border-color 0.2s;"><img src="assets/avatars/pink.svg" style="width:44px; height:44px; border-radius:50%;"></button>
          <button type="button" class="color-option" data-color="gray" style="width:44px; height:44px; border-radius:50%; border:3px solid transparent; cursor:pointer; background:none; padding:0; transition:border-color 0.2s;"><img src="assets/avatars/gray.svg" style="width:44px; height:44px; border-radius:50%;"></button>
        </div>
      </div>

      <!-- Save Button -->
      <button id="btn-save-profile" class="btn btn-primary" style="width:100%; max-width:320px; padding:12px; font-size:1rem; margin-bottom:24px;">Save Changes</button>
      <p id="save-profile-status" style="font-size:0.8rem; color:var(--color-text-muted); margin-top:-16px; margin-bottom:20px;"></p>

      <!-- Stats -->
      <div class="stats">
        <div class="stat">
          <div id="stat-xp" class="stat-value">0</div>
          <div class="stat-label">Total XP</div>
        </div>
        <div class="stat">
          <div id="stat-streak" class="stat-value">0</div>
          <div class="stat-label">Day Streak</div>
        </div>
        <div class="stat">
          <div id="stat-focusers" class="stat-value">0</div>
          <div class="stat-label">Focusers</div>
        </div>
      </div>

      <!-- Course Progress -->
      <div class="course-progress-section">
        <h3>Course Progress</h3>
        <ul id="lesson-list" class="lesson-list">
          <li class="no-progress">No lessons completed yet. Start learning!</li>
        </ul>
      </div>

      <!-- Actions -->
      <div class="profile-actions">
        <button id="btn-signout" class="btn btn-outline">Sign Out</button>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <p class="footer-copy">&copy; <span id="year"></span> Mathagram.org — All Rights Reserved. Built by Rehaan Rashid</p>
    </div>
  </footer>

  <!-- Scripts -->
  <script type="module">
    import { initNav } from './js/nav.js';
    initNav('');
    import { onAuthChange, getUserProfile, logOut } from './js/auth.js';
    import { calculateLevel, LEVELS, getCourseProgress } from './js/progress.js';
    import { doc, updateDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
    import { db, auth as fbAuth } from './js/firebase-config.js';
    document.getElementById('year').textContent = new Date().getFullYear();

    function getColorValue(colorName) {
      const colors = {
        blue: '#3b82f6',
        green: '#22c55e',
        orange: '#f97316',
        purple: '#8b5cf6',
        cyan: '#06b6d4',
        pink: '#ec4899',
        gray: '#6b7280'
      };
      return colors[colorName] || colors.blue;
    }

    // Redirect if not logged in
    onAuthChange(async (user) => {
      if (!user) {
        window.location.href = 'login.html';
        return;
      }

      try {
      // Load profile
      const profile = await getUserProfile();
      if (!profile) {
        document.getElementById('profile-name-input').value = user.displayName || 'New Learner';
        return;
      }

      // Avatar image
      const userColor = profile.color || 'blue';
      const displayName = profile.displayName || 'Learner';
      const avatarEl = document.getElementById('profile-avatar');
      avatarEl.innerHTML = `<img src="assets/avatars/${userColor}.svg" alt="">`;

      // Color picker — highlight current and handle clicks
      const colorMap = { blue:'#3b82f6', green:'#22c55e', orange:'#f97316', purple:'#8b5cf6', cyan:'#06b6d4', pink:'#ec4899', gray:'#6b7280' };
      document.querySelectorAll('#color-picker .color-option').forEach(btn => {
        if (btn.dataset.color === userColor) {
          btn.style.borderColor = colorMap[userColor] || '#3b82f6';
        }
        btn.addEventListener('click', () => {
          const newColor = btn.dataset.color;
          // Update UI immediately (not saved until Save button)
          document.querySelectorAll('#color-picker .color-option').forEach(b => b.style.borderColor = 'transparent');
          btn.style.borderColor = colorMap[newColor] || '#3b82f6';
          avatarEl.innerHTML = `<img src="assets/avatars/${newColor}.svg" alt="">`;
          pendingColor = newColor;
        });
      });

      // Display name input
      const nameInput = document.getElementById('profile-name-input');
      const nameSave = document.getElementById('nameSaveStatus');
      nameInput.value = displayName;

      // Filter to A-Z a-z only, max 13
      function updateNameCount() {
        nameInput.value = nameInput.value.replace(/[^A-Za-z]/g, '');
        if (nameInput.value.length > 13) nameInput.value = nameInput.value.slice(0, 13);
      }
      nameInput.addEventListener('input', updateNameCount);
      nameInput.addEventListener('keyup', updateNameCount);
      nameInput.addEventListener('change', updateNameCount);
      nameInput.addEventListener('search', updateNameCount);

      nameInput.addEventListener('focus', () => {
        nameInput.style.borderColor = 'var(--color-primary)';
      });
      nameInput.addEventListener('blur', () => {
        nameInput.style.borderColor = 'var(--color-border)';
      });

      // Track pending color
      let pendingColor = userColor;

      // Save button handler
      const saveBtn = document.getElementById('btn-save-profile');
      const saveStatus = document.getElementById('save-profile-status');
      let statusTimeout = null;

      saveBtn.addEventListener('click', async () => {
        const newName = nameInput.value.trim();
        if (!newName || newName.length !== 13 || !/^[A-Za-z]{13}$/.test(newName)) {
          saveStatus.textContent = 'Name must be exactly 13 characters, only A-Z and a-z.';
          saveStatus.style.color = '#ef4444';
          clearTimeout(statusTimeout);
          statusTimeout = setTimeout(() => { saveStatus.textContent = ''; }, 3000);
          return;
        }
        try {
          saveBtn.disabled = true;
          saveBtn.textContent = 'Saving...';
          saveStatus.textContent = '';
          const userRef = doc(db, 'users', fbAuth.currentUser.uid);
          await updateDoc(userRef, { displayName: newName, color: pendingColor });
          saveBtn.textContent = 'Save Changes';
          saveBtn.disabled = false;
          saveStatus.textContent = 'Saved!';
          saveStatus.style.color = '#22c55e';
          clearTimeout(statusTimeout);
          statusTimeout = setTimeout(() => { saveStatus.textContent = ''; }, 2000);
        } catch(e) {
          saveBtn.textContent = 'Save Changes';
          saveBtn.disabled = false;
          saveStatus.textContent = 'Error saving';
          saveStatus.style.color = '#ef4444';
          console.error('Save failed:', e);
        }
      });

      nameInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); saveBtn.click(); nameInput.blur(); } });

      // Level
      // Migrate legacy totalXP → xp on profile load
      let xp = profile.xp || 0;
      if (!xp && profile.totalXP) {
        xp = profile.totalXP;
        try {
          const userRef = doc(db, 'users', fbAuth.currentUser.uid);
          await updateDoc(userRef, { xp: profile.totalXP, totalXP: 0 });
        } catch (e) {}
      }
      const levelInfo = calculateLevel(xp);
      document.getElementById('level-badge').textContent = `Level ${levelInfo.level} — ${levelInfo.title}`;

      // Stats
      document.getElementById('stat-xp').textContent = xp;
      document.getElementById('stat-streak').textContent = profile.streak || 0;
      document.getElementById('stat-focusers').textContent = profile.focusers || 0;

      // Course progress
      try {
        const progress = await getCourseProgress('calculus');
        const lessonList = document.getElementById('lesson-list');
        const entries = Object.entries(progress);

        if (entries.length > 0) {
          lessonList.innerHTML = '';
          entries.forEach(([lessonId, data]) => {
            const stars = '★'.repeat(data.stars) + '☆'.repeat(3 - data.stars);
            const li = document.createElement('li');
            li.innerHTML = `
              <span>${lessonId}</span>
              <span>
                <span class="lesson-grade">${data.grade}</span>
                <span class="lesson-stars">${stars}</span>
              </span>
            `;
            lessonList.appendChild(li);
          });
        }
      } catch (err) {
        // Progress not available yet
      }

      } catch(profileError) {
        console.error('Profile error:', profileError);
        document.getElementById('profile-name-input').value = 'Error';
        document.getElementById('nameSaveStatus').textContent = profileError.message;
      }
    });

    // Sign out
    document.getElementById('btn-signout').addEventListener('click', async () => {
      await logOut();
      window.location.href = 'login.html';
    });
  </script>

</body>
</html>
