    const playable = {1:'lesson-1.html'};
    units.forEach(([unitNum, unitName, titles]) => {
      titles.forEach((title, i) => {
        lessonNum++;
        lessons.push({
          id: 'im-' + lessonNum,
          title: title,
          href: playable[lessonNum] || '#',
          unit: unitNum,
          unitName: unitName,
          category: 'math',
          checkpoint: i === titles.length - 1
        });
      });
    });
    async function loadPath() {
      const container = document.getElementById('learning-path');
      let completed = await getCompletedLessons('impossible-math');
      renderPath(container, lessons, completed);
      onAuthChange(async (user) => {
        completed = await getCompletedLessons('impossible-math');
        renderPath(container, lessons, completed);
      });
    }
    loadPath();
