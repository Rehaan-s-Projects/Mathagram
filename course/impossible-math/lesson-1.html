<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edam's Impossible Math — Level 1</title>
<link rel="icon" href="../../assets/lighthouse/logo.svg">
<link rel="stylesheet" href="../../css/global.css">
<link rel="stylesheet" href="../../css/characters.css">
<style>
body{background:#1a1a2e;color:#fff;min-height:100vh}
.wrap{max-width:500px;margin:70px auto 40px;text-align:center;padding:16px}
h1{font-size:1.5rem;margin-bottom:4px}
.sub{color:#94a3b8;font-size:.9rem;margin-bottom:16px}
.bar{height:12px;background:#334155;border-radius:6px;margin-bottom:20px;overflow:hidden}
.fill{height:100%;border-radius:6px;transition:width .3s,background .3s}
.edam-box{margin-bottom:20px;position:relative}
.edam-img{width:120px;height:120px;border-radius:50%;border:4px solid #fbbf24;margin:0 auto 8px;display:block;transition:border-color .3s,filter .3s}
.edam-mood{font-size:.85rem;font-weight:700;transition:color .3s}
.edam-speech{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:12px 16px;margin-top:10px;font-size:.9rem;color:#e2e8f0;font-style:italic;min-height:40px}
.question-box{background:rgba(255,255,255,.05);border:2px solid #334155;border-radius:16px;padding:24px;margin-bottom:16px;font-size:1.8rem;font-weight:900;min-height:80px;display:flex;align-items:center;justify-content:center;transition:border-color .3s}
.answer-input{width:100%;max-width:200px;padding:14px;font-size:1.5rem;font-weight:800;text-align:center;border:3px solid #475569;border-radius:12px;background:#0f172a;color:#fff;outline:none;font-family:inherit;margin-bottom:12px}
.answer-input:focus{border-color:#22d3ee}
.submit-btn{padding:12px 40px;font-size:1.1rem;font-weight:700;border:none;border-radius:12px;cursor:pointer;transition:all .2s}
.submit-btn:active{transform:scale(.95)}
.ok{padding:12px;border-radius:10px;margin:12px 0;font-weight:700;background:rgba(34,197,94,.15);color:#22c55e;border:2px solid #22c55e}
.no{padding:12px;border-radius:10px;margin:12px 0;font-weight:700;background:rgba(239,68,68,.15);color:#ef4444;border:2px solid #ef4444}
.btn{padding:12px 32px;font-size:1rem;font-weight:700;background:#22d3ee;color:#0f172a;border:none;border-radius:12px;cursor:pointer;margin-top:8px}
.btn:hover{background:#06b6d4}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
@keyframes pulse-red{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.4)}50%{box-shadow:0 0 20px 10px rgba(239,68,68,.2)}}
.screen-flash{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:999;opacity:0;transition:opacity .1s}
</style>
</head>
<body>
<div class="screen-flash" id="flash"></div>
<script type="module" src="../../js/auth-gate.js" data-base="../../"></script>
<nav class="nav"><div class="container">
<a href="../../index.html" class="nav-logo"><img src="../../assets/lighthouse/logo.svg" alt="" width="32" height="32"><span>Mathagram</span></a>
<div class="nav-links"><a href="../../courses.html">Courses</a><a href="../../learning-post.html">Posts</a><a href="../../login.html" data-auth="login">Login</a></div>
</div></nav>

<div class="wrap">
<h1>Edam's Impossible Math</h1>
<p class="sub">Answer correctly... or Edam gets angry.</p>
<div class="bar"><div class="fill" id="bar" style="width:0%;background:#22c55e"></div></div>

<div class="edam-box">
  <img src="../../assets/characters/edam.svg" alt="Edam" class="edam-img" id="edam">
  <div class="edam-mood" id="mood" style="color:#22c55e">&#128522; Edam is happy!</div>
  <div class="edam-speech" id="speech">Welcome! Let's start with something easy...</div>
</div>

<div class="question-box" id="question">Loading...</div>
<input type="text" class="answer-input" id="answer" placeholder="?" autocomplete="off">
<br>
<button class="submit-btn" id="submitBtn" style="background:#22d3ee;color:#0f172a">Submit</button>
<div id="msg"></div>
</div>

<script>
var questions = [
  // Easy (Edam happy)
  {q:'1 + 1 = ?', a:'2', diff:0},
  {q:'5 - 3 = ?', a:'2', diff:0},
  {q:'2 × 4 = ?', a:'8', diff:0},
  // Medium (Edam serious)
  {q:'12 × 12 = ?', a:'144', diff:1},
  {q:'√144 = ?', a:'12', diff:1},
  {q:'25% of 200 = ?', a:'50', diff:1},
  // Hard (Edam angry)
  {q:'17 × 23 = ?', a:'391', diff:2},
  {q:'2⁸ = ?', a:'256', diff:2},
  {q:'∫ 2x dx = ?', a:'x^2', diff:2},
  // Impossible (Edam furious)
  {q:'What is 9,653 × 7,281?', a:'70284393', diff:3},
  {q:'BB(5) = ?', a:'47176870', diff:3},
  {q:'83² = ?', a:'6889', diff:3},
  // INSANE
  {q:'What is the 10th digit of π?', a:'5', diff:4},
  {q:'Find x: x^x^x = 256', a:'2', diff:4},
  {q:'How many primes < 100?', a:'25', diff:4},
];

var ci = 0, sc = 0, N = questions.length, busy = false;

var moods = [
  {border:'#22c55e',mood:'&#128522; Edam is happy!',moodColor:'#22c55e',speech:'This is easy! You got this!',barColor:'#22c55e',bg:'#1a1a2e'},
  {border:'#fbbf24',mood:'&#128528; Edam is serious.',moodColor:'#fbbf24',speech:'Hmm... getting harder now.',barColor:'#fbbf24',bg:'#1a1a2e'},
  {border:'#f97316',mood:'&#128544; Edam is ANGRY!',moodColor:'#f97316',speech:'You better get this right...',barColor:'#f97316',bg:'#1f1515'},
  {border:'#ef4444',mood:'&#129324; Edam is FURIOUS!!',moodColor:'#ef4444',speech:'I AM LOSING MY PATIENCE!!!',barColor:'#ef4444',bg:'#2a0a0a'},
  {border:'#dc2626',mood:'&#128565; Edam has LOST IT!!!',moodColor:'#dc2626',speech:'IMPOSSIBLE!!! YOU CANNOT SOLVE THIS!!!',barColor:'#dc2626',bg:'#1a0505'},
];

function getMood(diff) { return moods[Math.min(diff, moods.length-1)]; }

function render() {
  var q = questions[ci];
  var m = getMood(q.diff);

  document.getElementById('bar').style.width = (ci/N*100)+'%';
  document.getElementById('bar').style.background = m.barColor;
  document.getElementById('question').textContent = q.q;
  document.getElementById('question').style.borderColor = m.border;
  document.getElementById('edam').style.borderColor = m.border;
  document.getElementById('mood').innerHTML = m.mood;
  document.getElementById('mood').style.color = m.moodColor;
  document.getElementById('speech').textContent = m.speech;
  document.getElementById('answer').value = '';
  document.getElementById('answer').focus();
  document.getElementById('msg').innerHTML = '';
  document.body.style.background = m.bg;

  // Shake edam on hard+
  if (q.diff >= 2) {
    document.getElementById('edam').style.animation = 'shake 0.3s ease '+(q.diff >= 3 ? 'infinite' : '3');
  } else {
    document.getElementById('edam').style.animation = 'none';
  }
  // Red pulse on furious+
  if (q.diff >= 3) {
    document.getElementById('edam').style.animation = 'shake 0.2s ease infinite, pulse-red 1s ease infinite';
    document.getElementById('edam').style.filter = 'saturate(1.5) brightness(0.9)';
  } else {
    document.getElementById('edam').style.filter = 'none';
  }
}

function flash(color) {
  var f = document.getElementById('flash');
  f.style.background = color;
  f.style.opacity = '0.3';
  setTimeout(function(){f.style.opacity='0'},150);
}

function submit() {
  if (busy) return;
  busy = true;
  var q = questions[ci];
  var ans = document.getElementById('answer').value.trim().toLowerCase().replace(/\s+/g,'');
  var correct = ans === q.a.toLowerCase().replace(/\s+/g,'');
  // Also accept x**2 or x2 for x^2
  if (!correct && q.a === 'x^2') correct = (ans === 'x**2' || ans === 'x2' || ans === 'x^2+c' || ans === 'x²');

  if (correct) {
    sc++;
    flash('#22c55e');
    var speeches = ['Correct!','Nice!','Well done!','You got it!','Impressive!'];
    document.getElementById('msg').innerHTML = '<div class="ok">✓ '+speeches[ci%speeches.length]+'</div><button class="btn" id="nxtbtn">Next →</button>';
  } else {
    flash('#ef4444');
    var angry = q.diff >= 3 ?
      ['WRONG!!! The answer was '+q.a+'!','YOU FAILED! It was '+q.a+'!','UNACCEPTABLE! Answer: '+q.a] :
      ['Wrong! The answer was '+q.a+'.','Nope! It\'s '+q.a+'.','Incorrect. '+q.a+' was the answer.'];
    document.getElementById('msg').innerHTML = '<div class="no">✗ '+angry[ci%angry.length]+'</div><button class="btn" id="nxtbtn">'+(ci>=N-1?'Finish':'Next →')+'</button>';
    // Shake screen on wrong for hard+
    if (q.diff >= 2) document.querySelector('.wrap').style.animation = 'shake 0.3s ease';
    setTimeout(function(){document.querySelector('.wrap').style.animation='none'},400);
  }
  busy = false;
}

document.getElementById('msg').addEventListener('click',function(e){
  if(e.target.id==='nxtbtn') next();
});
document.getElementById('submitBtn').addEventListener('click', submit);
document.getElementById('answer').addEventListener('keydown',function(e){
  if(e.key==='Enter') submit();
});

function next() {
  ci++;
  if (ci < N) {
    render();
  } else {
    finish();
  }
}

function finish() {
  document.getElementById('bar').style.width = '100%';
  document.body.style.background = '#1a1a2e';
  var pct = Math.round(sc/N*100);
  var gr,st;
  if(pct>=95){gr='A';st=3}else if(pct>=85){gr='B+';st=2}else if(pct>=70){gr='B';st=2}else if(pct>=60){gr='C';st=1}else{gr='D';st=0}
  var xp=pct>=60?10+(pct===100?5:0):0;
  var sl='';for(var i=0;i<3;i++)sl+=i<st?'⭐':'☆';

  var survived = pct >= 70;
  document.getElementById('edam').style.animation = 'none';
  document.getElementById('edam').style.filter = 'none';
  document.getElementById('edam').style.borderColor = survived ? '#22c55e' : '#ef4444';

  document.querySelector('.edam-box').innerHTML =
    '<img src="../../assets/characters/edam.svg" class="edam-img" style="border-color:'+(survived?'#22c55e':'#ef4444')+'">'+
    '<div class="edam-mood" style="color:'+(survived?'#22c55e':'#ef4444')+'">'+(survived?'&#128522; Edam is impressed!':'&#128545; Edam is disappointed.')+'</div>'+
    '<div class="edam-speech">'+(survived?'"Wow... you actually survived. I\'m proud of you. Maybe you ARE smart after all."':'"You couldn\'t handle it. Come back when you\'re ready to face IMPOSSIBLE MATH again."')+'</div>';

  document.getElementById('question').innerHTML = '';
  document.getElementById('answer').style.display = 'none';
  document.getElementById('submitBtn').style.display = 'none';
  document.getElementById('msg').innerHTML =
    '<div style="margin:20px 0">'+
    '<h2 style="font-size:2.5rem;margin:0 0 8px">'+gr+'</h2>'+
    '<div style="font-size:2.5rem;letter-spacing:6px">'+sl+'</div>'+
    '<div style="font-size:1.3rem;color:#eab308;font-weight:700;margin:12px 0">+'+xp+' XP</div>'+
    '<p style="margin:8px 0;color:#94a3b8">Score: '+pct+'% &middot; '+sc+'/'+N+' correct</p>'+
    '<a href="index.html" class="btn" style="text-decoration:none;display:inline-block;margin-top:12px">Back to Course</a>'+
    '</div>';
  if(typeof window._saveResult==='function')window._saveResult(pct);
}

render();
</script>

<script type="module">
import { initNav } from '../../js/nav.js';
import { initRitaChat } from '../../js/rita-chat.js';
import { initSideCharacter } from '../../js/characters.js';
import { saveLessonResult } from '../../js/progress.js';
import { onAuthChange } from '../../js/auth.js';
initNav('../../');initRitaChat('../../');initSideCharacter('edam','../../');
window._saveResult=function(pct){onAuthChange(async function(u){if(u)await saveLessonResult('impossible-math','im-1',pct)})};
</script>
</body>
</html>
