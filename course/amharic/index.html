<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Amharic — Mathagram</title>
  <link rel="icon" href="../../assets/lighthouse/logo.svg">
  <link rel="stylesheet" href="../../css/global.css">
  <link rel="stylesheet" href="../../css/learning-path.css">
  <style>
    .course-header { padding: 80px 24px 24px; text-align: center; }
    .course-badge { display: inline-block; padding: 4px 14px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #fff; border-radius: 999px; margin-bottom: 12px; }
    .course-header h1 { font-size: 2.5rem; font-weight: 800; margin-bottom: 8px; }
    .course-header p { font-size: 1rem; color: var(--color-text-secondary); max-width: 560px; margin: 0 auto; line-height: 1.6; }
    @media (max-width: 768px) { .course-header h1 { font-size: 2rem; } }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="container">
      <a href="../../index.html" class="nav-logo">
        <img src="../../assets/lighthouse/logo.svg" alt="" width="32" height="32">
        <span>Mathagram</span>
      </a>
      <div class="nav-links">
        <a href="../../courses.html">Courses</a>
        <a href="../../login.html" data-auth="login">Login</a>
      </div>
    </div>
  </nav>
  <header class="course-header">
    <span class="course-badge" style="background:var(--color-language)">Language</span>
    <h1>Amharic</h1>
    <p>Learn Amharic — the official language of Ethiopia, written in the beautiful Ge'ez script. 97 lessons across 7 units.</p>
  </header>
  <div id="learning-path" class="path-container"></div>
  <footer class="footer">
    <div class="container">
      <p class="footer-copy">&copy; <span id="year"></span> Mathagram.org — All Rights Reserved.</p>
    </div>
  </footer>
  <script type="module">
    import { initNav } from '../../js/nav.js';
    initNav('../../');
    import { renderPath, getCompletedLessons } from '../../js/learning-path.js';
    import { onAuthChange } from '../../js/auth.js';
    document.getElementById('year').textContent = new Date().getFullYear();
    const units = [
      [1,"Ge'ez Script",['Fidel Writing System Overview','First Order (Ge\'ez) ሀ ለ ሐ','Second Order (Ka\'ib) ሁ ሉ ሑ','Third Order (Salis) ሂ ሊ ሒ','Fourth Order (Rabi) ሃ ላ ሓ','Fifth Order (Hamis) ሄ ሌ ሔ','Sixth Order (Sadis) ህ ል ሕ','Seventh Order (Sabi) ሆ ሎ ሖ','Ge\'ez Numerals','Punctuation Marks','Reading Fidel Charts','Writing Practice 1','Writing Practice 2','Script Review']],
      [2,'Greetings & Basics',['Selam (Hello)','Ameseginalehu (Thank You)','Awo/Aye (Yes/No)','Endemin neh/nesh? (How Are You?)','Sime... new (My Name Is)','Keyet neh/nesh? (Where From?)','Dehna ader/aderi (Good Night)','Yikir ta (Excuse Me)','Ebakih/Ebakish (Please)','Numbers 1-20','Numbers 21-100','Days & Months (Ethiopian Calendar)','Emergency Phrases','Greetings Review']],
      [3,'Grammar Foundations',['SOV Word Order','Nouns & Gender','Definite Article (-u/-wa)','Plural Formation','Pronouns (I You He She)','Possessives','Adjectives','Demonstratives (This/That)','Prepositions','Question Words','Negation','Conjunctions','Sentence Patterns','Grammar Review']],
      [4,'Verb System',['Verb Roots (Trilateral)','Present Tense','Past Tense (Simple)','Future Tense','Imperative','Gerund','Infinitive','Negative Verbs','Common Verbs 1 (eat drink go)','Common Verbs 2 (see hear speak)','Compound Verbs','Verb Agreement (Gender/Number)','Verb Practice','Verbs Review']],
      [5,'Daily Life',['Family (Beteseb)','Injera & Wot','Buna (Coffee Ceremony)','Teff & Ethiopian Grains','Home (Bet)','Clothing (Habesha Kemis)','Market Shopping (Gebya)','Transportation','Health & Body','At the Hospital','School (Timhirt Bet)','Work & Occupations','Daily Conversations','Daily Life Review']],
      [6,'Culture & Ethiopia',['Ethiopian History Overview','Aksumite Empire','Lalibela Rock Churches','Gondar Castles','Addis Ababa','Timkat Festival','Meskel Festival','Ethiopian Christmas (Genna)','Ethiopian Music (Eskista)','Ethiopian Orthodox Church','Haile Selassie','Ethiopian Cuisine Culture','Proverbs & Sayings','Culture Review']],
      [7,'Fluency & Mastery',['Conversation Practice 1','Conversation Practice 2','Storytelling','Expressing Opinions','Reading Practice 1','Reading Practice 2','Writing Practice','Listening Practice','Idioms & Expressions','Formal vs Informal Register','News Reading','Comprehensive Test','Amharic Mastery!']]
    ];
    let n = 0;
    const lessons = [];
    units.forEach(([u, name, titles]) => {
      titles.forEach((t, i) => {
        n++;
        lessons.push({ id: 'am-'+n, title: t, href: '#', unit: u, unitName: name, category: 'language', checkpoint: i===titles.length-1 });
      });
    });
    async function loadPath() {
      const container = document.getElementById('learning-path');
      let completed = new Set();
      onAuthChange(async (user) => {
        if (user) completed = await getCompletedLessons('amharic');
        renderPath(container, lessons, completed);
      });
      renderPath(container, lessons, completed);
    }
    loadPath();
  </script>
</body>
</html>
