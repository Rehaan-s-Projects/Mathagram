    <h1>AP Statistics</h1>
    <p>Collect, analyze, and draw conclusions from data. Includes AP exam prep and workplace math. 264 lessons across 11 units.</p>
  </header>

  <script>
    // Force clear ALL caches
    if ('caches' in window) { caches.keys().then(function(n){n.forEach(function(k){caches.delete(k)})}); }
    if ('serviceWorker' in navigator) { navigator.serviceWorker.getRegistrations().then(function(r){r.forEach(function(g){g.unregister()})}); }
  </script>
  <script type="module">
    import { initNav } from '../../js/nav.js?v=3';
    initNav('../../');
    import { renderPath, getCompletedLessons } from '../../js/learning-path.js?v=3';
    import { onAuthChange } from '../../js/auth.js?v=3';
    document.getElementById('year').textContent = new Date().getFullYear();

    const units = [
      [1, 'Exploring Data', ['Categorical vs Quantitative Data','Frequency Tables','Measures of Center','Stem-and-Leaf Plots','Dot Plots','Frequency Tables Practice','Relative Frequency','Cumulative Frequency','Two-Way Tables','Marginal & Conditional Distributions','Comparing Distributions','Bar Graphs & Pie Charts','Pareto Charts','Pictographs','Time Series Plots','Misleading Graphs','Data Collection Methods','Exploring Data Practice']],
      [2, 'Describing Distributions', ['Histograms & Stemplots','Mean Median Mode','Standard Deviation & IQR','Skewness & Symmetry','Outliers & IQR Rule','Five-Number Summary','Comparing Box Plots','Standard Deviation Calculation','Variance','Chebyshev\'s Theorem','Empirical Rule 68-95-99.7','Range & Interquartile Range','Percentiles & Quartiles','Modified Box Plots','Comparing Two Distributions','Describing Shape Center Spread','Describing Distributions Practice']],
      [3, 'Normal Distributions', ['The Normal Curve','Z-Scores','The Empirical Rule','Properties of Normal Curves','Standard Normal Distribution','Z-Score Calculations','Using Z-Tables','Finding Percentiles','Finding Values from Percentiles','Normal Probability Plots','Assessing Normality','Comparing Z-Scores Across Distributions','Transforming Data','Normal Approximation to Binomial','When Normal Model Fails','Normal Distributions Practice']],
      [4, 'Designing Studies', ['Sampling Methods','Observational Studies vs Experiments','Bias & Confounding','Census vs Sample','Simple Random Sampling','Stratified Sampling','Cluster Sampling','Systematic Sampling','Bias in Sampling','Randomized Block Design','Matched Pairs Design','Convenience & Voluntary Response Sampling','Nonresponse & Undercoverage Bias','Blinding & Double-Blinding','Placebo Effect','Control Groups','Replication in Experiments','Scope of Inference','Designing Studies Practice']],
      [5, 'Probability', ['Basic Probability Rules','Conditional Probability','Independence','Sample Spaces & Events','Complement Rule','Addition Rule Mutually Exclusive','Addition Rule General','Multiplication Rule Independent','Multiplication Rule General','Conditional Probability Formula','Bayes\' Theorem Introduction','Tree Diagrams','Venn Diagrams in Probability','Permutations','Combinations','Counting Principles','Law of Large Numbers','Simulation & Probability','Probability Practice']],
      [6, 'Random Variables', ['Discrete Random Variables','Continuous Random Variables','The Binomial Distribution','Probability Distributions','Expected Value Mean','Standard Deviation of Random Variable','Combining Random Variables','Binomial Distribution','Binomial Probability Formula','Geometric Distribution','Poisson Distribution','Uniform Distribution','Transforming Random Variables','Mean & Variance of Sums','Mean & Variance of Differences','Normal Random Variables','Random Variables Practice']],
      [7, 'Sampling Distributions', ['Sampling Variability','Central Limit Theorem','Sampling Distribution of Proportion','What is a Sampling Distribution','Sampling Distribution of Sample Mean','CLT Applications','Sampling Distribution of Sample Proportion','Standard Error','Effect of Sample Size','Simulation of Sampling Distributions','t-Distribution Introduction','Conditions for CLT','Sampling Distribution of Difference of Means','Sampling Distribution of Difference of Proportions','Bias & Variability of Estimators','Sampling Distributions Practice']],
      [8, 'Confidence Intervals', ['Confidence Interval for a Mean','Confidence Interval for a Proportion','Margin of Error','Interpreting Confidence Level','CI for Mean sigma known','CI for Mean sigma unknown','CI for a Proportion detailed','Sample Size Determination','CI for Difference of Means','CI for Difference of Proportions','Choosing the Right CI','Conditions for CI','Interpreting CI in Context','Common CI Mistakes','CI for Matched Pairs','CI Width & Sample Size','Confidence Intervals Practice']],
      [9, 'Hypothesis Testing', ['Null & Alternative Hypotheses','P-Values & Significance','Type I & Type II Errors','Steps of a Hypothesis Test','One-Sample Z-Test','One-Sample t-Test','Two-Sample t-Test','Paired t-Test','One-Proportion Z-Test','Two-Proportion Z-Test','Chi-Square Goodness of Fit','Chi-Square Test of Independence','Chi-Square Homogeneity','Power of a Test','Significance Level & Power','Linear Regression t-Test','Inference for Slope','Residual Analysis','Hypothesis Testing Practice']],
      [10, 'AP Exam Final Review', ['AP Exam Format & Strategy','Hard MC Exploring Data','Hard MC Distributions','Hard MC Normal Distributions','Hard MC Study Design','Hard MC Probability','Hard MC Random Variables','Hard MC Sampling Distributions','Hard MC Confidence Intervals','Hard MC Hypothesis Testing','Tricky Z-Score Problems','Tricky Chi-Square Problems','Tricky Regression & Residual','Tricky Probability Combinations','Tricky Inference Problems','Free Response Investigative Task 1','Free Response Investigative Task 2','Free Response Investigative Task 3','Free Response Collecting Data','Free Response Exploring Data','Free Response Probability & Simulation','Free Response Statistical Inference','Common AP Exam Mistakes','Formula Sheet Mastery','Calculator Skills for AP Stats','Full Practice Exam MC 1','Full Practice Exam MC 2','Full Practice Exam Free Response','Score Prediction & Weak Spot Analysis','Final AP Statistics Challenge Get Your 5']],
      [11, 'Job Application & Workplace Math', ['Clock In & Clock Out','Weekly Timesheets','Overtime Calculations (1.5x & 2x)','Double Time & Holiday Pay','Hourly Wage vs Salary Comparison','Gross Pay vs Net Pay','Federal Tax Brackets','State Tax Calculations','FICA (Social Security & Medicare)','Tax Deductions & Withholdings (W-4)','Reading a Pay Stub','Direct Deposit vs Paper Check','Creating Employee Schedules','Shift Coverage & Staffing Ratios','Break Time & Labor Law Math','Spreadsheet Basics (Rows Columns Cells)','Spreadsheet Formulas (SUM AVERAGE COUNT IF)','VLOOKUP & INDEX MATCH','Pivot Tables for Data','Making Charts from Spreadsheet Data','Inventory Tracking & Stock Counts','Sales Reports & Revenue Calculations','Profit Margins & Cost Analysis','Commission Structures (Flat vs Tiered)','Bonus Calculations (Quarterly Annual)','Expense Reports & Reimbursements','Project Budgeting & Cost Estimation','KPIs & Performance Metrics','Filling Out Job Applications','Pre-Employment Math Tests','Resume Numbers — Quantifying Achievements','Workplace Data Presentation','401(k) Matching & Retirement Math','Health Insurance Premiums & Deductibles','HSA & FSA Calculations','Stock Options & Vesting Schedules','Compound Interest on Savings','Loan Amortization Schedules','Credit Card APR & Minimum Payments','Mortgage Payment Calculations','Debt-to-Income Ratio','Net Worth Calculations','Payroll Tax as Employer','Workers Compensation Insurance Costs','Depreciation of Business Assets','Revenue vs Profit vs Cash Flow','Break-Even Analysis','Cost of Goods Sold (COGS)','Markup vs Margin Calculations','Invoice & Accounts Receivable','Accounts Payable & Payment Terms (Net 30 60 90)','Cash Flow Forecasting','Annual Budget Planning','Quarterly Financial Reports','Year-Over-Year Growth Rate','Return on Investment (ROI)','Cost-Benefit Analysis','Opportunity Cost in Business','Time Value of Money','Present Value & Future Value','Annuity Calculations','Currency Exchange for International Business','Import Duties & Tariff Calculations','Sales Tax Collection & Remittance','Payroll Processing Step by Step','W-2 vs 1099 Tax Forms','Filing Business Taxes (Schedule C)','Estimated Quarterly Tax Payments','Business Expense Categories','Mileage & Travel Reimbursement','Per Diem Calculations','Tip Pooling & Distribution','Piece Rate Pay Calculations','Weighted Average Cost','Moving Average for Sales','Seasonal Adjustment Calculations','Workplace Math Mastery Challenge']]
    ];

    let n = 0;
    const lessons = [];
    units.forEach(([u, name, titles]) => {
      titles.forEach((t, i) => {
        n++;
        lessons.push({ id: 's-'+n, title: t, href: '#', unit: u, unitName: name, category: 'math', checkpoint: i===titles.length-1 });
      });
    });

    // Make first 5 lessons playable
    for (var i = 0; i < 5 && i < lessons.length; i++) {
      lessons[i].href = 'lesson-' + (i + 1) + '.html';
    }

    // Render path immediately (don't wait for auth)
    const container = document.getElementById('learning-path');
    const initialCompleted = await getCompletedLessons('ap-statistics');
    renderPath(container, lessons, initialCompleted);
    // Then try to load progress if logged in
    try {
      onAuthChange(async (user) => {
        const completed = await getCompletedLessons('ap-statistics');
        renderPath(container, lessons, completed);
      });
    } catch(e) {
      // Auth failed — path already rendered, just continue
    }
  </script>
