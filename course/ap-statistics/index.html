<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AP Statistics — Mathagram</title>
  <link rel="icon" href="../../assets/lighthouse/logo.svg">
  <link rel="stylesheet" href="../../css/global.css">
  <link rel="stylesheet" href="../../css/learning-path.css">
  <style>
    .course-header { padding: 80px 24px 24px; text-align: center; }
    .course-badge { display: inline-block; padding: 4px 14px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #fff; border-radius: 999px; margin-bottom: 12px; }
    .course-header h1 { font-size: 2.5rem; font-weight: 800; margin-bottom: 8px; }
    .course-header p { font-size: 1rem; color: var(--color-text-secondary); max-width: 560px; margin: 0 auto; line-height: 1.6; }
    @media (max-width: 768px) { .course-header h1 { font-size: 2rem; } }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="container">
      <a href="../../index.html" class="nav-logo">
        <img src="../../assets/lighthouse/logo.svg" alt="" width="32" height="32">
        <span>Mathagram</span>
      </a>
      <div class="nav-links">
        <a href="../../courses.html">Courses</a>
        <a href="../../login.html" data-auth="login">Login</a>
      </div>
    </div>
  </nav>

  <header class="course-header">
    <span class="course-badge" style="background:var(--color-math)">Math</span>
    <h1>AP Statistics</h1>
    <p>Collect, analyze, and draw conclusions from data. Includes AP exam prep and workplace math. 163 lessons across 11 units.</p>
  </header>

  <div id="learning-path" class="path-container"></div>

  <footer class="footer">
    <div class="container">
      <p class="footer-copy">&copy; <span id="year"></span> Mathagram.org — All Rights Reserved.</p>
    </div>
  </footer>

  <script type="module">
    import { initNav } from '../../js/nav.js';
    initNav('../../');
    import { renderPath, getCompletedLessons } from '../../js/learning-path.js';
    import { onAuthChange } from '../../js/auth.js';
    document.getElementById('year').textContent = new Date().getFullYear();

    const lessons = [
      { id: 'stat-1',  title: 'Categorical vs Quantitative', href: '#' },
      { id: 'stat-2',  title: 'Measures of Center',          href: '#' },
      { id: 'stat-3',  title: 'Two-Way Tables',              href: '#', checkpoint: true },
      { id: 'stat-4',  title: 'Histograms',                  href: '#' },
      { id: 'stat-5',  title: 'Standard Deviation',          href: '#' },
      { id: 'stat-6',  title: 'Empirical Rule',              href: '#', checkpoint: true },
      { id: 'stat-7',  title: 'Normal Curve',                href: '#' },
      { id: 'stat-8',  title: 'Z-Scores',                    href: '#' },
      { id: 'stat-9',  title: 'Z-Tables',                    href: '#', checkpoint: true },
      { id: 'stat-10', title: 'Sampling Methods',            href: '#' },
      { id: 'stat-11', title: 'Bias',                        href: '#' },
      { id: 'stat-12', title: 'Randomized Block',            href: '#', checkpoint: true },
      { id: 'stat-13', title: 'Basic Probability',           href: '#' },
      { id: 'stat-14', title: 'Conditional Probability',     href: '#' },
      { id: 'stat-15', title: "Bayes' Theorem",              href: '#', checkpoint: true },
      { id: 'stat-16', title: 'Binomial Distribution',       href: '#' },
      { id: 'stat-17', title: 'Expected Value',              href: '#', checkpoint: true },
      { id: 'stat-18', title: 'Central Limit Theorem',       href: '#' },
      { id: 'stat-19', title: 'Standard Error',              href: '#', checkpoint: true },
      { id: 'stat-20', title: 'Confidence Interval Mean',    href: '#' },
      { id: 'stat-21', title: 'Margin of Error',             href: '#', checkpoint: true },
      { id: 'stat-22', title: 'Null & Alternative',          href: '#' },
      { id: 'stat-23', title: 'P-Values',                    href: '#' },
      { id: 'stat-24', title: 'Chi-Square',                  href: '#', checkpoint: true },
      { id: 'stat-25', title: 'AP Exam Strategy',            href: '#' },
      { id: 'stat-26', title: 'Full Practice Exam',          href: '#' },
      { id: 'stat-27', title: 'Get Your 5!',                 href: '#', checkpoint: true },
      { id: 'stat-28', title: 'Clock In & Clock Out',        href: '#' },
      { id: 'stat-29', title: 'Spreadsheet Formulas',        href: '#' },
      { id: 'stat-30', title: 'Workplace Math Mastery!',     href: '#', checkpoint: true }
    ];

    async function loadPath() {
      const container = document.getElementById('learning-path');
      let completed = new Set();
      onAuthChange(async (user) => {
        if (user) completed = await getCompletedLessons('ap-statistics');
        renderPath(container, lessons, completed);
      });
      renderPath(container, lessons, completed);
    }
    loadPath();
  </script>
</body>
</html>
