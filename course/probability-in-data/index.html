    units.forEach(([u, name, titles]) => {

        n++;
        lessons.push({ id: 'pid-'+n, title: t, href: '#', unit: u, unitName: name, category: 'data', checkpoint: i===titles.length-1 });

    });

    async function loadPath() {
      const container = document.getElementById('learning-path');
      let completed = await getCompletedLessons('probability-in-data');
      renderPath(container, lessons, completed);
      onAuthChange(async (user) => {
        completed = await getCompletedLessons('probability-in-data');
        renderPath(container, lessons, completed);
      });
    }
    loadPath();
