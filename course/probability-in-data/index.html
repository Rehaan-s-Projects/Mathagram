<body>
  <nav class="nav">
    <div class="container">
      <a href="../../index.html" class="nav-logo">
        <img src="../../assets/lighthouse/logo.svg" alt="" width="32" height="32">

  <header class="course-header">
    <span class="course-badge" style="background:var(--color-data)">Data Analysis</span>
    <h1>Probability in Data</h1>
    <p>Chance, distributions, and quantifying uncertainty.</p>
  </header>
  <div id="learning-path" class="path-container"></div>
  <footer class="footer">
    <div class="container">
      <p class="footer-copy">&copy; <span id="year"></span> Mathagram.org — All Rights Reserved.</p>
    </div>
  </footer>
  <script type="module">
    import { initNav } from '../../js/nav.js';
    initNav('../../');
    import { renderPath, getCompletedLessons } from '../../js/learning-path.js';
    import { onAuthChange } from '../../js/auth.js';
    document.getElementById('year').textContent = new Date().getFullYear();
    const lessons = [{"id": "what-is-probability?", "title": "What Is Probability?", "unit": "Basics", "href": "#"}, {"id": "sample-spaces-and-events", "title": "Sample Spaces & Events", "unit": "Basics", "href": "#"}, {"id": "conditional-probability", "title": "Conditional Probability", "unit": "Basics", "href": "#"}, {"id": "bayes-theorem-intro", "title": "Bayes' Theorem Intro", "unit": "Basics", "href": "#"}, {"id": "probability-basics-checkpoint", "title": "Probability Basics Checkpoint", "unit": "Basics", "href": "#", "checkpoint": true}, {"id": "discrete-distributions", "title": "Discrete Distributions", "unit": "Distributions", "href": "#"}, {"id": "binomial-distribution", "title": "Binomial Distribution", "unit": "Distributions", "href": "#"}, {"id": "poisson-distribution", "title": "Poisson Distribution", "unit": "Distributions", "href": "#"}, {"id": "normal-distribution", "title": "Normal Distribution", "unit": "Distributions", "href": "#"}, {"id": "distributions-checkpoint", "title": "Distributions Checkpoint", "unit": "Distributions", "href": "#", "checkpoint": true}, {"id": "expected-value", "title": "Expected Value", "unit": "Applications", "href": "#"}, {"id": "variance-and-std-deviation", "title": "Variance & Std Deviation", "unit": "Applications", "href": "#"}, {"id": "law-of-large-numbers", "title": "Law of Large Numbers", "unit": "Applications", "href": "#"}, {"id": "central-limit-theorem", "title": "Central Limit Theorem", "unit": "Applications", "href": "#"}, {"id": "probability-mastery", "title": "Probability Mastery!", "unit": "Applications", "href": "#", "checkpoint": true}];
    async function loadPath() {
      const container = document.getElementById('learning-path');
      let completed = new Set();
      onAuthChange(async (user) => {
        if (user) completed = await getCompletedLessons('probability-in-data');
        renderPath(container, lessons, completed);
      });
      renderPath(container, lessons, completed);
    }
    loadPath();
  </script>
