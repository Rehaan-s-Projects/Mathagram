<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Probability in Data — Mathagram</title>
  <link rel="icon" href="../../assets/lighthouse/logo.svg">
  <link rel="stylesheet" href="../../css/global.css">
  <link rel="stylesheet" href="../../css/learning-path.css">
  <style>
    .course-header { padding: 80px 24px 24px; text-align: center; }
    .course-badge { display: inline-block; padding: 4px 14px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #fff; border-radius: 999px; margin-bottom: 12px; }
    .course-header h1 { font-size: 2.5rem; font-weight: 800; margin-bottom: 8px; }
    .course-header p { font-size: 1rem; color: var(--color-text-secondary); max-width: 560px; margin: 0 auto; line-height: 1.6; }
    @media (max-width: 768px) { .course-header h1 { font-size: 2rem; } }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="container">
      <a href="../../index.html" class="nav-logo">
        <img src="../../assets/lighthouse/logo.svg" alt="" width="32" height="32">
        <span>Mathagram</span>
      </a>
      <div class="nav-links">
        <a href="../../courses.html">Courses</a>
        <a href="../../login.html" data-auth="login">Login</a>
      </div>
    </div>
  </nav>
  <header class="course-header">
    <span class="course-badge" style="background:var(--color-data)">Data Analysis</span>
    <h1>Probability in Data</h1>
    <p>Apply probability to real datasets. 121 lessons across 11 units.</p>
  </header>
  <div id="learning-path" class="path-container"></div>
  <footer class="footer">
    <div class="container">
      <p class="footer-copy">&copy; <span id="year"></span> Mathagram.org — All Rights Reserved.</p>
    </div>
  </footer>
  <script type="module">
    import { initNav } from '../../js/nav.js';
    initNav('../../');
    import { renderPath, getCompletedLessons } from '../../js/learning-path.js';
    import { onAuthChange } from '../../js/auth.js';
    document.getElementById('year').textContent = new Date().getFullYear();
    const units = [
      [1,'Basic Probability',['What is Probability?','Sample Spaces','Events','Probability Scale 0 to 1','Equally Likely Outcomes','Experimental Probability','Theoretical Probability','Frequency & Probability','Law of Large Numbers','Probability Misconceptions','Basic Probability Review']],
      [2,'Counting Methods',['Fundamental Counting Principle','Permutations','Permutations with Repetition','Combinations','Combinations with Repetition','Pascal Triangle & Counting','Factorial Notation','Arrangements','Selections','Circular Permutations','Counting Review']],
      [3,'Conditional Probability',['What is Conditional Probability?','P(A|B) Formula','Tree Diagrams','Two-Way Tables','Independent Events','Dependent Events','Multiplication Rule','Total Probability','False Positives','Medical Testing','Conditional Review']],
      [4,'Bayes Theorem',['What is Bayes Theorem?','Prior Probability','Likelihood','Posterior Probability','Bayes Formula','Updating Beliefs','Naive Bayes Intro','Spam Filter Example','Medical Diagnosis','Bayesian vs Frequentist','Bayes Review']],
      [5,'Probability Distributions',['What is a Distribution?','Discrete Distributions','Continuous Distributions','PMF vs PDF','CDF','Uniform Distribution','Bernoulli Distribution','Binomial Distribution','Geometric Distribution','Poisson Distribution','Distributions Review']],
      [6,'Normal Distribution',['The Bell Curve','Mean & Standard Deviation','68-95-99.7 Rule','Standard Normal Z','Z-Score Calculations','Z-Table Usage','Finding Probabilities','Inverse Normal','Central Limit Theorem','Normal Approximation','Normal Review']],
      [7,'Expected Value & Variance',['Expected Value Definition','Computing Expected Value','Variance Definition','Standard Deviation','Properties of Expectation','Properties of Variance','Covariance','Correlation Coefficient','Portfolio Risk','Insurance Calculations','EV & Var Review']],
      [8,'Sampling & Estimation',['Random Sampling','Sampling Distributions','Sample Mean Distribution','Sample Proportion Distribution','Standard Error','Confidence Intervals','Margin of Error','Sample Size Calculation','Bootstrap Methods','Bias in Sampling','Sampling Review']],
      [9,'Hypothesis Testing',['Null Hypothesis','Alternative Hypothesis','Test Statistics','P-Values','Significance Levels','Type I Errors','Type II Errors','Power of a Test','One-Tailed vs Two-Tailed','Chi-Square Test','Hypothesis Review']],
      [10,'Monte Carlo Methods',['What is Monte Carlo?','Random Number Generation','Simulating Coin Flips','Simulating Dice','Estimating Pi','Monte Carlo Integration','Risk Simulation','Financial Modeling','Buffon Needle Simulation','Markov Chain Monte Carlo','Monte Carlo Review']],
      [11,'Probability in Real Life',['Weather Forecasting','Sports Analytics','Gambling Mathematics','Lottery Odds','Insurance Actuarial','Stock Market Probability','Election Predictions','A/B Testing','Quality Control','Epidemiology','Real Life Review']]
    ];

    let n = 0;
    const lessons = [];
    units.forEach(([u, name, titles]) => {
      titles.forEach((t, i) => {
        n++;
        lessons.push({ id: 'pid-'+n, title: t, href: '#', unit: u, unitName: name, category: 'data', checkpoint: i===titles.length-1 });
      });
    });

    async function loadPath() {
      const container = document.getElementById('learning-path');
      let completed = await getCompletedLessons('probability-in-data');
      renderPath(container, lessons, completed);
      onAuthChange(async (user) => {
        completed = await getCompletedLessons('probability-in-data');
        renderPath(container, lessons, completed);
      });
    }
    loadPath();
  </script>
</body>
</html>
