    .course-badge { display: inline-block; padding: 4px 14px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #fff; border-radius: 999px; margin-bottom: 12px; }

    @media (max-width: 768px) { .course-header h1 { font-size: 2rem; } }

<body>
  <nav class="nav">
    <div class="container">
      <a href="../../index.html" class="nav-logo">
        <img src="../../assets/lighthouse/logo.svg" alt="" width="32" height="32">
        <span>Mathagram</span>
      </a>
      <div class="nav-links">
        <a href="../../courses.html">Courses</a>
        <a href="../../learning-post.html">Posts</a>
        <a href="../../login.html" data-auth="login">Login</a>
      </div>
    </div>
  </nav>
  <header class="course-header">
    <span class="course-badge" style="background:var(--color-logic)">Logic</span>
    <h1>Formal Logic</h1>
    <p>Propositional logic, predicate logic, truth tables, proofs, modal logic, and metalogic. 15 units, 225 lessons.</p>
  </header>
  <div id="learning-path" class="path-container"></div>
  <footer class="footer">
    <div class="container">
      <p class="footer-copy">&copy; <span id="year"></span> Mathagram.org — All Rights Reserved.</p>
    </div>
  </footer>
  <script type="module">
    import { initNav } from '../../js/nav.js';
    initNav('../../');
    import { renderPath, getCompletedLessons } from '../../js/learning-path.js';
    import { onAuthChange } from '../../js/auth.js';
    document.getElementById('year').textContent = new Date().getFullYear();
    const units = [
      [1,'What Is Formal Logic?',['Logic vs Intuition','Statements & Propositions','Truth Values','Arguments — Validity vs Soundness','Logical Form','Syntax vs Semantics','Brief History of Logic','Aristotle to Frege','Modern Symbolic Logic','Why Study Formal Logic?','Logic in Math','Logic in CS','Logic in Philosophy','Logic in Daily Life','Intro Checkpoint']],
      [2,'Propositional Logic — Basics',['Propositional Variables','Negation — ¬','Conjunction — ∧','Disjunction — ∨','Conditional — →','Biconditional — ↔','Operator Precedence','Well-Formed Formulas','Parsing Complex Formulas','English to Symbols','Symbols to English','Ambiguity in English','Practice: Translation','Common Mistakes','Basics Checkpoint']],
      [3,'Truth Tables',['Truth Table Method','Negation Table','Conjunction Table','Disjunction Table','Conditional Table','Biconditional Table','Two-Variable Tables','Three-Variable Tables','Four-Variable Tables','Tautologies','Contradictions','Contingencies','Logical Equivalence via Tables','Validity Testing via Tables','Truth Tables Checkpoint']],
      [4,'Logical Equivalences',['Double Negation','De Morgan\'s Laws','Commutativity','Associativity','Distributivity','Material Conditional','Contrapositive','Exportation','Absorption','Idempotence','Tautology & Contradiction Laws','Biconditional Equivalences','Simplification Strategies','Practice: Proving Equivalences','Equivalences Checkpoint']],
      [5,'Natural Deduction — Propositional',['What Is Natural Deduction?','Assumptions & Conclusions','Conjunction Introduction','Conjunction Elimination','Disjunction Introduction','Disjunction Elimination','Conditional Introduction','Conditional Elimination (Modus Ponens)','Negation Introduction (Reductio)','Negation Elimination','Biconditional Rules','Subproofs','Proof Strategies','Multi-Step Proofs','Natural Deduction Checkpoint']],
      [6,'Derived Rules & Shortcuts',['Modus Tollens','Hypothetical Syllogism','Disjunctive Syllogism','Constructive Dilemma','Destructive Dilemma','Reductio Ad Absurdum','Proof by Cases','Conditional Proof','Indirect Proof','Derived vs Primitive Rules','Efficiency in Proofs','Common Proof Patterns','Complex Proofs','Practice Set','Derived Rules Checkpoint']],
      [7,'Predicate Logic — Basics',['Predicates & Properties','Individual Constants','Variables','Universal Quantifier — ∀','Existential Quantifier — ∃','Domain of Discourse','Free vs Bound Variables','Scope of Quantifiers','Multiple Quantifiers','Order of Quantifiers Matters','English to Predicate Logic','Predicate Logic to English','Relations — Two-Place Predicates','Identity — =','Predicate Basics Checkpoint']],
      [8,'Predicate Logic — Proofs',['Universal Instantiation','Universal Generalization','Existential Instantiation','Existential Generalization','Restrictions on Rules','Quantifier Negation','Proving Universal Statements','Proving Existential Statements','Disproving with Counterexamples','Proofs with Identity','Multi-Quantifier Proofs','Nested Quantifiers','Practice: Simple Proofs','Practice: Complex Proofs','Predicate Proofs Checkpoint']],
      [9,'Semantics & Models',['Interpretations','Truth in an Interpretation','Models & Countermodels','Logical Truth (Validity)','Logical Consequence','Satisfiability','Soundness of Natural Deduction','Completeness of Natural Deduction','Finite vs Infinite Domains','Structures & Signatures','Isomorphism','Elementary Equivalence','Compactness Theorem (Statement)','Löwenheim-Skolem (Statement)','Semantics Checkpoint']],
      [10,'Modal Logic',['What Is Modal Logic?','Necessity — □','Possibility — ◇','Possible Worlds','Accessibility Relations','Kripke Semantics','System K','System T','System S4','System S5','Deontic Logic (Ought)','Epistemic Logic (Knowledge)','Temporal Logic','Modal Proofs','Modal Logic Checkpoint']],
      [11,'Logical Paradoxes',['The Liar Paradox','Russell\'s Paradox','Sorites Paradox (Heap)','Zeno\'s Paradoxes','Newcomb\'s Paradox','Unexpected Hanging','Barber Paradox','Curry\'s Paradox','Berry\'s Paradox','Grelling–Nelson Paradox','Banach-Tarski (Statement)','Paradoxes of Material Conditional','Resolving Paradoxes','Paraconsistent Logic','Paradoxes Checkpoint']],
      [12,'Metalogic',['Object Language vs Metalanguage','Syntax vs Semantics Formally','Soundness','Completeness','Decidability','Compactness','Expressiveness','Gödel\'s First Incompleteness','Gödel\'s Second Incompleteness','Church-Turing Thesis','Halting Problem','Tarski\'s Undefinability','Löb\'s Theorem','Limits of Formal Systems','Metalogic Checkpoint']],
      [13,'Non-Classical Logics',['Intuitionistic Logic','Many-Valued Logic','Fuzzy Logic','Relevance Logic','Paraconsistent Logic','Linear Logic','Substructural Logics','Default Logic','Non-Monotonic Reasoning','Conditional Logic','Free Logic','Quantum Logic','Dialogical Logic','Comparing Logics','Non-Classical Checkpoint']],
      [14,'Logic in Computer Science',['Boolean Circuits','Logic Gates Review','Propositional SAT','Automated Theorem Proving','Logic Programming — Prolog','Type Theory Basics','Lambda Calculus','Curry-Howard Correspondence','Model Checking','Formal Verification','Database Query Logic','Description Logics','AI & Logic','Knowledge Representation','CS Logic Checkpoint']],
      [15,'Mastery',['Propositional Review','Predicate Review','Proof Techniques Review','Semantics Review','Modal Review','Metalogic Review','Non-Classical Review','Translation Drills','Proof Marathon','Countermodel Practice','Historical Perspectives','Open Problems','Self-Assessment','Study Resources','Formal Logic Mastery!']]
    ];
    let n = 0;
    const lessons = [];
    units.forEach(([u, name, titles]) => {
      titles.forEach((t, i) => {
        n++;
        lessons.push({ id: 'for-'+n, title: t, href: '#', unit: u, unitName: name, category: 'logic', checkpoint: i===titles.length-1 });
      });
    });
    async function loadPath() {
      const container = document.getElementById('learning-path');
      let completed = await getCompletedLessons('formal-logic');
      renderPath(container, lessons, completed);
      onAuthChange(async (user) => {
        completed = await getCompletedLessons('formal-logic');
        renderPath(container, lessons, completed);
      });
    }
    loadPath();
  </script>
</body>
</html>
