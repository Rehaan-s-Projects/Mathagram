    @media (max-width: 768px) { .course-header h1 { font-size: 2rem; } }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="container">
      <a href="../../index.html" class="nav-logo">
        <img src="../../assets/lighthouse/logo.svg" alt="" width="32" height="32">
        <span>Mathagram</span>
      </a>
      <div class="nav-links">
        <a href="../../courses.html">Courses</a>
        <a href="../../login.html" data-auth="login">Login</a>
      </div>
    </div>
  </nav>
  <header class="course-header">
    <span class="course-badge" style="background:var(--color-science)">Science</span>
    <h1>Science Puzzles</h1>
    <p>Brain-teasing challenges in physics, chemistry, and biology.</p>
  </header>
  <div id="learning-path" class="path-container"></div>
  <footer class="footer">
    <div class="container">
      <p class="footer-copy">&copy; <span id="year"></span> Mathagram.org — All Rights Reserved.</p>
    </div>
  </footer>
  <script type="module">
    import { initNav } from '../../js/nav.js';
    initNav('../../');
    import { renderPath, getCompletedLessons } from '../../js/learning-path.js';
    import { onAuthChange } from '../../js/auth.js';
    document.getElementById('year').textContent = new Date().getFullYear();
    const lessons = [{"id": "physics-brain-teasers", "title": "Physics Brain Teasers", "unit": "Physics Puzzles", "href": "#"}, {"id": "motion-and-forces", "title": "Motion & Forces", "unit": "Physics Puzzles", "href": "#"}, {"id": "energy-riddles", "title": "Energy Riddles", "unit": "Physics Puzzles", "href": "#"}, {"id": "wave-puzzles", "title": "Wave Puzzles", "unit": "Physics Puzzles", "href": "#"}, {"id": "physics-checkpoint", "title": "Physics Checkpoint", "unit": "Physics Puzzles", "href": "#", "checkpoint": true}, {"id": "element-mysteries", "title": "Element Mysteries", "unit": "Chemistry Puzzles", "href": "#"}, {"id": "reaction-challenges", "title": "Reaction Challenges", "unit": "Chemistry Puzzles", "href": "#"}, {"id": "molecular-puzzles", "title": "Molecular Puzzles", "unit": "Chemistry Puzzles", "href": "#"}, {"id": "ph-and-solutions", "title": "pH & Solutions", "unit": "Chemistry Puzzles", "href": "#"}, {"id": "chemistry-checkpoint", "title": "Chemistry Checkpoint", "unit": "Chemistry Puzzles", "href": "#", "checkpoint": true}, {"id": "cell-challenges", "title": "Cell Challenges", "unit": "Biology Puzzles", "href": "#"}, {"id": "genetics-riddles", "title": "Genetics Riddles", "unit": "Biology Puzzles", "href": "#"}, {"id": "ecology-puzzles", "title": "Ecology Puzzles", "unit": "Biology Puzzles", "href": "#"}, {"id": "evolution-brain-teasers", "title": "Evolution Brain Teasers", "unit": "Biology Puzzles", "href": "#"}, {"id": "science-puzzles-mastery", "title": "Science Puzzles Mastery!", "unit": "Biology Puzzles", "href": "#", "checkpoint": true}];
    async function loadPath() {
      const container = document.getElementById('learning-path');
      let completed = new Set();
      onAuthChange(async (user) => {
        if (user) completed = await getCompletedLessons('science-puzzles');
        renderPath(container, lessons, completed);
      });
      renderPath(container, lessons, completed);
    }
    loadPath();
  </script>
