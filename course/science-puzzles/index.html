    document.getElementById('year').textContent = new Date().getFullYear();
    const units = [

      [5,'Chemistry Puzzles — Reactions & Bonds',['Reaction Challenges','Balance the Equation','Exothermic vs Endothermic — Hot or Cold?','Acid-Base Riddles','pH Puzzles — Acid Neutral or Base?','Oxidation-Reduction — Who Gains Electrons?','Combustion Puzzles — What Burns?','Precipitation Reactions — What Falls Out?','Ionic vs Covalent Bonds','Molecular Shape Puzzles — VSEPR','Chemical Formula Decoder','Mole Calculation Challenges','Stoichiometry Riddles','Limiting Reagent — Who Runs Out First?','Reactions & Bonds Checkpoint']],
      [6,'Chemistry Puzzles — Everyday Chemistry',['Kitchen Chemistry — Baking Soda + Vinegar','Why Does Soap Clean?','How Does Rust Form?','Why Do Onions Make You Cry?','How Does Sunscreen Work?','What Makes Fireworks Colorful?','Why Does Ice Float?','How Does a Battery Work?','What Is Dry Ice?','How Does Glow-in-the-Dark Work?','Why Does Milk Spoil?','How Do Medicines Work?','What Makes Diamonds Hard?','Chemistry of Cooking — Maillard Reaction','Everyday Chemistry Checkpoint']],

    ];
    let n = 0;
    const lessons = [];
    units.forEach(([u, name, titles]) => {
      titles.forEach((t, i) => {
        n++;
        lessons.push({ id: 'sp-'+n, title: t, href: '#', unit: u, unitName: name, category: 'science', checkpoint: i===titles.length-1 });
      });
    });
    async function loadPath() {
      const container = document.getElementById('learning-path');
      let completed = await getCompletedLessons('science-puzzles');
      renderPath(container, lessons, completed);
      onAuthChange(async (user) => {
        completed = await getCompletedLessons('science-puzzles');
        renderPath(container, lessons, completed);
      });
    }
    loadPath();
  </script>
