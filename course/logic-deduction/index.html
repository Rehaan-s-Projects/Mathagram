<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logic Deduction — Mathagram</title>
  <link rel="icon" href="../../assets/lighthouse/logo.svg">
  <link rel="stylesheet" href="../../css/global.css">
  <link rel="stylesheet" href="../../css/learning-path.css">
  <style>
    .course-header { padding: 80px 24px 24px; text-align: center; }
    .course-badge { display: inline-block; padding: 4px 14px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #fff; border-radius: 999px; margin-bottom: 12px; }
    .course-header h1 { font-size: 2.5rem; font-weight: 800; margin-bottom: 8px; }
    .course-header p { font-size: 1rem; color: var(--color-text-secondary); max-width: 560px; margin: 0 auto; line-height: 1.6; }
    @media (max-width: 768px) { .course-header h1 { font-size: 2rem; } }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="container">
      <a href="../../index.html" class="nav-logo">
        <img src="../../assets/lighthouse/logo.svg" alt="" width="32" height="32">
        <span>Mathagram</span>
      </a>
      <div class="nav-links">
        <a href="../../courses.html">Courses</a>
        <a href="../../login.html" data-auth="login">Login</a>
      </div>
    </div>
  </nav>
  <header class="course-header">
    <span class="course-badge" style="background:var(--color-logic)">Logic</span>
    <h1>Logic Deduction</h1>
    <p>Master logical reasoning through puzzles — ordering, negation, rearrangement, and optimization. 63 lessons across 7 levels.</p>
  </header>
  <div id="learning-path" class="path-container"></div>
  <footer class="footer">
    <div class="container">
      <p class="footer-copy">&copy; <span id="year"></span> Mathagram.org — All Rights Reserved.</p>
    </div>
  </footer>
  <script type="module">
    import { initNav } from '../../js/nav.js';
    initNav('../../');
    import { renderPath, getCompletedLessons } from '../../js/learning-path.js';
    import { onAuthChange } from '../../js/auth.js';
    document.getElementById('year').textContent = new Date().getFullYear();
    const units = [
      [1,'Order Logic',['Order Logic Introduction','Ordering by Size','Ordering by Time','Neighbors','Heights & Comparisons','Relative Positions','Greater Than & Less Than','Sequential Ordering','Circular Ordering']],
      [2,'Negation & Value Logic',['Relative Comparisons','Value Logic Introduction','Negation Rules','Between Two Values','Not & Neither','De Morgans in Puzzles','Contradictions','Process of Elimination','Negation Review']],
      [3,'Rearrangement & Either/Or',['Shuffling Positions','Swapping Elements','Rearrangement Puzzles','Either/Or Constraints','At Least One','At Most One','Exactly One','Multiple Constraints','Rearrangement Review']],
      [4,'Handling Cases',['At Least Problems','At Most Problems','Sum Constraints','Difference Constraints','Range Constraints','Combining Multiple Cases','Case Analysis Strategy','Exhaustive Search','Handling Cases Review']],
      [5,'Assignment & Properties',['Assigning Sizes','Even and Odd Properties','Bigger and Smaller','Multiple Properties','Property Matching','Grid Logic Puzzles','Truth-Tellers & Liars','Knights & Knaves','Assignment Review']],
      [6,'Quantifiers & Optimization',['More Than / Fewer Than','Mixing Quantifiers','Not & No Quantifiers','Universal Statements','Existential Statements','Minimizing Values','Maximizing Values','Optimal Solutions','Quantifiers Review']],
      [7,'Advanced Deduction & Mastery',['Multi-Variable Deduction','Constraint Satisfaction','River Crossing Puzzles','Scheduling Problems','Seating Arrangements','Tournament Logic','Cryptarithmetic','Competition-Level Logic','Logic Deduction Mastery!']]
    ];
    let n = 0;
    const lessons = [];
    units.forEach(([u, name, titles]) => {
      titles.forEach((t, i) => {
        n++;
        lessons.push({ id: 'ld-'+n, title: t, href: '#', unit: u, unitName: name, category: 'logic', checkpoint: i===titles.length-1 });
      });
    });
    const container = document.getElementById('learning-path');
    const initialCompleted = await getCompletedLessons('logic-deduction');
    renderPath(container, lessons, initialCompleted);
    try {
      onAuthChange(async (user) => {
        const completed = await getCompletedLessons('logic-deduction');
        renderPath(container, lessons, completed);
      });
    } catch(e) {}
  </script>
</body>
</html>
