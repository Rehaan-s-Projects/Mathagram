<!DOCTYPE html>
<html lang="en">
<head>

  <link rel="icon" href="../../assets/lighthouse/logo.svg">

  <style>
    .course-header { padding: 80px 24px 24px; text-align: center; }
    .course-badge { display: inline-block; padding: 4px 14px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #fff; border-radius: 999px; margin-bottom: 12px; }
    .course-header h1 { font-size: 2.5rem; font-weight: 800; margin-bottom: 8px; }
    .course-header p { font-size: 1rem; color: var(--color-text-secondary); max-width: 560px; margin: 0 auto; line-height: 1.6; }
    @media (max-width: 768px) { .course-header h1 { font-size: 2rem; } }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="container">
      <a href="../../index.html" class="nav-logo">
        <img src="../../assets/lighthouse/logo.svg" alt="" width="32" height="32">
        <span>Mathagram</span>
      </a>
      <div class="nav-links">
        <a href="../../courses.html">Courses</a>
        <a href="../../login.html" data-auth="login">Login</a>
      </div>
    </div>
  </nav>
  <header class="course-header">
    <span class="course-badge" style="background:var(--color-logic)">Logic</span>
    <h1>Logic Deduction</h1>
    <p>Puzzles from ordering to optimization.</p>
  </header>
  <div id="learning-path" class="path-container"></div>
  <footer class="footer">
    <div class="container">
      <p class="footer-copy">&copy; <span id="year"></span> Mathagram.org — All Rights Reserved.</p>
    </div>
  </footer>
  <script type="module">
    import { initNav } from '../../js/nav.js';
    initNav('../../');
    import { renderPath, getCompletedLessons } from '../../js/learning-path.js';
    import { onAuthChange } from '../../js/auth.js';
    document.getElementById('year').textContent = new Date().getFullYear();
    const lessons = [{"id": "grid-logic-puzzles", "title": "Grid Logic Puzzles", "unit": "Puzzle Basics", "href": "#"}, {"id": "ordering-and-sequencing", "title": "Ordering & Sequencing", "unit": "Puzzle Basics", "href": "#"}, {"id": "matching-problems", "title": "Matching Problems", "unit": "Puzzle Basics", "href": "#"}, {"id": "truth-tellers-and-liars", "title": "Truth-Tellers & Liars", "unit": "Puzzle Basics", "href": "#"}, {"id": "puzzle-basics-checkpoint", "title": "Puzzle Basics Checkpoint", "unit": "Puzzle Basics", "href": "#", "checkpoint": true}, {"id": "constraint-satisfaction", "title": "Constraint Satisfaction", "unit": "Intermediate", "href": "#"}, {"id": "process-of-elimination", "title": "Process of Elimination", "unit": "Intermediate", "href": "#"}, {"id": "multi-variable-deduction", "title": "Multi-Variable Deduction", "unit": "Intermediate", "href": "#"}, {"id": "knights-and-knaves", "title": "Knights & Knaves", "unit": "Intermediate", "href": "#"}, {"id": "intermediate-checkpoint", "title": "Intermediate Checkpoint", "unit": "Intermediate", "href": "#", "checkpoint": true}, {"id": "river-crossing-puzzles", "title": "River Crossing Puzzles", "unit": "Advanced", "href": "#"}, {"id": "scheduling-problems", "title": "Scheduling Problems", "unit": "Advanced", "href": "#"}, {"id": "optimization-puzzles", "title": "Optimization Puzzles", "unit": "Advanced", "href": "#"}, {"id": "competition-level-logic", "title": "Competition-Level Logic", "unit": "Advanced", "href": "#"}, {"id": "logic-deduction-mastery", "title": "Logic Deduction Mastery!", "unit": "Advanced", "href": "#", "checkpoint": true}];
    async function loadPath() {
      const container = document.getElementById('learning-path');
      let completed = new Set();
      onAuthChange(async (user) => {
        if (user) completed = await getCompletedLessons('logic-deduction');
        renderPath(container, lessons, completed);
      });
      renderPath(container, lessons, completed);
    }
    loadPath();
  </script>
</body>
