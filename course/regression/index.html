<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Regression — Mathagram</title>
  <link rel="icon" href="../../assets/lighthouse/logo.svg">
  <link rel="stylesheet" href="../../css/global.css">
  <link rel="stylesheet" href="../../css/learning-path.css">
  <style>
    .course-header { padding: 80px 24px 24px; text-align: center; }
    .course-badge { display: inline-block; padding: 4px 14px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #fff; border-radius: 999px; margin-bottom: 12px; }
    .course-header h1 { font-size: 2.5rem; font-weight: 800; margin-bottom: 8px; }
    .course-header p { font-size: 1rem; color: var(--color-text-secondary); max-width: 560px; margin: 0 auto; line-height: 1.6; }
    @media (max-width: 768px) { .course-header h1 { font-size: 2rem; } }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="container">
      <a href="../../index.html" class="nav-logo">
        <img src="../../assets/lighthouse/logo.svg" alt="" width="32" height="32">
        <span>Mathagram</span>
      </a>
      <div class="nav-links">
        <a href="../../courses.html">Courses</a>
        <a href="../../login.html" data-auth="login">Login</a>
      </div>
    </div>
  </nav>
  <header class="course-header">
    <span class="course-badge" style="background:var(--color-data)">Data Analysis</span>
    <h1>Regression</h1>
    <p>Fit lines and curves to predict outcomes. 78 lessons across 6 units.</p>
  </header>
  <div id="learning-path" class="path-container"></div>
  <footer class="footer">
    <div class="container">
      <p class="footer-copy">&copy; <span id="year"></span> Mathagram.org — All Rights Reserved.</p>
    </div>
  </footer>
  <script type="module">
    import { initNav } from '../../js/nav.js';
    initNav('../../');
    import { renderPath, getCompletedLessons } from '../../js/learning-path.js';
    import { onAuthChange } from '../../js/auth.js';
    document.getElementById('year').textContent = new Date().getFullYear();
    const units = [
      [1,'Correlation',['What is Correlation?','Scatter Plot Patterns','Pearson Correlation','Spearman Rank Correlation','Correlation Coefficient r','Interpreting r Values','Correlation vs Causation','Spurious Correlations','Partial Correlation','Autocorrelation','Correlation Matrix','Heatmap of Correlations','Correlation Review']],
      [2,'Simple Linear Regression',['What is Regression?','Line of Best Fit','Slope & Intercept','Least Squares Method','Residuals','Sum of Squared Errors','R-Squared','Interpreting R-Squared','Predictions','Extrapolation Dangers','Regression Assumptions','Checking Assumptions','Simple LR Review']],
      [3,'Multiple Regression',['Multiple Predictors','Multiple Regression Equation','Adjusted R-Squared','Multicollinearity','VIF (Variance Inflation)','Feature Selection','Forward Selection','Backward Elimination','Stepwise Regression','Interaction Terms','Dummy Variables','Categorical Predictors','Multiple Regression Review']],
      [4,'Polynomial & Nonlinear',['Polynomial Regression','Quadratic Fit','Cubic Fit','Choosing Degree','Overfitting Polynomials','Exponential Regression','Logarithmic Regression','Power Regression','Logistic Curve','Sigmoid Function','Spline Regression','Curve Fitting','Nonlinear Review']],
      [5,'Logistic Regression',['Binary Classification','Odds & Log-Odds','Logistic Function','Maximum Likelihood','Decision Boundary','Threshold Selection','Accuracy','Precision & Recall','ROC Curve','AUC','Multinomial Logistic','Ordinal Logistic','Logistic Regression Review']],
      [6,'Advanced & Applications',['Ridge Regression','Lasso Regression','Elastic Net','Regularization','Cross-Validation for Regression','Time Series Regression','ARIMA Basics','Prediction Intervals','Confidence Bands','Real Estate Prediction','Sales Forecasting','Medical Outcomes','Advanced Regression Review']]
    ];

    let n = 0;
    const lessons = [];
    units.forEach(([u, name, titles]) => {
      titles.forEach((t, i) => {
        n++;
        lessons.push({ id: 'rg-'+n, title: t, href: '#', unit: u, unitName: name, category: 'data', checkpoint: i===titles.length-1 });
      });
    });

    async function loadPath() {
      const container = document.getElementById('learning-path');
      let completed = await getCompletedLessons('regression');
      renderPath(container, lessons, completed);
      onAuthChange(async (user) => {
        completed = await getCompletedLessons('regression');
        renderPath(container, lessons, completed);
      });
    }
    loadPath();
  </script>
</body>
</html>
