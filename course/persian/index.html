<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Persian (Farsi) — Mathagram</title>
  <link rel="icon" href="../../assets/lighthouse/logo.svg">
  <link rel="stylesheet" href="../../css/global.css">
  <link rel="stylesheet" href="../../css/learning-path.css">
  <style>
    .course-header { padding: 80px 24px 24px; text-align: center; }
    .course-badge { display: inline-block; padding: 4px 14px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #fff; border-radius: 999px; margin-bottom: 12px; }
    .course-header h1 { font-size: 2.5rem; font-weight: 800; margin-bottom: 8px; }
    .course-header p { font-size: 1rem; color: var(--color-text-secondary); max-width: 560px; margin: 0 auto; line-height: 1.6; }
    @media (max-width: 768px) { .course-header h1 { font-size: 2rem; } }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="container">
      <a href="../../index.html" class="nav-logo">
        <img src="../../assets/lighthouse/logo.svg" alt="" width="32" height="32">
        <span>Mathagram</span>
      </a>
      <div class="nav-links">
        <a href="../../courses.html">Courses</a>
        <a href="../../login.html" data-auth="login">Login</a>
      </div>
    </div>
  </nav>
  <header class="course-header">
    <span class="course-badge" style="background:var(--color-language)">Language</span>
    <h1>Persian (Farsi)</h1>
    <p>Learn Persian (Farsi) — the language of poetry, spoken by 110 million people in Iran, Afghanistan, and Tajikistan. 104 lessons across 8 units.</p>
  </header>
  <div id="learning-path" class="path-container"></div>
  <footer class="footer">
    <div class="container">
      <p class="footer-copy">&copy; <span id="year"></span> Mathagram.org — All Rights Reserved.</p>
    </div>
  </footer>
  <script type="module">
    import { initNav } from '../../js/nav.js';
    initNav('../../');
    import { renderPath, getCompletedLessons } from '../../js/learning-path.js';
    import { onAuthChange } from '../../js/auth.js';
    document.getElementById('year').textContent = new Date().getFullYear();
    const units = [
      [1,'Perso-Arabic Script',['Persian Alphabet Overview (32 Letters)','Unique Persian Letters (پ چ ژ گ)','Short Vowels (Fatheh Kasreh Zammeh)','Long Vowels (Alef Vav Ye)','Letter Connections (Initial Medial Final Isolated)','Numbers in Persian Script','Tashdid & Tanvin','Writing Direction & Ligatures','Reading Simple Words','Silent Letters (Hamzeh)','Common Letter Patterns','Writing Practice: Names & Words','Script Review']],
      [2,'Greetings & Basics',['Salam (Hello)','Dorood (Formal Greeting)','Khodahafez (Goodbye)','Hale shoma chetor ast? (How Are You?)','Esme man ... ast (My Name Is)','Mamnun / Mersi (Thank You)','Lotfan (Please)','Baleh / Na (Yes / No)','Bebakhshid (Excuse Me)','Numbers 1-20','Numbers 20-100','Days & Months (Solar Calendar)','Greetings Review']],
      [3,'Grammar & Structure',['Nouns & Gender','Ezafe Construction (-e connector)','Plural Formation (-ha -an)','Word Order (SOV)','Ra Marker (Direct Object)','Prepositions (Dar Az Ba Be)','Question Words (Chi Koja Key Chera)','Adjective Placement (After Noun + Ezafe)','Demonstratives (In An)','Possessive with Ezafe','Conjunctions (Va Amma Ya Chon)','Comparing (Tar Tarin)','Grammar Review']],
      [4,'Present Tense',['Verb Roots (Present Stem)','Personal Endings (am i ad im id and)','Kardan (To Do)','Raftan (To Go)','Amadan (To Come)','Khordan (To Eat)','Nushidan (To Drink)','Goftan (To Say)','Didan (To See)','Khandan (To Read)','Neveshtan (To Write)','Danestan (To Know)','Present Tense Review']],
      [5,'Past & Future Tenses',['Simple Past Formation','Past of Kardan','Past of Raftan','Past of Amadan','Imperfect Past (Mi + Past)','Present Perfect (Past Participle + Budan)','Past Perfect','Future with Khastan (Will)','Future Plans','Time Expressions (Diruz Emruz Farda)','Negative Past','Negative Future','Tenses Review']],
      [6,'Food & Cuisine',['Nan (Bread Varieties)','Chelo Kebab (National Dish)','Ghormeh Sabzi (Herb Stew)','Tahdig (Crispy Rice)','Zereshk Polo (Barberry Rice)','Fesenjan (Pomegranate Walnut Stew)','Ash Reshteh (Noodle Soup)','Dizi / Abgoosht (Stone Pot Stew)','Dolmeh (Stuffed Grape Leaves)','Chai & Sweets (Baklava Gaz Sohan)','Fruits & Dried Fruits','At the Restaurant','Food Review']],
      [7,'Travel & Iran',['Tehran (Capital City)','Isfahan (Nesfe Jahan)','Shiraz (City of Poetry)','Persepolis (Takht-e Jamshid)','Yazd (Desert City)','Kerman & Lut Desert','Tabriz & Azerbaijan Province','Gilan & Caspian Coast','Mashhad & Khorasan','At the Airport','Hotel & Accommodation','Directions & Transport','Travel Review']],
      [8,'Culture & Heritage',['Nowruz (Persian New Year)','Haft Sin Table','Chaharshanbe Suri (Fire Festival)','Hafez (Poetry Master)','Rumi (Molana)','Ferdowsi & Shahnameh','Sa\'di & Golestan','Persian Calligraphy','Persian Miniature Painting','Iranian Cinema','Traditional Music (Tar Setar Santur)','Persian Carpet Tradition','Culture Review']]
    ];
    let n = 0;
    const lessons = [];
    units.forEach(([u, name, titles]) => {
      titles.forEach((t, i) => {
        n++;
        lessons.push({ id: 'pe-'+n, title: t, href: '#', unit: u, unitName: name, category: 'language', checkpoint: i===titles.length-1 });
      });
    });
    async function loadPath() {
      const container = document.getElementById('learning-path');
      let completed = await getCompletedLessons('persian');
      renderPath(container, lessons, completed);
      onAuthChange(async (user) => {
        completed = await getCompletedLessons('persian');
        renderPath(container, lessons, completed);
      });
    }
    loadPath();
  </script>
</body>
</html>
