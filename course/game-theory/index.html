<body>
  <nav class="nav">
    <div class="container">
      <a href="../../index.html" class="nav-logo">
        <img src="../../assets/lighthouse/logo.svg" alt="" width="32" height="32">
        <span>Mathagram</span>

      <div class="nav-links">

  <header class="course-header">
    <span class="course-badge" style="background:var(--color-logic)">Logic</span>
    <h1>Game Theory</h1>
    <p>Strategic thinking from Prisoner's Dilemma to auctions.</p>
  </header>
  <div id="learning-path" class="path-container"></div>
  <footer class="footer">
    <div class="container">
      <p class="footer-copy">&copy; <span id="year"></span> Mathagram.org — All Rights Reserved.</p>
    </div>
  </footer>
  <script type="module">
    import { initNav } from '../../js/nav.js';
    initNav('../../');
    import { renderPath, getCompletedLessons } from '../../js/learning-path.js';
    import { onAuthChange } from '../../js/auth.js';
    document.getElementById('year').textContent = new Date().getFullYear();
    const lessons = [{"id": "what-is-game-theory?", "title": "What Is Game Theory?", "unit": "Foundations", "href": "#"}, {"id": "players-strategies-and-payoffs", "title": "Players, Strategies & Payoffs", "unit": "Foundations", "href": "#"}, {"id": "prisoners-dilemma", "title": "Prisoner's Dilemma", "unit": "Foundations", "href": "#"}, {"id": "dominant-strategies", "title": "Dominant Strategies", "unit": "Foundations", "href": "#"}, {"id": "foundations-checkpoint", "title": "Foundations Checkpoint", "unit": "Foundations", "href": "#", "checkpoint": true}, {"id": "nash-equilibrium", "title": "Nash Equilibrium", "unit": "Equilibria", "href": "#"}, {"id": "mixed-strategies", "title": "Mixed Strategies", "unit": "Equilibria", "href": "#"}, {"id": "zero-sum-games", "title": "Zero-Sum Games", "unit": "Equilibria", "href": "#"}, {"id": "cooperative-games", "title": "Cooperative Games", "unit": "Equilibria", "href": "#"}, {"id": "equilibria-checkpoint", "title": "Equilibria Checkpoint", "unit": "Equilibria", "href": "#", "checkpoint": true}, {"id": "auction-theory", "title": "Auction Theory", "unit": "Applications", "href": "#"}, {"id": "voting-systems", "title": "Voting Systems", "unit": "Applications", "href": "#"}, {"id": "evolutionary-game-theory", "title": "Evolutionary Game Theory", "unit": "Applications", "href": "#"}, {"id": "mechanism-design", "title": "Mechanism Design", "unit": "Applications", "href": "#"}, {"id": "game-theory-mastery", "title": "Game Theory Mastery!", "unit": "Applications", "href": "#", "checkpoint": true}];
    async function loadPath() {
      const container = document.getElementById('learning-path');
      let completed = new Set();
      onAuthChange(async (user) => {
        if (user) completed = await getCompletedLessons('game-theory');
        renderPath(container, lessons, completed);
      });
      renderPath(container, lessons, completed);
    }
    loadPath();
  </script>
