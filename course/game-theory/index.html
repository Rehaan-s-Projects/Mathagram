</header>

<script>

</script>
<script type="module">
import { initNav } from '../../js/nav.js'; initNav('../../');
import { renderPath, getCompletedLessons } from '../../js/learning-path.js?v=3';
import { onAuthChange } from '../../js/auth.js?v=3';
document.getElementById('year').textContent = new Date().getFullYear();
const units = [
  [1,'Foundations of Game Theory',['What is Game Theory?','Players Strategies & Payoffs','Rational Decision Making','Simultaneous vs Sequential Games','Normal Form (Matrix Games)','Extensive Form (Game Trees)','Information Sets','Perfect vs Imperfect Information','Complete vs Incomplete Information','Zero-Sum Games','Non-Zero-Sum Games','Cooperative vs Non-Cooperative','History — Von Neumann & Morgenstern','History — John Nash','Foundations Review']],
  [2,'Dominant Strategies',['Dominant Strategy Definition','Strictly Dominant','Weakly Dominant','Dominated Strategies','Iterated Elimination of Dominated Strategies','Best Response Functions','Nash Equilibrium Definition','Finding Nash Equilibria in 2x2','Multiple Nash Equilibria','Nash Equilibrium in Larger Games','Existence of Nash Equilibrium','Uniqueness of Equilibrium','Efficiency & Pareto Optimality','Nash Equilibrium vs Pareto Optimal','Dominant Strategies Review']],
  [3,'Mixed Strategies',['Pure vs Mixed Strategies','Mixed Strategy Nash Equilibrium','Computing Mixed Strategies (2x2)','Indifference Condition','Support of Mixed Strategy','Minimax Theorem','Maximin Strategy','Matching Pennies','Rock Paper Scissors Analysis','Randomization in Sports','Penalty Kicks in Soccer','Bluffing in Poker','Mixed Strategies in Business','Computing Mixed NE (3x3)','Mixed Strategies Review']],
  [4,'Classic Games',['Prisoners Dilemma','Prisoners Dilemma Payoffs','Cooperation vs Defection','Stag Hunt','Battle of the Sexes','Chicken (Hawk-Dove)','Coordination Games','Anti-Coordination Games','The Ultimatum Game','The Dictator Game','Public Goods Game','Tragedy of the Commons','Free Rider Problem','War of Attrition','Classic Games Review']],
  [5,'Repeated Games',['One-Shot vs Repeated','Finitely Repeated Games','Backward Induction in Repeated Games','Infinitely Repeated Games','Discount Factor','Folk Theorem','Trigger Strategies','Grim Trigger','Tit-for-Tat','Tit-for-Two-Tats','Win-Stay Lose-Shift','Forgiveness in Repeated Games','Axelrod Tournament','Cooperation in Repeated PD','Repeated Games Review']],
  [6,'Sequential Games',['Game Trees & Decision Nodes','Backward Induction','Subgame Perfect Equilibrium','First-Mover Advantage','Second-Mover Advantage','Stackelberg Competition','Entry Deterrence','Commitment & Credible Threats','Incredible Threats','Centipede Game','Chain Store Paradox','Bargaining with Alternating Offers','Rubinstein Bargaining Model','Sequential Rationality','Sequential Games Review']],
  [7,'Bargaining & Negotiation',['The Bargaining Problem','Nash Bargaining Solution','Kalai-Smorodinsky Solution','Outside Options','Deadlines & Time Pressure','Take-It-or-Leave-It Offers','Fair Division','Cake-Cutting Algorithms','Envy-Free Division','Adjusted Winner Procedure','Divide and Choose','Negotiation Strategies','BATNA (Best Alternative)','Zone of Possible Agreement','Bargaining Review']],
  [8,'Auction Theory',['Types of Auctions','English (Ascending) Auction','Dutch (Descending) Auction','First-Price Sealed Bid','Second-Price (Vickrey) Auction','Revenue Equivalence Theorem','Winners Curse','Common Value Auctions','Private Value Auctions','Affiliated Values','Optimal Auction Design','Reserve Prices','Online Auctions & eBay','Spectrum Auctions','Auction Theory Review']],
  [9,'Evolutionary Game Theory',['Evolution & Strategy','Evolutionary Stable Strategies (ESS)','Replicator Dynamics','Hawk-Dove Game in Nature','Producer-Scrounger','Evolutionary Prisoners Dilemma','Kin Selection & Altruism','Reciprocal Altruism','Signaling in Nature','Costly Signaling','Sexual Selection Games','Coevolution','Population Games','Agent-Based Models','Evolutionary Review']],
  [10,'Mechanism Design',['What is Mechanism Design?','Social Choice Functions','Revelation Principle','Incentive Compatibility','Individual Rationality','Gibbard-Satterthwaite Theorem','VCG Mechanism','Clarke Tax','Groves Mechanism','Optimal Mechanism Design','Revenue Maximization','Myerson Auction','Implementation Theory','Market Design','Mechanism Design Review']],
  [11,'Voting & Social Choice',['Voting Systems Overview','Plurality Voting','Runoff Voting','Instant Runoff (Ranked Choice)','Borda Count','Condorcet Winner','Condorcet Paradox','Arrows Impossibility Theorem','Gibbard-Satterthwaite','Strategic Voting','Median Voter Theorem','Gerrymandering Mathematics','Approval Voting','Score Voting','Voting Review']],
  [12,'Applications',['Game Theory in Economics — Oligopoly','Cournot Competition','Bertrand Competition','Game Theory in Politics','Arms Race as Prisoners Dilemma','Game Theory in Biology','Game Theory in Computer Science','Algorithmic Game Theory','Price of Anarchy','Network Games','Congestion Games','Game Theory in AI','Multi-Agent Systems','Game Theory in Cybersecurity','Applications Review']],
  [13,'Advanced Topics & Mastery',['Bayesian Games','Harsanyi Transformation','Signaling Games','Cheap Talk','Correlated Equilibrium','Trembling Hand Perfect','Proper Equilibrium','Shapley Value','Core of a Game','Nucleolus','Power Indices (Shapley-Shubik Banzhaf)','Combinatorial Game Theory','Sprague-Grundy Theory','Open Problems in Game Theory','Game Theory Mastery!']],
];
let n = 0;
const lessons = [];
units.forEach(([u, name, titles]) => {
  titles.forEach((t, i) => {
    n++;
    lessons.push({ id: 'gm-'+n, title: t, href: '#', unit: u, unitName: name, category: 'logic', checkpoint: i===titles.length-1 });
  });
});
const container = document.getElementById('learning-path');
const initialCompleted = await getCompletedLessons('game-theory');
renderPath(container, lessons, initialCompleted);
try {
  onAuthChange(async (user) => {
    const completed = await getCompletedLessons('game-theory');
    renderPath(container, lessons, completed);
  });
} catch(e) {}
</script>
