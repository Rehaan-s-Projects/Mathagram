<html lang="en">
<head>

  <link rel="icon" href="../../assets/lighthouse/logo.svg">
  <link rel="stylesheet" href="../../css/global.css">

  <style>
    .course-header { padding: 80px 24px 24px; text-align: center; }
    .course-badge { display: inline-block; padding: 4px 14px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #fff; border-radius: 999px; margin-bottom: 12px; }
    .course-header h1 { font-size: 2.5rem; font-weight: 800; margin-bottom: 8px; }
    .course-header p { font-size: 1rem; color: var(--color-text-secondary); max-width: 560px; margin: 0 auto; line-height: 1.6; }
    @media (max-width: 768px) { .course-header h1 { font-size: 2rem; } }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="container">
      <a href="../../index.html" class="nav-logo">
        <img src="../../assets/lighthouse/logo.svg" alt="" width="32" height="32">
        <span>Mathagram</span>
      </a>
      <div class="nav-links">
        <a href="../../courses.html">Courses</a>
        <a href="../../login.html" data-auth="login">Login</a>
      </div>
    </div>
  </nav>
  <header class="course-header">
    <span class="course-badge" style="background:var(--color-logic)">Logic</span>
    <h1>Information Theory</h1>
    <p>Bits, entropy, compression, and error correction.</p>
  </header>
  <div id="learning-path" class="path-container"></div>
  <footer class="footer">
    <div class="container">
      <p class="footer-copy">&copy; <span id="year"></span> Mathagram.org — All Rights Reserved.</p>
    </div>
  </footer>
  <script type="module">
    import { initNav } from '../../js/nav.js';
    initNav('../../');
    import { renderPath, getCompletedLessons } from '../../js/learning-path.js';
    import { onAuthChange } from '../../js/auth.js';
    document.getElementById('year').textContent = new Date().getFullYear();
    const lessons = [{"id": "what-is-information?", "title": "What Is Information?", "unit": "Foundations", "href": "#"}, {"id": "bits-and-binary", "title": "Bits & Binary", "unit": "Foundations", "href": "#"}, {"id": "entropy", "title": "Entropy", "unit": "Foundations", "href": "#"}, {"id": "information-content", "title": "Information Content", "unit": "Foundations", "href": "#"}, {"id": "foundations-checkpoint", "title": "Foundations Checkpoint", "unit": "Foundations", "href": "#", "checkpoint": true}, {"id": "huffman-coding", "title": "Huffman Coding", "unit": "Compression", "href": "#"}, {"id": "lossless-vs-lossy", "title": "Lossless vs Lossy", "unit": "Compression", "href": "#"}, {"id": "run-length-and-lzw", "title": "Run-Length & LZW", "unit": "Compression", "href": "#"}, {"id": "data-compression-limits", "title": "Data Compression Limits", "unit": "Compression", "href": "#"}, {"id": "compression-checkpoint", "title": "Compression Checkpoint", "unit": "Compression", "href": "#", "checkpoint": true}, {"id": "error-detection", "title": "Error Detection", "unit": "Error Correction", "href": "#"}, {"id": "hamming-codes", "title": "Hamming Codes", "unit": "Error Correction", "href": "#"}, {"id": "channel-capacity", "title": "Channel Capacity", "unit": "Error Correction", "href": "#"}, {"id": "shannons-theorems", "title": "Shannon's Theorems", "unit": "Error Correction", "href": "#"}, {"id": "information-theory-mastery", "title": "Information Theory Mastery!", "unit": "Error Correction", "href": "#", "checkpoint": true}];
    async function loadPath() {
      const container = document.getElementById('learning-path');
      let completed = new Set();
      onAuthChange(async (user) => {
        if (user) completed = await getCompletedLessons('information-theory');
        renderPath(container, lessons, completed);
      });
      renderPath(container, lessons, completed);
    }
    loadPath();
  </script>
</body>
</html>
