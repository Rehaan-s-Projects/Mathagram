<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scientific Thinking — Mathagram</title>
  <link rel="icon" href="../../assets/lighthouse/logo.svg">
  <link rel="stylesheet" href="../../css/global.css">
  <link rel="stylesheet" href="../../css/learning-path.css">
  <style>
    .course-header { padding: 80px 24px 24px; text-align: center; }
    .course-badge { display: inline-block; padding: 4px 14px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #fff; border-radius: 999px; margin-bottom: 12px; }
    .course-header h1 { font-size: 2.5rem; font-weight: 800; margin-bottom: 8px; }
    .course-header p { font-size: 1rem; color: var(--color-text-secondary); max-width: 560px; margin: 0 auto; line-height: 1.6; }
    @media (max-width: 768px) { .course-header h1 { font-size: 2rem; } }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="container">
      <a href="../../index.html" class="nav-logo">
        <img src="../../assets/lighthouse/logo.svg" alt="" width="32" height="32">
        <span>Mathagram</span>
      </a>
      <div class="nav-links">
        <a href="../../courses.html">Courses</a>
        <a href="../../login.html" data-auth="login">Login</a>
      </div>
    </div>
  </nav>
  <header class="course-header">
    <span class="course-badge" style="background:var(--color-science)">Science</span>
    <h1>Scientific Thinking</h1>
    <p>Hypothesize, experiment, and reason like a scientist.</p>
  </header>
  <div id="learning-path" class="path-container"></div>
  <footer class="footer">
    <div class="container">
      <p class="footer-copy">&copy; <span id="year"></span> Mathagram.org — All Rights Reserved.</p>
    </div>
  </footer>
  <script type="module">
    import { initNav } from '../../js/nav.js';
    initNav('../../');
    import { renderPath, getCompletedLessons } from '../../js/learning-path.js';
    import { onAuthChange } from '../../js/auth.js';
    document.getElementById('year').textContent = new Date().getFullYear();
    const lessons = [{"id": "observation-skills", "title": "Observation Skills", "unit": "Foundations", "href": "#"}, {"id": "asking-questions", "title": "Asking Questions", "unit": "Foundations", "href": "#"}, {"id": "forming-hypotheses", "title": "Forming Hypotheses", "unit": "Foundations", "href": "#"}, {"id": "variables-and-controls", "title": "Variables & Controls", "unit": "Foundations", "href": "#"}, {"id": "scientific-method-checkpoint", "title": "Scientific Method Checkpoint", "unit": "Foundations", "href": "#", "checkpoint": true}, {"id": "designing-experiments", "title": "Designing Experiments", "unit": "Experimentation", "href": "#"}, {"id": "collecting-data", "title": "Collecting Data", "unit": "Experimentation", "href": "#"}, {"id": "measurement-and-precision", "title": "Measurement & Precision", "unit": "Experimentation", "href": "#"}, {"id": "bias-and-error", "title": "Bias & Error", "unit": "Experimentation", "href": "#"}, {"id": "experimentation-checkpoint", "title": "Experimentation Checkpoint", "unit": "Experimentation", "href": "#", "checkpoint": true}, {"id": "analyzing-results", "title": "Analyzing Results", "unit": "Reasoning", "href": "#"}, {"id": "drawing-conclusions", "title": "Drawing Conclusions", "unit": "Reasoning", "href": "#"}, {"id": "peer-review", "title": "Peer Review", "unit": "Reasoning", "href": "#"}, {"id": "communicating-findings", "title": "Communicating Findings", "unit": "Reasoning", "href": "#"}, {"id": "scientific-thinking-mastery", "title": "Scientific Thinking Mastery!", "unit": "Reasoning", "href": "#", "checkpoint": true}];
    async function loadPath() {
      const container = document.getElementById('learning-path');
      let completed = new Set();
      onAuthChange(async (user) => {
        if (user) completed = await getCompletedLessons('scientific-thinking');
        renderPath(container, lessons, completed);
      });
      renderPath(container, lessons, completed);
    }
    loadPath();
  </script>
</body>
</html>
