<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Qualitative vs Quantitative Data — Mathagram</title>
  <link rel="icon" href="../../assets/lighthouse/logo.svg">
  <link rel="stylesheet" href="../../css/global.css">
  <link rel="stylesheet" href="../../css/learning-path.css">
  <style>
    .course-header { padding: 80px 24px 24px; text-align: center; }
    .course-badge { display: inline-block; padding: 4px 14px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #fff; border-radius: 999px; margin-bottom: 12px; }
    .course-header h1 { font-size: 2.5rem; font-weight: 800; margin-bottom: 8px; }
    .course-header p { font-size: 1rem; color: var(--color-text-secondary); max-width: 560px; margin: 0 auto; line-height: 1.6; }
    @media (max-width: 768px) { .course-header h1 { font-size: 2rem; } }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="container">
      <a href="../../index.html" class="nav-logo">
        <img src="../../assets/lighthouse/logo.svg" alt="" width="32" height="32">
        <span>Mathagram</span>
      </a>
      <div class="nav-links">
        <a href="../../courses.html">Courses</a>
        <a href="../../login.html" data-auth="login">Login</a>
      </div>
    </div>
  </nav>
  <header class="course-header">
    <span class="course-badge" style="background:var(--color-data)">Data Analysis</span>
    <h1>Qualitative vs Quantitative Data</h1>
    <p>Master both types of data — learn when to count and when to describe. From surveys to experiments, interviews to statistics. 68 lessons across 6 units.</p>
  </header>
  <div id="learning-path" class="path-container"></div>
  <footer class="footer">
    <div class="container">
      <p class="footer-copy">&copy; <span id="year"></span> Mathagram.org — All Rights Reserved.</p>
    </div>
  </footer>
  <script type="module">
    import { initNav } from '../../js/nav.js';
    initNav('../../');
    import { renderPath, getCompletedLessons } from '../../js/learning-path.js';
    import { onAuthChange } from '../../js/auth.js';
    document.getElementById('year').textContent = new Date().getFullYear();
    const units = [
      [1,'Understanding Data Types',['What is Data?','Qualitative Data Defined','Quantitative Data Defined','Nominal Data','Ordinal Data','Discrete Data','Continuous Data','Ratio vs Interval Scales','Primary vs Secondary Data','Structured vs Unstructured','Mixed Methods Overview','Data Types Review']],
      [2,'Qualitative Methods',['What is Qualitative Research?','Interviews','Focus Groups','Observations','Case Studies','Ethnography','Content Analysis','Thematic Analysis','Coding Qualitative Data','Open vs Closed Questions','Trustworthiness & Validity','Qualitative Methods Review']],
      [3,'Quantitative Methods',['What is Quantitative Research?','Surveys & Questionnaires','Experiments','Correlational Studies','Longitudinal Studies','Cross-Sectional Studies','Sampling Methods','Sample Size Calculations','Variables Independent Dependent Control','Hypotheses','Reliability & Validity','Quantitative Methods Review']],
      [4,'Collecting & Organizing',['Designing a Survey','Writing Good Questions','Likert Scales','Open-Ended vs Closed-Ended','Pilot Testing','Data Entry','Spreadsheet Organization','Data Cleaning','Handling Missing Data','Outlier Detection','Data Collection Review']],
      [5,'Analyzing & Interpreting',['Descriptive Statistics Review','Inferential Statistics Review','Qualitative Coding Process','Grounded Theory','Narrative Analysis','Chi-Square for Categories','T-Tests for Means','ANOVA Basics','Correlation Analysis','Triangulation','Analysis Review']],
      [6,'Presenting & Reporting',['Tables for Data','Charts for Categories','Charts for Numbers','Infographics','Research Reports','Executive Summaries','Oral Presentations','Data Dashboards','APA Style Basics','Presenting Review']]
    ];

    let n = 0;
    const lessons = [];
    units.forEach(([u, name, titles]) => {
      titles.forEach((t, i) => {
        n++;
        lessons.push({ id: 'qq-'+n, title: t, href: '#', unit: u, unitName: name, category: 'data', checkpoint: i===titles.length-1 });
      });
    });

    async function loadPath() {
      const container = document.getElementById('learning-path');
      let completed = new Set();
      onAuthChange(async (user) => {
        if (user) completed = await getCompletedLessons('qualitative-vs-quantitative');
        renderPath(container, lessons, completed);
      });
      renderPath(container, lessons, completed);
    }
    loadPath();
  </script>
</body>
</html>
