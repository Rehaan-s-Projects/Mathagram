<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkers — Capture the Stars — Silver</title>
<link rel="icon" href="../../assets/lighthouse/logo.svg">
<link rel="stylesheet" href="../../css/global.css">
<link rel="stylesheet" href="../../css/characters.css">
<style>
body { background:#f8f9fa; }
.wrap { max-width:460px; margin:70px auto 40px; text-align:center; padding:16px; }
h1 { font-size:1.5rem; margin-bottom:6px; }
.sub { color:#555; font-size:0.95rem; margin-bottom:14px; font-weight:500; }
.bar { height:10px; background:#e0e0e0; border-radius:5px; margin-bottom:18px; }
.fill { height:100%; background:#58cc02; border-radius:5px; transition:width 0.3s; }
table { border-collapse:collapse; margin:0 auto 16px; border:4px solid #222; }
td { width:50px; height:50px; text-align:center; vertical-align:middle; padding:0; }
.light { background:#f0d9b5; }
.dark { background:#b58863; }
.piece {
  display:inline-block; width:38px; height:38px; border-radius:50%;
  background:radial-gradient(circle at 35% 35%,#a0522d,#5c2d0e);
  border:3px solid #3e1a00; box-shadow:0 3px 0 rgba(60,20,0,0.5);
}
.star-piece { display:inline-block; width:38px; height:38px; line-height:38px; font-size:28px; }
.land-dot {
  display:inline-block; width:30px; height:30px; border-radius:50%;
  cursor:pointer; border:4px solid #4caf50;
  animation:pulse 0.8s infinite;
}
.land-dot:hover { transform:scale(1.2); background:rgba(76,175,80,0.6); }
@keyframes pulse {
  0%,100% { background:rgba(76,175,80,0.2); }
  50% { background:rgba(76,175,80,0.5); }
}
.msg { padding:14px; border-radius:10px; margin:12px 0; font-weight:700; font-size:1rem; }
.msg-ok { background:#dcfce7; color:#166534; border:2px solid #22c55e; }
.msg-no { background:#fef2f2; color:#991b1b; border:2px solid #ef4444; }
.btn { padding:12px 32px; font-size:1.05rem; font-weight:700; background:#58cc02; color:#fff; border:none; border-radius:12px; cursor:pointer; margin-top:10px; box-shadow:0 4px 0 #46a302; }
.btn:hover { background:#46a302; }
.jump-info { margin-top:10px; font-size:0.85rem; }
.jump-badge { display:inline-block; padding:4px 14px; border-radius:20px; color:#fff; font-weight:700; font-size:0.8rem; }
.stars-left { margin-top:6px; font-size:0.85rem; color:#b58863; }
</style>
</head>
<body>
<script type="module" src="../../js/auth-gate.js" data-base="../../"></script>
<nav class="nav"><div class="container">
  <a href="../../index.html" class="nav-logo"><img src="../../assets/lighthouse/logo.svg" alt="" width="32" height="32"><span>Mathagram</span></a>
  <div class="nav-links"><a href="../../courses.html">Courses</a><a href="../../learning-post.html">Posts</a><a href="../../login.html" data-auth="login">Login</a></div>
</div></nav>

<div class="wrap">
<h1>Capture the Stars — Silver</h1>
<p class="sub">Single, Double &amp; Triple jumps! Chain your captures!</p>
<div class="bar"><div class="fill" id="bar"></div></div>
<div id="game"></div>
<div id="msg"></div>
</div>

<script>
// NON-MODULE script so onclick handlers work everywhere
var puzzles = [
  // 3 single jumps
  {type:'single', p:[6,1], stars:[[5,2]], jumps:[[4,3]], bad:[[4,1]]},
  {type:'single', p:[6,5], stars:[[5,4]], jumps:[[4,3]], bad:[[4,5]]},
  {type:'single', p:[5,6], stars:[[4,5]], jumps:[[3,4]], bad:[[3,6]]},
  // 4 double jumps
  {type:'double', p:[6,1], stars:[[5,2],[3,4]], jumps:[[4,3],[2,5]], bad:[[4,1],[2,3]]},
  {type:'double', p:[6,5], stars:[[5,4],[3,2]], jumps:[[4,3],[2,1]], bad:[[4,5],[2,3]]},
  {type:'double', p:[7,0], stars:[[6,1],[4,3]], jumps:[[5,2],[3,4]], bad:[[5,0],[3,2]]},
  {type:'double', p:[6,3], stars:[[5,2],[3,2]], jumps:[[4,1],[2,3]], bad:[[4,3],[2,1]]},
  // 3 triple jumps
  {type:'triple', p:[7,0], stars:[[6,1],[4,3],[2,5]], jumps:[[5,2],[3,4],[1,6]], bad:[[5,0],[3,2],[1,4]]},
  {type:'triple', p:[7,6], stars:[[6,5],[4,3],[2,1]], jumps:[[5,4],[3,2],[1,0]], bad:[[5,6],[3,4],[1,2]]},
  {type:'triple', p:[7,2], stars:[[6,3],[4,3],[2,3]], jumps:[[5,4],[3,2],[1,4]], bad:[[5,0],[3,4],[1,2]]}
];

var cur = 0;
var score = 0;
var total = puzzles.length;
var step = 0; // current jump within puzzle
var locked = false;

function isAt(r, c, arr) {
  for (var i = 0; i < arr.length; i++) {
    if (arr[i][0] === r && arr[i][1] === c) return true;
  }
  return false;
}

function drawBoard() {
  var q = puzzles[cur];
  var pieceR, pieceC;
  if (step > 0) {
    pieceR = q.jumps[step - 1][0];
    pieceC = q.jumps[step - 1][1];
  } else {
    pieceR = q.p[0];
    pieceC = q.p[1];
  }

  var done = step >= q.jumps.length;
  var goodR = done ? -1 : q.jumps[step][0];
  var goodC = done ? -1 : q.jumps[step][1];
  var badR = done ? -1 : q.bad[step][0];
  var badC = done ? -1 : q.bad[step][1];

  var html = '<table>';
  for (var r = 0; r < 8; r++) {
    html += '<tr>';
    for (var c = 0; c < 8; c++) {
      var cls = (r + c) % 2 === 0 ? 'light' : 'dark';
      var cell = '';

      if (r === pieceR && c === pieceC) {
        cell = '<div class="piece"></div>';
      } else if (!done && r === goodR && c === goodC) {
        cell = '<div class="land-dot" onclick="tapGood()"></div>';
      } else if (!done && r === badR && c === badC) {
        cell = '<div class="land-dot" onclick="tapBad()"></div>';
      } else {
        // Check if it's a remaining star (not yet captured)
        for (var s = step; s < q.stars.length; s++) {
          if (r === q.stars[s][0] && c === q.stars[s][1]) {
            cell = '<div class="star-piece">⭐</div>';
            break;
          }
        }
        // Check if it's a captured star (faded)
        if (!cell) {
          for (var s2 = 0; s2 < step; s2++) {
            if (r === q.stars[s2][0] && c === q.stars[s2][1]) {
              cell = '<span style="opacity:0.15;font-size:20px;">⭐</span>';
              break;
            }
          }
        }
      }

      html += '<td class="' + cls + '">' + cell + '</td>';
    }
    html += '</tr>';
  }
  html += '</table>';

  // Info below board
  if (!done) {
    var color = q.type === 'triple' ? '#ef4444' : q.type === 'double' ? '#f97316' : '#22c55e';
    var label = q.type === 'triple' ? 'Triple Jump' : q.type === 'double' ? 'Double Jump' : 'Single Jump';
    var left = q.stars.length - step;
    html += '<div class="jump-info">';
    html += '<span class="jump-badge" style="background:' + color + ';">' + label + '</span>';
    if (q.jumps.length > 1) {
      html += ' <span style="color:#666;">Step ' + (step + 1) + ' of ' + q.jumps.length + '</span>';
    }
    html += '</div>';
    html += '<div class="stars-left">' + '⭐'.repeat(left) + ' ' + left + ' star' + (left > 1 ? 's' : '') + ' to capture</div>';
  }

  document.getElementById('game').innerHTML = html;
}

function tapGood() {
  if (locked) return;
  locked = true;
  step++;
  var q = puzzles[cur];

  if (step < q.jumps.length) {
    // More jumps remain
    var left = q.jumps.length - step;
    document.getElementById('msg').innerHTML = '<div class="msg msg-ok">✓ Captured! ' + left + ' more star' + (left > 1 ? 's' : '') + ' to go!</div>';
    drawBoard();
    locked = false;
  } else {
    // Puzzle complete
    score++;
    var n = q.stars.length;
    var word = n >= 3 ? 'TRIPLE ' : n >= 2 ? 'DOUBLE ' : '';
    drawBoard();
    document.getElementById('msg').innerHTML =
      '<div class="msg msg-ok">✓ ' + word + 'Capture! ' + n + ' star' + (n > 1 ? 's' : '') + ' captured!</div>' +
      '<button class="btn" onclick="nextPuzzle()">' + (cur >= total - 1 ? 'Finish!' : 'Next →') + '</button>';
    locked = false;
  }
}

function tapBad() {
  if (locked) return;
  locked = true;
  document.getElementById('msg').innerHTML = '<div class="msg msg-no">✗ Wrong! Jump OVER the ⭐ to the other side.</div>';
  setTimeout(function() {
    document.getElementById('msg').innerHTML = '';
    locked = false;
  }, 1000);
}

function nextPuzzle() {
  cur++;
  step = 0;
  if (cur < total) {
    showPuzzle();
  } else {
    finishGame();
  }
}

function showPuzzle() {
  document.getElementById('bar').style.width = (cur / total * 100) + '%';
  document.getElementById('msg').innerHTML = '';
  drawBoard();
}

function finishGame() {
  document.getElementById('bar').style.width = '100%';
  var pct = Math.round(score / total * 100);
  // Grade
  var grade, stars;
  if (pct >= 95) { grade = 'A'; stars = 3; }
  else if (pct >= 85) { grade = 'B+'; stars = 2; }
  else if (pct >= 75) { grade = 'B'; stars = 2; }
  else if (pct >= 65) { grade = 'C'; stars = 1; }
  else if (pct >= 50) { grade = 'D'; stars = 0; }
  else { grade = 'F'; stars = 0; }
  var xp = pct >= 60 ? 10 + (pct === 100 ? 5 : 0) : 0;

  document.getElementById('game').innerHTML = '';
  document.getElementById('msg').innerHTML =
    '<h2 style="font-size:2.5rem;margin:16px 0">' + grade + '</h2>' +
    '<div style="font-size:2.5rem">' + '⭐'.repeat(stars) + '☆'.repeat(3 - stars) + '</div>' +
    '<div style="font-size:1.3rem;color:#eab308;font-weight:700;margin:8px 0">+' + xp + ' XP</div>' +
    '<p style="margin:10px 0;color:#888">Score: ' + pct + '% (' + score + '/' + total + ')</p>' +
    '<a href="index.html" class="btn" style="text-decoration:none;display:inline-block">Back to Course</a>';
}

// Start
showPuzzle();
</script>

<script type="module">
import { initNav } from '../../js/nav.js';
import { initRitaChat } from '../../js/rita-chat.js';
import { initSideCharacter } from '../../js/characters.js';
import { saveLessonResult } from '../../js/progress.js';
import { onAuthChange } from '../../js/auth.js';
initNav('../../');
initRitaChat('../../');
initSideCharacter('william', '../../');

// Save result when game ends (hook into finishGame)
var origFinish = window.finishGame;
window.finishGame = function() {
  origFinish();
  var pct = Math.round(window.score / window.total * 100);
  onAuthChange(async function(u) { if (u) await saveLessonResult('board-games', 'bg-2', pct); });
};
</script>
</body>
</html>
