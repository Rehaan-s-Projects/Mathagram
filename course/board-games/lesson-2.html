<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Checkers — Capture the Stars — Silver</title>
<link rel="icon" href="../../assets/lighthouse/logo.svg">
<link rel="stylesheet" href="../../css/global.css">
<link rel="stylesheet" href="../../css/characters.css">
<style>
body { background:#f8f9fa; }
.wrap { max-width:460px; margin:70px auto 40px; text-align:center; padding:16px; }
h1 { font-size:1.5rem; margin-bottom:6px; }
.sub { color:#555; font-size:0.95rem; margin-bottom:14px; font-weight:500; }
.bar { height:10px; background:#e0e0e0; border-radius:5px; margin-bottom:18px; }
.fill { height:100%; background:#58cc02; border-radius:5px; transition:width 0.3s; }
table { border-collapse:collapse; margin:0 auto 16px; border:4px solid #222; }
td { width:50px; height:50px; text-align:center; vertical-align:middle; padding:0; }
.light { background:#f0d9b5; }
.dark { background:#b58863; }
.piece {
  display:inline-block; width:38px; height:38px; border-radius:50%;
  background:radial-gradient(circle at 35% 35%,#a0522d,#5c2d0e);
  border:3px solid #3e1a00; box-shadow:0 3px 0 rgba(60,20,0,0.5);
}
.star-piece {
  display:inline-block; width:38px; height:38px;
  line-height:38px; font-size:28px; pointer-events:none;
}
.land-dot {
  display:inline-block; width:30px; height:30px; border-radius:50%;
  cursor:pointer; border:4px solid #4caf50;
  animation:pulse 0.8s infinite;
}
.land-dot:hover { transform:scale(1.2); background:rgba(76,175,80,0.6); }
@keyframes pulse {
  0%,100% { background:rgba(76,175,80,0.2); }
  50% { background:rgba(76,175,80,0.5); }
}
.msg { padding:14px; border-radius:10px; margin:12px 0; font-weight:700; font-size:1rem; }
.msg-ok { background:#dcfce7; color:#166534; border:2px solid #22c55e; }
.msg-no { background:#fef2f2; color:#991b1b; border:2px solid #ef4444; }
.btn { padding:12px 32px; font-size:1.05rem; font-weight:700; background:#58cc02; color:#fff; border:none; border-radius:12px; cursor:pointer; margin-top:10px; box-shadow:0 4px 0 #46a302; }
.btn:hover { background:#46a302; }
</style>
</head>
<body>
  <script type="module" src="../../js/auth-gate.js" data-base="../../"></script>
<nav class="nav"><div class="container">
  <a href="../../index.html" class="nav-logo"><img src="../../assets/lighthouse/logo.svg" alt="" width="32" height="32"><span>Mathagram</span></a>
  <div class="nav-links"><a href="../../courses.html">Courses</a><a href="../../learning-post.html">Posts</a><a href="../../login.html" data-auth="login">Login</a></div>
</div></nav>

<div class="wrap">
<h1>Capture the Stars — Silver</h1>
<p class="sub">Single, Double & Triple jumps! Chain your captures to grab all the ⭐!</p>
<div class="bar"><div class="fill" id="bar"></div></div>
<div id="game"></div>
<div id="msg"></div>
</div>

<script>
if ('caches' in window) { caches.keys().then(function(n){n.forEach(function(k){caches.delete(k)})}); }
if ('serviceWorker' in navigator) { navigator.serviceWorker.getRegistrations().then(function(r){r.forEach(function(g){g.unregister()})}); }
</script>
<script type="module">
import { initNav } from '../../js/nav.js';
    import { initRitaChat } from '../../js/rita-chat.js'; initNav('../../');
    initRitaChat('../../');
import { showBuddy, initSideCharacter } from '../../js/characters.js';
import { calculateGrade, calculateXP, saveLessonResult } from '../../js/progress.js';
import { onAuthChange } from '../../js/auth.js';
initSideCharacter('william', '../../');

// Puzzles: p=piece, stars=stars to capture, jumps=landing spots in order, bad=wrong landing spots
// type: 'single','double','triple'
var puzzles = [
  // Single jumps (warm-up)
  {type:'single', label:'Single Jump', p:[6,1], stars:[[5,2]], jumps:[[4,3]], bad:[[4,1]]},
  {type:'single', label:'Single Jump', p:[6,5], stars:[[5,4]], jumps:[[4,3]], bad:[[4,5]]},
  {type:'single', label:'Single Jump', p:[5,6], stars:[[4,5]], jumps:[[3,4]], bad:[[3,6]]},
  // Double jumps
  {type:'double', label:'Double Jump!', p:[6,1], stars:[[5,2],[3,4]], jumps:[[4,3],[2,5]], bad:[[4,1],[2,3]]},
  {type:'double', label:'Double Jump!', p:[6,5], stars:[[5,4],[3,2]], jumps:[[4,3],[2,1]], bad:[[4,5],[2,3]]},
  {type:'double', label:'Double Jump!', p:[7,0], stars:[[6,1],[4,3]], jumps:[[5,2],[3,4]], bad:[[5,0],[3,2]]},
  {type:'double', label:'Double Jump!', p:[6,3], stars:[[5,2],[3,0]], jumps:[[4,1],[2,1]], bad:[[4,3],[2,3]]},
  // Triple jumps
  {type:'triple', label:'Triple Jump!', p:[7,0], stars:[[6,1],[4,3],[2,5]], jumps:[[5,2],[3,4],[1,6]], bad:[[5,0],[3,2],[1,4]]},
  {type:'triple', label:'Triple Jump!', p:[7,6], stars:[[6,5],[4,3],[2,1]], jumps:[[5,4],[3,2],[1,0]], bad:[[5,6],[3,4],[1,2]]},
  {type:'triple', label:'Triple Jump!', p:[7,2], stars:[[6,3],[4,5],[2,3]], jumps:[[5,4],[3,6],[1,2]], bad:[[5,2],[3,4],[1,4]]}
];
var cur=0, sc=0, tot=puzzles.length;
var jumpStep=0; // which jump in the chain we're on

window.tap = function(good) {
  var q = puzzles[cur];
  if (good) {
    jumpStep++;
    // Check if more jumps remaining
    if (jumpStep < q.jumps.length) {
      // Show intermediate state and next landing spots
      showBuddy('william','correct');
      document.getElementById('msg').innerHTML = '<div class="msg msg-ok">✓ Great capture! Keep jumping — '+(q.jumps.length - jumpStep)+' more!</div>';
      document.getElementById('game').innerHTML = makeBoard(q, jumpStep);
    } else {
      // All jumps done
      sc++;
      showBuddy('william','correct');
      var jumpWord = q.type==='triple'?'TRIPLE':q.type==='double'?'DOUBLE':'';
      document.getElementById('game').innerHTML = makeBoard(q, jumpStep);
      document.getElementById('msg').innerHTML =
        '<div class="msg msg-ok">✓ '+(jumpWord?jumpWord+' ':'')+'Capture complete! '+q.stars.length+' star'+(q.stars.length>1?'s':'')+' captured!</div>' +
        '<button class="btn" onclick="nxt()">'+(cur>=tot-1?'Finish!':'Next →')+'</button>';
    }
  } else {
    showBuddy('william','wrong');
    document.getElementById('msg').innerHTML = '<div class="msg msg-no">✗ Wrong spot! Tap the correct green circle to capture the star.</div>';
    setTimeout(function(){ document.getElementById('msg').innerHTML=''; }, 900);
  }
};

window.nxt = function() {
  cur++;
  jumpStep=0;
  if (cur<tot) render();
  else fin();
};

function makeBoard(q, step) {
  // step: 0 = initial, number = how many jumps completed
  var completed = (typeof step === 'number' && step > 0) ? step : 0;
  var allDone = completed >= q.jumps.length;
  // Current piece position
  var piecePos = completed > 0 ? q.jumps[completed-1] : q.p;

  var h = '<table>';
  for (var r=0;r<8;r++) {
    h += '<tr>';
    for (var c=0;c<8;c++) {
      var cls = (r+c)%2===0 ? 'light' : 'dark';
      var inner = '';

      // Draw piece at current position
      if (r===piecePos[0]&&c===piecePos[1]) {
        inner = '<div class="piece"></div>';
      }
      // Draw remaining stars (not yet captured)
      else {
        var isStar = false;
        for (var si=completed; si<q.stars.length; si++) {
          if (r===q.stars[si][0]&&c===q.stars[si][1]) { isStar=true; break; }
        }
        if (isStar && !allDone) {
          inner = '<div class="star-piece">⭐</div>';
        }
        // Draw next landing spot (good) if not all done
        else if (!allDone && completed < q.jumps.length && r===q.jumps[completed][0]&&c===q.jumps[completed][1]) {
          inner = '<div class="land-dot" onclick="tap(1)"></div>';
        }
        // Draw bad landing spot if not all done
        else if (!allDone && completed < q.bad.length && r===q.bad[completed][0]&&c===q.bad[completed][1]) {
          inner = '<div class="land-dot" onclick="tap(0)"></div>';
        }
        // Show captured star positions as faded
        else {
          for (var ci=0; ci<completed; ci++) {
            if (r===q.stars[ci][0]&&c===q.stars[ci][1]) { inner = '<span style="opacity:0.2;font-size:22px;">⭐</span>'; break; }
          }
        }
      }
      h += '<td class="'+cls+'">'+inner+'</td>';
    }
    h += '</tr>';
  }
  h += '</table>';
  // Show jump type badge
  if (!allDone) {
    h += '<div style="margin-top:8px;"><span style="background:'+(q.type==='triple'?'#ef4444':q.type==='double'?'#f97316':'#22c55e')+';color:#fff;padding:4px 12px;border-radius:20px;font-size:0.75rem;font-weight:700;">'+q.label+'</span>';
    if (q.jumps.length > 1) h += ' <span style="color:#888;font-size:0.75rem;">Jump '+(completed+1)+' of '+q.jumps.length+'</span>';
    h += '</div>';
  }
  return h;
}

function render() {
  document.getElementById('bar').style.width = (cur/tot*100)+'%';
  document.getElementById('msg').innerHTML = '';
  document.getElementById('game').innerHTML = makeBoard(puzzles[cur], false);
}

function fin() {
  document.getElementById('bar').style.width = '100%';
  var pct = Math.round(sc/tot*100);
  var g = calculateGrade(pct);
  var xp = calculateXP(pct);
  document.getElementById('game').innerHTML = '';
  document.getElementById('msg').innerHTML =
    '<h2 style="font-size:2.5rem;margin:16px 0">'+g.grade+'</h2>' +
    '<div style="font-size:2.5rem">'+'⭐'.repeat(g.stars)+'☆'.repeat(3-g.stars)+'</div>' +
    '<div style="font-size:1.3rem;color:#eab308;font-weight:700;margin:8px 0">+'+xp+' XP</div>' +
    '<p style="margin:10px 0;color:#888">Score: '+pct+'%</p>' +
    '<a href="index.html" class="btn" style="text-decoration:none;display:inline-block">Back to Course</a>';
  showBuddy('william', pct===100?'perfect':'correct');
  onAuthChange(async function(u){if(u) await saveLessonResult('board-games','bg-2',pct);});
}

render();
</script>
</body>
</html>
