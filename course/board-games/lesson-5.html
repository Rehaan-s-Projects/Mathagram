<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Checkers — Capture the Stars — Diamond</title>
<link rel="icon" href="../../assets/lighthouse/logo.svg">
<link rel="stylesheet" href="../../css/global.css">
<link rel="stylesheet" href="../../css/characters.css">
<style>
body { background:#f8f9fa; }
.wrap { max-width:460px; margin:70px auto 40px; text-align:center; padding:16px; }
h1 { font-size:1.5rem; margin-bottom:6px; }
.sub { color:#555; font-size:0.95rem; margin-bottom:14px; font-weight:500; }
.bar { height:10px; background:#e0e0e0; border-radius:5px; margin-bottom:18px; }
.fill { height:100%; background:#58cc02; border-radius:5px; transition:width 0.3s; }
table { border-collapse:collapse; margin:0 auto 16px; border:4px solid #222; }
td { width:50px; height:50px; text-align:center; vertical-align:middle; padding:0; }
.light { background:#f0d9b5; }
.dark { background:#b58863; }
.piece {
  display:inline-block; width:38px; height:38px; border-radius:50%;
  background:radial-gradient(circle at 35% 35%,#a0522d,#5c2d0e);
  border:3px solid #3e1a00; box-shadow:0 3px 0 rgba(60,20,0,0.5);
}
.star-piece {
  display:inline-block; width:38px; height:38px;
  line-height:38px; font-size:28px; pointer-events:none;
}
.land-dot {
  display:inline-block; width:30px; height:30px; border-radius:50%;
  cursor:pointer; border:4px solid #4caf50;
  animation:pulse 0.8s infinite;
}
.land-dot:hover { transform:scale(1.2); background:rgba(76,175,80,0.6); }
@keyframes pulse {
  0%,100% { background:rgba(76,175,80,0.2); }
  50% { background:rgba(76,175,80,0.5); }
}
.msg { padding:14px; border-radius:10px; margin:12px 0; font-weight:700; font-size:1rem; }
.msg-ok { background:#dcfce7; color:#166534; border:2px solid #22c55e; }
.msg-no { background:#fef2f2; color:#991b1b; border:2px solid #ef4444; }
.btn { padding:12px 32px; font-size:1.05rem; font-weight:700; background:#58cc02; color:#fff; border:none; border-radius:12px; cursor:pointer; margin-top:10px; box-shadow:0 4px 0 #46a302; }
.btn:hover { background:#46a302; }
</style>
</head>
<body>
  <script type="module" src="../../js/auth-gate.js" data-base="../../"></script>
<nav class="nav"><div class="container">
  <a href="../../index.html" class="nav-logo"><img src="../../assets/lighthouse/logo.svg" alt="" width="32" height="32"><span>Mathagram</span></a>
  <div class="nav-links"><a href="../../courses.html">Courses</a><a href="../../login.html" data-auth="login">Login</a></div>
</div></nav>

<div class="wrap">
<h1>Capture the Stars — Diamond</h1>
<p class="sub">Master level! Jump from anywhere on the board!</p>
<div class="bar"><div class="fill" id="bar"></div></div>
<div id="game"></div>
<div id="msg"></div>
</div>

<script>
if ('caches' in window) { caches.keys().then(function(n){n.forEach(function(k){caches.delete(k)})}); }
if ('serviceWorker' in navigator) { navigator.serviceWorker.getRegistrations().then(function(r){r.forEach(function(g){g.unregister()})}); }
</script>
<script type="module">
import { initNav } from '../../js/nav.js';
    import { initRitaChat } from '../../js/rita-chat.js'; initNav('../../');
    initRitaChat('../../');
import { showBuddy, initSideCharacter } from '../../js/characters.js';
import { calculateGrade, calculateXP, saveLessonResult } from '../../js/progress.js';
import { onAuthChange } from '../../js/auth.js';
initSideCharacter('william', '../../');

var puzzles = [
  {p:[4,3], s:[3,4], g:[2,5], b:[2,1]},
  {p:[5,6], s:[4,5], g:[3,4], b:[3,6]},
  {p:[3,2], s:[2,3], g:[1,4], b:[1,0]},
  {p:[6,5], s:[5,4], g:[4,3], b:[4,7]},
  {p:[4,1], s:[3,2], g:[2,3], b:[2,1]}
];
var cur=0, sc=0, tot=puzzles.length;

window.tap = function(good) {
  var q = puzzles[cur];
  if (good) {
    sc++;
    document.getElementById('game').innerHTML = makeBoard(q, true);
    showBuddy('william','correct');
    document.getElementById('msg').innerHTML =
      '<div class="msg msg-ok">✓ Captured! The piece jumped over the star!</div>' +
      '<button class="btn" onclick="nxt()">'+(cur>=tot-1?'Finish!':'Next →')+'</button>';
  } else {
    showBuddy('william','wrong');
    document.getElementById('msg').innerHTML = '<div class="msg msg-no">✗ Wrong spot! Tap the OTHER green circle.</div>';
    setTimeout(function(){ document.getElementById('msg').innerHTML=''; }, 900);
  }
};

window.nxt = function() {
  cur++;
  if (cur<tot) render();
  else fin();
};

function makeBoard(q, jumped) {
  var h = '<table>';
  for (var r=0;r<8;r++) {
    h += '<tr>';
    for (var c=0;c<8;c++) {
      var cls = (r+c)%2===0 ? 'light' : 'dark';
      var inner = '';
      if (jumped) {
        if (r===q.g[0]&&c===q.g[1]) inner = '<div class="piece"></div>';
      } else {
        if (r===q.p[0]&&c===q.p[1]) inner = '<div class="piece"></div>';
        else if (r===q.s[0]&&c===q.s[1]) inner = '<div class="star-piece">⭐</div>';
        else if (r===q.g[0]&&c===q.g[1]) inner = '<div class="land-dot" onclick="tap(1)"></div>';
        else if (r===q.b[0]&&c===q.b[1]) inner = '<div class="land-dot" onclick="tap(0)"></div>';
      }
      h += '<td class="'+cls+'">'+inner+'</td>';
    }
    h += '</tr>';
  }
  h += '</table>';
  return h;
}

function render() {
  document.getElementById('bar').style.width = (cur/tot*100)+'%';
  document.getElementById('msg').innerHTML = '';
  document.getElementById('game').innerHTML = makeBoard(puzzles[cur], false);
}

function fin() {
  document.getElementById('bar').style.width = '100%';
  var pct = Math.round(sc/tot*100);
  var g = calculateGrade(pct);
  var xp = calculateXP(pct);
  document.getElementById('game').innerHTML = '';
  document.getElementById('msg').innerHTML =
    '<h2 style="font-size:2.5rem;margin:16px 0">'+g.grade+'</h2>' +
    '<div style="font-size:2.5rem">'+'⭐'.repeat(g.stars)+'☆'.repeat(3-g.stars)+'</div>' +
    '<div style="font-size:1.3rem;color:#eab308;font-weight:700;margin:8px 0">+'+xp+' XP</div>' +
    '<p style="margin:10px 0;color:#888">Score: '+pct+'%</p>' +
    '<a href="index.html" class="btn" style="text-decoration:none;display:inline-block">Back to Course</a>';
  showBuddy('william', pct===100?'perfect':'correct');
  onAuthChange(async function(u){if(u) await saveLessonResult('board-games','bg-5',pct);});
}

render();
</script>
</body>
</html>
