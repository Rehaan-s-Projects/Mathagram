<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Checkers — The Board & Setup</title>
<link rel="icon" href="../../assets/lighthouse/logo.svg">
<link rel="stylesheet" href="../../css/global.css">
<link rel="stylesheet" href="../../css/characters.css">
<style>
body { background:#f8f9fa; }
.wrap { max-width:520px; margin:70px auto 40px; text-align:center; padding:16px; }
h1 { font-size:1.5rem; margin-bottom:6px; }
.sub { color:#555; font-size:0.95rem; margin-bottom:14px; font-weight:500; line-height:1.5; }
.bar { height:10px; background:#e0e0e0; border-radius:5px; margin-bottom:18px; }
.fill { height:100%; background:#58cc02; border-radius:5px; transition:width 0.3s; }
.counter { font-weight:700; margin-bottom:10px; color:#374151; }
table { border-collapse:collapse; margin:0 auto 16px; border:4px solid #222; box-shadow:0 6px 18px rgba(0,0,0,0.15); }
td { width:50px; height:50px; text-align:center; vertical-align:middle; padding:0; position:relative; }
.light { background:#f0d9b5; }
.dark { background:#b58863; }
.piece-black {
  display:inline-block; width:38px; height:38px; border-radius:50%;
  background:radial-gradient(circle at 35% 35%,#4a4a4a,#0a0a0a);
  border:3px solid #000; box-shadow:0 3px 0 rgba(0,0,0,0.5);
}
.piece-red {
  display:inline-block; width:38px; height:38px; border-radius:50%;
  background:radial-gradient(circle at 35% 35%,#ef4444,#7f1d1d);
  border:3px solid #450a0a; box-shadow:0 3px 0 rgba(0,0,0,0.4);
}
.target {
  display:inline-block; width:30px; height:30px; border-radius:50%;
  cursor:pointer; border:4px solid #4caf50;
  animation:pulse 0.8s infinite;
}
.target:hover { transform:scale(1.2); background:rgba(76,175,80,0.6); }
@keyframes pulse {
  0%,100% { background:rgba(76,175,80,0.2); }
  50% { background:rgba(76,175,80,0.5); }
}
.wrong-tap {
  display:inline-block; width:30px; height:30px; border-radius:50%;
  cursor:pointer;
}
.wrong-tap:hover { background:rgba(239,68,68,0.2); }
.msg { padding:14px; border-radius:10px; margin:12px 0; font-weight:700; font-size:1rem; }
.msg-ok { background:#dcfce7; color:#166534; border:2px solid #22c55e; }
.msg-no { background:#fef2f2; color:#991b1b; border:2px solid #ef4444; }
.msg-info { background:#dbeafe; color:#1e3a8a; border:2px solid #3b82f6; }
.btn { padding:12px 32px; font-size:1.05rem; font-weight:700; background:#58cc02; color:#fff; border:none; border-radius:12px; cursor:pointer; margin-top:10px; box-shadow:0 4px 0 #46a302; text-decoration:none; display:inline-block; }
.btn:hover { background:#46a302; }
</style>
</head>
<body>
  <script type="module" src="../../js/lesson-loader.js"></script>
  <script type="module" src="../../js/auth-gate.js" data-base="../../"></script>
<nav class="nav"><div class="container">
  <a href="../../index.html" class="nav-logo"><img src="../../assets/lighthouse/logo.svg" alt="" width="32" height="32"><span>Mathagram</span></a>
  <div class="nav-links"><a href="../../courses.html">Courses</a><a href="../../learning-post.html">Posts</a><a href="../../login.html" data-auth="login">Login</a></div>
</div></nav>

<div class="wrap">
<h1>The Board & Setup</h1>
<p class="sub">Tap the <span style="color:#4caf50;font-weight:800">GREEN CIRCLE</span> to place each piece.<br>Pieces only go on <strong>dark squares</strong>. Black starts at the bottom, Red at the top.</p>
<div class="bar"><div class="fill" id="bar"></div></div>
<div class="counter" id="counter">0 / 24 pieces placed</div>
<div id="game"></div>
<div id="msg"></div>
</div>

<script>
if ('caches' in window) { caches.keys().then(function(n){n.forEach(function(k){caches.delete(k)})}); }
if ('serviceWorker' in navigator) { navigator.serviceWorker.getRegistrations().then(function(r){r.forEach(function(g){g.unregister()})}); }
</script>
<script type="module">
import { initNav } from '../../js/nav.js';
import { initRitaChat } from '../../js/rita-chat.js';
initNav('../../');
initRitaChat('../../');
import { showBuddy, initSideCharacter } from '../../js/characters.js';
import { calculateGrade, calculateXP, saveLessonResult } from '../../js/progress.js';
import { onAuthChange } from '../../js/auth.js';
initSideCharacter('william', '../../');

// 12 black starting squares (rows 5,6,7 — dark squares only)
// 12 red starting squares (rows 0,1,2 — dark squares only)
// On a checker board, dark squares satisfy (r+c) % 2 === 1
const blackSquares = [];
for (let r=5; r<=7; r++) for (let c=0; c<8; c++) if ((r+c)%2===1) blackSquares.push([r,c]);
const redSquares = [];
for (let r=0; r<=2; r++) for (let c=0; c<8; c++) if ((r+c)%2===1) redSquares.push([r,c]);

// Sequence: black first, then red
const sequence = [...blackSquares.map(p=>({pos:p,color:'black'})), ...redSquares.map(p=>({pos:p,color:'red'}))];
const TOTAL = sequence.length; // 24

let placed = []; // {r,c,color}
let mistakes = 0;
let cur = 0;

window.tap = function(r, c) {
  const target = sequence[cur];
  const [tr, tc] = target.pos;
  if (r === tr && c === tc) {
    placed.push({r, c, color: target.color});
    cur++;
    showBuddy('william','correct');
    if (cur === blackSquares.length) {
      document.getElementById('msg').innerHTML = '<div class="msg msg-info">✓ Black is set up. Now place the Red pieces at the top.</div>';
      setTimeout(()=>{ document.getElementById('msg').innerHTML=''; render(); }, 1300);
    } else if (cur >= TOTAL) {
      finish();
    } else {
      render();
    }
  } else {
    mistakes++;
    showBuddy('william','wrong');
    document.getElementById('msg').innerHTML = '<div class="msg msg-no">✗ That isn\'t the next square. Tap the GREEN circle.</div>';
    setTimeout(()=>{ document.getElementById('msg').innerHTML=''; }, 900);
  }
};

function render() {
  document.getElementById('bar').style.width = (cur/TOTAL*100)+'%';
  document.getElementById('counter').textContent = cur + ' / ' + TOTAL + ' pieces placed';
  const target = sequence[cur];
  const [tr, tc] = target.pos;

  let h = '<table>';
  for (let r=0;r<8;r++) {
    h += '<tr>';
    for (let c=0;c<8;c++) {
      const cls = (r+c)%2===0 ? 'light' : 'dark';
      let inner = '';
      const piecePlaced = placed.find(p => p.r===r && p.c===c);
      if (piecePlaced) {
        inner = '<div class="piece-' + piecePlaced.color + '"></div>';
      } else if (r===tr && c===tc) {
        inner = '<div class="target" onclick="tap('+r+','+c+')"></div>';
      } else if ((r+c)%2===1) {
        // other dark squares — clickable but wrong
        inner = '<div class="wrong-tap" onclick="tap('+r+','+c+')"></div>';
      }
      h += '<td class="'+cls+'">'+inner+'</td>';
    }
    h += '</tr>';
  }
  h += '</table>';
  document.getElementById('game').innerHTML = h;
}

function finish() {
  document.getElementById('bar').style.width = '100%';
  document.getElementById('counter').textContent = TOTAL + ' / ' + TOTAL + ' pieces placed';
  // Score: 100% if no mistakes, lose 4 points per mistake, min 0
  const pct = Math.max(0, 100 - mistakes * 4);
  const g = calculateGrade(pct);
  const xp = calculateXP(pct);

  // Render full board with all pieces
  let h = '<table>';
  for (let r=0;r<8;r++) {
    h += '<tr>';
    for (let c=0;c<8;c++) {
      const cls = (r+c)%2===0 ? 'light' : 'dark';
      const p = placed.find(x => x.r===r && x.c===c);
      const inner = p ? '<div class="piece-' + p.color + '"></div>' : '';
      h += '<td class="'+cls+'">'+inner+'</td>';
    }
    h += '</tr>';
  }
  h += '</table>';
  document.getElementById('game').innerHTML = h;

  document.getElementById('msg').innerHTML =
    '<h2 style="font-size:2.5rem;margin:16px 0">'+g.grade+'</h2>' +
    '<div style="font-size:2.5rem">'+'⭐'.repeat(g.stars)+'☆'.repeat(3-g.stars)+'</div>' +
    '<div style="font-size:1.3rem;color:#eab308;font-weight:700;margin:8px 0">+'+xp+' XP</div>' +
    '<p style="margin:10px 0;color:#888">' + (mistakes===0 ? 'Perfect setup — no mistakes!' : mistakes + ' mistake' + (mistakes===1?'':'s')) + '</p>' +
    '<a href="index.html" class="btn">Back to Course</a>';

  showBuddy('william', pct===100 ? 'perfect' : 'correct');
  onAuthChange(async function(u){ if(u) await saveLessonResult('board-games','setup-checkers',pct); });
}

render();
</script>
</body>
</html>
