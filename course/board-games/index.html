<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Board Games — Mathagram</title>
  <link rel="icon" href="../../assets/lighthouse/logo.svg">
  <link rel="stylesheet" href="../../css/global.css">
  <link rel="stylesheet" href="../../css/learning-path.css">
  <style>
    .course-header { padding: 80px 24px 24px; text-align: center; }
    .course-badge { display: inline-block; padding: 4px 14px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #fff; border-radius: 999px; margin-bottom: 12px; }
    .course-header h1 { font-size: 2.5rem; font-weight: 800; margin-bottom: 8px; }
    .course-header p { font-size: 1rem; color: var(--color-text-secondary); max-width: 560px; margin: 0 auto; line-height: 1.6; }
    @media (max-width: 768px) { .course-header h1 { font-size: 2rem; } }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="container">
      <a href="../../index.html" class="nav-logo">
        <img src="../../assets/lighthouse/logo.svg" alt="" width="32" height="32">
        <span>Mathagram</span>
      </a>
      <div class="nav-links">
        <a href="../../courses.html">Courses</a>
        <a href="../../login.html" data-auth="login">Login</a>
      </div>
    </div>
  </nav>
  <header class="course-header">
    <span class="course-badge" style="background:var(--color-others)">Others</span>
    <h1>Board Games</h1>
    <p>Master classic board games — from Checkers to Go, Backgammon to Mancala. Strategy, history, and competitive play. 170 lessons across 12 units.</p>
  </header>
  <div id="learning-path" class="path-container"></div>
  <footer class="footer">
    <div class="container">
      <p class="footer-copy">&copy; <span id="year"></span> Mathagram.org — All Rights Reserved.</p>
    </div>
  </footer>
  <script type="module">
    import { initNav } from '../../js/nav.js';
    initNav('../../');
    import { renderPath, getCompletedLessons } from '../../js/learning-path.js';
    import { onAuthChange } from '../../js/auth.js';
    document.getElementById('year').textContent = new Date().getFullYear();
    const units = [
      [1,'Checkers (Draughts)',['⭐ Capture the Stars — Bronze Challenge','⭐ Capture the Stars — Silver Challenge','⭐ Capture the Stars — Gold Challenge','⭐ Capture the Stars — Diamond Challenge','History of Checkers','The Board & Setup','Basic Moves','Jumping & Capturing','Multiple Jumps','King Me! (Promotion)','Forced Captures Rule','Opening Strategies','Middle Game Tactics','Endgame Techniques','Double Corner Defense','Man Down Strategy','Checkers Puzzles','Checkers Review']],
      [2,'Backgammon',['History of Backgammon','The Board & Setup','Rolling & Moving','Hitting & Entering','Bearing Off','The Doubling Cube','Opening Moves','Anchoring Strategy','Running Game','Holding Game','Backgame Strategy','Pip Counting','Backgammon Probabilities','Backgammon Review']],
      [3,'Go (Baduk/Weiqi)',['History of Go','The Board (19x19)','Placing Stones','Liberties','Capturing Stones','Ko Rule','Eyes & Life/Death','Territory Counting','Seki (Mutual Life)','Opening (Fuseki)','Middle Game (Chuban)','Endgame (Yose)','Go Puzzles (Tsumego)','Go Review']],
      [4,'Mancala',['History of Mancala','Oware Rules','Kalah Rules','Bao Rules','Basic Strategy','Counting Seeds','Capturing Techniques','Opening Moves','Middle Game','Endgame Strategy','African Mancala Variations','Asian Mancala Variations','Mancala Mathematics','Mancala Review']],
      [5,'Othello (Reversi)',['History of Othello','The Board & Setup','Flipping Discs','Corner Strategy','Edge Play','Mobility','Parity','Stable Discs','X-Squares & C-Squares','Opening Book','Middle Game Strategy','Endgame Counting','Othello Tournaments','Othello Review']],
      [6,'Shogi (Japanese)',['History of Shogi','The Board (9x9)','Piece Types & Movement','Drops (Unique Rule)','Promotion Rules','King Safety','Opening Strategies','Attacking Formations','Castle Building','Middle Game Tactics','Endgame (Tsume)','Famous Shogi Games','Shogi vs Chess Comparison','Shogi Review']],
      [7,'Xiangqi (Chinese)',['History of Xiangqi','The Board & River','Piece Types','The General & Advisors','Elephants & Horses','Chariots & Cannons','Soldiers','Opening Principles','Middle Game','Checkmate Patterns','Famous Games','Xiangqi Strategy','Xiangqi Puzzles','Xiangqi Review']],
      [8,'Connect Four & Dots',['Connect Four Rules','First Move Advantage','Column Control','Threat Building','Double Threats','Odd/Even Strategy','Advanced Patterns','Connect Four Solutions','Dots & Boxes Rules','Chain Strategy','Double-Dealing','Nimstring Theory','Dots Endgame','Connect Four & Dots Review']],
      [9,'Scrabble & Word Games',['Scrabble Board & Tiles','Tile Values & Distribution','Two-Letter Words','Three-Letter Words','Bingo (7-Letter Words)','Rack Management','Board Control','Triple Word Traps','Q Without U Words','Hook Strategy','Endgame Tile Tracking','Tournament Rules','Boggle & Anagram Games','Word Games Review']],
      [10,'Strategy Board Games',['Risk — World Domination','Catan — Trading & Building','Carcassonne — Tile Placement','Ticket to Ride — Route Building','Pandemic — Cooperative Play','Azul — Pattern Building','Splendor — Engine Building','7 Wonders — Card Drafting','Codenames — Team Guessing','Terraforming Mars','Wingspan — Engine Building','Puerto Rico','Strategy Games Review']],
      [11,'Classic & Traditional',['Ludo — Race to Home','Snakes & Ladders — History & Math','Parcheesi','Nine Men Morris','Hnefatafl (Viking Game)','Senet (Ancient Egypt)','Royal Game of Ur','Pachisi (Indian Classic)','Mahjong — Tile Matching','Dominoes — Basics & Strategy','Carrom — Flicking Game','Crokinole','Traditional Games Review']],
      [12,'Board Game Theory & Mastery',['Game Theory in Board Games','Perfect Information Games','Imperfect Information','Combinatorial Game Theory','Solved vs Unsolved Games','First Player Advantage','Zugzwang & Tempo','Probability in Board Games','Expected Value Decisions','Bluffing & Psychology','Tournament Preparation','Rating Systems (Elo Glicko)','Sportsmanship & Etiquette','Board Games Mastery!']]
    ];
    let n = 0;
    const lessons = [];
    units.forEach(([u, name, titles]) => {
      titles.forEach((t, i) => {
        n++;
        lessons.push({ id: 'bg-'+n, title: t, href: '#', unit: u, unitName: name, category: 'others', checkpoint: i===titles.length-1 });
      });
    });
    // Make first 5 lessons playable
    for (let i = 0; i < 5 && i < lessons.length; i++) {
      lessons[i].href = 'lesson-' + (i+1) + '.html';
    }
    async function loadPath() {
      const container = document.getElementById('learning-path');
      let completed = await getCompletedLessons('board-games');
      renderPath(container, lessons, completed);
      onAuthChange(async (user) => {
        completed = await getCompletedLessons('board-games');
        renderPath(container, lessons, completed);
      });
    }
    loadPath();
  </script>
</body>
</html>
