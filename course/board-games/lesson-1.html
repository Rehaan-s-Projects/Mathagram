<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Capture the Stars — Bronze — Mathagram</title>
  <link rel="icon" href="../../assets/lighthouse/logo.svg">
  <link rel="stylesheet" href="../../css/global.css">
  <link rel="stylesheet" href="../../css/characters.css">
  <style>
    .game-container { max-width:500px; margin:0 auto; padding:80px 16px 40px; text-align:center; }
    .game-title { font-size:1.5rem; font-weight:800; margin-bottom:4px; }
    .game-sub { font-size:0.9rem; color:#64748b; margin-bottom:16px; }
    .progress-bar { width:100%; height:10px; background:#e5e5e5; border-radius:5px; margin-bottom:20px; overflow:hidden; }
    .progress-fill { height:100%; background:linear-gradient(90deg,#58cc02,#89e219); border-radius:5px; transition:width 0.4s; }

    /* Board */
    .board-wrap { position:relative; display:inline-block; margin:12px auto; }
    .board { display:grid; grid-template-columns:repeat(8,44px); grid-template-rows:repeat(8,44px); border:4px solid #1a1a1a; border-radius:6px; box-shadow:0 6px 20px rgba(0,0,0,0.25); }
    .sq { width:44px; height:44px; display:flex; align-items:center; justify-content:center; position:relative; }
    .lt { background:#edd6b0; }
    .dk { background:#b07442; }

    /* Move dots — small circles on normal dark squares */
    .move-dot { cursor:pointer; position:relative; background:#b07442 !important; }
    .move-dot::after { content:''; width:14px; height:14px; border-radius:50%; background:rgba(88,204,2,0.5); position:absolute; transition:transform 0.15s; }
    .move-dot:hover::after { background:rgba(88,204,2,0.85); transform:scale(1.4); }
    .move-dot.star { background:#b07442 !important; }
    .move-dot.star::after { background:#ffd54f; width:18px; height:18px; box-shadow:0 0 10px rgba(255,193,7,0.7); animation:dotPulse 1s infinite; }
    @keyframes dotPulse { 0%,100%{box-shadow:0 0 6px rgba(255,193,7,0.5)} 50%{box-shadow:0 0 16px rgba(255,193,7,1)} }

    .wrong-flash { background:#ff6b6b !important; }
    .wrong-flash::after { content:'✗' !important; width:auto !important; height:auto !important; background:none !important; font-size:1.2rem; color:#fff; box-shadow:none !important; animation:shake 0.4s !important; }
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }

    /* Piece — slides across board */
    .piece-layer { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:10; }
    .checker { width:34px; height:34px; border-radius:50%; background:radial-gradient(circle at 35% 35%, #a0522d, #5c2d0e); border:3px solid #3e1a00; box-shadow:0 3px 0 rgba(60,20,0,0.5); position:absolute; transition:top 0.35s ease-in-out, left 0.35s ease-in-out; }

    .hint { font-size:0.9rem; color:#64748b; margin:12px 0; }
    .result-banner { padding:14px; border-radius:12px; margin:14px 0; font-weight:700; font-size:0.95rem; }
    .result-banner.correct { background:#dcfce7; color:#166534; border:2px solid #22c55e; }
    .result-banner.wrong { background:#fef2f2; color:#991b1b; border:2px solid #ef4444; }
    .next-btn { margin-top:10px; padding:12px 32px; font-size:1rem; font-weight:700; background:#58cc02; color:#fff; border:none; border-radius:12px; cursor:pointer; box-shadow:0 4px 0 #46a302; }
    .next-btn:hover { background:#46a302; }
    .complete { padding:32px; }
    .complete h2 { font-size:2rem; margin-bottom:8px; }
    .complete .stars-display { font-size:2.5rem; margin:12px 0; }
    .complete .xp { font-size:1.2rem; color:#eab308; font-weight:700; }
  </style>
</head>
<body>
  <nav class="nav"><div class="container">
    <a href="../../index.html" class="nav-logo"><img src="../../assets/lighthouse/logo.svg" alt="" width="32" height="32"><span>Mathagram</span></a>
    <div class="nav-links"><a href="../../courses.html">Courses</a><a href="../../login.html" data-auth="login">Login</a></div>
  </div></nav>

  <div class="game-container">
    <div class="game-title">⭐ Capture the Stars</div>
    <div class="game-sub">Bronze Challenge</div>
    <div class="progress-bar"><div class="progress-fill" id="progress" style="width:0%"></div></div>
    <div id="hint" class="hint">Tap the glowing dot to move your piece!</div>
    <div id="board"></div>
    <div id="result"></div>
    <div id="completion" style="display:none"></div>
  </div>

  <footer class="footer"><div class="container"><p class="footer-copy">&copy; <span id="year"></span> Mathagram.org</p></div></footer>

  <script type="module">
    import { initNav } from '../../js/nav.js'; initNav('../../');
    import { showBuddy, initSideCharacter } from '../../js/characters.js';
    import { calculateGrade, calculateXP, saveLessonResult } from '../../js/progress.js';
    import { onAuthChange } from '../../js/auth.js';
    document.getElementById('year').textContent = new Date().getFullYear();
    initSideCharacter('william', '../../');

    const SQ = 44; // square size in px
    // Piece at BOTTOM row 7, jump targets 2 rows up at row 5
    const puzzles = [
      { piece:[7,2], star:[5,4], wrong:[5,0] },
      { piece:[7,4], star:[5,2], wrong:[5,6] },
      { piece:[7,4], star:[5,6], wrong:[5,2] },
      { piece:[7,2], star:[5,0], wrong:[5,4] },
      { piece:[7,4], star:[5,6], wrong:[5,2] }
    ];

    let current = 0, correctCount = 0;
    const total = puzzles.length;
    const boardEl = document.getElementById('board');
    const hintEl = document.getElementById('hint');
    const resultEl = document.getElementById('result');
    const progressEl = document.getElementById('progress');

    function renderPuzzle(p) {
      resultEl.innerHTML = '';
      hintEl.textContent = 'Tap the glowing dot to jump your piece!';
      progressEl.style.width = ((current/total)*100)+'%';

      // Build board + piece overlay
      let html = '<div class="board-wrap"><div class="board">';
      for (let r=0; r<8; r++) {
        for (let c=0; c<8; c++) {
          const light = (r+c)%2===0;
          const isStar = p.star[0]===r && p.star[1]===c;
          const isWrong = p.wrong[0]===r && p.wrong[1]===c;

          if (isStar) {
            html += '<div class="sq dk move-dot star" data-correct="1" data-r="'+r+'" data-c="'+c+'"></div>';
          } else if (isWrong) {
            html += '<div class="sq dk move-dot" data-correct="0" data-r="'+r+'" data-c="'+c+'"></div>';
          } else {
            html += '<div class="sq '+(light?'lt':'dk')+'"></div>';
          }
        }
      }
      html += '</div>';
      // Piece overlay — absolutely positioned so it can slide
      html += '<div class="piece-layer"><div class="checker" id="checker" style="top:'+(p.piece[0]*SQ+6)+'px;left:'+(p.piece[1]*SQ+6)+'px;"></div></div>';
      html += '</div>';
      boardEl.innerHTML = html;

      // Click handlers on dots
      document.querySelectorAll('.move-dot').forEach(function(dot) {
        dot.addEventListener('click', function() {
          var correct = dot.getAttribute('data-correct')==='1';
          var tr = parseInt(dot.getAttribute('data-r'));
          var tc = parseInt(dot.getAttribute('data-c'));
          handleTap(dot, correct, tr, tc, p);
        });
      });
    }

    function handleTap(dot, correct, tr, tc, p) {
      // Disable all dots
      document.querySelectorAll('.move-dot').forEach(function(d){ d.style.pointerEvents='none'; });

      if (correct) {
        correctCount++;
        // Slide piece to target
        var checker = document.getElementById('checker');
        checker.style.top = (tr*SQ+6)+'px';
        checker.style.left = (tc*SQ+6)+'px';

        // Remove ALL dots — reset to normal dark squares
        document.querySelectorAll('.move-dot').forEach(function(d){
          d.className = 'sq dk';
          d.removeAttribute('style');
          d.removeAttribute('data-correct');
          d.removeAttribute('data-r');
          d.removeAttribute('data-c');
        });

        showBuddy('william', 'correct');
        resultEl.innerHTML = '<div class="result-banner correct">✓ Well done, young scholar!</div>';

        setTimeout(function() {
          var isLast = current >= total-1;
          var btn = document.createElement('button');
          btn.className = 'next-btn';
          btn.textContent = isLast ? 'Finish!' : 'Next →';
          btn.onclick = function() {
            current++;
            if (current < total) renderPuzzle(puzzles[current]);
            else showComplete();
          };
          resultEl.appendChild(btn);
        }, 500);

      } else {
        dot.classList.add('wrong-flash');
        showBuddy('william', 'wrong');
        resultEl.innerHTML = '<div class="result-banner wrong">✗ Try the other dot!</div>';
        setTimeout(function() {
          dot.classList.remove('wrong-flash');
          dot.className = 'sq dk move-dot';
          document.querySelectorAll('.move-dot').forEach(function(d){ d.style.pointerEvents='auto'; });
          resultEl.innerHTML = '';
        }, 800);
      }
    }

    function showComplete() {
      progressEl.style.width = '100%';
      boardEl.innerHTML = '';
      hintEl.style.display = 'none';
      resultEl.innerHTML = '';
      var score = Math.round((correctCount/total)*100);
      var r = calculateGrade(score);
      var xp = calculateXP(score);
      document.getElementById('completion').style.display = 'block';
      document.getElementById('completion').innerHTML =
        '<div class="complete"><h2>'+r.grade+'</h2>' +
        '<div class="stars-display">'+'⭐'.repeat(r.stars)+'☆'.repeat(3-r.stars)+'</div>' +
        '<div class="xp">+'+xp+' XP</div>' +
        '<p style="margin:12px 0;color:#64748b;">You scored '+score+'%</p>' +
        '<a href="index.html" class="next-btn" style="text-decoration:none;display:inline-block;">Back to Course</a></div>';
      showBuddy('william', score===100 ? 'perfect' : 'correct');
      onAuthChange(async function(u){ if(u) await saveLessonResult('board-games','bg-1',score); });
    }

    renderPuzzle(puzzles[0]);
  </script>
</body>
</html>
