<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Capture the Stars — Bronze Challenge — Mathagram</title>
  <link rel="icon" href="../../assets/lighthouse/logo.svg">
  <link rel="stylesheet" href="../../css/global.css">
  <link rel="stylesheet" href="../../css/characters.css">
  <style>
    .game-container { max-width:500px; margin:0 auto; padding:80px 16px 40px; text-align:center; }
    .game-title { font-size:1.5rem; font-weight:800; margin-bottom:4px; }
    .game-sub { font-size:0.9rem; color:#64748b; margin-bottom:16px; }
    .progress-bar { width:100%; height:10px; background:#e5e5e5; border-radius:5px; margin-bottom:20px; overflow:hidden; }
    .progress-fill { height:100%; background:linear-gradient(90deg,#58cc02,#89e219); border-radius:5px; transition:width 0.4s ease; }
    .board { display:inline-grid; grid-template-columns:repeat(8,44px); grid-template-rows:repeat(8,44px); border:4px solid #1a1a1a; border-radius:6px; box-shadow:0 6px 20px rgba(0,0,0,0.25); margin:12px auto; }
    .sq { width:44px; height:44px; display:flex; align-items:center; justify-content:center; position:relative; box-sizing:border-box; }
    .lt { background:#edd6b0; }
    .dk { background:#b07442; }

    /* Star = correct move */
    .star { background:#ffd54f; cursor:pointer; animation:glow 1s ease-in-out infinite; transition:transform 0.15s; }
    .star:hover { transform:scale(1.15); z-index:2; }
    .star::after { content:'⭐'; font-size:1.1rem; }
    @keyframes glow { 0%,100% { box-shadow:inset 0 0 8px rgba(255,193,7,0.6); } 50% { background:#ffecb3; box-shadow:inset 0 0 18px rgba(255,193,7,1); } }

    /* Move option = wrong move (the other diagonal) */
    .move-option { background:#a0d2db; cursor:pointer; transition:transform 0.15s; border:2px dashed rgba(255,255,255,0.5); }
    .move-option:hover { transform:scale(1.1); z-index:2; background:#7ec8d8; }
    .move-option::after { content:'•'; font-size:1.5rem; color:rgba(255,255,255,0.7); }

    .wrong-sq { background:#ff6b6b !important; animation:shake 0.4s ease; border:none !important; }
    .wrong-sq::after { content:'✗' !important; font-size:1.2rem; color:#fff; }
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
    .correct-sq { background:#58cc02 !important; animation:none !important; border:none !important; }
    .correct-sq::after { content:'✓' !important; font-size:1.2rem; color:#fff; }

    .pc { width:30px; height:30px; border-radius:50%; background:radial-gradient(circle at 35% 35%, #a0522d, #5c2d0e); border:3px solid #3e1a00; box-shadow:0 3px 0 rgba(60,20,0,0.5); transition:all 0.3s ease; }
    .pc.moving { animation:pieceMove 0.4s ease; }
    @keyframes pieceMove { 0%{transform:scale(1)} 50%{transform:scale(1.3)} 100%{transform:scale(1)} }

    .hint { font-size:0.9rem; color:#64748b; margin:12px 0; font-weight:500; }
    .hint strong { color:#1a1a2e; }
    .result-banner { padding:16px; border-radius:12px; margin:16px 0; font-weight:700; font-size:1rem; animation:slideUp 0.3s ease; }
    .result-banner.correct { background:#dcfce7; color:#166534; border:2px solid #22c55e; }
    .result-banner.wrong { background:#fef2f2; color:#991b1b; border:2px solid #ef4444; }
    @keyframes slideUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    .next-btn { margin-top:12px; padding:12px 32px; font-size:1rem; font-weight:700; background:#58cc02; color:#fff; border:none; border-radius:12px; cursor:pointer; box-shadow:0 4px 0 #46a302; }
    .next-btn:hover { background:#46a302; }
    .complete { text-align:center; padding:32px; }
    .complete h2 { font-size:2rem; margin-bottom:8px; }
    .complete .stars-display { font-size:2.5rem; margin:12px 0; }
    .complete .xp { font-size:1.2rem; color:#eab308; font-weight:700; }
  </style>
</head>
<body>
  <nav class="nav"><div class="container">
    <a href="../../index.html" class="nav-logo"><img src="../../assets/lighthouse/logo.svg" alt="" width="32" height="32"><span>Mathagram</span></a>
    <div class="nav-links"><a href="../../courses.html">Courses</a><a href="../../login.html" data-auth="login">Login</a></div>
  </div></nav>

  <div class="game-container">
    <div class="game-title">⭐ Capture the Stars</div>
    <div class="game-sub">Bronze Challenge — Tap the correct square!</div>
    <div class="progress-bar"><div class="progress-fill" id="progress" style="width:0%"></div></div>
    <div id="hint" class="hint">Two moves available — tap the ⭐ <strong>star</strong>!</div>
    <div id="board"></div>
    <div id="result"></div>
    <div id="completion" style="display:none"></div>
  </div>

  <footer class="footer"><div class="container"><p class="footer-copy">&copy; <span id="year"></span> Mathagram.org</p></div></footer>

  <script type="module">
    import { initNav } from '../../js/nav.js'; initNav('../../');
    import { showBuddy, initSideCharacter } from '../../js/characters.js';
    import { calculateGrade, calculateXP, saveLessonResult } from '../../js/progress.js';
    import { onAuthChange } from '../../js/auth.js';
    document.getElementById('year').textContent = new Date().getFullYear();
    initSideCharacter('william', '../../');

    // Each puzzle: piece position, star (correct), wrong (other forward diagonal)
    // Piece moves UP diagonally: up-left [r-1,c-1] or up-right [r-1,c+1]
    const puzzles = [
      { piece:[6,3], star:[5,4], wrong:[5,2], hint:'↗ or ↖? Tap the ⭐ star to move!' },
      { piece:[6,5], star:[5,4], wrong:[5,6], hint:'Which diagonal? Tap the ⭐!' },
      { piece:[5,2], star:[4,3], wrong:[4,1], hint:'Go up-right ↗ or up-left ↖?' },
      { piece:[5,6], star:[4,5], wrong:[4,7], hint:'Find the star! Tap to move.' },
      { piece:[7,4], star:[6,5], wrong:[6,3], hint:'Last one! Capture the ⭐!' }
    ];

    let current = 0;
    let correctCount = 0;
    const total = puzzles.length;
    const boardEl = document.getElementById('board');
    const hintEl = document.getElementById('hint');
    const resultEl = document.getElementById('result');
    const progressEl = document.getElementById('progress');

    function renderBoard(puzzle) {
      resultEl.innerHTML = '';
      hintEl.textContent = puzzle.hint;
      progressEl.style.width = ((current / total) * 100) + '%';

      let html = '<div class="board">';
      for (let r = 0; r < 8; r++) {
        for (let c = 0; c < 8; c++) {
          const isLight = (r + c) % 2 === 0;
          const isPiece = puzzle.piece[0] === r && puzzle.piece[1] === c;
          const isStar = puzzle.star[0] === r && puzzle.star[1] === c;
          const isWrong = puzzle.wrong[0] === r && puzzle.wrong[1] === c;

          if (isStar) {
            html += '<div class="sq star" id="sq-star"></div>';
          } else if (isWrong) {
            html += '<div class="sq move-option" id="sq-wrong"></div>';
          } else if (isPiece) {
            html += '<div class="sq ' + (isLight ? 'lt' : 'dk') + '" id="sq-piece"><div class="pc" id="piece"></div></div>';
          } else {
            html += '<div class="sq ' + (isLight ? 'lt' : 'dk') + '"></div>';
          }
        }
      }
      html += '</div>';
      boardEl.innerHTML = html;

      // Click star = correct
      document.getElementById('sq-star').addEventListener('click', function() { handleMove(this, true); });
      // Click wrong = incorrect
      document.getElementById('sq-wrong').addEventListener('click', function() { handleMove(this, false); });
    }

    function handleMove(sq, isCorrect) {
      const starSq = document.getElementById('sq-star');
      const wrongSq = document.getElementById('sq-wrong');
      starSq.style.pointerEvents = 'none';
      wrongSq.style.pointerEvents = 'none';

      if (isCorrect) {
        correctCount++;
        sq.className = 'sq correct-sq';

        // Move piece to star
        const pieceSq = document.getElementById('sq-piece');
        setTimeout(function() {
          sq.innerHTML = '<div class="pc moving" id="piece"></div>';
          if (pieceSq) pieceSq.innerHTML = '';
          wrongSq.className = 'sq dk';
          wrongSq.innerHTML = '';
        }, 200);

        showBuddy('william', 'correct');
        resultEl.innerHTML = '<div class="result-banner correct">✓ Correct! Well done, young scholar.</div>';

        // Next button
        setTimeout(function() {
          var isLast = current >= total - 1;
          var btn = document.createElement('button');
          btn.className = 'next-btn';
          btn.textContent = isLast ? 'Finish!' : 'Next →';
          btn.addEventListener('click', function() {
            current++;
            if (current < total) {
              renderBoard(puzzles[current]);
            } else {
              showComplete();
            }
          });
          resultEl.appendChild(btn);
        }, 500);

      } else {
        sq.className = 'sq wrong-sq';
        showBuddy('william', 'wrong');
        resultEl.innerHTML = '<div class="result-banner wrong">✗ Wrong square! Tap the ⭐ star.</div>';

        // Re-enable after shake
        setTimeout(function() {
          sq.className = 'sq move-option';
          sq.innerHTML = '';
          starSq.style.pointerEvents = 'auto';
          wrongSq.style.pointerEvents = 'auto';
          resultEl.innerHTML = '';
        }, 1000);
      }
    }

    function showComplete() {
      progressEl.style.width = '100%';
      boardEl.innerHTML = '';
      hintEl.style.display = 'none';
      resultEl.innerHTML = '';

      var score = Math.round((correctCount / total) * 100);
      var result = calculateGrade(score);
      var xpEarned = calculateXP(score);

      document.getElementById('completion').style.display = 'block';
      document.getElementById('completion').innerHTML =
        '<div class="complete">' +
        '<h2>' + result.grade + '</h2>' +
        '<div class="stars-display">' + '⭐'.repeat(result.stars) + '☆'.repeat(3-result.stars) + '</div>' +
        '<div class="xp">+' + xpEarned + ' XP</div>' +
        '<p style="margin:12px 0;color:#64748b;">You scored ' + score + '%</p>' +
        '<a href="index.html" class="next-btn" style="text-decoration:none;display:inline-block;">Back to Course</a>' +
        '</div>';

      showBuddy('william', score === 100 ? 'perfect' : 'correct');
      onAuthChange(async function(user) { if (user) await saveLessonResult('board-games', 'bg-1', score); });
    }

    // Start!
    renderBoard(puzzles[0]);
  </script>
</body>
</html>
