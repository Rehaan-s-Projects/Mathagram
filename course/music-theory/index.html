  <header class="course-header">
    <span class="course-badge" style="background:var(--color-others)">Others</span>
    <h1>Music Theory</h1>
    <p>Learn the language of music — from reading notes to composing. 367 lessons across 25 units.</p>
  </header>

  <div id="learning-path" class="path-container"></div>

  <footer class="footer">
    <div class="container">
      <p class="footer-copy">&copy; <span id="year"></span> Mathagram.org — All Rights Reserved.</p>

    initNav('../../');
    import { renderPath, getCompletedLessons } from '../../js/learning-path.js';
    import { onAuthChange } from '../../js/auth.js';
    document.getElementById('year').textContent = new Date().getFullYear();

      [5, 'Intervals', ['What Is an Interval?','Half Steps & Whole Steps','Unison & Octave','Major & Minor Seconds','Major & Minor Thirds','Perfect Fourth & Fifth','Tritone','Major & Minor Sixths','Major & Minor Sevenths','Compound Intervals','Consonance & Dissonance','Interval Ear Training','Intervals in Melodies','Inverting Intervals','Intervals Review']],
      [6, 'Chords', ['What Is a Chord?','Building Triads','Major Triads','Minor Triads','Diminished Triads','Augmented Triads','Chord Symbols & Notation','First Inversion','Second Inversion','Seventh Chords Overview','Major 7th Chords','Minor 7th Chords','Dominant 7th Chords','Diminished 7th Chords','Chords Review']],
      [7, 'Chord Progressions & Harmony', ['Roman Numeral Analysis','The I-IV-V Progression','The I-V-vi-IV Progression','The ii-V-I Progression','Diatonic Chords in Major','Diatonic Chords in Minor','Cadences (Authentic Plagal Half)','Secondary Dominants','Modulation Basics','Circle of Fifths','Harmonic Rhythm','Voice Leading','Counterpoint Introduction','Harmonizing a Melody','Chord Progressions & Harmony Review']],

      [12, 'Ear Training', ['Interval Recognition 2nds & 3rds','Interval Recognition 4ths & 5ths','Interval Recognition 6ths & 7ths','Chord Quality by Ear','Major vs Minor by Ear','Melodic Dictation','Rhythmic Dictation','Harmonic Dictation','Scale Identification','Sight-Singing Solfege','Relative Pitch Training','Transcription Skills','Inner Hearing','Ear Training Review']],
      [13, 'Music History Periods', ['Medieval Music','Renaissance Music','Baroque Period','Classical Period','Romantic Period','Impressionism','20th Century Modernism','Minimalism','Jazz History','Blues & Gospel Origins','Rock & Pop History','Hip Hop & Electronic','World Music Traditions','Music History Review']],
      [14, 'World Music Theory', ['Indian Raga System','Tala Rhythm Cycles','Middle Eastern Maqam','African Polyrhythm','Gamelan & Javanese Scales','Chinese Pentatonic Traditions','Japanese Music Gagaku','Celtic Music Theory','Latin American Rhythms Clave','Brazilian Bossa Nova','Flamenco Theory','Afrobeat Patterns','Cross-Cultural Fusion','World Music Review']],
      [15, 'Music Production', ['DAW Introduction','MIDI Basics','Audio Recording Fundamentals','Mixing Fundamentals','EQ & Frequency','Compression & Dynamics','Reverb & Delay Effects','Panning & Stereo Image','Automation','Sampling & Loops','Synthesizer Basics','Mastering Overview','Publishing & Distribution','Music Production Review']],
      [16, 'Advanced Harmony', ['Extended Chords 9ths 11ths 13ths','Altered Chords','Tritone Substitution','Neapolitan Chord','Augmented Sixth Chords','Chromatic Mediants','Borrowed Chords','Modal Interchange','Polytonality','Atonality Introduction','Set Theory Basics','Twelve-Tone Technique','Neo-Riemannian Theory','Advanced Harmony Review']],
      [17, 'Songwriting', ['Song Structure Templates','Writing Hooks','Lyric Writing Basics','Rhyme Schemes','Melody & Lyric Marriage','Chord Choices for Mood','Writing Verses','Writing Choruses','Bridges & Pre-Choruses','Collaboration Techniques','Demo Recording','Revision & Rewriting','Copyright Basics','Songwriting Review']],
      [18, 'Jazz Harmony', ['What Makes Jazz Jazz?','Swing Feel & Rhythm','Jazz Chord Voicings','Shell Voicings','The ii-V-I in Jazz','Turnarounds','Chord Substitutions','Tritone Substitution in Jazz','Modal Jazz','Blues in Jazz','Bebop Scales','Jazz Standards Analysis','Comping Patterns','Improvisation Over Changes','Jazz Harmony Review']],
      [19, 'World Music Scales', ['Raga Scales of India','Maqam Scales of the Middle East','Pelog & Slendro of Indonesia','Chinese Pentatonic Modes','Japanese Hirajoshi Scale','African Modal Systems','Klezmer Scales','Flamenco Modes','Celtic Modes & Scales','Brazilian Chord Scales','Microtonal Systems','Quarter Tones','Comparing Tuning Systems','Integrating World Scales','World Music Scales Review']],
      [20, 'Electronic Music Production', ['History of Electronic Music','Analog vs Digital Synthesis','Subtractive Synthesis','FM Synthesis','Wavetable Synthesis','Drum Machine Programming','Step Sequencing','Sampling Techniques','Sound Design Basics','Building a Drop','Arrangement in Electronic Music','Sidechain Compression','Automation in Production','Mixing Electronic Tracks','Electronic Music Production Review']],
      [21, 'Film Scoring Basics', ['What Is Film Scoring?','Music & Emotion in Film','Leitmotifs & Themes','Scoring to Picture','Tempo & Sync Points','Orchestral Scoring Basics','Using Synths in Film','Ambient & Textural Scoring','Action Scene Scoring','Romantic Scene Scoring','Horror & Suspense Music','Comedy Scoring','Spotting Sessions','Working with Directors','Film Scoring Basics Review']],
      [22, 'Songwriting Techniques', ['Finding Inspiration','Stream of Consciousness Writing','Topline Writing','Writing from a Title','Co-Writing Strategies','Verse Development Techniques','Chorus Hook Techniques','Writing Bridges That Work','Prosody — Matching Music to Words','Writing in Different Genres','Storytelling in Songs','Emotional Arc of a Song','Rewriting & Editing Songs','Pitching Your Songs','Songwriting Techniques Review']],
      [23, 'Music & Mathematics', ['Pythagoras & Musical Ratios','Frequency Ratios & Intervals','The Mathematics of Tuning','Fibonacci & the Golden Ratio in Music','Fractal Music','Symmetry in Music','Group Theory & Transformations','Probability in Composition','Algorithmic Composition','Fourier Analysis of Sound','Wave Interference & Beats','Mathematical Models of Rhythm','Geometry of Chord Spaces','Music as Mathematics','Music & Mathematics Review']],
      [24, 'Ear Training Advanced', ['Complex Interval Recognition','Identifying Chord Extensions','Hearing Inversions','Transcribing Bass Lines','Transcribing Melodies by Ear','Rhythmic Transcription','Identifying Key Centers','Modulation Detection','Hearing Inner Voices','Identifying Instruments by Timbre','Polyrhythm Recognition','Microtonal Hearing','Speed Transcription','Developing Perfect Pitch','Ear Training Advanced Review']],
      [25, 'Music Theory in Practice', ['Applying Theory to Guitar','Applying Theory to Piano','Applying Theory to Bass','Theory for Singers','Theory for Drummers','Theory in Band Rehearsals','Theory for Music Teachers','Theory in Recording Sessions','Theory in Live Performance','Reading & Writing Lead Sheets','Chart Reading on the Gig','Theory for Music Production','Continuing Your Theory Journey','Music Theory Final Review','Music Theory in Practice Review']]
    ];

    let lessonNum = 0;
    const lessons = [];
    units.forEach(([unitNum, unitName, titles]) => {
      titles.forEach((title, i) => {
        lessonNum++;
        lessons.push({
          id: 'mt-' + lessonNum,
          title: title,
          href: '#',
          unit: unitNum,
          unitName: unitName,
          category: 'others',
          checkpoint: i === titles.length - 1
        });
      });
    });

    async function loadPath() {
      const container = document.getElementById('learning-path');
      let completed = await getCompletedLessons('music-theory');
      renderPath(container, lessons, completed);
      onAuthChange(async (user) => {
        completed = await getCompletedLessons('music-theory');
        renderPath(container, lessons, completed);
      });
    }
    loadPath();
  </script>
</body>
</html>
