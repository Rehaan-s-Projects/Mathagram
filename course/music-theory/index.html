<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Music Theory — Mathagram</title>
  <link rel="icon" href="../../assets/lighthouse/logo.svg">
  <link rel="stylesheet" href="../../css/global.css">
  <link rel="stylesheet" href="../../css/learning-path.css">
  <style>
    .course-header { padding: 80px 24px 24px; text-align: center; }
    .course-badge { display: inline-block; padding: 4px 14px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #fff; border-radius: 999px; margin-bottom: 12px; }
    .course-header h1 { font-size: 2.5rem; font-weight: 800; margin-bottom: 8px; }
    .course-header p { font-size: 1rem; color: var(--color-text-secondary); max-width: 560px; margin: 0 auto; line-height: 1.6; }
    @media (max-width: 768px) { .course-header h1 { font-size: 2rem; } }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="container">
      <a href="../../index.html" class="nav-logo">
        <img src="../../assets/lighthouse/logo.svg" alt="" width="32" height="32">
        <span>Mathagram</span>
      </a>
      <div class="nav-links">
        <a href="../../courses.html">Courses</a>
        <a href="../../login.html" data-auth="login">Login</a>
      </div>
    </div>
  </nav>

  <header class="course-header">
    <span class="course-badge" style="background:var(--color-others)">Others</span>
    <h1>Music Theory</h1>
    <p>Learn the language of music — from reading notes to composing. 135 lessons across 9 units.</p>
  </header>

  <div id="learning-path" class="path-container"></div>

  <footer class="footer">
    <div class="container">
      <p class="footer-copy">&copy; <span id="year"></span> Mathagram.org — All Rights Reserved.</p>
    </div>
  </footer>

  <script type="module">
    import { initNav } from '../../js/nav.js';
    initNav('../../');
    import { renderPath, getCompletedLessons } from '../../js/learning-path.js';
    import { onAuthChange } from '../../js/auth.js';
    document.getElementById('year').textContent = new Date().getFullYear();

    const units = [
      [1, 'Sound & Pitch', ['What Is Sound?','Sound Waves & Vibrations','Frequency & Pitch','Amplitude & Volume','Timbre & Tone Color','The Harmonic Series','Octaves','Tuning Systems','Equal Temperament','A440 & Concert Pitch','Acoustic vs Electric Sound','How Instruments Produce Sound','The Human Voice','Digital Sound & Synthesis','Sound & Pitch Review']],
      [2, 'Reading Music', ['The Musical Staff','Treble Clef','Bass Clef','Notes on the Treble Staff','Notes on the Bass Staff','Ledger Lines','The Grand Staff','Note Names A through G','Sharps & Flats','Natural Sign','Enharmonic Equivalents','Key Signatures Introduction','Reading Simple Melodies','Sight-Reading Basics','Reading Music Review']],
      [3, 'Rhythm & Time Signatures', ['What Is Rhythm?','Beat & Tempo','Whole Half & Quarter Notes','Eighth & Sixteenth Notes','Dotted Notes','Ties & Slurs','Rests','Time Signatures Explained','Common Time 4/4','3/4 Time Waltz','2/4 Time March','6/8 Compound Time','Syncopation','Tuplets & Triplets','Rhythm & Time Signatures Review']],
      [4, 'Scales', ['What Is a Scale?','The Chromatic Scale','Major Scale Pattern','C Major Scale','G Major & D Major','F Major & B-flat Major','All Major Scales','Natural Minor Scale','Harmonic Minor Scale','Melodic Minor Scale','Relative Major & Minor','Pentatonic Scales','Blues Scale','Modes Introduction (Dorian Mixolydian)','Scales Review']],
      [5, 'Intervals', ['What Is an Interval?','Half Steps & Whole Steps','Unison & Octave','Major & Minor Seconds','Major & Minor Thirds','Perfect Fourth & Fifth','Tritone','Major & Minor Sixths','Major & Minor Sevenths','Compound Intervals','Consonance & Dissonance','Interval Ear Training','Intervals in Melodies','Inverting Intervals','Intervals Review']],
      [6, 'Chords', ['What Is a Chord?','Building Triads','Major Triads','Minor Triads','Diminished Triads','Augmented Triads','Chord Symbols & Notation','First Inversion','Second Inversion','Seventh Chords Overview','Major 7th Chords','Minor 7th Chords','Dominant 7th Chords','Diminished 7th Chords','Chords Review']],
      [7, 'Chord Progressions & Harmony', ['Roman Numeral Analysis','The I-IV-V Progression','The I-V-vi-IV Progression','The ii-V-I Progression','Diatonic Chords in Major','Diatonic Chords in Minor','Cadences (Authentic Plagal Half)','Secondary Dominants','Modulation Basics','Circle of Fifths','Harmonic Rhythm','Voice Leading','Counterpoint Introduction','Harmonizing a Melody','Chord Progressions & Harmony Review']],
      [8, 'Song Structure & Form', ['What Is Musical Form?','Phrases & Periods','Binary Form (AB)','Ternary Form (ABA)','Rondo Form','Theme & Variations','Verse-Chorus Structure','Bridge & Pre-Chorus','Intro Outro & Interlude','12-Bar Blues Form','Sonata Form','Fugue','Through-Composed Form','Analyzing Song Structure','Song Structure & Form Review']],
      [9, 'Composition & Arrangement', ['What Is Composition?','Melody Writing Basics','Motifs & Development','Writing a Bass Line','Adding Harmony to Melody','Rhythm in Composition','Dynamics & Expression','Instrumentation Basics','Arranging for Ensembles','Transposing Instruments','Writing for Voice','Lead Sheets & Chord Charts','Music Production Basics','Putting It All Together','Composition & Arrangement Review']]
    ];

    let lessonNum = 0;
    const lessons = [];
    units.forEach(([unitNum, unitName, titles]) => {
      titles.forEach((title, i) => {
        lessonNum++;
        lessons.push({
          id: 'mt-' + lessonNum,
          title: title,
          href: '#',
          unit: unitNum,
          unitName: unitName,
          category: 'others',
          checkpoint: i === titles.length - 1
        });
      });
    });

    async function loadPath() {
      const container = document.getElementById('learning-path');
      let completed = new Set();
      onAuthChange(async (user) => {
        if (user) completed = await getCompletedLessons('music-theory');
        renderPath(container, lessons, completed);
      });
      renderPath(container, lessons, completed);
    }
    loadPath();
  </script>
</body>
</html>
