    const lessons = [];
    units.forEach(([u, name, titles]) => {
      titles.forEach((t, i) => {
        n++;
        lessons.push({ id: 'ss-'+n, title: t, href: '#', unit: u, unitName: name, category: 'data', checkpoint: i===titles.length-1 });
      });
    });
    async function loadPath() {
      const container = document.getElementById('learning-path');
      let completed = await getCompletedLessons('spreadsheets');
      renderPath(container, lessons, completed);
      onAuthChange(async (user) => {
        completed = await getCompletedLessons('spreadsheets');
        renderPath(container, lessons, completed);
      });
    }
    loadPath();
