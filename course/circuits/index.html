<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" href="../../assets/lighthouse/logo.svg">
  <link rel="stylesheet" href="../../css/global.css">
  <link rel="stylesheet" href="../../css/learning-path.css">
  <style>
    .course-header { padding: 80px 24px 24px; text-align: center; }
    .course-badge { display: inline-block; padding: 4px 14px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #fff; border-radius: 999px; margin-bottom: 12px; }
    .course-header h1 { font-size: 2.5rem; font-weight: 800; margin-bottom: 8px; }
    .course-header p { font-size: 1rem; color: var(--color-text-secondary); max-width: 560px; margin: 0 auto; line-height: 1.6; }
    @media (max-width: 768px) { .course-header h1 { font-size: 2rem; } }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="container">
      <a href="../../index.html" class="nav-logo">
        <img src="../../assets/lighthouse/logo.svg" alt="" width="32" height="32">
        <span>Mathagram</span>
      </a>
      <div class="nav-links">
        <a href="../../courses.html">Courses</a>
        <a href="../../login.html" data-auth="login">Login</a>
      </div>
    </div>
  </nav>
  <header class="course-header">
    <span class="course-badge" style="background:var(--color-science)">Science</span>
    <h1>Circuits</h1>
    <p>Build and analyze electrical circuits — from Ohm's law to microcontrollers. 180 lessons across 12 units.</p>
  </header>
  <div id="learning-path" class="path-container"></div>
  <footer class="footer">
    <div class="container">
      <p class="footer-copy">&copy; <span id="year"></span> Mathagram.org — All Rights Reserved.</p>
    </div>
  </footer>
  <script type="module">
    import { initNav } from '../../js/nav.js';
    initNav('../../');
    import { renderPath, getCompletedLessons } from '../../js/learning-path.js';
    import { onAuthChange } from '../../js/auth.js';
    document.getElementById('year').textContent = new Date().getFullYear();
    const units = [
      [1,'Electricity Basics',['What is Electricity?','Electric Charge','Conductors vs Insulators','Current (Amps)','Voltage (Volts)','Resistance (Ohms)','Ohm\'s Law (V=IR)','Ohm\'s Law Calculations','Power (P=IV)','Energy & Kilowatt-Hours','Electrical Safety','Static Electricity','Grounding','Electricity in Nature','Basics Review']],
      [2,'DC Circuit Fundamentals',['What is a Circuit?','Circuit Diagrams & Symbols','Open vs Closed Circuits','Short Circuits','Series Circuits','Voltage Divider (Series)','Current in Series','Parallel Circuits','Current Divider (Parallel)','Voltage in Parallel','Series-Parallel Combinations','Kirchhoff\'s Current Law (KCL)','Kirchhoff\'s Voltage Law (KVL)','Solving with Kirchhoff','DC Fundamentals Review']],
      [3,'Resistors & Resistance',['What is a Resistor?','Resistor Color Codes','Reading Color Bands','Standard Resistor Values','Resistors in Series','Resistors in Parallel','Equivalent Resistance','Potentiometers','Thermistors','Photoresistors (LDR)','Varistors','Wire Resistance','Temperature & Resistance','Superconductors','Resistors Review']],
      [4,'Capacitors & Capacitance',['What is a Capacitor?','How Capacitors Store Energy','Capacitance (Farads)','Capacitor Types (Ceramic Electrolytic Film)','Capacitors in Series','Capacitors in Parallel','RC Charging Curve','RC Discharging Curve','Time Constant (tau)','Capacitor Energy Storage','Decoupling Capacitors','Bypass Capacitors','Supercapacitors','Capacitor Applications','Capacitors Review']],
      [5,'Inductors & Magnetism',['What is an Inductor?','Electromagnetic Induction','Faraday\'s Law','Lenz\'s Law','Inductance (Henrys)','Inductors in Series','Inductors in Parallel','RL Circuits','RL Time Constant','Energy in Inductors','Transformers','Step-Up & Step-Down','Solenoids','Relays','Inductors Review']],
      [6,'Diodes & LEDs',['What is a Diode?','PN Junction','Forward Bias','Reverse Bias','Diode Characteristics','LED (Light Emitting Diode)','LED Colors & Wavelengths','Current Limiting Resistors for LEDs','Zener Diodes','Voltage Regulation with Zener','Rectifier Diodes','Half-Wave Rectification','Full-Wave Rectification','Bridge Rectifier','Diodes Review']],
      [7,'Transistors',['What is a Transistor?','NPN vs PNP','Bipolar Junction Transistor (BJT)','BJT as a Switch','BJT as an Amplifier','Current Gain (hFE/Beta)','MOSFET Introduction','N-Channel MOSFET','P-Channel MOSFET','MOSFET as a Switch','MOSFET vs BJT','Darlington Pair','H-Bridge Motor Control','Transistor Biasing','Transistors Review']],
      [8,'AC Circuits',['What is AC?','AC vs DC Comparison','Sine Wave Properties','Frequency & Period','Peak vs RMS Values','AC Through Resistors','AC Through Capacitors (Reactance)','AC Through Inductors (Reactance)','Impedance','RLC Series Circuit','RLC Parallel Circuit','Resonance','Bandwidth & Q Factor','AC Power (Real Reactive Apparent)','AC Circuits Review']],
      [9,'Filters & Signals',['What is a Filter?','Low-Pass RC Filter','High-Pass RC Filter','Band-Pass Filter','Band-Stop (Notch) Filter','Cutoff Frequency','Bode Plots','Decibels (dB)','First-Order vs Second-Order','Active Filters','Op-Amp Basics','Inverting Amplifier','Non-Inverting Amplifier','Summing Amplifier','Filters Review']],
      [10,'Sensors & Measurement',['Multimeter Usage','Measuring Voltage','Measuring Current','Measuring Resistance','Oscilloscope Basics','Reading Waveforms','Temperature Sensors (Thermocouple NTC)','Light Sensors (Photodiode LDR)','Proximity Sensors','Pressure Sensors','Accelerometers','Hall Effect Sensors','Ultrasonic Sensors','Sensor Interfacing','Sensors Review']],
      [11,'Digital & Microcontrollers',['Analog vs Digital','Binary Numbers & Logic','Logic Gates (AND OR NOT)','NAND & NOR Gates','Combinational Logic','Flip-Flops','Counters','What is a Microcontroller?','Arduino Introduction','GPIO Pins','Digital Read & Write','Analog Read (ADC)','PWM Output','Serial Communication','Microcontrollers Review']],
      [12,'Projects & Applications',['LED Blinker Circuit','Traffic Light Controller','Light-Activated Switch','Temperature Monitor','Motor Speed Controller','Audio Amplifier','Power Supply Design','Battery Charger Circuit','Alarm System','Radio Receiver Basics','PCB Design Basics','Soldering Techniques','Troubleshooting Circuits','Circuit Simulation Tools','Circuits Mastery!']]
    ];
    let n = 0;
    const lessons = [];
    units.forEach(([u, name, titles]) => {
      titles.forEach((t, i) => {
        n++;
        lessons.push({ id: 'ci-'+n, title: t, href: '#', unit: u, unitName: name, category: 'science', checkpoint: i===titles.length-1 });
      });
    });
    async function loadPath() {
      const container = document.getElementById('learning-path');
      let completed = new Set();
      onAuthChange(async (user) => {
        if (user) completed = await getCompletedLessons('circuits');
        renderPath(container, lessons, completed);
      });
      renderPath(container, lessons, completed);
    }
    loadPath();
  </script>
</body>
</html>
