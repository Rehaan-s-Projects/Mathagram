<body>
  <nav class="nav">
    <div class="container">
      <a href="../../index.html" class="nav-logo">
        <img src="../../assets/lighthouse/logo.svg" alt="" width="32" height="32">
        <span>Mathagram</span>

  <header class="course-header">
    <span class="course-badge" style="background:var(--color-science)">Science</span>
    <h1>NASA Circuits & Space Engineering</h1>
    <p>Circuits behind telescopes, rockets, rovers, and satellites.</p>
  </header>
  <div id="learning-path" class="path-container"></div>
  <footer class="footer">
    <div class="container">
      <p class="footer-copy">&copy; <span id="year"></span> Mathagram.org — All Rights Reserved.</p>
    </div>
  </footer>
  <script type="module">
    import { initNav } from '../../js/nav.js';
    initNav('../../');
    import { renderPath, getCompletedLessons } from '../../js/learning-path.js';
    import { onAuthChange } from '../../js/auth.js';
    document.getElementById('year').textContent = new Date().getFullYear();
    const units = [
      [1, 'Space Electronics Intro', ['Why Space Electronics Are Different', 'Vacuum & Zero-Gravity Effects', 'Radiation Environment in Space', 'Temperature Extremes — Hot & Cold', 'Power Budgets for Spacecraft', 'Voltage Regulators in Space', 'PCB Design for Space', 'Component Selection & Derating', 'Space-Grade vs Commercial Parts', 'Redundancy & Fault Tolerance', 'Testing for Space — Vibration & Thermal', 'EMI & Shielding in Spacecraft', 'Space Electronics Checkpoint']],
      [2, 'Telescope Circuits', ['Hubble Space Telescope Electronics', 'James Webb — Infrared Sensor Circuits', 'CCD vs CMOS Image Sensors', 'Photon Counting Detectors', 'Cryogenic Electronics for Telescopes', 'Adaptive Optics Control Circuits', 'Mirror Alignment Actuators', 'Data Processing on the Telescope', 'Downlink & Data Compression', 'Star Tracker Sensor Circuits', 'Spectrometer Electronics', 'Filter Wheel Motor Control', 'Telescope Circuits Checkpoint']],
      [3, 'Rocket Engine Electronics', ['Engine Controller Architecture', 'Valve Actuator Circuits', 'Ignition Sequencing Electronics', 'Thrust Vector Control', 'Turbopump Sensor Circuits', 'Combustion Chamber Monitoring', 'Engine Health Management', 'Propellant Flow Sensors', 'RS-25 Engine Electronics', 'Merlin Engine Control System', 'Raptor Engine Sensors', 'Engine Shutdown Sequencing', 'Rocket Engine Electronics Checkpoint']],
      [4, 'Satellite Systems', ['Satellite Bus Architecture', 'Power Distribution Unit', 'Solar Array Drive Electronics', 'Battery Management Circuits', 'Attitude Determination & Control', 'Reaction Wheel Electronics', 'Magnetorquer Drivers', 'Star Sensor Processing', 'Sun Sensor Circuits', 'GPS Receiver for LEO Satellites', 'Thermal Control Electronics', 'Satellite Housekeeping Computers', 'Satellite Systems Checkpoint']],
      [5, 'Communication & Signal', ['Deep Space Network Architecture', 'X-Band & Ka-Band Transceivers', 'High-Gain Antenna Electronics', 'Low-Noise Amplifiers', 'Signal Modulation — BPSK & QPSK', 'Error Correction Coding Hardware', 'Doppler Tracking Circuits', 'Relay Satellite Links', 'Laser Communication Terminals', 'CubeSat Communication Modules', 'Ground Station Receivers', 'Interplanetary Internet Protocols', 'Communication & Signal Checkpoint']],
      [6, 'Rover & Lander', ['Curiosity Rover Electronics Overview', 'Perseverance — Compute & Sensors', 'Rover Motor Controllers', 'Rocker-Bogie Suspension Electronics', 'Hazard Avoidance Camera Circuits', 'Navigation Camera Systems', 'Sample Collection Actuators', 'Lander Descent Engine Control', 'Touchdown Sensor Circuits', 'Surface Power Systems', 'MOXIE — Oxygen Production Electronics', 'Ingenuity Helicopter Avionics', 'Rover & Lander Checkpoint']],
      [7, 'Space Station', ['ISS Power System — 8 Solar Arrays', 'ISS Electrical Power Distribution', 'Environmental Control Electronics', 'Life Support Sensor Circuits', 'CO2 Scrubber Control Systems', 'Water Recycling Electronics', 'Communications & Tracking Relay', 'Docking Mechanism Electronics', 'Robotic Arm — Canadarm2 Control', 'Experiment Rack Power & Data', 'Fire Detection & Suppression Circuits', 'Station Attitude Control', 'Space Station Checkpoint']],
      [8, 'Launch Vehicle', ['Launch Pad Electronics', 'Countdown Sequencer Circuits', 'SLS Avionics Architecture', 'Flight Termination System', 'Range Safety Electronics', 'Stage Separation Pyrotechnics', 'Fairing Deployment Circuits', 'Inertial Measurement Units', 'Flight Computer Redundancy', 'Telemetry Transmitters', 'Solid Rocket Booster Sensors', 'Payload Adapter Electronics', 'Launch Vehicle Checkpoint']],
      [9, 'Space Suits & EVA', ['EMU Suit Electronics Overview', 'xEMU — Next-Gen Suit Avionics', 'Life Support Display & Controls', 'Oxygen Supply Regulation', 'CO2 Removal Circuits', 'Suit Pressure Sensors', 'Temperature Control — Liquid Cooling', 'Communication System — EVCS', 'Helmet Camera & Lights', 'Glove Heater Circuits', 'Battery & Power Management', 'Biometric Monitoring Sensors', 'Space Suits & EVA Checkpoint']],
      [10, 'Propulsion & Ion Drives', ['Chemical vs Electric Propulsion', 'Ion Thruster — How It Works', 'Hall Effect Thruster Circuits', 'Power Processing Unit Design', 'Xenon Flow Control Electronics', 'Solar Electric Propulsion', 'Nuclear Electric Propulsion Concepts', 'Pulsed Plasma Thrusters', 'Electrospray Thruster Circuits', 'Thrust Stand Measurement Circuits', 'Dawn Spacecraft Ion Drive', 'NEXT-C Ion Engine Electronics', 'Propulsion & Ion Drives Checkpoint']],
      [11, 'Scientific Instruments', ['Mass Spectrometer Electronics', 'Magnetometer Sensor Circuits', 'Particle Detector Electronics', 'Gamma-Ray Spectrometer', 'LIDAR Systems for Space', 'Radar Altimeter Circuits', 'Seismometer Electronics — InSight', 'Weather Station Sensors — MEDA', 'Drill & Sample Analysis Circuits', 'UV Spectrometer Electronics', 'Gravitational Wave Detector — LISA', 'X-Ray Telescope Electronics', 'Scientific Instruments Checkpoint']],
      [12, 'Mission Control', ['Mission Control Center Architecture', 'Telemetry Processing Systems', 'Command Uplink Hardware', 'Real-Time Data Display Systems', 'Voice Communication Loops', 'Mission Planning Computers', 'Simulation & Training Systems', 'Anomaly Detection Circuits', 'Backup Control Centers', 'Network Operations — TDRSS', 'Launch Control Room Electronics', 'Flight Director Console Systems', 'Mission Control Checkpoint']],
      [13, 'Future Space Tech', ['Artemis Gateway Station Electronics', 'Lunar Surface Power Systems', 'Mars Habitat Electronics', 'In-Space Manufacturing Circuits', 'Space Nuclear Reactors — Kilopower', 'Optical Communication for Deep Space', 'Quantum Sensors for Navigation', 'AI Processors for Autonomous Spacecraft', 'Inflatable Module Electronics', 'Space Debris Tracking Sensors', 'Solar Sail Control Electronics', 'Interstellar Probe Concepts', 'NASA Engineering Mastery!']],
    ];
    let n = 0;
    const lessons = [];
    units.forEach(([u, name, titles]) => {
      titles.forEach((t, i) => {
        n++;
        lessons.push({ id: 'nc-'+n, title: t, href: '#', unit: u, unitName: name, category: 'science', checkpoint: i===titles.length-1 });
      });
    });
    async function loadPath() {
      const container = document.getElementById('learning-path');
      let completed = new Set();
      onAuthChange(async (user) => {
        if (user) completed = await getCompletedLessons('nasa-circuits');
        renderPath(container, lessons, completed);
      });
      renderPath(container, lessons, completed);
    }
    loadPath();
  </script>
</body>
</html>
