        n++;

      const container = document.getElementById('learning-path');
      let completed = await getCompletedLessons('python-programming');
      renderPath(container, lessons, completed);
      onAuthChange(async (user) => {
        completed = await getCompletedLessons('python-programming');
        renderPath(container, lessons, completed);
      });
    }
    loadPath();
