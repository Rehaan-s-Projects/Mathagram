    ];

    let n = 0;
    const lessons = [];
    units.forEach(([u, name, titles]) => {
      titles.forEach((t, i) => {
        n++;
        lessons.push({ id: 'inst-'+n, title: t, href: '#', unit: u, unitName: name, category: 'others', checkpoint: i===titles.length-1 });
      });
    });

    async function loadPath() {
      const container = document.getElementById('learning-path');
      let completed = await getCompletedLessons('instrumental');
      renderPath(container, lessons, completed);
      onAuthChange(async (user) => {
        completed = await getCompletedLessons('instrumental');
        renderPath(container, lessons, completed);
      });
    }
    loadPath();
  </script>
