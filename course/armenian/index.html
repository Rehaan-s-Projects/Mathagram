<body>

  <header class="course-header">
    <span class="course-badge" style="background:var(--color-language)">Language</span>
    <h1>Armenian</h1>
    <p>An ancient Indo-European language with its own script since 405 AD. 10 units, 200 lessons.</p>
  </header>
  <div id="learning-path" class="path-container"></div>
  <footer class="footer">
    <div class="container">
      <p class="footer-copy">&copy; <span id="year"></span> Mathagram.org — All Rights Reserved.</p>
    </div>
  </footer>
  <script type="module">
    import { initNav } from '../../js/nav.js';
    initNav('../../');
    import { renderPath, getCompletedLessons } from '../../js/learning-path.js';
    import { onAuthChange } from '../../js/auth.js';
    document.getElementById('year').textContent = new Date().getFullYear();
    const units = [
      [1,'Armenian Alphabet',['History of the Armenian Alphabet','Mesrop Mashtots — Creator of the Script','The 38 Letters Overview','Armenian Vowels — A E E I O U','Consonants Group 1 — B G D Z','Consonants Group 2 — T Zh L Kh','Consonants Group 3 — Ts K H Dz','Consonants Group 4 — Gh Ch M Y','Consonants Group 5 — N Sh Ch P','Consonants Group 6 — R S V T R','Reading Armenian Script','Writing Armenian by Hand','Armenian Punctuation Marks','Capital vs Lowercase Letters','Numbers in Armenian Numerals','Typing on Armenian Keyboard','Pronunciation Drills','Comparing Eastern & Western Armenian Sounds','Armenian Calligraphy Basics','Alphabet Checkpoint']],
      [2,'Greetings & Essentials',['Barev — Hello','Inchpes es? — How Are You?','Shnorhakalutyun — Thank You','Ayo & Voch — Yes & No','Introducing Yourself in Armenian','Asking for Help — Ogneek','At the Shop — Basic Phrases','Asking Directions','At a Restaurant — Ordering','Emergency Phrases','Making Small Talk','Talking About the Weather','Phone & Texting Phrases','Saying Goodbye — Tstesutyun','Apologizing — Nereek','Agreeing & Disagreeing','Expressing Feelings & Emotions','Time & Date Expressions','Common Armenian Expressions','Greetings Checkpoint']],
      [3,'Grammar Basics',['Nouns in Armenian — Gender','Definite Article — The Suffix','Indefinite — Mi','Plural Formation — -ner & -er','Adjectives — Position & Agreement','Demonstratives — Ays Ayd Ayn','Personal Pronouns — Yes Du Na','Possessive Constructions','Question Words — Ov Inch Vortegh','Prepositions & Postpositions','Word Order — SOV Basics','Cases Overview — 7 Cases','Nominative & Accusative Case','Dative & Genitive Case','Instrumental & Ablative Case','Locative Case','Conjunctions — Yev Bayts Kam','Negation — Che Voch','Numbers 1-100','Grammar Basics Checkpoint']],
      [4,'Verb System',['Present Tense Formation','The Verb Linel — To Be','The Verb Unenal — To Have','The Verb Gnal — To Go','The Verb Gal — To Come','The Verb Anel — To Do','The Verb Utel — To Eat','The Verb Khmel — To Drink','Past Tense — Simple','Past Tense — Compound','Future Tense Formation','Imperative Mood — Commands','Conditional Mood','Subjunctive Mood','Negative Verb Forms','Reflexive Verbs','Causative Verbs','Passive Voice','Verb Conjugation Practice','Verb System Checkpoint']],
      [5,'Family & People',['Family Members — Entanik','Parents — Hayr Mayr','Siblings — Yeghbayr Kuyr','Children — Yerekha','Extended Family Vocabulary','Armenian Names & Naming Customs','Marriage & Wedding Traditions','Armenian Christening — Mkrtutyun','Describing People — Appearance','Describing People — Personality','Occupations & Professions','Relationships & Dating','Elderly Respect Traditions','Armenian Diaspora Family Life','Community & Neighborhood','Social Gatherings','Godparents — Knakahayr','Armenian Identity & Heritage','Family Conversations Practice','Family & People Checkpoint']],
      [6,'Food & Cuisine',['Armenian Cuisine Overview','Lavash — Traditional Flatbread','Dolma — Stuffed Grape Leaves','Khorovats — Armenian BBQ','Khash — Winter Bone Broth','Harissa — Wheat & Meat Porridge','Ghapama — Stuffed Pumpkin','Basturma — Dried Cured Beef','Sujukh — Walnut Churchkhela','Gata — Sweet Bread Pastry','Armenian Cheese — Panir','Fruit & Dried Fruit — Apricots','Armenian Wine & Brandy','Tan — Yogurt Drink','Armenian Coffee — Surch','Spices & Herbs in Armenian Cooking','Ordering at a Restaurant','Cooking Vocabulary & Recipes','Market Shopping — Shuka','Food & Cuisine Checkpoint']],
      [7,'Yerevan & Travel',['Yerevan — The Pink City','Republic Square','Cascade Complex & Modern Art','Matenadaran — Manuscript Museum','Tsitsernakaberd — Genocide Memorial','Mount Ararat — The Symbol','Garni Temple & Geghard Monastery','Lake Sevan — The Jewel','Tatev Monastery & Wings of Tatev','Dilijan — Little Switzerland','Noravank Monastery','Public Transport in Yerevan','Booking Hotels — Hyuranots','At the Airport — Odanavakayan','Money & Currency — Dram','Taxi & Marshrutka Vocabulary','Asking Directions in Armenian','Maps & Navigation','Shopping in Yerevan — Vernissage','Yerevan & Travel Checkpoint']],
      [8,'History & Heritage',['Ancient Armenia — Urartu','Kingdom of Armenia — Tigran the Great','First Christian Nation — 301 AD','Mesrop Mashtots & the Alphabet','Medieval Armenian Kingdoms','Armenian Architecture — Khachkars','Cilician Armenia','Ottoman Era & Armenian Life','The Armenian Genocide — 1915','Survivors & Diaspora Formation','Soviet Armenia — 1920-1991','Independence — 1991','Nagorno-Karabakh Conflict','Armenian Diaspora Worldwide','Los Angeles Armenian Community','Beirut Armenian Community','Armenian Churches Worldwide','National Holidays & Remembrance','Historical Vocabulary Practice','History & Heritage Checkpoint']],
      [9,'Culture & Arts',['The Duduk — Armenia\'s Soul Instrument','Djivan Gasparyan — Duduk Master','Armenian Folk Music — Ashugh','Armenian Dance — Kochari & Shalakho','Khachkar — Stone Cross Art','Armenian Miniature Painting','Armenian Carpet Weaving','Cinema — Sergei Parajanov','Modern Armenian Music & Pop','Armenian Literature — Classics','Hovhannes Tumanyan — Poet','William Saroyan — Writer','Armenian Theater Tradition','Contemporary Armenian Art','Armenian Cuisine as Culture','Easter & Christmas Traditions','Armenian Wedding Rituals','Armenian Humor & Jokes','Diaspora Cultural Preservation','Culture & Arts Checkpoint']],
      [10,'Armenian Mastery',['Comprehensive Grammar Review','Vocabulary Mastery Test 1','Vocabulary Mastery Test 2','Reading Comprehension — News','Reading Comprehension — Literature','Listening Comprehension Test','Writing Skills Assessment','Armenian Script Writing Final','Translation Practice — English','Translation Practice — Russian','Conversation Skills Assessment','Cultural Knowledge Exam','History & Geography Final','Idioms & Proverbs Review','Formal Writing Portfolio','Pronunciation Final Assessment','Error Correction Exercises','Eastern vs Western Armenian Review','Self-Assessment & Portfolio','Armenian Mastery Certification']],
    ];
    let n = 0;
    const lessons = [];
    units.forEach(([u, name, titles]) => {
      titles.forEach((t, i) => {
        n++;
        lessons.push({ id: 'hy-'+n, title: t, href: '#', unit: u, unitName: name, category: 'language', checkpoint: i===titles.length-1 });
      });
    });
    async function loadPath() {
      const container = document.getElementById('learning-path');
      let completed = await getCompletedLessons('armenian');
      renderPath(container, lessons, completed);
      onAuthChange(async (user) => {
        completed = await getCompletedLessons('armenian');
        renderPath(container, lessons, completed);
      });
    }
    loadPath();
  </script>
</body>
</html>
