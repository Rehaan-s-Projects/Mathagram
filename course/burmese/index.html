<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Burmese — Mathagram</title>
  <link rel="icon" href="../../assets/lighthouse/logo.svg">
  <link rel="stylesheet" href="../../css/global.css">
  <link rel="stylesheet" href="../../css/learning-path.css">
  <style>
    .course-header { padding: 80px 24px 24px; text-align: center; }
    .course-badge { display: inline-block; padding: 4px 14px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #fff; border-radius: 999px; margin-bottom: 12px; }
    .course-header h1 { font-size: 2.5rem; font-weight: 800; margin-bottom: 8px; }
    .course-header p { font-size: 1rem; color: var(--color-text-secondary); max-width: 560px; margin: 0 auto; line-height: 1.6; }
    @media (max-width: 768px) { .course-header h1 { font-size: 2rem; } }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="container">
      <a href="../../index.html" class="nav-logo">
        <img src="../../assets/lighthouse/logo.svg" alt="" width="32" height="32">
        <span>Mathagram</span>
      </a>
      <div class="nav-links">
        <a href="../../courses.html">Courses</a>
        <a href="../../login.html" data-auth="login">Login</a>
      </div>
    </div>
  </nav>
  <header class="course-header">
    <span class="course-badge" style="background:var(--color-language)">Language</span>
    <h1>Burmese</h1>
    <p>Learn Burmese — the official language of Myanmar, written in beautiful circular script. 174 lessons across 12 units.</p>
  </header>
  <div id="learning-path" class="path-container"></div>
  <footer class="footer">
    <div class="container">
      <p class="footer-copy">&copy; <span id="year"></span> Mathagram.org — All Rights Reserved.</p>
    </div>
  </footer>
  <script type="module">
    import { initNav } from '../../js/nav.js';
    initNav('../../');
    import { renderPath, getCompletedLessons } from '../../js/learning-path.js';
    import { onAuthChange } from '../../js/auth.js';
    document.getElementById('year').textContent = new Date().getFullYear();
    const units = [
      [1,'Burmese Script',['Consonants Overview','Consonant Groups 1-5','Basic Vowels','Complex Vowels','Tone Marks (Low Creaky High)','Medial Consonants','Stacked Consonants','Asat & Virama','Burmese Numerals 0-9','Numbers 10-100','Writing Circles & Curves','Syllable Structure','Reading Practice','Writing Practice','Script Review']],
      [2,'Greetings & Basics',['Mingalaba (Hello)','Kyei zu tin ba de (Thank You)','Houq ke / Ma houq pa bu (Yes/No)','Ne kaung la? (How Are You?)','My Name Is','Where Are You From?','Good Morning / Good Night','Excuse Me / Sorry','Please (Kyei zu pyu pi)','Polite Particles (kha-mya / shin)','Formal vs Informal','Emergency Phrases','Basic Phrases Practice','Conversation Starters','Greetings Review']],
      [3,'Grammar Basics',['SOV Word Order','Subject Particles (ka/ga)','Object Particle (ko)','Topic Marker (ha)','Classifiers & Counters','Adjectives (Before Noun)','Demonstratives (This/That)','Possessives','Negation with Ma...Bu','Question Particle (la)','Conjunctions','Postpositions','Sentence Building','Grammar Practice','Grammar Review']],
      [4,'Present & Past Tense',['Verb Stems','Present Marker (ne de)','Habitual Actions (ta/da)','Progressive Aspect','Completed Action (pi/bi)','Past Tense Marker (khe)','Recent Past','Remote Past','Experiential Past','Common Verbs 1 (go come eat)','Common Verbs 2 (see hear speak)','Common Verbs 3 (give take buy)','Negative Past','Tense Practice','Present & Past Review']],
      [5,'Future & Modal',['Future Marker (me)','Planned Future','Predictions','Can/Able (ta/naing)','Should (thin)','Must (ya me)','Want (chin de)','Need (lo de)','May/Might','Conditional (ya in)','If...Then Sentences','Permission & Requests','Obligations','Modal Practice','Future & Modal Review']],
      [6,'Family & People',['Father (A-phei)','Mother (A-mei)','Older Brother (A-ko)','Older Sister (A-ma)','Younger Sibling (Nyi/Nyi-ma)','Grandparents','Uncle & Aunt','Husband & Wife','Son & Daughter','Describing Appearance','Describing Personality','Age & Relationships','Kinship Terms','Family Conversations','Family Review']],
      [7,'Food & Dining',['Mohinga (Fish Noodle Soup)','Tea Leaf Salad (Lahpet Thoke)','Shan Noodles','Curries (Hin)','Rice (Htamin)','Samosas & Snacks','Burmese Tea Shop Culture','Ordering at a Restaurant','Street Food','Fruits & Vegetables','Cooking Vocabulary','Taste Descriptions','Dietary Needs','Food Conversations','Food Review']],
      [8,'Travel & Myanmar',['Yangon City','Shwedagon Pagoda','Mandalay','Bagan Temples','Inle Lake','Ngapali Beach','Mrauk U','Kyaiktiyo (Golden Rock)','At the Airport','Bus & Train Travel','River Boats','Hotel Check-In','Asking Directions','Tourist Conversations','Travel Review']],
      [9,'Culture & History',['Buddhism in Myanmar','Pagoda Etiquette','Thingyan Water Festival','Thadingyut Light Festival','Thanaka & Longyi','Chinlone (Cane Ball)','Traditional Music','Marionette Theatre','Myanmar History Overview','Colonial Period','Independence & Modern Era','Ethnic Diversity','Proverbs & Sayings','Cultural Etiquette','Culture Review']],
      [10,'Shopping & Numbers',['Counting System','Large Numbers','Ordinal Numbers','Currency (Kyat)','Prices & Bargaining','At the Market (Zei)','Clothing Shopping','Jewelry & Gems','Weights & Measures','Time Expressions','Days & Dates','Calculating & Comparing','Shopping Conversations','Money Matters','Shopping Review']],
      [11,'Advanced Grammar',['Particle Combinations','Relative Clauses','Passive Constructions','Causative Verbs','Reported Speech','Complex Conjunctions','Formal Register','Literary Burmese','Written vs Spoken','Honorific System','Loan Words (Pali English)','Dialectal Differences','Error Correction','Advanced Practice','Advanced Grammar Review']],
      [12,'Fluency & Mastery',['Conversation Practice 1','Conversation Practice 2','Storytelling','Expressing Opinions','Reading Practice','Writing Practice','Listening Practice','Idioms & Expressions','Burmese Mastery!']]
    ];
    let n = 0;
    const lessons = [];
    units.forEach(([u, name, titles]) => {
      titles.forEach((t, i) => {
        n++;
        lessons.push({ id: 'bu-'+n, title: t, href: '#', unit: u, unitName: name, category: 'language', checkpoint: i===titles.length-1 });
      });
    });
    async function loadPath() {
      const container = document.getElementById('learning-path');
      let completed = new Set();
      onAuthChange(async (user) => {
        if (user) completed = await getCompletedLessons('burmese');
        renderPath(container, lessons, completed);
      });
      renderPath(container, lessons, completed);
    }
    loadPath();
  </script>
</body>
</html>
