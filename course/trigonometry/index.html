<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trigonometry — Mathagram</title>
  <link rel="icon" href="../../assets/lighthouse/logo.svg">
  <link rel="stylesheet" href="../../css/global.css">
  <link rel="stylesheet" href="../../css/learning-path.css">
  <style>
    .course-header { padding: 80px 24px 24px; text-align: center; }
    .course-badge { display: inline-block; padding: 4px 14px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #fff; border-radius: 999px; margin-bottom: 12px; }
    .course-header h1 { font-size: 2.5rem; font-weight: 800; margin-bottom: 8px; }
    .course-header p { font-size: 1rem; color: var(--color-text-secondary); max-width: 560px; margin: 0 auto; line-height: 1.6; }
    @media (max-width: 768px) { .course-header h1 { font-size: 2rem; } }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="container">
      <a href="../../index.html" class="nav-logo">
        <img src="../../assets/lighthouse/logo.svg" alt="" width="32" height="32">
        <span>Mathagram</span>
      </a>
      <div class="nav-links">
        <a href="../../courses.html">Courses</a>
        <a href="../../login.html" data-auth="login">Login</a>
      </div>
    </div>
  </nav>

  <header class="course-header">
    <span class="course-badge" style="background:var(--color-math)">Math</span>
    <h1>Trigonometry</h1>
    <p>Master angles, triangles, trig functions, identities, polar coordinates, and real-world applications. 214 lessons across 23 units.</p>
  </header>

  <div id="learning-path" class="path-container"></div>

  <footer class="footer">
    <div class="container">
      <p class="footer-copy">&copy; <span id="year"></span> Mathagram.org — All Rights Reserved.</p>
    </div>
  </footer>

  <script type="module">
    import { initNav } from '../../js/nav.js';
    initNav('../../');
    import { renderPath, getCompletedLessons } from '../../js/learning-path.js';
    import { onAuthChange } from '../../js/auth.js';
    document.getElementById('year').textContent = new Date().getFullYear();

    const units = [
      [1,'Angles & Measurement',['Degrees and Radians','Angle Measurement and Types','Arc Length & Sector Area','Coterminal Angles','Angular & Linear Speed','Angle Pairs (Complementary & Supplementary)','Angles in Standard Position','Sketching Angles','Angles Review']],
      [2,'Triangle Geometry',['Types of Triangles','Triangle Angle Sum Theorem','Exterior Angle Theorem','Triangle Inequality Theorem','Area of a Triangle','Congruent Triangles','Similar Triangles','Proportions in Triangles','Triangle Geometry Review']],
      [3,'Right Triangle Trig',['SOH-CAH-TOA','Finding Missing Sides','Finding Missing Angles','Cosecant (csc)','Secant (sec)','Cotangent (cot)','Solving Right Triangles','Special Right Triangles 30-60-90','Special Right Triangles 45-45-90','Applications of Right Triangle Trig','Right Triangle Trig Review']],
      [4,'The Unit Circle',['The Unit Circle Introduction','Quadrant Signs (All Students Take Calculus)','Reference Angles','Coordinates & Trig Values','Memorizing the Unit Circle','Radian-Degree Conversion Mastery','Evaluating Trig Functions Without Calculator','Exact Values of Trig Functions','Unit Circle Review']],
      [5,'Graphing Trig Functions',['Graphing Sine','Graphing Cosine','Amplitude & Period','Phase Shift & Vertical Shift','Graphing Tangent','Graphing Cotangent','Graphing Secant','Graphing Cosecant','Writing Equations from Graphs','Transformations of Trig Graphs','Graphing Review']],
      [6,'Trig Identities',['Pythagorean Identities','Reciprocal Identities','Quotient Identities','Simplifying Trig Expressions','Cofunction Identities','Even-Odd Identities','Verifying Trig Identities','Proving Identities Strategy','Trig Identities Review']],
      [7,'Sum & Difference Formulas',['Sine Sum Formula','Sine Difference Formula','Cosine Sum Formula','Cosine Difference Formula','Tangent Sum & Difference','Double-Angle Formula for Sine','Double-Angle Formula for Cosine','Double-Angle Formula for Tangent','Half-Angle Formulas','Product-to-Sum Formulas','Sum-to-Product Formulas','Formulas Review']],
      [8,'Inverse Trig Functions',['Inverse Sine (arcsin)','Inverse Cosine (arccos)','Inverse Tangent (arctan)','Inverse Cosecant Secant Cotangent','Graphing Inverse Trig Functions','Domain & Range of Inverses','Compositions of Trig & Inverse','Evaluating Inverse Expressions','Inverse Trig Review']],
      [9,'Solving Trig Equations',['Basic Trig Equations','Equations with Factoring','Equations with Identities','Equations with Multiple Angles','Equations with Half Angles','General Solutions','Solutions in a Given Interval','Quadratic-Type Trig Equations','Trig Equations Review']],
      [10,'Law of Sines & Cosines',['Law of Sines','Ambiguous Case (SSA)','Law of Cosines','Herons Formula','Area with Trig (SAS)','Solving Oblique Triangles','Navigation & Bearing Problems','Surveying Applications','Law of Sines & Cosines Review']],
      [11,'Polar Coordinates & Equations',['Polar vs Cartesian','Plotting Polar Points','Converting Polar to Rectangular','Converting Rectangular to Polar','Graphing Polar Equations','Polar Roses','Limacons & Cardioids','Lemniscates & Spirals','Polar Coordinates Review']],
      [12,'Complex Numbers & DeMoivre',['Complex Numbers Review','Complex Plane','Polar Form of Complex Numbers','Multiplying in Polar Form','Dividing in Polar Form','DeMoivres Theorem','Finding nth Roots','Roots of Unity','Complex Numbers Review']],
      [13,'Vectors & Trig',['Introduction to Vectors','Vector Components','Magnitude & Direction','Adding & Subtracting Vectors','Scalar Multiplication','Dot Product','Angle Between Vectors','Applications of Vectors','Vectors Review']],
      [14,'Parametric Equations',['What Are Parametric Equations?','Graphing Parametric Equations','Eliminating the Parameter','Parametric Circles & Ellipses','Parametric Lines','Projectile Motion','Cycloids','Parametric Equations Review']],
      [15,'Trig in Real Life',['Heights & Distances','Navigation & Bearings','Surveying & Mapping','Sound Waves & Music','Light & Optics','Electrical Engineering (AC Circuits)','Astronomy & Angles','Architecture & Construction','Real Life Applications Review']],
      [16,'Conic Sections & Trig',['Circles & Trig','Ellipses','Hyperbolas','Parabolas','Rotating Conics','Polar Form of Conics','Eccentricity','Directrix & Focus','Conic Sections & Trig Review']],
      [17,'Spherical Trigonometry',['Great Circles & Arcs','Spherical Triangles','Spherical Law of Sines','Spherical Law of Cosines','Napiers Rules','Celestial Navigation','GPS & Coordinates','Earth Distance Problems','Spherical Trig Review']],
      [18,'Harmonic Motion & Waves',['Simple Harmonic Motion','Spring & Pendulum Models','Damped Oscillations','Forced Oscillations & Resonance','Superposition of Waves','Beat Frequencies','Standing Waves','Fourier Series Introduction','Harmonic Motion Review']],
      [19,'Trigonometric Modeling',['Modeling Temperature Data','Modeling Tidal Patterns','Modeling Daylight Hours','Modeling Ferris Wheels','Modeling Sound & Music','Modeling Population Cycles','Modeling Business Cycles','Modeling Sunrise & Sunset','Regression with Trig Functions','Trig Modeling Review']],
      [20,'Matrices & Rotations',['Rotation Matrices','2D Rotations','3D Rotations (Roll Pitch Yaw)','Reflection Matrices','Scaling & Shearing','Composing Transformations','Computer Graphics Basics','Quaternions Introduction','Matrices & Rotations Review']],
      [21,'Hyperbolic Functions',['Sinh & Cosh','Tanh & Other Hyperbolic','Csch Sech & Coth','Hyperbolic Identities','Inverse Hyperbolic Functions','Graphs of Hyperbolic Functions','Catenary Curves','Hyperbolic vs Circular','Applications of Hyperbolic Functions','Hyperbolic Functions Review']],
      [22,'Trig in Calculus Preview',['Limits of Trig Functions','sin(x)/x as x Approaches 0','Derivatives of sin & cos','Derivatives of tan & sec','Trig Substitution Preview','Integrals of Trig Functions','Area Under Sine Curve','LHopitals Rule with Trig','Trig in Calculus Review']],
      [23,'Trigonometry Mastery',['Mixed Identity Problems','Mixed Equation Problems','Mixed Triangle Problems','Mixed Graphing Problems','Mixed Application Problems','Competition-Level Problems','Trigonometry Final Challenge!']]
    ];
    let n = 0;
    const lessons = [];
    const playable = {1:'lesson-1.html',2:'lesson-2.html',3:'lesson-4.html',11:'lesson-3.html'};
    units.forEach(([u, name, titles]) => {
      titles.forEach((t, i) => {
        n++;
        lessons.push({ id: 't-'+n, title: t, href: playable[n]||'#', unit: u, unitName: name, category: 'math', checkpoint: i===titles.length-1 });
      });
    });

    async function loadPath() {
      const container = document.getElementById('learning-path');
      let completed = await getCompletedLessons('trigonometry');
      renderPath(container, lessons, completed);
      onAuthChange(async (user) => {
        completed = await getCompletedLessons('trigonometry');
        renderPath(container, lessons, completed);
      });
    }
    loadPath();
  </script>
</body>
</html>
