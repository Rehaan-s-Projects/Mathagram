<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trigonometry — Mathagram</title>
  <link rel="icon" href="../../assets/lighthouse/logo.svg">
  <link rel="stylesheet" href="../../css/global.css">
  <link rel="stylesheet" href="../../css/learning-path.css">
  <style>
    .course-header { padding: 80px 24px 24px; text-align: center; }
    .course-badge { display: inline-block; padding: 4px 14px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #fff; border-radius: 999px; margin-bottom: 12px; }
    .course-header h1 { font-size: 2.5rem; font-weight: 800; margin-bottom: 8px; }
    .course-header p { font-size: 1rem; color: var(--color-text-secondary); max-width: 560px; margin: 0 auto; line-height: 1.6; }
    @media (max-width: 768px) { .course-header h1 { font-size: 2rem; } }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="container">
      <a href="../../index.html" class="nav-logo">
        <img src="../../assets/lighthouse/logo.svg" alt="" width="32" height="32">
        <span>Mathagram</span>
      </a>
      <div class="nav-links">
        <a href="../../courses.html">Courses</a>
        <a href="../../login.html" data-auth="login">Login</a>
      </div>
    </div>
  </nav>

  <header class="course-header">
    <span class="course-badge" style="background:var(--color-math)">Math</span>
    <h1>Trigonometry</h1>
    <p>Master angles, triangles, trig functions, identities, and polar coordinates. 53 lessons across 10 units.</p>
  </header>

  <div id="learning-path" class="path-container"></div>

  <footer class="footer">
    <div class="container">
      <p class="footer-copy">&copy; <span id="year"></span> Mathagram.org — All Rights Reserved.</p>
    </div>
  </footer>

  <script type="module">
    import { initNav } from '../../js/nav.js';
    initNav('../../');
    import { renderPath, getCompletedLessons } from '../../js/learning-path.js';
    import { onAuthChange } from '../../js/auth.js';
    document.getElementById('year').textContent = new Date().getFullYear();

    const lessons = [
      { id: 'trig-1',  title: 'Degrees & Radians',       href: 'lesson-1.html' },
      { id: 'trig-2',  title: 'Angle Types',              href: 'lesson-2.html' },
      { id: 'trig-3',  title: 'Types of Triangles',       href: 'lesson-4.html' },
      { id: 'trig-4',  title: 'Triangle Angle Sum',       href: '#' },
      { id: 'trig-5',  title: 'Area of a Triangle',       href: '#', checkpoint: true },
      { id: 'trig-6',  title: 'SOH-CAH-TOA',             href: 'lesson-3.html' },
      { id: 'trig-7',  title: 'Finding Missing Sides',    href: '#' },
      { id: 'trig-8',  title: 'Cosecant',                 href: '#' },
      { id: 'trig-9',  title: 'Secant',                   href: '#' },
      { id: 'trig-10', title: 'Cotangent',                href: '#', checkpoint: true },
      { id: 'trig-11', title: 'The Unit Circle',          href: '#' },
      { id: 'trig-12', title: 'Reference Angles',         href: '#' },
      { id: 'trig-13', title: 'Coordinates & Trig Values', href: '#', checkpoint: true },
      { id: 'trig-14', title: 'Graphing Sin & Cos',       href: '#' },
      { id: 'trig-15', title: 'Amplitude & Period',       href: '#' },
      { id: 'trig-16', title: 'Phase Shift',              href: '#', checkpoint: true },
      { id: 'trig-17', title: 'Pythagorean Identities',   href: '#' },
      { id: 'trig-18', title: 'Reciprocal Identities',    href: '#', checkpoint: true },
      { id: 'trig-19', title: 'Sum Formulas',             href: '#' },
      { id: 'trig-20', title: 'Double-Angle',             href: '#', checkpoint: true },
      { id: 'trig-21', title: 'Inverse Sin & Cos',        href: '#' },
      { id: 'trig-22', title: 'Solving Trig Equations',   href: '#', checkpoint: true },
      { id: 'trig-23', title: 'Law of Sines',             href: '#' },
      { id: 'trig-24', title: 'Law of Cosines',           href: '#' },
      { id: 'trig-25', title: 'Applications',             href: '#', checkpoint: true },
      { id: 'trig-26', title: 'Polar vs Cartesian',       href: '#' },
      { id: 'trig-27', title: 'Graphing Polar',           href: '#' },
      { id: 'trig-28', title: 'Polar Roses',              href: '#' },
      { id: 'trig-29', title: 'Complex Numbers Polar',    href: '#' },
      { id: 'trig-30', title: 'Trig Mastery!',            href: '#', checkpoint: true }
    ];

    async function loadPath() {
      const container = document.getElementById('learning-path');
      let completed = new Set();
      onAuthChange(async (user) => {
        if (user) completed = await getCompletedLessons('trigonometry');
        renderPath(container, lessons, completed);
      });
      renderPath(container, lessons, completed);
    }
    loadPath();
  </script>
</body>
</html>
