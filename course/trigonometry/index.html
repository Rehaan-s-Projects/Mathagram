  <header class="course-header">

    <h1>Trigonometry</h1>
    <p>Master angles, triangles, trig functions, identities, polar coordinates, and real-world applications. 314 lessons across 30 units.</p>
  </header>

  <div id="learning-path" class="path-container"></div>

  <footer class="footer">
    <div class="container">
      <p class="footer-copy">&copy; <span id="year"></span> Mathagram.org — All Rights Reserved.</p>

  <script type="module">
    import { initNav } from '../../js/nav.js';
    initNav('../../');
    import { renderPath, getCompletedLessons } from '../../js/learning-path.js';
    import { onAuthChange } from '../../js/auth.js';
    document.getElementById('year').textContent = new Date().getFullYear();

      [5,'Graphing Trig Functions',['Graphing Sine','Graphing Cosine','Amplitude & Period','Phase Shift & Vertical Shift','Graphing Tangent','Graphing Cotangent','Graphing Secant','Graphing Cosecant','Writing Equations from Graphs','Transformations of Trig Graphs','Graphing Review']],
      [6,'Trig Identities',['Pythagorean Identities','Reciprocal Identities','Quotient Identities','Simplifying Trig Expressions','Cofunction Identities','Even-Odd Identities','Verifying Trig Identities','Proving Identities Strategy','Multi-Step Identity Proofs','Trig Identities Review']],

      [8,'Inverse Trig Functions',['Inverse Sine (arcsin)','Inverse Cosine (arccos)','Inverse Tangent (arctan)','Inverse Cosecant Secant Cotangent','Graphing Inverse Trig Functions','Domain & Range of Inverses','Compositions of Trig & Inverse','Evaluating Inverse Expressions','Inverse Trig Review']],

      [12,'Complex Numbers & DeMoivre',['Complex Numbers Review','Complex Plane','Polar Form of Complex Numbers','Multiplying in Polar Form','Dividing in Polar Form','DeMoivres Theorem','Finding nth Roots','Roots of Unity','Complex Numbers Review']],
      [13,'Vectors & Trig',['Introduction to Vectors','Vector Components','Magnitude & Direction','Adding & Subtracting Vectors','Scalar Multiplication','Dot Product','Angle Between Vectors','Applications of Vectors','Vectors Review']],
      [14,'Parametric Equations',['What Are Parametric Equations?','Graphing Parametric Equations','Eliminating the Parameter','Parametric Circles & Ellipses','Parametric Lines','Projectile Motion','Cycloids','Lissajous Figures','Parametric Equations Review']],
      [15,'Trig in Real Life',['Heights & Distances','Navigation & Bearings','Surveying & Mapping','Sound Waves & Music','Light & Optics','Electrical Engineering (AC Circuits)','Astronomy & Angles','Architecture & Construction','Photography & Camera Angles','Real Life Applications Review']],
      [16,'Conic Sections & Trig',['Circles & Trig','Ellipses','Hyperbolas','Parabolas','Rotating Conics','Polar Form of Conics','Eccentricity','Directrix & Focus','Conic Sections & Trig Review']],
      [17,'Spherical Trigonometry',['Great Circles & Arcs','Spherical Triangles','Spherical Law of Sines','Spherical Law of Cosines','Napiers Rules','Celestial Navigation','GPS & Coordinates','Earth Distance Problems','Spherical Trig Review']],
      [18,'Harmonic Motion & Waves',['Simple Harmonic Motion','Spring & Pendulum Models','Damped Oscillations','Forced Oscillations & Resonance','Superposition of Waves','Beat Frequencies','Standing Waves','Fourier Series Introduction','Harmonic Motion Review']],
      [19,'Trigonometric Modeling',['Modeling Temperature Data','Modeling Tidal Patterns','Modeling Daylight Hours','Modeling Ferris Wheels','Modeling Sound & Music','Modeling Population Cycles','Modeling Business Cycles','Modeling Sunrise & Sunset','Regression with Trig Functions','Trig Modeling Review']],
      [20,'Matrices & Rotations',['Rotation Matrices','2D Rotations','3D Rotations (Roll Pitch Yaw)','Reflection Matrices','Scaling & Shearing','Composing Transformations','Computer Graphics Basics','Quaternions Introduction','Matrices & Rotations Review']],
      [21,'Hyperbolic Functions',['Sinh & Cosh','Tanh & Other Hyperbolic','Csch Sech & Coth','Hyperbolic Identities','Inverse Hyperbolic Functions','Graphs of Hyperbolic Functions','Catenary Curves','Hyperbolic vs Circular','Applications of Hyperbolic Functions','Hyperbolic Functions Review']],
      [22,'Trig in Calculus Preview',['Limits of Trig Functions','sin(x)/x as x Approaches 0','Derivatives of sin & cos','Derivatives of tan & sec','Trig Substitution Preview','Integrals of Trig Functions','Area Under Sine Curve','LHopitals Rule with Trig','Trig in Calculus Review']],
      [23,'Trig & Physics',['Projectile Motion with Trig','Range & Maximum Height','Inclined Plane Problems','Force Components on a Slope','Tension in Ropes at Angles','Torque & Lever Arms','Circular Motion & Trig','Pendulum Swing Angles','Satellite Orbits & Angles','Wave Interference Patterns','Doppler Effect & Trig','Trig & Physics Review']],
      [24,'Trig & Engineering',['Bridge Design with Trig','Roof Pitch Calculations','Surveying with Theodolites','GPS Triangulation','Signal Processing Basics','Antenna Radiation Patterns','Gear Tooth Geometry','Cam Profiles & Mechanisms','Structural Load Analysis','Electrical Phase Angles','Power Factor in AC Circuits','Impedance & Phasors','Trig & Engineering Review']],
      [25,'Trig in Computer Science',['Trig in Game Development','2D Sprite Rotation','3D Camera Angles','Ray Casting & Trig','Collision Detection with Trig','Bezier Curves','Trig in Animation','Signal Sampling & Aliasing','FFT (Fast Fourier Transform)','Image Rotation Algorithms','GPS Algorithms','Trig in Machine Learning','Computer Science Review']],
      [26,'Number Theory & Trig',['Trig & Prime Numbers','Dirichlet Series & Trig','Eulers Formula (e^ix)','Eulers Identity','Complex Exponentials','Fourier Analysis of Integers','Chebyshev Polynomials','Trig & Continued Fractions','Weierstrass Substitution','Trig in Cryptography','Number Theory Review']],
      [27,'Advanced Identities & Proofs',['Power-Reduction Formulas','Triple-Angle Formulas','Prosthaphaeresis Formulas','Tangent Half-Angle Substitution','Morries Law','Niven Theorem','Vieta Product Formula','Infinite Trig Products','Wallis Product','Basel Problem & Trig','Stirlings Approximation Link','Advanced Identities Review']],
      [28,'Trig Inequalities & Optimization',['Solving Trig Inequalities','Graphical Solutions','Algebraic Solutions','Absolute Value Trig Inequalities','Systems of Trig Inequalities','Maximizing Trig Expressions','Minimizing Trig Expressions','AM-GM with Trig','Lagrange Multipliers & Trig','Optimization Word Problems','Calculus of Trig Optimization','Trig Optimization Review']],
      [29,'History of Trigonometry',['Ancient Babylonian Trig','Greek Trigonometry (Hipparchus)','Ptolemys Chord Tables','Indian Trigonometry (Aryabhata)','Islamic Golden Age Trig','Al-Khwarizmi & Sine Tables','European Renaissance Trig','Euler & Modern Trig','Fourier & Harmonic Analysis','History Review']],
      [30,'Competition & AP Prep',['AMC Trig Problems','AIME Trig Problems','Olympiad Trig Techniques','AP Calculus Trig Review','AP Physics Trig Applications','SAT Trig Problems','ACT Trig Problems','IB Math Trig Topics','Speed Tricks for Trig','Mental Math with Trig','Trig Problem Marathon','Trigonometry Ultimate Challenge!']]
    ];
    let n = 0;
    const lessons = [];
    const playable = {1:'lesson-1.html',2:'lesson-2.html',3:'lesson-4.html',11:'lesson-5.html',22:'lesson-3.html'};
    units.forEach(([u, name, titles]) => {
      titles.forEach((t, i) => {
        n++;
        lessons.push({ id: 't-'+n, title: t, href: playable[n]||'#', unit: u, unitName: name, category: 'math', checkpoint: i===titles.length-1 });
      });
    });

    async function loadPath() {
      const container = document.getElementById('learning-path');
      let completed = await getCompletedLessons('trigonometry');
      renderPath(container, lessons, completed);
      onAuthChange(async (user) => {
        completed = await getCompletedLessons('trigonometry');
        renderPath(container, lessons, completed);
      });
    }
    loadPath();
  </script>
