<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clustering & Classification — Mathagram</title>
  <link rel="icon" href="../../assets/lighthouse/logo.svg">
  <link rel="stylesheet" href="../../css/global.css">
  <link rel="stylesheet" href="../../css/learning-path.css">
  <style>
    .course-header { padding: 80px 24px 24px; text-align: center; }
    .course-badge { display: inline-block; padding: 4px 14px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #fff; border-radius: 999px; margin-bottom: 12px; }
    .course-header h1 { font-size: 2.5rem; font-weight: 800; margin-bottom: 8px; }
    .course-header p { font-size: 1rem; color: var(--color-text-secondary); max-width: 560px; margin: 0 auto; line-height: 1.6; }
    @media (max-width: 768px) { .course-header h1 { font-size: 2rem; } }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="container">
      <a href="../../index.html" class="nav-logo">
        <img src="../../assets/lighthouse/logo.svg" alt="" width="32" height="32">
        <span>Mathagram</span>
      </a>
      <div class="nav-links">
        <a href="../../courses.html">Courses</a>
        <a href="../../learning-post.html">Posts</a>
        <a href="../../login.html" data-auth="login">Login</a>
      </div>
    </div>
  </nav>
  <header class="course-header">
    <span class="course-badge" style="background:var(--color-data)">Data Analysis</span>
    <h1>Clustering & Classification</h1>
    <p>Group and categorize data using ML algorithms. 98 lessons across 7 units.</p>
  </header>
  <div id="learning-path" class="path-container"></div>
  <footer class="footer">
    <div class="container">
      <p class="footer-copy">&copy; <span id="year"></span> Mathagram.org — All Rights Reserved.</p>
    </div>
  </footer>
  <script type="module">
    import { initNav } from '../../js/nav.js';
    initNav('../../');
    import { renderPath, getCompletedLessons } from '../../js/learning-path.js';
    import { onAuthChange } from '../../js/auth.js';
    document.getElementById('year').textContent = new Date().getFullYear();
    const units = [
      [1,'Introduction to ML',['What is Machine Learning?','Supervised vs Unsupervised','Training & Test Sets','Features & Labels','Overfitting & Underfitting','Cross-Validation','Bias-Variance Tradeoff','Model Evaluation Metrics','Accuracy Precision Recall','F1 Score','Confusion Matrix','ROC Curve','AUC Score','ML Intro Review']],
      [2,'K-Nearest Neighbors',['What is KNN?','Distance Metrics (Euclidean)','Manhattan Distance','Choosing K','KNN for Classification','KNN for Regression','Weighted KNN','Feature Scaling','Normalization','Standardization','Curse of Dimensionality','KNN Pros & Cons','KNN Applications','KNN Review']],
      [3,'Decision Trees',['What is a Decision Tree?','Entropy','Information Gain','Gini Impurity','Building a Tree','Pruning','Pre-Pruning vs Post-Pruning','Decision Boundaries','Feature Importance','Handling Missing Data','Categorical Features','Continuous Features','Decision Tree Visualization','Decision Trees Review']],
      [4,'K-Means Clustering',['What is Clustering?','K-Means Algorithm','Choosing K (Elbow Method)','Silhouette Score','Initialization Methods','K-Means++','Convergence','Limitations of K-Means','Cluster Shapes','Customer Segmentation','Image Compression','Color Quantization','K-Means Variations','K-Means Review']],
      [5,'Hierarchical Clustering',['Agglomerative Clustering','Divisive Clustering','Linkage Methods (Single Complete Average)','Dendrograms','Cutting Dendrograms','Distance Matrices','Ward Method','DBSCAN Introduction','DBSCAN Parameters','Noise Points','Cluster Density','Comparing Clustering Methods','Hierarchical Applications','Hierarchical Review']],
      [6,'Naive Bayes & SVM',['Naive Bayes Classifier','Gaussian Naive Bayes','Multinomial Naive Bayes','Text Classification','Spam Detection','Sentiment Analysis','What is SVM?','Linear SVM','Maximum Margin','Support Vectors','Kernel Trick','RBF Kernel','SVM Applications','Naive Bayes & SVM Review']],
      [7,'Real-World Applications',['Image Classification','Handwriting Recognition','Facial Recognition Basics','Recommendation Systems','Anomaly Detection','Fraud Detection','Medical Diagnosis ML','Natural Language Processing','Topic Modeling','Market Basket Analysis','Ethical AI','Feature Engineering','Model Deployment','Applications Review']]
    ];

    let n = 0;
    const lessons = [];
    units.forEach(([u, name, titles]) => {
      titles.forEach((t, i) => {
        n++;
        lessons.push({ id: 'cc-'+n, title: t, href: '#', unit: u, unitName: name, category: 'data', checkpoint: i===titles.length-1 });
      });
    });

    async function loadPath() {
      const container = document.getElementById('learning-path');
      let completed = await getCompletedLessons('clustering-and-classification');
      renderPath(container, lessons, completed);
      onAuthChange(async (user) => {
        completed = await getCompletedLessons('clustering-and-classification');
        renderPath(container, lessons, completed);
      });
    }
    loadPath();
  </script>
</body>
</html>
