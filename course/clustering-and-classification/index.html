<body>

  <footer class="footer">

  <script type="module">
    import { initNav } from '../../js/nav.js';
    initNav('../../');
    import { renderPath, getCompletedLessons } from '../../js/learning-path.js';
    import { onAuthChange } from '../../js/auth.js';
    document.getElementById('year').textContent = new Date().getFullYear();
    const lessons = [{"id": "supervised-vs-unsupervised", "title": "Supervised vs Unsupervised", "unit": "ML Basics", "href": "#"}, {"id": "distance-metrics", "title": "Distance Metrics", "unit": "ML Basics", "href": "#"}, {"id": "feature-scaling", "title": "Feature Scaling", "unit": "ML Basics", "href": "#"}, {"id": "train-test-split", "title": "Train-Test Split", "unit": "ML Basics", "href": "#"}, {"id": "ml-basics-checkpoint", "title": "ML Basics Checkpoint", "unit": "ML Basics", "href": "#", "checkpoint": true}, {"id": "k-means-clustering", "title": "K-Means Clustering", "unit": "Clustering", "href": "#"}, {"id": "hierarchical-clustering", "title": "Hierarchical Clustering", "unit": "Clustering", "href": "#"}, {"id": "dbscan", "title": "DBSCAN", "unit": "Clustering", "href": "#"}, {"id": "evaluating-clusters", "title": "Evaluating Clusters", "unit": "Clustering", "href": "#"}, {"id": "clustering-checkpoint", "title": "Clustering Checkpoint", "unit": "Clustering", "href": "#", "checkpoint": true}, {"id": "k-nearest-neighbors", "title": "K-Nearest Neighbors", "unit": "Classification", "href": "#"}, {"id": "decision-trees", "title": "Decision Trees", "unit": "Classification", "href": "#"}, {"id": "naive-bayes", "title": "Naive Bayes", "unit": "Classification", "href": "#"}, {"id": "confusion-matrix-and-accuracy", "title": "Confusion Matrix & Accuracy", "unit": "Classification", "href": "#"}, {"id": "classification-mastery", "title": "Classification Mastery!", "unit": "Classification", "href": "#", "checkpoint": true}];
    async function loadPath() {
      const container = document.getElementById('learning-path');
      let completed = new Set();
      onAuthChange(async (user) => {
        if (user) completed = await getCompletedLessons('clustering-and-classification');
        renderPath(container, lessons, completed);
      });
      renderPath(container, lessons, completed);
    }
    loadPath();
  </script>
