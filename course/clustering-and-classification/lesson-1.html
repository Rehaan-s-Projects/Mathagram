<head>

  <style>
    .quiz-page { max-width: 760px; margin: 0 auto; padding: 64px 16px 96px; }
    .quiz-header { text-align: center; margin-bottom: 28px; }
    .quiz-badge { display: inline-block; padding: 4px 14px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #fff; border-radius: 999px; margin-bottom: 12px; background: var(--color-data, #3b82f6); }
    .quiz-header h1 { font-size: 2rem; font-weight: 800; margin-bottom: 4px; }
    .quiz-header p { color: var(--color-text-secondary); max-width: 560px; margin: 4px auto 0; line-height: 1.6; }

    .progress-bar { height: 8px; background: rgba(255,255,255,0.08); border-radius: 999px; overflow: hidden; margin-bottom: 20px; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, #3b82f6, #6366f1); transition: width 0.4s ease; }

    .qcard { background: var(--color-surface, #1a1a1a); border: 1px solid rgba(255,255,255,0.08); border-radius: 14px; padding: 24px; }
    .qprogress { font-size: 0.78rem; color: var(--color-text-secondary, #aaa); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
    .qtitle { font-size: 1.15rem; font-weight: 700; line-height: 1.5; margin: 0 0 18px; color: var(--color-text-primary, #fff); }
    .qopts { display: flex; flex-direction: column; gap: 10px; }
    .qopt { padding: 12px 16px; background: rgba(255,255,255,0.04); border: 2px solid rgba(255,255,255,0.10); border-radius: 10px; cursor: pointer; transition: all 0.15s; font-family: inherit; font-size: 0.95rem; color: var(--color-text-primary, #fff); text-align: left; }
    .qopt:hover:not(:disabled) { border-color: #3b82f6; background: rgba(59,130,246,0.1); }
    .qopt:disabled { cursor: default; }
    .qopt.correct { border-color: #22c55e; background: rgba(34,197,94,0.18); color: #86efac; }
    .qopt.wrong { border-color: #ef4444; background: rgba(239,68,68,0.18); color: #fca5a5; }

    .qexplain { margin-top: 14px; padding: 12px 16px; border-radius: 10px; font-size: 0.92rem; line-height: 1.55; display: none; }
    .qexplain.show { display: block; }
    .qexplain.correct { background: rgba(34,197,94,0.10); color: #86efac; border-left: 3px solid #22c55e; }
    .qexplain.wrong   { background: rgba(239,68,68,0.10); color: #fca5a5; border-left: 3px solid #ef4444; }

    .qactions { display: flex; gap: 10px; margin-top: 18px; justify-content: flex-end; }
    .qbtn { padding: 10px 22px; border-radius: 10px; font-weight: 700; font-size: 0.95rem; cursor: pointer; font-family: inherit; border: none; transition: background 0.15s, transform 0.1s; }
    .qbtn:hover { transform: translateY(-1px); }
    .qbtn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    .qbtn.primary { background: #3b82f6; color: #fff; }
    .qbtn.primary:hover:not(:disabled) { background: #2563eb; }

    .summary { background: var(--color-surface, #1a1a1a); border: 1px solid rgba(34,197,94,0.45); border-radius: 14px; padding: 28px; text-align: center; }
    .summary h2 { font-size: 1.5rem; font-weight: 800; margin: 0 0 8px; color: #86efac; }
    .summary .score { font-size: 2.5rem; font-weight: 800; margin: 12px 0; color: #fff; }
    .summary .score small { font-size: 1.1rem; color: var(--color-text-secondary, #aaa); font-weight: 500; }
    .summary p { color: var(--color-text-primary, #fff); line-height: 1.6; max-width: 480px; margin: 8px auto 16px; }
    .summary .actions { display: flex; gap: 10px; justify-content: center; margin-top: 20px; flex-wrap: wrap; }
    .summary a, .summary button { text-decoration: none; display: inline-block; }

    .footer-nav { text-align: center; margin-top: 32px; }
    .footer-nav a { color: #3b82f6; text-decoration: none; font-weight: 600; }
    .footer-nav a:hover { text-decoration: underline; }
  </style>

  <main class="quiz-page">
    <header class="quiz-header">
      <span class="quiz-badge">Clustering &amp; Classification · Unit 1 · Lesson 1</span>
      <h1>What is Machine Learning?</h1>
      <p>Eight quick questions to anchor the core idea of ML. Pick the best answer — you'll see the explanation immediately.</p>
    </header>

    <div class="progress-bar"><div id="progress-fill" class="progress-fill" style="width: 12.5%"></div></div>

    <section id="qcard" class="qcard"></section>

    <div class="footer-nav">
      <a href="index.html">← Back to course</a>
    </div>
  </main>

  <footer class="footer"><div class="container"><p class="footer-copy">&copy; <span id="year"></span> Mathagram.org — All Rights Reserved.</p></div></footer>

  <script type="module">
    import { initNav } from '../../js/nav.js';
    initNav('../../');
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>

  <script>
    const QUESTIONS = [
      {
        q: "Which of these is the best definition of machine learning?",
        opts: [
          "Edam (The Bear): \"Hand-coding every rule a computer should follow.\"",
          "Diego (The Researcher): \"A field where computers learn patterns from data instead of being programmed with explicit rules.\"",
          "James (The Strong Man): \"A way to make computers run faster — crush it!\"",
          "William (The Old Man): \"A subfield of databases focused on storage.\""
        ],
        correct: 1,
        explain: {
          ok: "Right. Diego nails it — ML is about learning patterns from examples. The rules emerge from the data, instead of being explicitly written by a programmer.",
          no: "Listen to Diego the Researcher: ML is the discipline where models learn from data. Instead of writing if/else rules by hand, you show the model examples and it figures out the pattern."
        }
      },
      {
        q: "In TRADITIONAL programming you write rules; in MACHINE LEARNING you provide:",
        opts: [
          "Steve (The Fox): \"A faster CPU — sly move!\"",
          "Rita (The Cat): \"A different programming language. Purrfect!\"",
          "Diego (The Researcher): \"Examples (data) and a target — and the model learns the rule.\"",
          "Sam (The Kid): \"More memory! Woohoo!\""
        ],
        correct: 2,
        explain: {
          ok: "Exactly — Diego's right. Traditional code: rules + data → answers. ML: data + answers → rules.",
          no: "Diego had it: in traditional programming you give rules and data and get answers; in ML you give data and answers (labels) and the model learns the rules."
        }
      },
      {
        q: "Predicting house prices from features like square footage, bedrooms, and location is an example of:",
        opts: [
          "Gosia (The Girl): \"Classification — amazing work!\"",
          "William (The Old Man): \"Regression, scholar.\"",
          "James (The Strong Man): \"Clustering!\"",
          "Steve (The Fox): \"Reinforcement learning — sly move!\""
        ],
        correct: 1,
        explain: {
          ok: "Yes — well done, scholar. William's right: predicting a continuous numeric value, like a price, is regression.",
          no: "William called it: predicting a continuous number (price, temperature, weight) is regression. Classification predicts a category; clustering finds groups without labels."
        }
      },
      {
        q: "Why do we usually split data into a TRAINING set and a TEST set?",
        opts: [
          "Edam (The Bear): \"To use less memory — you got this!\"",
          "Diego (The Researcher): \"Training data is for learning; test data measures how well the model handles unseen examples.\"",
          "Rita (The Cat): \"Because the algorithm only works on small data. Purrfect!\"",
          "Sam (The Kid): \"Test data is just a backup of training data — woohoo!\""
        ],
        correct: 1,
        explain: {
          ok: "Right. Diego's the researcher for a reason — test data is held out so we can estimate how the model will perform on data it has never seen. That's what 'generalization' means.",
          no: "Diego had it: the test set is unseen data used to measure generalization. If you only checked accuracy on the training set, you'd just be measuring how well the model memorized."
        }
      },
      {
        q: "Grouping customers into segments WITHOUT predefined categories — letting the algorithm discover the groups — is:",
        opts: [
          "James (The Strong Man): \"Supervised learning — crush it!\"",
          "Diego (The Researcher): \"Unsupervised learning (clustering).\"",
          "William (The Old Man): \"Linear regression, scholar.\"",
          "Steve (The Fox): \"Reinforcement learning — sly move!\""
        ],
        correct: 1,
        explain: {
          ok: "Correct — Diego knows. Clustering is the textbook unsupervised task: you have no labels, and the algorithm groups similar items together (e.g. K-Means).",
          no: "Diego had it: when there are no labels and the model finds groups itself, that's unsupervised clustering. Supervised would require predefined categories with labeled examples."
        }
      },
      {
        q: "A 'feature' in machine learning is:",
        opts: [
          "Sam (The Kid): \"The model's prediction — woohoo!\"",
          "Diego (The Researcher): \"An individual input variable — a column in the data.\"",
          "Rita (The Cat): \"A type of optimizer. Purrfect!\"",
          "Gosia (The Girl): \"The loss function — amazing work!\""
        ],
        correct: 1,
        explain: {
          ok: "Yes. Diego nailed it: features are the inputs the model sees. For predicting price you might have square footage, bedrooms, and zip code as three features.",
          no: "Listen to Diego: features are the input variables (columns). The model's output is the prediction (or label). Optimizers and loss functions are training mechanics, not features."
        }
      },
      {
        q: "A 'label' (in supervised learning) is:",
        opts: [
          "Steve (The Fox): \"Random noise added to the data — sly move!\"",
          "William (The Old Man): \"The known correct answer for a training example, scholar.\"",
          "Edam (The Bear): \"A name for the dataset file — you got this!\"",
          "James (The Strong Man): \"The number of features — crush it!\""
        ],
        correct: 1,
        explain: {
          ok: "Right — well done, scholar. William's correct: the label is the ground-truth answer, what the model is trying to predict. Supervised learning needs labeled examples to train.",
          no: "William had it: a label is the known correct answer attached to each training example. Without labels, you can't do supervised learning at all."
        }
      },
      {
        q: "A model gets 99% accuracy on training data but only 60% on data it hasn't seen. What's happening?",
        opts: [
          "James (The Strong Man): \"The model is perfect — it just needs more compute. Crush it!\"",
          "Sam (The Kid): \"Underfitting — the model is too simple to learn the data. Woohoo!\"",
          "Diego (The Researcher): \"Overfitting — the model memorized the training set instead of learning the general pattern.\"",
          "Gosia (The Girl): \"There's a hardware bug — amazing work!\""
        ],
        correct: 2,
        explain: {
          ok: "That's Diego's classic signature of overfitting: great on data it has seen, poor on data it hasn't. The model memorized noise instead of learning the underlying rule.",
          no: "Diego called it: when training accuracy is high but test accuracy is much lower, the model has overfit — it's memorized the training set instead of learning to generalize."
        }
      }
    ];

    const qcard = document.getElementById('qcard');
    const progressFill = document.getElementById('progress-fill');
    let idx = 0;
    let score = 0;
    let answered = false;

    function render() {
      const item = QUESTIONS[idx];
      progressFill.style.width = `${((idx) / QUESTIONS.length) * 100}%`;
      qcard.innerHTML = `
        <div class="qprogress">Question ${idx + 1} of ${QUESTIONS.length}</div>
        <h2 class="qtitle">${item.q}</h2>
        <div class="qopts" id="qopts"></div>
        <div class="qexplain" id="qexplain"></div>
        <div class="qactions">
          <button id="next-btn" class="qbtn primary" disabled>${idx === QUESTIONS.length - 1 ? 'Finish' : 'Next →'}</button>
        </div>`;
      const opts = document.getElementById('qopts');
      const nextBtn = document.getElementById('next-btn');
      const explain = document.getElementById('qexplain');
      answered = false;

      item.opts.forEach((text, i) => {
        const btn = document.createElement('button');
        btn.className = 'qopt';
        btn.type = 'button';
        btn.textContent = text;
        btn.addEventListener('click', () => {
          if (answered) return;
          answered = true;
          const allBtns = opts.querySelectorAll('.qopt');
          allBtns.forEach((b, j) => {
            b.disabled = true;
            if (j === item.correct) b.classList.add('correct');
            if (j === i && i !== item.correct) b.classList.add('wrong');
          });
          const isCorrect = i === item.correct;
          if (isCorrect) score++;
          explain.className = 'qexplain show ' + (isCorrect ? 'correct' : 'wrong');
          explain.textContent = isCorrect ? item.explain.ok : item.explain.no;
          nextBtn.disabled = false;
        });
        opts.appendChild(btn);
      });

      nextBtn.addEventListener('click', () => {
        if (idx < QUESTIONS.length - 1) {
          idx++;
          render();
        } else {
          finish();
        }
      });
    }

    function finish() {
      progressFill.style.width = '100%';
      const pct = Math.round((score / QUESTIONS.length) * 100);
      const message = pct === 100 ? "Perfect score — you've nailed the foundations." :
                      pct >= 80  ? "Strong work. The fundamentals are clearly clicking." :
                      pct >= 60  ? "Solid attempt. Worth re-reading the lesson before moving on." :
                                   "Keep going — review the lesson and try again.";
      qcard.outerHTML = `
        <section class="summary">
          <h2>Quiz Complete</h2>
          <div class="score">${score} / ${QUESTIONS.length} <small>(${pct}%)</small></div>
          <p>${message}</p>
          <div class="actions">
            <button id="retry-btn" class="qbtn primary">Try Again</button>
            <a class="qbtn primary" href="lesson-2.html">Next Lesson →</a>
            <a class="qbtn primary" style="background:rgba(59,130,246,0.2); color:#bfdbfe;" href="index.html">Back to Course</a>
          </div>
        </section>`;
      document.getElementById('retry-btn').addEventListener('click', () => location.reload());
    }

    render();
  </script>
</body>
