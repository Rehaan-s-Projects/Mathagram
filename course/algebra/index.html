<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Algebra — Mathagram</title>
  <link rel="icon" href="../../assets/lighthouse/logo.svg">
  <link rel="stylesheet" href="../../css/global.css">
  <link rel="stylesheet" href="../../css/learning-path.css">
  <style>
    .course-header { padding: 80px 24px 24px; text-align: center; }
    .course-badge { display: inline-block; padding: 4px 14px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #fff; border-radius: 999px; margin-bottom: 12px; }
    .course-header h1 { font-size: 2.5rem; font-weight: 800; margin-bottom: 8px; }
    .course-header p { font-size: 1rem; color: var(--color-text-secondary); max-width: 560px; margin: 0 auto; line-height: 1.6; }
    @media (max-width: 768px) { .course-header h1 { font-size: 2rem; } }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="container">
      <a href="../../index.html" class="nav-logo">
        <img src="../../assets/lighthouse/logo.svg" alt="" width="32" height="32">
        <span>Mathagram</span>
      </a>
      <div class="nav-links">
        <a href="../../courses.html">Courses</a>
        <a href="../../login.html" data-auth="login">Login</a>
      </div>
    </div>
  </nav>

  <header class="course-header">
    <span class="course-badge" style="background:var(--color-math)">Math</span>
    <h1>Algebra</h1>
    <p>The ultimate algebra course — from foundations to linear algebra. 733 lessons across 27 units.</p>
  </header>

  <div id="learning-path" class="path-container"></div>

  <footer class="footer">
    <div class="container">
      <p class="footer-copy">&copy; <span id="year"></span> Mathagram.org — All Rights Reserved.</p>
    </div>
  </footer>

  <script type="module">
    import { initNav } from '../../js/nav.js';
    initNav('../../');
    import { renderPath, getCompletedLessons } from '../../js/learning-path.js';
    import { onAuthChange } from '../../js/auth.js';
    document.getElementById('year').textContent = new Date().getFullYear();

    const lessons = [
      { id: 'alg-1',  title: 'Variables & Expressions',      href: '#' },
      { id: 'alg-2',  title: 'Order of Operations',          href: '#' },
      { id: 'alg-3',  title: 'Fractions',                    href: '#' },
      { id: 'alg-4',  title: 'Decimals',                     href: '#' },
      { id: 'alg-5',  title: 'Percents',                     href: '#', checkpoint: true },
      { id: 'alg-6',  title: 'One-Step Equations',           href: '#' },
      { id: 'alg-7',  title: 'Multi-Step Equations',         href: '#' },
      { id: 'alg-8',  title: 'Word Problems',                href: '#', checkpoint: true },
      { id: 'alg-9',  title: 'Graphing Inequalities',        href: '#' },
      { id: 'alg-10', title: 'Compound Inequalities',        href: '#', checkpoint: true },
      { id: 'alg-11', title: 'Slope',                        href: '#' },
      { id: 'alg-12', title: 'Slope-Intercept Form',         href: '#' },
      { id: 'alg-13', title: 'Graphing Linear',              href: '#', checkpoint: true },
      { id: 'alg-14', title: 'Scatter Plots',                href: '#' },
      { id: 'alg-15', title: 'Line of Best Fit',             href: '#', checkpoint: true },
      { id: 'alg-16', title: 'Solving by Graphing',          href: '#' },
      { id: 'alg-17', title: 'Solving by Elimination',       href: '#', checkpoint: true },
      { id: 'alg-18', title: 'Laws of Exponents',            href: '#' },
      { id: 'alg-19', title: 'Scientific Notation',          href: '#', checkpoint: true },
      { id: 'alg-20', title: 'Simplifying Radicals',         href: '#' },
      { id: 'alg-21', title: 'Pythagorean Theorem',          href: '#', checkpoint: true },
      { id: 'alg-22', title: 'FOIL',                         href: '#' },
      { id: 'alg-23', title: 'Factoring',                    href: '#', checkpoint: true },
      { id: 'alg-24', title: 'Quadratic Formula',            href: '#' },
      { id: 'alg-25', title: 'Completing the Square',        href: '#', checkpoint: true },
      { id: 'alg-26', title: 'Functions',                    href: '#' },
      { id: 'alg-27', title: 'Domain & Range',               href: '#', checkpoint: true },
      { id: 'alg-28', title: 'Exponential Growth',           href: '#' },
      { id: 'alg-29', title: 'Logarithms',                   href: '#', checkpoint: true },
      { id: 'alg-30', title: 'Rational Equations',           href: '#' },
      { id: 'alg-31', title: 'Asymptotes',                   href: '#', checkpoint: true },
      { id: 'alg-32', title: 'Coordinate Transformations',   href: '#', checkpoint: true },
      { id: 'alg-33', title: 'Arithmetic Sequences',         href: '#' },
      { id: 'alg-34', title: 'Geometric Series',             href: '#', checkpoint: true },
      { id: 'alg-35', title: 'Matrix Multiplication',        href: '#' },
      { id: 'alg-36', title: 'Determinants',                 href: '#', checkpoint: true },
      { id: 'alg-37', title: 'Eigenvalues',                  href: '#' },
      { id: 'alg-38', title: 'Diagonalization',              href: '#', checkpoint: true },
      { id: 'alg-39', title: 'Competition Math',             href: '#' },
      { id: 'alg-40', title: 'Algebra Mastery!',             href: '#', checkpoint: true }
    ];

    async function loadPath() {
      const container = document.getElementById('learning-path');
      let completed = new Set();
      onAuthChange(async (user) => {
        if (user) completed = await getCompletedLessons('algebra');
        renderPath(container, lessons, completed);
      });
      renderPath(container, lessons, completed);
    }
    loadPath();
  </script>
</body>
</html>
