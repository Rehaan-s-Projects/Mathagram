<body>
  <nav class="nav">
    <div class="container">
      <a href="../../index.html" class="nav-logo">
        <img src="../../assets/lighthouse/logo.svg" alt="" width="32" height="32">
        <span>Mathagram</span>
      </a>
      <div class="nav-links">
        <a href="../../courses.html">Courses</a>
        <a href="../../login.html" data-auth="login">Login</a>
      </div>
    </div>
  </nav>
  <header class="course-header">
    <span class="course-badge" style="background:var(--color-science)">Science</span>
    <h1>Soil Science</h1>
    <p>Sand, clay, loam — their properties and role in life.</p>
  </header>
  <div id="learning-path" class="path-container"></div>
  <footer class="footer">
    <div class="container">
      <p class="footer-copy">&copy; <span id="year"></span> Mathagram.org — All Rights Reserved.</p>
    </div>
  </footer>
  <script type="module">
    import { initNav } from '../../js/nav.js';
    initNav('../../');
    import { renderPath, getCompletedLessons } from '../../js/learning-path.js';
    import { onAuthChange } from '../../js/auth.js';
    document.getElementById('year').textContent = new Date().getFullYear();
    const lessons = [{"id": "what-is-soil?", "title": "What Is Soil?", "unit": "Soil Basics", "href": "#"}, {"id": "soil-layers-and-horizons", "title": "Soil Layers & Horizons", "unit": "Soil Basics", "href": "#"}, {"id": "sand-silt-and-clay", "title": "Sand, Silt & Clay", "unit": "Soil Basics", "href": "#"}, {"id": "soil-texture-triangle", "title": "Soil Texture Triangle", "unit": "Soil Basics", "href": "#"}, {"id": "soil-basics-checkpoint", "title": "Soil Basics Checkpoint", "unit": "Soil Basics", "href": "#", "checkpoint": true}, {"id": "soil-water-and-drainage", "title": "Soil Water & Drainage", "unit": "Soil Properties", "href": "#"}, {"id": "nutrients-and-ph", "title": "Nutrients & pH", "unit": "Soil Properties", "href": "#"}, {"id": "organic-matter-and-humus", "title": "Organic Matter & Humus", "unit": "Soil Properties", "href": "#"}, {"id": "soil-color-and-structure", "title": "Soil Color & Structure", "unit": "Soil Properties", "href": "#"}, {"id": "properties-checkpoint", "title": "Properties Checkpoint", "unit": "Soil Properties", "href": "#", "checkpoint": true}, {"id": "soil-and-plant-growth", "title": "Soil & Plant Growth", "unit": "Soil & Life", "href": "#"}, {"id": "erosion-and-conservation", "title": "Erosion & Conservation", "unit": "Soil & Life", "href": "#"}, {"id": "soil-ecosystems", "title": "Soil Ecosystems", "unit": "Soil & Life", "href": "#"}, {"id": "climate-and-soil", "title": "Climate & Soil", "unit": "Soil & Life", "href": "#"}, {"id": "soil-science-mastery", "title": "Soil Science Mastery!", "unit": "Soil & Life", "href": "#", "checkpoint": true}];
    async function loadPath() {
      const container = document.getElementById('learning-path');
      let completed = new Set();
      onAuthChange(async (user) => {
        if (user) completed = await getCompletedLessons('soil-science');
        renderPath(container, lessons, completed);
      });
      renderPath(container, lessons, completed);
    }
    loadPath();
  </script>
