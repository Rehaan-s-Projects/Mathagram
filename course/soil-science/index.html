<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" href="../../assets/lighthouse/logo.svg">
  <link rel="stylesheet" href="../../css/global.css">
  <link rel="stylesheet" href="../../css/learning-path.css">
  <style>
    .course-header { padding: 80px 24px 24px; text-align: center; }
    .course-badge { display: inline-block; padding: 4px 14px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #fff; border-radius: 999px; margin-bottom: 12px; }
    .course-header h1 { font-size: 2.5rem; font-weight: 800; margin-bottom: 8px; }
    .course-header p { font-size: 1rem; color: var(--color-text-secondary); max-width: 560px; margin: 0 auto; line-height: 1.6; }
    @media (max-width: 768px) { .course-header h1 { font-size: 2rem; } }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="container">
      <a href="../../index.html" class="nav-logo">
        <img src="../../assets/lighthouse/logo.svg" alt="" width="32" height="32">
        <span>Mathagram</span>
      </a>
      <div class="nav-links">
        <a href="../../courses.html">Courses</a>
        <a href="../../login.html" data-auth="login">Login</a>
      </div>
    </div>
  </nav>
  <header class="course-header">
    <span class="course-badge" style="background:var(--color-science)">Science</span>
    <h1>Soil Science</h1>
    <p>Explore soil formation, texture, chemistry, biology, and the role soil plays in agriculture, ecosystems, and climate. 93 lessons across 9 units.</p>
  </header>
  <div id="learning-path" class="path-container"></div>
  <footer class="footer">
    <div class="container">
      <p class="footer-copy">&copy; <span id="year"></span> Mathagram.org — All Rights Reserved.</p>
    </div>
  </footer>
  <script type="module">
    import { initNav } from '../../js/nav.js';
    initNav('../../');
    import { renderPath, getCompletedLessons } from '../../js/learning-path.js';
    import { onAuthChange } from '../../js/auth.js';
    document.getElementById('year').textContent = new Date().getFullYear();
    const units = [
      [1,'What Is Soil?',['What Is Soil?','Why Soil Matters','Soil vs Dirt','Components of Soil','How Soil Forms','Weathering — Physical Chemical Biological','Parent Material','Soil Formation Factors (CLORPT)','Soil Basics Review']],
      [2,'Soil Layers & Profiles',['Soil Horizons Overview','O Horizon (Organic Layer)','A Horizon (Topsoil)','E Horizon (Eluviation)','B Horizon (Subsoil)','C Horizon (Parent Material)','R Horizon (Bedrock)','Reading a Soil Profile','Soil Depth & Root Growth','Digging a Soil Pit','Soil Layers Review']],
      [3,'Soil Texture & Classification',['Sand Silt & Clay','Particle Size Differences','Feel Test for Texture','Soil Texture Triangle','Sandy Soils — Properties','Clay Soils — Properties','Loam — The Ideal Soil','Sandy Loam Clay Loam & More','Soil Taxonomy — 12 Orders','Soil Texture Review']],
      [4,'Soil Physical Properties',['Soil Structure — Granular Blocky Platy','Soil Aggregates','Soil Porosity','Soil Permeability','Soil Compaction','Bulk Density','Soil Color & Munsell Chart','Soil Temperature','Soil Aeration','Soil Physical Properties Review']],
      [5,'Soil Water & Chemistry',['Water in Soil','Gravitational Capillary & Hygroscopic Water','Field Capacity & Wilting Point','Soil Drainage','Soil pH Scale','Acidic vs Alkaline Soils','Cation Exchange Capacity (CEC)','Soil Buffering','Soil Salinity','Soil Water & Chemistry Review']],
      [6,'Soil Nutrients & Fertility',['Essential Plant Nutrients','Macronutrients — N P K','Nitrogen Cycle in Soil','Phosphorus & Potassium in Soil','Secondary & Micronutrients','Nutrient Deficiency Symptoms','Fertilizers — Organic vs Synthetic','Composting','Soil Testing & Lab Analysis','Soil Fertility Review']],
      [7,'Soil Biology & Ecosystems',['Soil as a Living Ecosystem','Bacteria in Soil','Fungi & Mycorrhizae','Earthworms — Natures Plows','Nematodes & Soil Arthropods','Decomposition Process','Humus Formation','Organic Matter & Carbon','Soil Food Web','Soil Biology Review']],
      [8,'Soil & Agriculture',['Soil for Crop Production','Tillage vs No-Till Farming','Crop Rotation','Cover Crops','Mulching','Irrigation & Soil','Raised Bed Gardening','Hydroponics vs Soil','Soil Erosion — Wind & Water','Erosion Control Methods','Terracing & Contour Farming','Soil & Agriculture Review']],
      [9,'Soil & the Environment',['Soil & Climate Change','Carbon Sequestration in Soil','Soil & the Water Cycle','Wetland Soils','Desert Soils','Tropical Soils','Permafrost & Frozen Soils','Soil Pollution & Contamination','Soil Remediation','Land Degradation & Desertification','Soil Science Mastery!']]
    ];
    let n = 0;
    const lessons = [];
    units.forEach(([u, name, titles]) => {
      titles.forEach((t, i) => {
        n++;
        lessons.push({ id: 'ss-'+n, title: t, href: '#', unit: u, unitName: name, category: 'science', checkpoint: i===titles.length-1 });
      });
    });
    async function loadPath() {
      const container = document.getElementById('learning-path');
      let completed = await getCompletedLessons('soil-science');
      renderPath(container, lessons, completed);
      onAuthChange(async (user) => {
        completed = await getCompletedLessons('soil-science');
        renderPath(container, lessons, completed);
      });
    }
    loadPath();
  </script>
</body>
</html>
