<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Uzbek — Mathagram</title>
  <link rel="icon" href="../../assets/lighthouse/logo.svg">
  <link rel="stylesheet" href="../../css/global.css">
  <link rel="stylesheet" href="../../css/learning-path.css">
  <style>
    .course-header { padding: 80px 24px 24px; text-align: center; }
    .course-badge { display: inline-block; padding: 4px 14px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #fff; border-radius: 999px; margin-bottom: 12px; }
    .course-header h1 { font-size: 2.5rem; font-weight: 800; margin-bottom: 8px; }
    .course-header p { font-size: 1rem; color: var(--color-text-secondary); max-width: 560px; margin: 0 auto; line-height: 1.6; }
    @media (max-width: 768px) { .course-header h1 { font-size: 2rem; } }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="container">
      <a href="../../index.html" class="nav-logo">
        <img src="../../assets/lighthouse/logo.svg" alt="" width="32" height="32">
        <span>Mathagram</span>
      </a>
      <div class="nav-links">
        <a href="../../courses.html">Courses</a>
        <a href="../../login.html" data-auth="login">Login</a>
      </div>
    </div>
  </nav>
  <header class="course-header">
    <span class="course-badge" style="background:var(--color-language)">Language</span>
    <h1>Uzbek</h1>
    <p>Learn Uzbek — a Turkic language spoken by 35 million people in Uzbekistan. Silk Road heritage and rich culture. 183 lessons across 12 units.</p>
  </header>
  <div id="learning-path" class="path-container"></div>
  <footer class="footer">
    <div class="container">
      <p class="footer-copy">&copy; <span id="year"></span> Mathagram.org — All Rights Reserved.</p>
    </div>
  </footer>
  <script type="module">
    import { initNav } from '../../js/nav.js';
    initNav('../../');
    import { renderPath, getCompletedLessons } from '../../js/learning-path.js';
    import { onAuthChange } from '../../js/auth.js';
    document.getElementById('year').textContent = new Date().getFullYear();
    const units = [
      [1,'Latin & Cyrillic Script',['Uzbek Latin Alphabet (29 Letters)','Vowels (A E I O U O\' )','Consonants & Special Letters','Apostrophe Letters (O\' G\' Sh Ch Ng)','Cyrillic Alphabet Overview','Latin-Cyrillic Conversion','Vowel Harmony Basics','Numbers 1-20','Numbers 20-100','Large Numbers','Days of the Week','Months & Seasons','Writing Practice','Reading Signs & Labels','Script Review']],
      [2,'Greetings & Basics',['Assalomu Alaykum (Peace Greeting)','Salom (Hello)','Xayr (Goodbye)','Qalaysiz? (How Are You?)','Mening ismim... (My Name Is)','Rahmat (Thank You)','Kechirasiz (Excuse Me)','Ha / Yo\'q (Yes / No)','Qayerdan? (Where From?)','Xush kelibsiz (Welcome)','Hayr (Good Night)','Emergency Phrases','Polite Expressions','Introductions Practice','Greetings Review']],
      [3,'Grammar Basics',['Nouns & Gender','Plural Formation (-lar -ler)','Definite & Indefinite','Word Order (SOV)','Postpositions (bilan uchun haqida)','Possessive Suffixes','Question Particles (mi)','Question Words (Kim Nima Qayerda Qachon)','Demonstratives (Bu Shu U)','Adjectives & Agreement','Comparatives & Superlatives','Conjunctions (va lekin yoki)','Agglutination Explained','Suffixation Chains','Grammar Basics Review']],
      [4,'Present Tense',['Verb Roots in Uzbek','Present Continuous (-yap-)','Present Habitual (-a/-y)','Qilmoq (To Do)','Bormoq (To Go)','Kelmoq (To Come)','Yemoq (To Eat)','Ichmoq (To Drink)','Gapirmoq (To Speak)','O\'qimoq (To Read)','Yozmoq (To Write)','Ko\'rmoq (To See)','Bilmoq (To Know)','Negative Present','Present Tense Review']],
      [5,'Past & Future Tenses',['Simple Past (-di)','Past of Qilmoq','Past of Bormoq','Definite Past','Indefinite Past (-gan)','Past Continuous','Future Tense (-a + di suffix)','Intentional Future (-moqchi)','Time Expressions (Kecha Bugun Ertaga)','Negative Past','Negative Future','Reported Past','Sequencing Events','Conditional Past','Tenses Review']],
      [6,'Family & People',['Ota (Father)','Ona (Mother)','Aka (Older Brother)','Uka (Younger Brother)','Opa (Older Sister)','Singil (Younger Sister)','Buva (Grandfather)','Buvi (Grandmother)','Amaki (Uncle)','Xola (Aunt)','Turmush O\'rtoq (Spouse)','Farzand (Child)','Describing Appearance','Personality & Character','Family Review']],
      [7,'Food & Cuisine',['Non (Bread)','Osh / Plov (National Pilaf)','Somsa (Baked Pastry)','Shashlik (Grilled Kebab)','Lag\'mon (Hand-Pulled Noodles)','Manti (Steamed Dumplings)','Mastava (Rice Soup)','Norin (Noodles with Meat)','Choy (Tea Culture)','Fruits of Uzbekistan (Melon Grapes)','Vegetables & Salads','At the Choyxona (Teahouse)','Ordering at a Restaurant','Cooking Vocabulary','Market Etiquette','Food Review']],
      [8,'Shopping & Numbers',['Currency (So\'m)','Bazaar Culture','Haggling & Bargaining','Clothing Vocabulary','Colors in Uzbek','Sizes & Measurements','Traditional Textiles (Ikat Atlas)','Ceramics & Crafts','Spice Market','Grocery Shopping','Price Comparisons','Modern Shopping','Electronics & Tech','Online Shopping Terms','Shopping Review']],
      [9,'Travel & Uzbekistan',['Toshkent (Tashkent Capital)','Samarqand (Registan Square)','Buxoro (Bukhara Old City)','Xiva (Khiva Ichan-Kala)','Farg\'ona Valley','Nukus & Savitsky Museum','Shahrisabz (Amir Temur)','Aral Sea Region','Uzbek Railways','At the Airport','Hotel & Accommodation','Directions & Navigation','Public Transport','Emergency Travel Phrases','Silk Road History Sites','Travel Review']],
      [10,'Culture & Traditions',['Navruz (Spring New Year)','Shashmaqom Music','Uzbek Silk Ikat Weaving','Suzani Embroidery','Amir Temur Legacy','Ulugh Beg & Astronomy','Alisher Navoiy (Literature)','Wedding Traditions (Nikoh)','Beshik To\'y (Cradle Ceremony)','Hospitality & Mehmondo\'stlik','Uzbek Proverbs','Traditional Games','Miniature Painting Art','Modern Uzbekistan','Cultural Etiquette','Culture Review']],
      [11,'Advanced Grammar',['Six Cases (Nominative Genitive Dative Accusative Locative Ablative)','Complex Suffixation','Relative Clauses (-gan -digan)','Passive Voice','Causative Verbs (-tir-)','Reflexive Verbs','Reported Speech','Conditional Sentences','Subjunctive Mood','Formal vs Informal Register','Written vs Spoken Differences','Dialectal Variations','Error Correction','Academic Uzbek','Advanced Grammar Review']],
      [12,'Fluency & Mastery',['Conversation Starters','Small Talk & Weather','Expressing Opinions','Agreeing & Disagreeing','Storytelling Traditions','Uzbek News Reading','Uzbek Poetry (She\'r)','Listening Practice 1','Listening Practice 2','Writing Practice (Essay)','Debate & Discussion','Role Play Scenarios','Presentation Skills','Job Interview Practice','Final Uzbek Challenge']]
    ];
    let n = 0;
    const lessons = [];
    units.forEach(([u, name, titles]) => {
      titles.forEach((t, i) => {
        n++;
        lessons.push({ id: 'uz-'+n, title: t, href: '#', unit: u, unitName: name, category: 'language', checkpoint: i===titles.length-1 });
      });
    });
    async function loadPath() {
      const container = document.getElementById('learning-path');
      let completed = await getCompletedLessons('uzbek');
      renderPath(container, lessons, completed);
      onAuthChange(async (user) => {
        completed = await getCompletedLessons('uzbek');
        renderPath(container, lessons, completed);
      });
    }
    loadPath();
  </script>
</body>
</html>
