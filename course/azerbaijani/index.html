  <header class="course-header">
    <span class="course-badge" style="background:var(--color-language)">Language</span>
    <h1>Azerbaijani</h1>
    <p>Learn Azerbaijani — a Turkic language spoken by over 30 million people in Azerbaijan and Iran. Rich culture, mugham music, and Caspian heritage. 143 lessons across 11 units.</p>
  </header>
  <div id="learning-path" class="path-container"></div>
  <footer class="footer">
    <div class="container">
      <p class="footer-copy">&copy; <span id="year"></span> Mathagram.org — All Rights Reserved.</p>
    </div>
  </footer>
  <script type="module">
    import { initNav } from '../../js/nav.js';
    initNav('../../');
    import { renderPath, getCompletedLessons } from '../../js/learning-path.js';
    import { onAuthChange } from '../../js/auth.js';
    document.getElementById('year').textContent = new Date().getFullYear();
    const units = [
      [1,'Alphabet & Pronunciation',['Latin Alphabet Overview','Vowels (A E I O U Ö Ü Ə)','Front vs Back Vowels','Vowel Harmony','Consonants','Special Letters (Ğ X Q Ş Ç)','Soft Sign & Hard Sign','Numbers 1-10','Numbers 11-100','Large Numbers','Days of the Week','Months & Seasons','Telling Time']],
      [2,'Greetings & Basics',['Salam (Hello)','Sağ olun (Thank You)','Bəli/Xeyr (Yes/No)','Necəsən? (How Are You?)','Mənim adım... (My Name Is)','Hardan gəlirsən? (Where From?)','Sabahınız xeyir (Good Morning)','Gecəniz xeyir (Good Night)','Zəhmət olmasa (Please)','Bağışlayın (Sorry)','Görüşənədək (Goodbye)','Emergency Phrases','Greetings Review']],
      [3,'Pronouns & Grammar',['Mən (I)','Sən (You informal)','Siz (You formal)','O (He/She/It)','Biz (We)','Onlar (They)','Possessive Suffixes','Word Order (SOV)','Vowel Harmony in Suffixes','Consonant Harmony','Agglutination Basics','Question Particles (mı mi mu mü)','Grammar Review']],
      [4,'Present Tense',['Verb Roots','Present Continuous (-ır -ir -ur -ür)','Olmaq (To Be)','Getmək (To Go)','Gəlmək (To Come)','Yemək (To Eat)','İçmək (To Drink)','Danışmaq (To Speak)','Oxumaq (To Read)','Yazmaq (To Write)','Görmək (To See)','Bilmək (To Know)','Present Tense Review']],
      [5,'Past & Future Tenses',['Simple Past (-dı -di -du -dü)','Past of Olmaq','Past of Getmək','Definite Past','Indefinite Past (-mış -miş)','Past Continuous','Future Tense (-acaq -əcək)','Immediate Future','Future Plans','Time Expressions','Negative Past','Negative Future','Tenses Review']],
      [6,'Family & People',['Ata (Father)','Ana (Mother)','Qardaş (Brother)','Bacı (Sister)','Baba (Grandfather)','Nənə (Grandmother)','Əmi/Dayı (Uncle)','Xala/Bibi (Aunt)','Həyat yoldaşı (Spouse)','Uşaqlar (Children)','Describing People','Personality Traits','Family Review']],
      [7,'Food & Dining',['Çörək (Bread)','Plov (Rice Pilaf)','Dolma','Qutab','Düşbərə (Dumplings)','Kebab','Piti (Lamb Stew)','Çay (Tea Culture)','Şərbət (Sherbet)','Fruits & Vegetables','At the Restaurant','Ordering Food','Food Review']],
      [8,'Travel & Azerbaijan',['Bakı (Baku) City','Old City (İçərişəhər)','Flame Towers','Heydar Aliyev Center','Şəki & Caravanserai','Qobustan Rock Art','Mud Volcanoes','Caspian Sea Coast','Quba & Xınalıq','Gəncə City','At the Airport','Hotel & Transport','Travel Review']],
      [9,'Culture & History',['Azerbaijan History Overview','Ancient Caucasus Albania','Islamic Period','Safavid Dynasty','Oil Boom (19th Century)','Soviet Period','Independence 1991','Mugham Music','Ashiq Tradition','Novruz Bayramı','Carpet Weaving','Tar & Kamancha Instruments','Culture Review']],
      [10,'Advanced Grammar',['Cases (Nominative Genitive Dative Accusative Locative Ablative)','Suffix Chains','Relative Clauses','Passive Voice','Causative Verbs','Reported Speech','Conditional Sentences','Complex Sentences','Formal vs Informal','Written vs Spoken','Dialectal Differences','Error Correction','Advanced Grammar Review']],
      [11,'Fluency & Mastery',['Conversation Starters','Small Talk','Expressing Opinions','Agreeing & Disagreeing','Storytelling','Idioms & Proverbs','Tongue Twisters','Listening Practice 1','Listening Practice 2','Reading Practice','Writing Practice','Role Play Scenarios','Final Azerbaijani Challenge']]
    ,
      [12,"Azerbaijani at the Market",["Shopping for Food","Clothing Store","Electronics Shop","Bargaining & Prices","Asking for Sizes","Comparing Products","Payment Methods","Returns & Exchanges","Online Shopping Vocabulary","Market Culture","Street Vendors","Gift Shopping","Window Shopping","Shopping Phrases","Market Checkpoint"]],
      [13,"Azerbaijani Travel & Tourism",["At the Airport","At the Hotel","Public Transportation","Asking Directions","Booking Reservations","At the Restaurant Abroad","Emergency Phrases","Sightseeing Vocabulary","Taking Photos","Currency Exchange","Customs & Immigration","Travel Insurance","Packing Vocabulary","Travel Blog Writing","Travel Checkpoint"]],
      [14,"Azerbaijani Sports & Fitness",["Football & Soccer","Basketball","Swimming","Running & Jogging","Gym Vocabulary","Traditional Sports","Olympic Sports","Team Sports","Individual Sports","Watching Sports","Sports Commentary","Fitness Goals","Exercise Routine","Competition Vocabulary","Sports Checkpoint"]],
      [15,"Azerbaijani Technology",["Computer Basics","Smartphone Vocabulary","Internet & Social Media","Email & Messaging","Apps & Software","Video Games","Streaming & Media","Online Safety","Tech Support Phrases","Programming Terms","AI & Robots","Smart Home","Photography","Digital Vocabulary","Technology Checkpoint"]],
      [16,"Azerbaijani Nature & Environment",["Trees & Forests","Rivers & Lakes","Mountains & Valleys","Ocean & Beach","Weather Patterns","Animals — Wild","Animals — Domestic","Birds & Insects","Flowers & Plants","Seasons Detailed","Environmental Issues","Recycling & Conservation","Climate Change","Nature Vocabulary","Nature Checkpoint"]],
      [17,"Azerbaijani Music & Entertainment",["Musical Instruments","Singing & Songs","Traditional Music","Modern Music","Concerts & Festivals","Movies & Cinema","Television Shows","Theater & Drama","Dancing","Art & Painting","Photography","Entertainment Vocabulary","Reviews & Opinions","Celebrity Culture","Entertainment Checkpoint"]],
      [18,"Azerbaijani History & Heritage",["Ancient History","Medieval Period","Colonial Era","Modern History","Independence & Revolution","Famous Leaders","Cultural Heritage","Archaeological Sites","Museums","Historical Events","Wars & Conflicts","Peace & Diplomacy","National Symbols","Heritage Preservation","History Checkpoint"]],
      [19,"Azerbaijani Food Deep Dive",["Breakfast Traditions","Lunch Culture","Dinner Customs","Street Food","Desserts & Sweets","Beverages — Hot & Cold","Spices & Herbs","Cooking Methods","Kitchen Utensils","Regional Dishes","Holiday Foods","Food Etiquette","Diet & Nutrition","Recipe Writing","Food Deep Dive Checkpoint"]],
      [20,"Azerbaijani Family & Relationships",["Extended Family","Parenting Vocabulary","Children & Babies","Marriage & Wedding","Dating & Romance","Friendship","Neighbors & Community","Elderly Care","Family Traditions","Family Conflicts","Celebrations Together","Family Values","Describing People","Relationship Advice","Family Checkpoint"]],
      [21,"Azerbaijani Education & School",["Primary School","Secondary School","University","Teachers & Professors","Exams & Tests","Homework & Assignments","School Supplies","Subjects Deep Dive","Graduation","Libraries","Online Learning","Study Abroad","Scholarships","Student Life","Education Checkpoint"]],
      [22,"Azerbaijani Health & Medicine",["Doctor Visit","Hospital Vocabulary","Pharmacy","Mental Health","Dental Care","Eye Care","First Aid","Chronic Illness","Healthy Eating","Exercise & Wellness","Sleep & Rest","Allergies","Medical Tests","Health Insurance","Health Checkpoint"]],
      [23,"Azerbaijani Work & Career",["Job Titles","Office Life","Job Interview","Resume & CV","Salary & Benefits","Meetings","Email at Work","Phone Calls","Presentations","Teamwork","Deadlines & Projects","Promotion","Retirement","Freelancing","Career Checkpoint"]],
      [24,"Azerbaijani Emotions & Feelings",["Happy & Excited","Sad & Disappointed","Angry & Frustrated","Scared & Nervous","Surprised & Shocked","Love & Affection","Jealousy & Envy","Pride & Confidence","Shame & Embarrassment","Boredom & Tiredness","Hope & Optimism","Nostalgia","Describing Moods","Emotional Expression","Emotions Checkpoint"]],
      [25,"Azerbaijani Weather & Climate",["Sunny Days","Rainy Weather","Snow & Winter","Wind & Storms","Fog & Mist","Hot & Humid","Cold & Freezing","Weather Forecast","Seasons Detailed","Natural Disasters","Climate Zones","Weather Idioms","Dressing for Weather","Weather Conversations","Weather Checkpoint"]],
      [26,"Azerbaijani Idioms & Proverbs",["Common Proverbs","Wisdom Sayings","Animal Idioms","Food Idioms","Weather Idioms","Work Idioms","Family Proverbs","Love Proverbs","Humorous Expressions","Poetic Phrases","Using Idioms in Speech","Regional Expressions","Comparing with English Idioms","Creating Sentences","Idioms Checkpoint"]]
    ];
    let n = 0;
    const lessons = [];
    units.forEach(([u, name, titles]) => {
      titles.forEach((t, i) => {
        n++;
        lessons.push({ id: 'az-'+n, title: t, href: '#', unit: u, unitName: name, category: 'language', checkpoint: i===titles.length-1 });
      });
    });
    async function loadPath() {
      const container = document.getElementById('learning-path');
      let completed = await getCompletedLessons('azerbaijani');
      renderPath(container, lessons, completed);
      onAuthChange(async (user) => {
        completed = await getCompletedLessons('azerbaijani');
        renderPath(container, lessons, completed);
      });
    }
    loadPath();
  </script>
