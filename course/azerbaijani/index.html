<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Azerbaijani — Mathagram</title>
  <link rel="icon" href="../../assets/lighthouse/logo.svg">
  <link rel="stylesheet" href="../../css/global.css">
  <link rel="stylesheet" href="../../css/learning-path.css">
  <style>
    .course-header { padding: 80px 24px 24px; text-align: center; }
    .course-badge { display: inline-block; padding: 4px 14px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #fff; border-radius: 999px; margin-bottom: 12px; }
    .course-header h1 { font-size: 2.5rem; font-weight: 800; margin-bottom: 8px; }
    .course-header p { font-size: 1rem; color: var(--color-text-secondary); max-width: 560px; margin: 0 auto; line-height: 1.6; }
    @media (max-width: 768px) { .course-header h1 { font-size: 2rem; } }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="container">
      <a href="../../index.html" class="nav-logo">
        <img src="../../assets/lighthouse/logo.svg" alt="" width="32" height="32">
        <span>Mathagram</span>
      </a>
      <div class="nav-links">
        <a href="../../courses.html">Courses</a>
        <a href="../../learning-post.html">Posts</a>
        <a href="../../login.html" data-auth="login">Login</a>
      </div>
    </div>
  </nav>
  <header class="course-header">
    <span class="course-badge" style="background:var(--color-language)">Language</span>
    <h1>Azerbaijani</h1>
    <p>Learn Azerbaijani — a Turkic language spoken by over 30 million people in Azerbaijan and Iran. Rich culture, mugham music, and Caspian heritage. 143 lessons across 11 units.</p>
  </header>
  <div id="learning-path" class="path-container"></div>
  <footer class="footer">
    <div class="container">
      <p class="footer-copy">&copy; <span id="year"></span> Mathagram.org — All Rights Reserved.</p>
    </div>
  </footer>
  <script type="module">
    import { initNav } from '../../js/nav.js';
    initNav('../../');
    import { renderPath, getCompletedLessons } from '../../js/learning-path.js';
    import { onAuthChange } from '../../js/auth.js';
    document.getElementById('year').textContent = new Date().getFullYear();
    const units = [
      [1,'Alphabet & Pronunciation',['Latin Alphabet Overview','Vowels (A E I O U Ö Ü Ə)','Front vs Back Vowels','Vowel Harmony','Consonants','Special Letters (Ğ X Q Ş Ç)','Soft Sign & Hard Sign','Numbers 1-10','Numbers 11-100','Large Numbers','Days of the Week','Months & Seasons','Telling Time']],
      [2,'Greetings & Basics',['Salam (Hello)','Sağ olun (Thank You)','Bəli/Xeyr (Yes/No)','Necəsən? (How Are You?)','Mənim adım... (My Name Is)','Hardan gəlirsən? (Where From?)','Sabahınız xeyir (Good Morning)','Gecəniz xeyir (Good Night)','Zəhmət olmasa (Please)','Bağışlayın (Sorry)','Görüşənədək (Goodbye)','Emergency Phrases','Greetings Review']],
      [3,'Pronouns & Grammar',['Mən (I)','Sən (You informal)','Siz (You formal)','O (He/She/It)','Biz (We)','Onlar (They)','Possessive Suffixes','Word Order (SOV)','Vowel Harmony in Suffixes','Consonant Harmony','Agglutination Basics','Question Particles (mı mi mu mü)','Grammar Review']],
      [4,'Present Tense',['Verb Roots','Present Continuous (-ır -ir -ur -ür)','Olmaq (To Be)','Getmək (To Go)','Gəlmək (To Come)','Yemək (To Eat)','İçmək (To Drink)','Danışmaq (To Speak)','Oxumaq (To Read)','Yazmaq (To Write)','Görmək (To See)','Bilmək (To Know)','Present Tense Review']],
      [5,'Past & Future Tenses',['Simple Past (-dı -di -du -dü)','Past of Olmaq','Past of Getmək','Definite Past','Indefinite Past (-mış -miş)','Past Continuous','Future Tense (-acaq -əcək)','Immediate Future','Future Plans','Time Expressions','Negative Past','Negative Future','Tenses Review']],
      [6,'Family & People',['Ata (Father)','Ana (Mother)','Qardaş (Brother)','Bacı (Sister)','Baba (Grandfather)','Nənə (Grandmother)','Əmi/Dayı (Uncle)','Xala/Bibi (Aunt)','Həyat yoldaşı (Spouse)','Uşaqlar (Children)','Describing People','Personality Traits','Family Review']],
      [7,'Food & Dining',['Çörək (Bread)','Plov (Rice Pilaf)','Dolma','Qutab','Düşbərə (Dumplings)','Kebab','Piti (Lamb Stew)','Çay (Tea Culture)','Şərbət (Sherbet)','Fruits & Vegetables','At the Restaurant','Ordering Food','Food Review']],
      [8,'Travel & Azerbaijan',['Bakı (Baku) City','Old City (İçərişəhər)','Flame Towers','Heydar Aliyev Center','Şəki & Caravanserai','Qobustan Rock Art','Mud Volcanoes','Caspian Sea Coast','Quba & Xınalıq','Gəncə City','At the Airport','Hotel & Transport','Travel Review']],
      [9,'Culture & History',['Azerbaijan History Overview','Ancient Caucasus Albania','Islamic Period','Safavid Dynasty','Oil Boom (19th Century)','Soviet Period','Independence 1991','Mugham Music','Ashiq Tradition','Novruz Bayramı','Carpet Weaving','Tar & Kamancha Instruments','Culture Review']],
      [10,'Advanced Grammar',['Cases (Nominative Genitive Dative Accusative Locative Ablative)','Suffix Chains','Relative Clauses','Passive Voice','Causative Verbs','Reported Speech','Conditional Sentences','Complex Sentences','Formal vs Informal','Written vs Spoken','Dialectal Differences','Error Correction','Advanced Grammar Review']],
      [11,'Fluency & Mastery',['Conversation Starters','Small Talk','Expressing Opinions','Agreeing & Disagreeing','Storytelling','Idioms & Proverbs','Tongue Twisters','Listening Practice 1','Listening Practice 2','Reading Practice','Writing Practice','Role Play Scenarios','Final Azerbaijani Challenge']]
    ];
    let n = 0;
    const lessons = [];
    units.forEach(([u, name, titles]) => {
      titles.forEach((t, i) => {
        n++;
        lessons.push({ id: 'az-'+n, title: t, href: '#', unit: u, unitName: name, category: 'language', checkpoint: i===titles.length-1 });
      });
    });
    async function loadPath() {
      const container = document.getElementById('learning-path');
      let completed = await getCompletedLessons('azerbaijani');
      renderPath(container, lessons, completed);
      onAuthChange(async (user) => {
        completed = await getCompletedLessons('azerbaijani');
        renderPath(container, lessons, completed);
      });
    }
    loadPath();
  </script>
</body>
</html>
