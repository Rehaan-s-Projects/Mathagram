<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exploring Data Visually — Mathagram</title>
  <link rel="icon" href="../../assets/lighthouse/logo.svg">
  <link rel="stylesheet" href="../../css/global.css">
  <link rel="stylesheet" href="../../css/learning-path.css">
  <style>
    .course-header { padding: 80px 24px 24px; text-align: center; }
    .course-badge { display: inline-block; padding: 4px 14px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #fff; border-radius: 999px; margin-bottom: 12px; }
    .course-header h1 { font-size: 2.5rem; font-weight: 800; margin-bottom: 8px; }
    .course-header p { font-size: 1rem; color: var(--color-text-secondary); max-width: 560px; margin: 0 auto; line-height: 1.6; }
    @media (max-width: 768px) { .course-header h1 { font-size: 2rem; } }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="container">
      <a href="../../index.html" class="nav-logo">
        <img src="../../assets/lighthouse/logo.svg" alt="" width="32" height="32">
        <span>Mathagram</span>
      </a>
      <div class="nav-links">
        <a href="../../courses.html">Courses</a>
        <a href="../../login.html" data-auth="login">Login</a>
      </div>
    </div>
  </nav>
  <header class="course-header">
    <span class="course-badge" style="background:var(--color-data)">Data Analysis</span>
    <h1>Exploring Data Visually</h1>
    <p>Turn raw numbers into compelling visual stories. 132 lessons across 11 units.</p>
  </header>
  <div id="learning-path" class="path-container"></div>
  <footer class="footer">
    <div class="container">
      <p class="footer-copy">&copy; <span id="year"></span> Mathagram.org — All Rights Reserved.</p>
    </div>
  </footer>
  <script type="module">
    import { initNav } from '../../js/nav.js';
    initNav('../../');
    import { renderPath, getCompletedLessons } from '../../js/learning-path.js';
    import { onAuthChange } from '../../js/auth.js';
    document.getElementById('year').textContent = new Date().getFullYear();
    const units = [
      [1,'Types of Data',['What is Data?','Categorical Data','Quantitative Data','Discrete vs Continuous','Nominal vs Ordinal','Ratio vs Interval','Data Collection Methods','Surveys & Questionnaires','Primary vs Secondary Data','Data Cleaning Basics','Missing Data','Types of Data Review']],
      [2,'Bar Charts & Histograms',['Simple Bar Charts','Grouped Bar Charts','Stacked Bar Charts','Horizontal Bar Charts','Histograms Introduction','Choosing Bin Width','Frequency Histograms','Relative Frequency Histograms','Comparing Histograms','Misleading Bar Charts','When to Use Each','Bar & Histogram Review']],
      [3,'Scatter Plots',['What is a Scatter Plot?','Plotting Points','Positive Correlation','Negative Correlation','No Correlation','Outliers in Scatter Plots','Trend Lines','Clusters in Data','Scatter Plot Matrix','Bubble Charts','3D Scatter Plots','Scatter Plot Review']],
      [4,'Line Graphs & Time Series',['Simple Line Graphs','Multiple Line Graphs','Time Series Data','Trends','Seasonal Patterns','Cyclical Patterns','Moving Averages','Smoothing Data','Stock Market Charts','Temperature Over Time','Population Growth Charts','Line Graph Review']],
      [5,'Pie Charts & Proportions',['Simple Pie Charts','When to Use Pie Charts','When NOT to Use Pie Charts','Donut Charts','Treemaps','Waffle Charts','Stacked Area Charts','100% Stacked Bar','Proportional Data','Market Share Visualization','Budget Visualization','Proportions Review']],
      [6,'Box Plots & Distributions',['Box Plot Basics','Quartiles & IQR','Whiskers & Outliers','Comparing Box Plots','Violin Plots','Density Plots','Kernel Density Estimation','Normal Distribution Shape','Skewed Distributions','Bimodal Distributions','QQ Plots','Distribution Review']],
      [7,'Heatmaps & Matrices',['What is a Heatmap?','Color Scales','Correlation Heatmaps','Calendar Heatmaps','Geographic Heatmaps','Confusion Matrices','Pivot Tables Visualization','Cluster Maps','Annotated Heatmaps','Choosing Color Palettes','Accessibility in Color','Heatmap Review']],
      [8,'Geographic & Maps',['Choropleth Maps','Point Maps','Flow Maps','Cartograms','GPS Data Visualization','Population Density Maps','Election Maps','Weather Maps','Crime Heat Maps','Migration Patterns','Interactive Maps','Maps Review']],
      [9,'Interactive Dashboards',['What is a Dashboard?','KPI Selection','Layout & Design','Filters & Slicers','Drill-Down','Linked Charts','Real-Time Data','Dashboard Tools Overview','Google Data Studio','Tableau Basics','Power BI Basics','Dashboard Review']],
      [10,'Storytelling with Data',['What is Data Storytelling?','Narrative Structure','Choosing the Right Chart','Chart Junk vs Clean Design','Edward Tufte Principles','Color Theory for Data','Typography in Charts','Annotations & Labels','Before/After Comparisons','Presentation Skills','Infographics','Storytelling Review']],
      [11,'Advanced Visualization',['Small Multiples','Sparklines','Radar Charts','Parallel Coordinates','Sankey Diagrams','Network Graphs','Word Clouds','Sunburst Charts','Gantt Charts','Waterfall Charts','Animation in Data','Advanced Viz Review']]
    ];

    let n = 0;
    const lessons = [];
    units.forEach(([u, name, titles]) => {
      titles.forEach((t, i) => {
        n++;
        lessons.push({ id: 'edv-'+n, title: t, href: '#', unit: u, unitName: name, category: 'data', checkpoint: i===titles.length-1 });
      });
    });

    async function loadPath() {
      const container = document.getElementById('learning-path');
      let completed = await getCompletedLessons('exploring-data-visually');
      renderPath(container, lessons, completed);
      onAuthChange(async (user) => {
        completed = await getCompletedLessons('exploring-data-visually');
        renderPath(container, lessons, completed);
      });
    }
    loadPath();
  </script>
</body>
</html>
