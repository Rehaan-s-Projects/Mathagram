<body>
  <nav class="nav">
    <div class="container">

  </header>

  <footer class="footer">
    <div class="container">

  <script type="module">
    import { initNav } from '../../js/nav.js';
    initNav('../../');
    import { renderPath, getCompletedLessons } from '../../js/learning-path.js';
    import { onAuthChange } from '../../js/auth.js';
    document.getElementById('year').textContent = new Date().getFullYear();
    const lessons = [{"id": "bar-charts-and-histograms", "title": "Bar Charts & Histograms", "unit": "Chart Types", "href": "#"}, {"id": "line-graphs-and-trends", "title": "Line Graphs & Trends", "unit": "Chart Types", "href": "#"}, {"id": "pie-charts-and-proportions", "title": "Pie Charts & Proportions", "unit": "Chart Types", "href": "#"}, {"id": "scatter-plots", "title": "Scatter Plots", "unit": "Chart Types", "href": "#"}, {"id": "chart-types-checkpoint", "title": "Chart Types Checkpoint", "unit": "Chart Types", "href": "#", "checkpoint": true}, {"id": "choosing-the-right-chart", "title": "Choosing the Right Chart", "unit": "Visual Design", "href": "#"}, {"id": "color-and-accessibility", "title": "Color & Accessibility", "unit": "Visual Design", "href": "#"}, {"id": "axes-labels-and-legends", "title": "Axes, Labels & Legends", "unit": "Visual Design", "href": "#"}, {"id": "misleading-graphs", "title": "Misleading Graphs", "unit": "Visual Design", "href": "#"}, {"id": "visual-design-checkpoint", "title": "Visual Design Checkpoint", "unit": "Visual Design", "href": "#", "checkpoint": true}, {"id": "dashboards", "title": "Dashboards", "unit": "Data Storytelling", "href": "#"}, {"id": "interactive-visualizations", "title": "Interactive Visualizations", "unit": "Data Storytelling", "href": "#"}, {"id": "infographics", "title": "Infographics", "unit": "Data Storytelling", "href": "#"}, {"id": "presenting-data", "title": "Presenting Data", "unit": "Data Storytelling", "href": "#"}, {"id": "data-visualization-mastery", "title": "Data Visualization Mastery!", "unit": "Data Storytelling", "href": "#", "checkpoint": true}];
    async function loadPath() {
      const container = document.getElementById('learning-path');
      let completed = new Set();
      onAuthChange(async (user) => {
        if (user) completed = await getCompletedLessons('exploring-data-visually');
        renderPath(container, lessons, completed);
      });
      renderPath(container, lessons, completed);
    }
    loadPath();
  </script>
