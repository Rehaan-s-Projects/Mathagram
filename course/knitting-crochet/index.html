<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Knitting &amp; Crochet — Mathagram</title>
  <link rel="icon" href="../../assets/lighthouse/logo.svg">
  <link rel="stylesheet" href="../../css/global.css">
  <link rel="stylesheet" href="../../css/learning-path.css">
  <style>
    .course-header { padding: 80px 24px 24px; text-align: center; }
    .course-badge { display: inline-block; padding: 4px 14px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #fff; border-radius: 999px; margin-bottom: 12px; }
    .course-header h1 { font-size: 2.5rem; font-weight: 800; margin-bottom: 8px; }
    .course-header p { font-size: 1rem; color: var(--color-text-secondary); max-width: 560px; margin: 0 auto; line-height: 1.6; }
    @media (max-width: 768px) { .course-header h1 { font-size: 2rem; } }
  </style>
</head>
<body>
  <nav class="nav"><div class="container"><a href="../../index.html" class="nav-logo"><img src="../../assets/lighthouse/logo.svg" alt="" width="32" height="32"><span>Mathagram</span></a><div class="nav-links"><a href="../../courses.html">Courses</a><a href="../../learning-post.html">Posts</a><a href="../../login.html" data-auth="login">Login</a></div></div></nav>
  <header class="course-header">
    <span class="course-badge" style="background:var(--color-others)">Others</span>
    <h1>Knitting &amp; Crochet</h1>
    <p>Yarn, hooks, needles, stitches, and patterns — from your first scarf to amigurumi, garments, lace, and selling your work. 150 lessons across 10 units.</p>
  </header>
  <div id="learning-path" class="path-container"></div>
  <footer class="footer"><div class="container"><p class="footer-copy">&copy; <span id="year"></span> Mathagram.org — All Rights Reserved.</p></div></footer>
  <script type="module">
    import { initNav } from '../../js/nav.js';
    initNav('../../');
    import { renderPath, getCompletedLessons } from '../../js/learning-path.js';
    import { onAuthChange } from '../../js/auth.js';
    document.getElementById('year').textContent = new Date().getFullYear();
    const units = [
      [1,"Tools & Materials",["Yarn Weights","Yarn Fibers — Wool Cotton Acrylic","Knitting Needles","Crochet Hooks","Stitch Markers","Tapestry Needles","Row Counters","Scissors & Notions","Project Bags","Blocking Mats","Reading Yarn Labels","Gauge Swatches","Choosing the Right Yarn","Storage & Care","Tools Checkpoint"]],
      [2,"Knitting Foundations",["Long-Tail Cast On","Cable Cast On","Knit Stitch","Purl Stitch","Garter Stitch","Stockinette","Rib Stitch","Seed Stitch","Binding Off","Slipped Stitches","Knitting in the Round","DPNs","Magic Loop","Fixing Mistakes","Knitting Basics Checkpoint"]],
      [3,"Crochet Foundations",["Slip Knot","Chain Stitch","Single Crochet","Half Double Crochet","Double Crochet","Treble Crochet","Slip Stitch","Magic Ring","Working in Rows","Working in the Round","Turning Chains","Front vs Back Loop","Reading Crochet Charts","Fixing Mistakes","Crochet Basics Checkpoint"]],
      [4,"Knit Stitch Patterns",["Cables","Cable Needles","Bobbles","Lace Stitches","Yarn Overs","SSK & K2tog","Increases (M1L M1R)","Brioche","Mosaic Knitting","Fair Isle","Intarsia","Entrelac","Linen Stitch","Slip Stitch Colorwork","Knit Patterns Checkpoint"]],
      [5,"Crochet Stitch Patterns",["Granny Squares","Shell Stitch","V-Stitch","Bobble Stitch","Popcorn Stitch","Cluster Stitch","Filet Crochet","Tunisian Crochet","Surface Crochet","Front Post / Back Post","Linked Stitches","Mosaic Crochet","Tapestry Crochet","Broomstick Lace","Crochet Patterns Checkpoint"]],
      [6,"Reading Patterns",["Pattern Anatomy","Abbreviations Glossary","Charts vs Written","Repeats with * and ()","Sizing Notes","Yardage Estimates","Substituting Yarn","Pattern Errata","Choosing a Pattern","Modifying a Pattern","Stitch Counts","Schematic Diagrams","Test Knitting","Designer Etiquette","Reading Patterns Checkpoint"]],
      [7,"Hats, Scarves & Accessories",["Garter Scarf","Ribbed Scarf","Infinity Scarf","Cowl","Beanie — Top-Down","Beanie — Bottom-Up","Slouchy Hat","Beret","Fingerless Mittens","Mittens","Convertible Mittens","Headband","Ear Warmers","Boot Cuffs","Accessories Checkpoint"]],
      [8,"Garments — Sweaters & More",["Top-Down Yoke","Raglan Sweater","Set-In Sleeves","Drop Shoulder","Knitted Cardigan","Crochet Cardigan","Vests","Shawls","Triangle Shawls","Crescent Shawls","Socks — Toe-Up","Socks — Cuff-Down","Heel Techniques","Blocking a Garment","Garments Checkpoint"]],
      [9,"Amigurumi & Toys",["Amigurumi Basics","Magic Ring Recap","Increases & Decreases","Stuffing Techniques","Joining Limbs","Embroidered Faces","Safety Eyes","Animal Shapes","Doll Heads","Articulated Joints","Wireframes for Posing","Teddy Bears","Octopi & Plushies","Holiday Toys","Amigurumi Checkpoint"]],
      [10,"Finishing, Selling & Mastery",["Weaving in Ends","Mattress Stitch Seam","Crochet Seams","Pick Up Stitches","Buttonholes","Steeking","Felting","Wet Blocking","Steam Blocking","Photographing Work","Etsy & Ravelry Selling","Pattern Writing","Pricing Handmade","Care & Washing","Knitting & Crochet Grand Mastery!"]]
    ];
    let n = 0;
    const lessons = [];
    units.forEach(([u, name, titles]) => {
      titles.forEach((t, i) => {
        n++;
        lessons.push({ id: 'kc-'+n, title: t, href: '#', unit: u, unitName: name, category: 'others', checkpoint: i===titles.length-1 });
      });
    });
    async function loadPath() {
      const container = document.getElementById('learning-path');
      let completed = await getCompletedLessons('knitting-crochet');
      renderPath(container, lessons, completed);
      onAuthChange(async (user) => {
        completed = await getCompletedLessons('knitting-crochet');
        renderPath(container, lessons, completed);
      });
    }
    loadPath();
  </script>
</body>
</html>
