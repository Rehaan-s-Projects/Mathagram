<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logical Languages — Mathagram</title>
  <link rel="icon" href="../../assets/lighthouse/logo.svg">
  <link rel="stylesheet" href="../../css/global.css">
  <link rel="stylesheet" href="../../css/learning-path.css">
  <style>
    .course-header { padding: 80px 24px 24px; text-align: center; }
    .course-badge { display: inline-block; padding: 4px 14px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #fff; border-radius: 999px; margin-bottom: 12px; }
    .course-header h1 { font-size: 2.5rem; font-weight: 800; margin-bottom: 8px; }
    .course-header p { font-size: 1rem; color: var(--color-text-secondary); max-width: 560px; margin: 0 auto; line-height: 1.6; }
    @media (max-width: 768px) { .course-header h1 { font-size: 2rem; } }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="container">
      <a href="../../index.html" class="nav-logo">
        <img src="../../assets/lighthouse/logo.svg" alt="" width="32" height="32">
        <span>Mathagram</span>
      </a>
      <div class="nav-links">
        <a href="../../courses.html">Courses</a>
        <a href="../../login.html" data-auth="login">Login</a>
      </div>
    </div>
  </nav>
  <header class="course-header">
    <span class="course-badge" style="background:var(--color-logic)">Logic</span>
    <h1>Logical Languages</h1>
    <p>Venn diagrams, set operations, and arguments.</p>
  </header>
  <div id="learning-path" class="path-container"></div>
  <footer class="footer">
    <div class="container">
      <p class="footer-copy">&copy; <span id="year"></span> Mathagram.org — All Rights Reserved.</p>
    </div>
  </footer>
  <script type="module">
    import { initNav } from '../../js/nav.js';
    initNav('../../');
    import { renderPath, getCompletedLessons } from '../../js/learning-path.js';
    import { onAuthChange } from '../../js/auth.js';
    document.getElementById('year').textContent = new Date().getFullYear();
    const lessons = [{"id": "sets-and-members", "title": "Sets & Members", "unit": "Set Theory", "href": "#"}, {"id": "venn-diagrams", "title": "Venn Diagrams", "unit": "Set Theory", "href": "#"}, {"id": "union-and-intersection", "title": "Union & Intersection", "unit": "Set Theory", "href": "#"}, {"id": "complement-and-difference", "title": "Complement & Difference", "unit": "Set Theory", "href": "#"}, {"id": "set-theory-checkpoint", "title": "Set Theory Checkpoint", "unit": "Set Theory", "href": "#", "checkpoint": true}, {"id": "propositional-logic", "title": "Propositional Logic", "unit": "Formal Logic", "href": "#"}, {"id": "truth-tables", "title": "Truth Tables", "unit": "Formal Logic", "href": "#"}, {"id": "logical-connectives", "title": "Logical Connectives", "unit": "Formal Logic", "href": "#"}, {"id": "quantifiers", "title": "Quantifiers", "unit": "Formal Logic", "href": "#"}, {"id": "formal-logic-checkpoint", "title": "Formal Logic Checkpoint", "unit": "Formal Logic", "href": "#", "checkpoint": true}, {"id": "argument-structure", "title": "Argument Structure", "unit": "Argumentation", "href": "#"}, {"id": "valid-vs-sound", "title": "Valid vs Sound", "unit": "Argumentation", "href": "#"}, {"id": "proof-techniques", "title": "Proof Techniques", "unit": "Argumentation", "href": "#"}, {"id": "symbolic-reasoning", "title": "Symbolic Reasoning", "unit": "Argumentation", "href": "#"}, {"id": "logical-languages-mastery", "title": "Logical Languages Mastery!", "unit": "Argumentation", "href": "#", "checkpoint": true}];
    async function loadPath() {
      const container = document.getElementById('learning-path');
      let completed = await getCompletedLessons('logical-languages');
      renderPath(container, lessons, completed);
      onAuthChange(async (user) => {
        completed = await getCompletedLessons('logical-languages');
        renderPath(container, lessons, completed);
      });
    }
    loadPath();
  </script>
</body>
</html>
