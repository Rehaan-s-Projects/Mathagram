<body>
  <nav class="nav"><div class="container"><a href="../../index.html" class="nav-logo"><img src="../../assets/lighthouse/logo.svg" alt="" width="32" height="32"><span>Mathagram</span></a><div class="nav-links"><a href="../../courses.html">Courses</a><a href="../../learning-post.html">Posts</a><a href="../../login.html" data-auth="login">Login</a></div></div></nav>
  <header class="course-header">
    <span class="course-badge" style="background:var(--color-others)">Others</span>
    <h1>Public Speaking & Debate</h1>
    <p>Speak with confidence — presentations, debates, storytelling, persuasion, body language, and overcoming stage fright. 225 lessons across 15 units.</p>
  </header>
  <div id="learning-path" class="path-container"></div>
  <footer class="footer"><div class="container"><p class="footer-copy">&copy; <span id="year"></span> Mathagram.org — All Rights Reserved.</p></div></footer>
  <script type="module">
    import { initNav } from '../../js/nav.js';
    initNav('../../');
    import { renderPath, getCompletedLessons } from '../../js/learning-path.js';
    import { onAuthChange } from '../../js/auth.js';
    document.getElementById('year').textContent = new Date().getFullYear();
    const units = [
      [1,"Foundations of Speaking",["Why Public Speaking Matters","Overcoming Fear — Stage Fright","Types of Speeches","Know Your Audience","Purpose & Central Message","Ethos Pathos Logos","First Impressions","Voice Projection","Pace & Pausing","Eye Contact","Filler Words — Removing Um Uh","Practice Techniques","Recording Yourself","Feedback & Improvement","Foundations Checkpoint"]],
      [2,"Speech Structure",["Introduction — Hook & Thesis","Body — Main Points","Transitions Between Points","Conclusion — Call to Action","Rule of Three","Chronological Structure","Problem-Solution Structure","Compare-Contrast","Topical Organization","Outline vs Script","Note Cards","Timing Your Speech","Opening Lines That Work","Closing Strong","Structure Checkpoint"]],
      [3,"Body Language",["Posture & Stance","Hand Gestures — Dos & Donts","Facial Expressions","Movement on Stage","Open vs Closed Body Language","Mirroring","Power Poses","Nervous Habits to Avoid","Smiling & Warmth","Walking to the Podium","Sitting While Speaking","Video Call Body Language","Cultural Differences","Reading Others Body Language","Body Language Checkpoint"]],
      [4,"Voice & Delivery",["Breath Control","Diaphragmatic Breathing","Vocal Variety — Pitch","Volume Control","Speed & Rhythm","Emphasis & Stress","Articulation & Diction","Warm-Up Exercises","Monotone — How to Avoid","Whispering for Effect","The Dramatic Pause","Vocal Fry & Uptalk","Microphone Technique","Voice Care — Hydration Rest","Voice Checkpoint"]],
      [5,"Storytelling",["Why Stories Work","Story Structure for Speeches","Personal Anecdotes","Emotional Connection","Vivid Details","Dialogue in Stories","Humor in Storytelling","The Lesson or Moral","Audience Participation","Timing & Pacing Stories","Opening with a Story","Data + Story = Persuasion","Cultural Stories","Building a Story Bank","Storytelling Checkpoint"]],
      [6,"Persuasive Speaking",["The Art of Persuasion","Ethos — Credibility","Pathos — Emotional Appeal","Logos — Logical Argument","Rhetorical Questions","Repetition & Anaphora","Call to Action","Addressing Counter-Arguments","Monroes Motivated Sequence","Social Proof","Scarcity & Urgency","Framing & Reframing","Propaganda vs Persuasion","Ethical Persuasion","Persuasion Checkpoint"]],
      [7,"Debate Fundamentals",["What Is Debate?","Debate Formats — Lincoln-Douglas","Policy Debate","Parliamentary Debate","Public Forum Debate","Constructive & Rebuttal","Cross-Examination","Evidence & Sources","Logical Fallacies","Straw Man & Ad Hominem","Burden of Proof","Flowing — Note-Taking","Judging Criteria","Sportsmanship","Debate Checkpoint"]],
      [8,"Informative Speaking",["Purpose of Informative Speeches","Topic Selection","Research & Credibility","Visual Aids — Slides Props","Explaining Complex Ideas Simply","Demonstrations — How-To","Lecture Style","TED Talk Format","Statistics & Data Presentation","Analogies & Metaphors","Audience Questions — Q&A","Panel Discussions","Webinar Presenting","Training & Teaching","Informative Checkpoint"]],
      [9,"Presentations & Slides",["PowerPoint vs Google Slides vs Keynote","Slide Design Principles","Less Text More Visual","Font & Color Choices","Images That Support","Charts & Graphs","Animations — Subtle","Presenter Notes","Clicker & Remote","Backup Plans — Tech Fails","Handouts","Virtual Presentations — Zoom","Screen Sharing","Presentation Rehearsal","Presentations Checkpoint"]],
      [10,"Special Occasions",["Wedding Toasts","Graduation Speeches","Eulogies","Award Acceptance","Introduction of a Speaker","After-Dinner Speeches","Motivational Speeches","Commencement Addresses","Business Pitches","Elevator Pitch — 60 Seconds","Job Interview Answers","Networking — Small Talk","Impromptu Speaking","Roasts & Humor","Occasions Checkpoint"]],
      [11,"Argumentation & Logic",["Claims & Evidence","Deductive Reasoning","Inductive Reasoning","Analogical Reasoning","Cause & Effect Arguments","Statistical Arguments","Expert Testimony","Anecdotal vs Statistical Evidence","Logical Fallacies — 20 Common","Red Herring","Slippery Slope","False Dilemma","Appeal to Authority","Constructing Sound Arguments","Logic Checkpoint"]],
      [12,"Listening & Responding",["Active Listening","Listening for Main Ideas","Note-Taking During Speeches","Asking Good Questions","Responding to Questions","Thinking on Your Feet","Bridging Technique","Deflecting Hostile Questions","Panel Q&A Management","Handling Hecklers","Giving Constructive Feedback","Receiving Criticism Gracefully","Listening in Debates","Empathetic Listening","Listening Checkpoint"]],
      [13,"Communication Contexts",["One-on-One Conversations","Small Group Discussions","Large Audience — 100+","Virtual Communication","Phone Calls — Professional","Email — Tone & Clarity","Text & Chat — Brevity","Video Messages","Podcast Interviews","Media Interviews — TV Radio","Press Conferences","Town Halls","Classroom Teaching","International & Cross-Cultural","Contexts Checkpoint"]],
      [14,"Advanced Techniques",["Rhetoric — Classical & Modern","Kairos — Timing","Chiasmus & Antithesis","Metaphor & Allegory","Humor — Timing & Delivery","Improvisation","Debate Rebuttals — Advanced","Speed & Spread in Debate","Emotional Intelligence","Reading the Room","Adapting Mid-Speech","Silence as a Tool","Vulnerability on Stage","Signature Phrases","Advanced Checkpoint"]],
      [15,"Public Speaking Mastery",["Foundations Review","Structure & Delivery Review","Body Language Review","Storytelling Review","Persuasion Review","Debate Review","Presentations Review","Special Occasions Review","Logic & Arguments Review","Listening Review","Communication Contexts Review","Advanced Techniques Review","Building Your Speaker Brand","Finding Speaking Opportunities","Public Speaking Mastery!"]],
    ];
    let n = 0;
    const lessons = [];
    units.forEach(([u, name, titles]) => {
      titles.forEach((t, i) => {
        n++;
        lessons.push({ id: 'ps-'+n, title: t, href: '#', unit: u, unitName: name, category: 'others', checkpoint: i===titles.length-1 });
      });
    });
    async function loadPath() {
      const container = document.getElementById('learning-path');
      let completed = await getCompletedLessons('public-speaking');
      renderPath(container, lessons, completed);
      onAuthChange(async (user) => {
        completed = await getCompletedLessons('public-speaking');
        renderPath(container, lessons, completed);
      });
    }
    loadPath();
  </script>
</body>
</html>
