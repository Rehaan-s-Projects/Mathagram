const initialCompleted = await getCompletedLessons('group-theory');
renderPath(container, lessons, initialCompleted);
try {
  onAuthChange(async (user) => {
    const completed = await getCompletedLessons('group-theory');
    renderPath(container, lessons, completed);
  });
} catch(e) {}
