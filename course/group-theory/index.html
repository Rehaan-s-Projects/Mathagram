<body>
<nav class="nav"><div class="container">
  <a href="../../index.html" class="nav-logo"><img src="../../assets/lighthouse/logo.svg" alt="" width="32" height="32"><span>Mathagram</span></a>
  <div class="nav-links"><a href="../../courses.html">Courses</a><a href="../../login.html" data-auth="login">Login</a></div>
</div></nav>
<header class="course-header">
  <span class="course-badge" style="background:var(--color-others)">Others</span>
  <h1>Group Theory</h1>
  <p>Explore the mathematics of symmetry — from basic groups to Galois theory. The foundation of modern abstract algebra. 156 lessons across 12 units.</p>
</header>
<div id="learning-path" class="path-container"></div>
<footer class="footer"><div class="container"><p class="footer-copy">&copy; <span id="year"></span> Mathagram.org — All Rights Reserved.</p></div></footer>
<script>
if ('caches' in window) { caches.keys().then(function(n){n.forEach(function(k){caches.delete(k)})}); }
</script>
<script type="module">
import { initNav } from '../../js/nav.js'; initNav('../../');
import { renderPath, getCompletedLessons } from '../../js/learning-path.js?v=3';
import { onAuthChange } from '../../js/auth.js?v=3';
document.getElementById('year').textContent = new Date().getFullYear();

const units = [
  [1,'Introduction to Groups',['What is a Group?','Binary Operations','Closure Property','Associativity','Identity Element','Inverse Elements','Group Axioms Summary','Examples of Groups (Integers)','Examples of Groups (Rationals)','Clock Arithmetic as a Group','Symmetry & Groups','Rubiks Cube & Group Theory','Group Theory History']],
  [2,'Basic Group Properties',['Order of a Group','Order of an Element','Finite vs Infinite Groups','Abelian (Commutative) Groups','Non-Abelian Groups','Cayley Tables','Reading Cayley Tables','Constructing Cayley Tables','Cyclic Groups','Generators','Klein Four-Group','Dihedral Groups Introduction','Properties Review']],
  [3,'Subgroups',['What is a Subgroup?','Trivial Subgroups','Proper Subgroups','Subgroup Test (Two-Step)','Subgroup Test (One-Step)','Cyclic Subgroups','Center of a Group','Centralizer','Normalizer','Lagranges Theorem','Corollaries of Lagranges Theorem','Index of a Subgroup','Subgroups Review']],
  [4,'Cyclic Groups & Permutations',['Cyclic Group Properties','Subgroups of Cyclic Groups','Euler Totient Function','Permutations','Cycle Notation','Transpositions','Even & Odd Permutations','Symmetric Group Sn','Alternating Group An','Permutation Composition','Sign of a Permutation','Cayley Theorem','Cyclic & Permutations Review']],
  [5,'Cosets & Lagranges Theorem',['Left Cosets','Right Cosets','Coset Properties','Cosets Partition a Group','Lagranges Theorem Proof','Applications of Lagranges Theorem','Fermats Little Theorem from Groups','Eulers Theorem from Groups','Counting Cosets','Index Formula','Cosets in Abelian Groups','Non-Normal Subgroups','Cosets Review']],
  [6,'Normal Subgroups & Quotient Groups',['Normal Subgroups Definition','Testing for Normality','Kernel is Normal','Center is Normal','Simple Groups','Quotient Group Construction','Quotient Group Examples','First Isomorphism Theorem','Second Isomorphism Theorem','Third Isomorphism Theorem','Correspondence Theorem','Factor Groups','Normal & Quotient Review']],
  [7,'Homomorphisms & Isomorphisms',['Group Homomorphism Definition','Examples of Homomorphisms','Kernel of a Homomorphism','Image of a Homomorphism','Properties of Homomorphisms','Isomorphism Definition','Proving Two Groups Isomorphic','Automorphisms','Inner Automorphisms','Automorphism Group','Classification by Isomorphism','Fundamental Homomorphism Theorem','Homomorphisms Review']],
  [8,'Group Actions',['Group Actions Definition','Orbits','Stabilizers','Orbit-Stabilizer Theorem','Fixed Points','Burnside Lemma','Counting with Burnside','Coloring Problems','Conjugacy Classes','Class Equation','Sylows First Theorem','Sylows Second & Third Theorems','Group Actions Review']],
  [9,'Sylow Theory',['p-Groups','Sylow p-Subgroups','Existence of Sylow Subgroups','Conjugacy of Sylow Subgroups','Number of Sylow Subgroups','Applications: Groups of Order pq','Applications: Groups of Order p2q','Classifying Small Groups','Groups of Order 8','Groups of Order 12','Semi-Direct Products','Sylow Theory in Practice','Sylow Review']],
  [10,'Ring Theory Introduction',['What is a Ring?','Ring Axioms','Commutative Rings','Unity & Units','Zero Divisors','Integral Domains','Fields','Ring Homomorphisms','Ideals','Principal Ideals','Quotient Rings','Polynomial Rings','Ring Theory Review']],
  [11,'Field Theory & Galois Theory',['Field Extensions','Degree of Extension','Algebraic vs Transcendental','Minimal Polynomial','Splitting Fields','Algebraic Closure','Galois Group Definition','Fundamental Theorem of Galois Theory','Solvability by Radicals','Insolvability of the Quintic','Constructible Numbers','Galois Theory Applications','Field & Galois Review']],
  [12,'Applications & Advanced Topics',['Symmetry in Physics','Crystallographic Groups','Molecular Symmetry','Error-Correcting Codes','Cryptography & Groups','Elliptic Curves','Topological Groups Preview','Lie Groups Preview','Representation Theory Preview','Category Theory Preview','Group Theory in Computer Science','Open Problems in Group Theory','Group Theory Mastery!']]
];
let n = 0;
const lessons = [];
units.forEach(([u, name, titles]) => {
  titles.forEach((t, i) => {
    n++;
    lessons.push({ id: 'gt-'+n, title: t, href: '#', unit: u, unitName: name, category: 'others', checkpoint: i===titles.length-1 });
  });
});
const container = document.getElementById('learning-path');
renderPath(container, lessons, new Set());
try {
  onAuthChange(async (user) => {
    if (user) {
      const completed = await getCompletedLessons('group-theory');
      renderPath(container, lessons, completed);
    }
  });
} catch(e) {}
</script>
</body>
</html>
