      [8,"Future & Compound Tenses",["Future Formation","Future Plans","Predictions","Conditional Sentences","Imperative Commands","Subjunctive","Passive Voice","Causative Verbs","Habitual Aspect","Compound Tenses","Tense Review","Mixed Practice","Advanced Conjugation","Reading Comprehension","Future Checkpoint"]],

    ];
    let n = 0;
    const lessons = [];
    units.forEach(([u, name, titles]) => {
      titles.forEach((t, i) => {
        n++;
        lessons.push({ id: 'ben-'+n, title: t, href: '#', unit: u, unitName: name, category: 'language', checkpoint: i===titles.length-1 });
      });
    });
    async function loadPath() {
      const container = document.getElementById('learning-path');
      let completed = await getCompletedLessons('bengali');
      renderPath(container, lessons, completed);
      onAuthChange(async (user) => {
        completed = await getCompletedLessons('bengali');
        renderPath(container, lessons, completed);
      });
    }
    loadPath();
  </script>
