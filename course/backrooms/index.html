    document.getElementById('year').textContent = new Date().getFullYear();

    const units = [
      [1, 'Introduction to the Backrooms', ['What Are the Backrooms?','The Origin Story (4chan 2019)','How to No-Clip into the Backrooms','The Infinite Office \u2014 Level 0','The Yellow Wallpaper','Fluorescent Lights Buzz','The Smell of Wet Carpet','No Windows No Exits','The Feeling of Being Watched','Survival Rule #1: Keep Moving','Survival Rule #2: Trust No One','Survival Rule #3: Don\'t Run','Almond Water \u2014 Your Best Friend','Sanity & Mental Health','The Hum of the Lights','Time Doesn\'t Work Here','The Backrooms Wiki Overview','Canon vs Fanon','Different Canons Explained','MEG (Major Explorer Group)','Introduction Review']],
      [2, 'The Main Levels (0-9)', ['Level 0 \u2014 The Lobby','Level 0 Survival Guide','Level 1 \u2014 Habitable Zone','Level 1 Warehouse Corridors','Level 2 \u2014 Pipe Dreams','Level 2 Dark Hallways & Steam','Level 3 \u2014 Electrical Station','Level 3 Power Grid Maze','Level 4 \u2014 Abandoned Office','Level 4 Cubicle Labyrinth','Level 5 \u2014 Terror Hotel','Level 5 Never-Ending Hallways','Level 6 \u2014 Lights Out','Level 6 Total Darkness Survival','Level 7 \u2014 Thalassophobia','Level 7 Ocean of Murky Water','Level 8 \u2014 Cave System','Level 8 Underground Passages','Level 9 \u2014 The Suburbs','Level 9 Abandoned Neighborhood','Main Levels Review']],

      [4, 'Entities', ['What Are Entities?','Entity Classification System','Skin-Stealers','The Smiler','Hounds','Facelings','Clumps','Wretches','Death Moths','Dullers','Bursters','The Beast of Level 5','Jerry','Partygoers (=))','The Partypoopers','Windows Entity','The Thing on Level 7','Neighborhood Watch Entities','Entity Survival Strategies','Entity Encounter Protocol','Entities Review']],

      [7, 'Theories & Lore', ['The Nature of the Backrooms','Dimensional Theory','Simulation Theory','Quantum No-Clipping','Why Does It Exist?','Who Built It?','The Backrooms is Alive Theory','Level Generation Mechanics','How New Levels Form','The Connection to Our Reality','Dreams & the Backrooms','Parallel Backrooms','The Frontrooms (Our World)','The True Ending Theory','The Architect Theory','The Bacterial Colony Theory','The Afterlife Theory','The Prison Theory','The Test Theory','Unresolved Mysteries','Theories Review']],
      [8, 'Survival Guide', ['Essential Supplies Checklist','Navigation Without Landmarks','Marking Your Path','Water Purification','Food Gathering & Rationing','Building a Shelter','Fire in the Backrooms','First Aid & Injuries','Dealing with Isolation','Maintaining Sanity','Sleep Strategies','Entity Avoidance Tactics','When to Fight vs Flee','Level Transition Methods','Finding Exits','Safe Level Bases','Long-Term Survival','Rescue Protocols','Communication Signals','Documenting Your Journey','Survival Mastery']],
      [9, 'The Backrooms in Media', ['The Original Creepypasta','r/backrooms Subreddit','The Backrooms Wiki Growth','Kane Pixels YouTube Series','Kane Pixels Analysis','Found Footage Style','The Backrooms Game (Steam)','Other Backrooms Games','Backrooms Roblox Experiences','Backrooms in Minecraft','A-24 Movie Announcement','Fan Films & Animations','Backrooms Music & Soundscapes','Liminal Spaces Connection','Kenopsia & Liminal Aesthetics','Nostalgia & Uncanny Valley','The Internet Horror Genre','SCP Foundation Comparison','Analog Horror Connection','Creating Your Own Backrooms Content','Backrooms Mastery!']]
    ];

    let lessonNum = 0;
    const lessons = [];
    units.forEach(([unitNum, unitName, titles]) => {
      titles.forEach((title, i) => {
        lessonNum++;
        lessons.push({
          id: 'br-' + lessonNum,
          title: title,
          href: '#',
          unit: unitNum,
          unitName: unitName,
          category: 'others',
          checkpoint: i === titles.length - 1
        });
      });
    });

    async function loadPath() {
      const container = document.getElementById('learning-path');
      let completed = new Set();
      onAuthChange(async (user) => {
        if (user) completed = await getCompletedLessons('backrooms');
        renderPath(container, lessons, completed);
      });
      renderPath(container, lessons, completed);
    }
    loadPath();
  </script>
