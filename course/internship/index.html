  <header class="course-header">

      [6, 'Workplace Skills', ['Professional Email Etiquette','Slack & Team Communication','Meeting Etiquette','Time Management at Work','Prioritizing Tasks','Taking Initiative','Asking for Help','Receiving Feedback Gracefully','Giving Constructive Feedback','Working in Teams','Remote Work Best Practices','Office Culture & Norms','Confidentiality & Professionalism','Managing Stress at Work','Workplace Skills Review']],
      [7, 'On the Job', ['Your First Day','Setting Expectations with Your Manager','Learning the Tools & Systems','Taking Notes & Documenting','Building Relationships with Colleagues','Finding a Mentor','Weekly Check-Ins','Tracking Your Accomplishments','Going Above & Beyond','Presenting Your Work','Handling Mistakes','Adapting to Feedback','Mid-Internship Self-Assessment','Asking for More Responsibility','On the Job Review']],

      [10, 'Remote Internship Skills', ['Remote Work Culture','Setting Up Your Home Office','Virtual Communication Tools','Video Call Best Practices','Async Communication','Managing Your Schedule Remotely','Staying Visible & Engaged','Remote Team Building','Time Zone Management','Documenting Work Remotely','Virtual Networking','Overcoming Isolation','Remote Productivity Tips','Remote Internship Review']],

      [13, 'Portfolio Building', ['Why Build a Portfolio?','Choosing What to Include','Writing Case Studies','Documenting Projects','Before & After Showcases','Quantifying Your Impact','Photography & Visual Evidence','Building a Personal Website','GitHub & Code Portfolios','Design Portfolios','Writing Portfolios','Video Portfolios','Keeping It Updated','Portfolio Review']],
      [14, 'Entrepreneurial Internships', ['Startup Culture Overview','Working at a Startup','Wearing Many Hats','Startup vs Corporate Culture','Equity & Stock Options Basics','Learning from Founders','Rapid Skill Development','Building Products from Scratch','Handling Ambiguity','Startup Failure & Resilience','Intrapreneurship','Starting Your Own Thing','Startup Ecosystem','Entrepreneurial Review']],
      [15, 'STEM Internship Prep', ['Research Internships','Lab Safety & Protocols','Scientific Writing','Data Analysis Skills','Programming for Internships','Statistical Tools','Presentation of Research','Working with Advisors','REU Programs','Conference Presentations','Publishing as an Intern','Patent & IP in STEM','Graduate School Pathways','STEM Internship Review']],
      [16, 'Leadership Development', ['What Is Leadership?','Leadership Styles','Leading Without Authority','Communication for Leaders','Delegation Skills','Conflict Resolution','Decision Making Under Pressure','Mentoring Others','Building Team Trust','Emotional Intelligence','Giving Effective Presentations','Running Meetings','Leading Projects','Leadership Review']],

      [18, 'Remote Internship Skills', ['Remote Work Mindset','Setting Up a Productive Home Office','Virtual Communication Mastery','Slack & Teams Power User Tips','Video Call Presence & Confidence','Asynchronous Work Best Practices','Time Management Without Supervision','Staying Visible to Your Manager','Building Relationships Remotely','Virtual Coffee Chats','Documenting Your Work Daily','Remote Collaboration Tools','Overcoming Loneliness & Isolation','Thriving in a Distributed Team','Remote Internship Skills Review']],
      [19, 'Startup vs Corporate Internships', ['Startup Culture Explained','Corporate Culture Explained','Pace & Structure Differences','Learning Opportunities Compared','Mentorship in Startups vs Corporates','Compensation & Perks','Career Growth Paths','Risk & Stability','Innovation & Bureaucracy','Networking Differences','Resume Impact','Choosing What Fits You','Hybrid & Mid-Size Companies','Making the Most of Either','Startup vs Corporate Review']],

      [21, 'Building a Portfolio', ['Why Every Intern Needs a Portfolio','Choosing Your Best Work','Writing Project Descriptions','Before & After Case Studies','Quantifying Your Contributions','Screenshots & Visual Documentation','Building a Portfolio Website','GitHub Profile Optimization','Writing a Technical Blog','Creating Video Demos','Design Portfolio Best Practices','Writing Portfolio Tips','Keeping It Updated & Relevant','Sharing Your Portfolio Effectively','Building a Portfolio Review']],
      [22, 'Networking Strategies', ['Why Networking Is Essential','Building Your Network Early','LinkedIn Advanced Strategies','Informational Interview Mastery','Networking at Conferences','Alumni Network Leverage','Industry Meetups & Events','Online Communities & Forums','The Art of the Follow-Up','Building Genuine Relationships','Networking for Introverts','Creating a Networking Plan','Giving Before You Ask','Maintaining Long-Term Connections','Networking Strategies Review']],
      [23, 'Turning Internship into Full-Time', ['Signaling Your Interest Early','Exceeding Expectations','Building Internal Advocates','Understanding the Conversion Process','Timing Your Conversations','Negotiating a Full-Time Offer','What If There\'s No Open Role?','Staying Connected After Internship','Leveraging Return Offers','Evaluating the Full-Time Opportunity','Competing Offers Strategy','The Transition from Intern to Employee','First 90 Days as Full-Time','Long-Term Career Planning','Internship to Full-Time Review']],
      [24, 'Internship Abroad', ['Why Intern Abroad?','Finding International Opportunities','Visa & Work Authorization','Cultural Adaptation Strategies','Language Barriers & Solutions','Cost Planning & Budgeting','Housing & Logistics Abroad','Health & Safety Abroad','Cross-Cultural Communication','Working in Different Time Zones','Building a Global Network','Adding International Experience to Resume','Reverse Culture Shock','Making the Most of the Experience','Internship Abroad Review']],
      [25, 'Entrepreneurship as Alternative', ['Why Consider Entrepreneurship?','Identifying Problems to Solve','Validating Your Idea','Lean Startup Methodology','Building a Minimum Viable Product','Finding Co-Founders','Bootstrapping vs Fundraising','Pitching Your Idea','Incubators & Accelerators','Freelancing as a Start','Side Projects & Side Hustles','Learning from Failed Ventures','Entrepreneurial Mindset','When to Take the Leap','Entrepreneurship Review']]
    ];

    let lessonNum = 0;
    const lessons = [];
    units.forEach(([unitNum, unitName, titles]) => {
      titles.forEach((title, i) => {
        lessonNum++;
        lessons.push({
          id: 'intern-' + lessonNum,
          title: title,
          href: '#',
          unit: unitNum,
          unitName: unitName,
          category: 'others',
          checkpoint: i === titles.length - 1
        });
      });
    });

    async function loadPath() {
      const container = document.getElementById('learning-path');
      let completed = await getCompletedLessons('internship');
      renderPath(container, lessons, completed);
      onAuthChange(async (user) => {
        completed = await getCompletedLessons('internship');
        renderPath(container, lessons, completed);
      });
    }
    loadPath();
  </script>
</body>
</html>
