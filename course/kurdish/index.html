<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kurdish (Kurmanji) — Mathagram</title>
  <link rel="icon" href="../../assets/lighthouse/logo.svg">
  <link rel="stylesheet" href="../../css/global.css">
  <link rel="stylesheet" href="../../css/learning-path.css">
  <style>
    .course-header { padding: 80px 24px 24px; text-align: center; }
    .course-badge { display: inline-block; padding: 4px 14px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #fff; border-radius: 999px; margin-bottom: 12px; }
    .course-header h1 { font-size: 2.5rem; font-weight: 800; margin-bottom: 8px; }
    .course-header p { font-size: 1rem; color: var(--color-text-secondary); max-width: 560px; margin: 0 auto; line-height: 1.6; }
    @media (max-width: 768px) { .course-header h1 { font-size: 2rem; } }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="container">
      <a href="../../index.html" class="nav-logo">
        <img src="../../assets/lighthouse/logo.svg" alt="" width="32" height="32">
        <span>Mathagram</span>
      </a>
      <div class="nav-links">
        <a href="../../courses.html">Courses</a>
        <a href="../../login.html" data-auth="login">Login</a>
      </div>
    </div>
  </nav>
  <header class="course-header">
    <span class="course-badge" style="background:var(--color-language)">Language</span>
    <h1>Kurdish (Kurmanji)</h1>
    <p>Learn Kurdish (Kurmanji) — spoken by 20 million Kurds across Turkey, Iraq, Syria, and Iran. 111 lessons across 8 units.</p>
  </header>
  <div id="learning-path" class="path-container"></div>
  <footer class="footer">
    <div class="container">
      <p class="footer-copy">&copy; <span id="year"></span> Mathagram.org — All Rights Reserved.</p>
    </div>
  </footer>
  <script type="module">
    import { initNav } from '../../js/nav.js';
    initNav('../../');
    import { renderPath, getCompletedLessons } from '../../js/learning-path.js';
    import { onAuthChange } from '../../js/auth.js';
    document.getElementById('year').textContent = new Date().getFullYear();
    const units = [
      [1,'Kurdish Alphabet',['Latin Script Overview','Vowels (a e ê i î o u û)','Consonants','Special Letters (ç ş x)','Pronunciation Rules','Numbers 1-20','Numbers 21-100','Days & Months','Colors','Greetings (Silav Merheba)','Introductions','Formal vs Informal','Alphabet Review','Script Practice']],
      [2,'Grammar Basics',['Gender (Masculine/Feminine)','Definite & Indefinite','Plural Formation','Pronouns (Ez Tu Ew)','Possessives','Postpositions','Word Order','Question Words','Negative Sentences','Ezafe Construction','Adjective Agreement','Cases (Nominative Oblique)','Grammar Practice','Grammar Review']],
      [3,'Verb System',['Verb Roots','Present Tense','Past Simple','Past Continuous','Future Tense','Imperative','Modal Verbs','Compound Verbs','Negative Verbs','Questions with Verbs','Common Irregular Verbs','Verb Practice 1','Verb Practice 2','Verbs Review']],
      [4,'Daily Life',['Family (Malbat)','Food (Xwarin)','Home (Mal)','Clothing','Shopping (Bazaar)','At the Restaurant','Weather','Time Telling','Health & Body','At the Doctor','School & Education','Work & Jobs','Daily Conversations','Daily Life Review']],
      [5,'Kurdish Culture',['Kurdish History Overview','Kurdistan Geography','Newroz Festival','Kurdish Music','Kurdish Dance','Kurdish Cuisine (Dolma Kebab)','Poetry Tradition','Famous Kurds','Peshmerga History','Kurdish Dress','Hospitality Culture','Proverbs & Sayings','Cultural Etiquette','Culture Review']],
      [6,'Travel & Places',['Erbil','Diyarbakir','Sulaymaniyah','Duhok','Kurdish Mountains','Rivers & Lakes','At the Border','Transportation','Hotel & Accommodation','Asking Directions','Emergency Situations','Tourist Sites','Travel Conversations','Travel Review']],
      [7,'Advanced Grammar',['Relative Clauses','Passive Voice','Reported Speech','Complex Sentences','Subjunctive','Conditional','Conjunctions','Adverbs','Comparatives & Superlatives','Formal Writing','Dialectal Differences (Kurmanji vs Sorani)','Sorani Script Intro','Error Correction','Advanced Review']],
      [8,'Fluency & Mastery',['Conversation Practice 1','Conversation Practice 2','Storytelling','Opinion Expressing','Debate Skills','Reading Practice 1','Reading Practice 2','Writing Practice','Listening Practice','Idioms & Expressions','News Reading','Song Lyrics','Kurdish Mastery!']]
    ];
    let n = 0;
    const lessons = [];
    units.forEach(([u, name, titles]) => {
      titles.forEach((t, i) => {
        n++;
        lessons.push({ id: 'ku-'+n, title: t, href: '#', unit: u, unitName: name, category: 'language', checkpoint: i===titles.length-1 });
      });
    });
    async function loadPath() {
      const container = document.getElementById('learning-path');
      let completed = new Set();
      onAuthChange(async (user) => {
        if (user) completed = await getCompletedLessons('kurdish');
        renderPath(container, lessons, completed);
      });
      renderPath(container, lessons, completed);
    }
    loadPath();
  </script>
</body>
</html>
