<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Knot Tying — Mathagram</title>
  <link rel="icon" href="../../assets/lighthouse/logo.svg">
  <link rel="stylesheet" href="../../css/global.css">
  <link rel="stylesheet" href="../../css/learning-path.css">
  <style>
    .course-header { padding: 80px 24px 24px; text-align: center; }
    .course-badge { display: inline-block; padding: 4px 14px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #fff; border-radius: 999px; margin-bottom: 12px; }
    .course-header h1 { font-size: 2.5rem; font-weight: 800; margin-bottom: 8px; }
    .course-header p { font-size: 1rem; color: var(--color-text-secondary); max-width: 560px; margin: 0 auto; line-height: 1.6; }
    @media (max-width: 768px) { .course-header h1 { font-size: 2rem; } }
  </style>
</head>
<body>
  <nav class="nav"><div class="container"><a href="../../index.html" class="nav-logo"><img src="../../assets/lighthouse/logo.svg" alt="" width="32" height="32"><span>Mathagram</span></a><div class="nav-links"><a href="../../courses.html">Courses</a><a href="../../learning-post.html">Posts</a><a href="../../login.html" data-auth="login">Login</a></div></div></nav>
  <header class="course-header">
    <span class="course-badge" style="background:var(--color-others)">Others</span>
    <h1>Knot Tying</h1>
    <p>From bowlines to bowknots — every knot you need: stoppers, bends, loops, hitches, lashings, decorative knots, climbing, sailing, and rescue knots. 150 lessons across 10 units.</p>
  </header>
  <div id="learning-path" class="path-container"></div>
  <footer class="footer"><div class="container"><p class="footer-copy">&copy; <span id="year"></span> Mathagram.org — All Rights Reserved.</p></div></footer>
  <script type="module">
    import { initNav } from '../../js/nav.js';
    initNav('../../');
    import { renderPath, getCompletedLessons } from '../../js/learning-path.js';
    import { onAuthChange } from '../../js/auth.js';
    document.getElementById('year').textContent = new Date().getFullYear();
    const units = [
      [1,"Knot Vocabulary",["Bight","Loop","Round Turn","Standing Part","Working End","Tail","Dressing a Knot","Setting a Knot","Slip Knot Concept","Reef vs Granny","Knot Strength","Rope Materials","Cordage Sizes","Knot Names — ABoK","Vocabulary Checkpoint"]],
      [2,"Stopper Knots",["Overhand Knot","Figure 8","Double Overhand","Stevedore","Ashley's Stopper","Heaving Line Knot","Monkey's Fist","Lanyard Knot","Diamond Knot","Wall Knot","Crown Knot","Matthew Walker","Manrope Knot","Rope End Whipping","Stoppers Checkpoint"]],
      [3,"Bends — Joining Two Lines",["Sheet Bend","Double Sheet Bend","Carrick Bend","Double Carrick","Square (Reef) Knot","Granny (Don't Use)","Surgeon's Knot","Water Knot","Zeppelin Bend","Hunter's Bend","Ashley's Bend","Alpine Butterfly Bend","Fisherman's Knot","Double Fisherman","Bends Checkpoint"]],
      [4,"Loops",["Bowline","Bowline on a Bight","Spanish Bowline","Triple Bowline","Running Bowline","Figure-8 Loop","Alpine Butterfly Loop","Inline Figure-8","Bowstring Knot","Honda Knot","Eskimo Bowline","Yosemite Bowline","Angler's Loop","Perfection Loop","Loops Checkpoint"]],
      [5,"Hitches",["Half Hitch","Two Half Hitches","Clove Hitch","Cow Hitch","Lark's Head","Timber Hitch","Killick Hitch","Pile Hitch","Rolling Hitch","Buntline Hitch","Anchor Bend","Fisherman's Bend","Magnus Hitch","Constrictor Knot","Hitches Checkpoint"]],
      [6,"Lashings & Bindings",["Square Lashing","Diagonal Lashing","Sheer Lashing","Tripod Lashing","Floor Lashing","Round Lashing","Spar Lashing","Constrictor Binding","Boa Constrictor","Strangle Knot","Stein Knot","Surgeon's Tie","Pioneer Bridge","A-Frame Construction","Lashings Checkpoint"]],
      [7,"Decorative Knots",["Turk's Head","Globe Knot","Footrope Knot","Lanyard Braid","Round Braid","Flat Braid","Crown Sinnet","Square Sinnet","Cobra Stitch (Paracord)","King Cobra","Solomon Knot","Celtic Button","Chinese Button","Three-Loop Decorative","Decorative Checkpoint"]],
      [8,"Climbing Knots",["Figure-8 Follow Through","Double Figure-8","Bunny Ears","Munter Hitch","Klemheist","Prusik","Bachmann Hitch","Autoblock (French Prusik)","Alpine Butterfly","Tibloc/Mechanical Equivalents","Anchor Equalization","Three-Piece Anchor","EDK (European Death Knot)","Knot Failure Modes","Climbing Knots Checkpoint"]],
      [9,"Sailing & Rescue Knots",["Bowline Boater Loop","Cleat Hitch","Stopper Knot for Sheets","Reefing Lines","Anchor Hitch","Rolling Hitch on Halyards","Trucker's Hitch","Truckie Mountaineer's","Rescue Loop","Bottle Sling","Highwayman's Hitch","Tautline Hitch","Mooring Hitch","Pile Hitch on Bollard","Sailing & Rescue Checkpoint"]],
      [10,"Practice & Mastery",["Practice Cord Setup","Tying Behind Your Back","Memory Aids","Common Mistakes","Daily Knot Drill","Inspection Routines","Storing Cordage","Repairing Frayed Rope","Knots in Survival","Knots in First Aid","Teaching Knots","Knot Books — ABoK","Knot Apps","Joining Guilds & Forums","Knot Tying Grand Mastery!"]]
    ];
    let n = 0;
    const lessons = [];
    units.forEach(([u, name, titles]) => {
      titles.forEach((t, i) => {
        n++;
        lessons.push({ id: 'knot-'+n, title: t, href: '#', unit: u, unitName: name, category: 'others', checkpoint: i===titles.length-1 });
      });
    });
    async function loadPath() {
      const container = document.getElementById('learning-path');
      let completed = await getCompletedLessons('knot-tying');
      renderPath(container, lessons, completed);
      onAuthChange(async (user) => {
        completed = await getCompletedLessons('knot-tying');
        renderPath(container, lessons, completed);
      });
    }
    loadPath();
  </script>
</body>
</html>
