<body>
  <nav class="nav">
    <div class="container">

  <header class="course-header">
    <span class="course-badge" style="background:var(--color-logic)">Logic</span>
    <h1>Proof Techniques</h1>
    <p>Direct proof, contradiction, induction, contrapositive, construction, and advanced proof methods for math. 15 units, 225 lessons.</p>
  </header>
  <div id="learning-path" class="path-container"></div>
  <footer class="footer">
    <div class="container">
      <p class="footer-copy">&copy; <span id="year"></span> Mathagram.org — All Rights Reserved.</p>
    </div>
  </footer>
  <script type="module">
    import { initNav } from '../../js/nav.js';
    initNav('../../');
    import { renderPath, getCompletedLessons } from '../../js/learning-path.js';
    import { onAuthChange } from '../../js/auth.js';
    document.getElementById('year').textContent = new Date().getFullYear();
    const units = [
      [1,'What Is a Proof?',['Statements & Propositions','Axioms & Definitions','Theorems, Lemmas, Corollaries','Conjectures','Logical Structure of Proofs','Proof vs Evidence','History of Proof','Euclid\'s Elements','Modern Proof Standards','Reading a Proof','Understanding Before Writing','Scratch Work vs Formal Proof','Common Proof Errors','Proof-Writing Style','Intro Checkpoint']],
      [2,'Direct Proof',['If P Then Q','Proving Implications Directly','Even & Odd Numbers','Divisibility Proofs','Sum of Integers','Properties of Rationals','Algebraic Identities','Inequalities','Absolute Value','Triangle Inequality','Proof by Algebra','Proof by Substitution','Multi-Step Direct Proofs','Practice Set','Direct Proof Checkpoint']],
      [3,'Proof by Contrapositive',['Contrapositive ¬Q → ¬P','When to Use Contrapositive','If n² Is Even Then n Is Even','Irrational Number Proofs','Divisibility Contrapositives','Inequality Contrapositives','Logical Equivalence','Inverse vs Converse vs Contrapositive','Combining with Direct Proof','Negating Complex Statements','Negating Quantifiers','Practice: Choosing Strategy','Multi-Step Contrapositives','Common Mistakes','Contrapositive Checkpoint']],
      [4,'Proof by Contradiction',['Assume the Opposite','√2 Is Irrational','Infinitely Many Primes','No Largest Integer','Irrationality of √3','Sum of Rational & Irrational','Proof vs Contrapositive','When Contradiction Is Best','Finding the Contradiction','Indirect Proof Strategy','Reductio Ad Absurdum','Proof of Impossibility','Nonconstructive Proofs','Practice Set','Contradiction Checkpoint']],
      [5,'Mathematical Induction',['Principle of Induction','Base Case','Inductive Step','Inductive Hypothesis','Sum Formulas','Inequality Proofs','Divisibility by Induction','Geometric Sum','Fibonacci Identities','Tower of Hanoi','Strong Induction','Well-Ordering Principle','Structural Induction','Common Induction Errors','Induction Checkpoint']],
      [6,'Proof by Cases',['Exhaustive Cases','Even/Odd Split','Triangle Inequality Cases','Absolute Value Cases','Min/Max Cases','Modular Arithmetic Cases','Sign Cases','Proof by Division into Cases','Combining Cases','Without Loss of Generality (WLOG)','Symmetry Arguments','Pigeonhole as Cases','Optimizing Case Splits','Practice Set','Cases Checkpoint']],
      [7,'Existence & Uniqueness',['Constructive Existence','Nonconstructive Existence','Existence via Contradiction','Existence via Pigeonhole','Existence via IVT','Uniqueness Proofs','Assume Two & Show Equal','Existence & Uniqueness Combined','Fixed Point Theorems','Existence in Algebra','Existence in Analysis','Existence in Combinatorics','Cantor\'s Diagonal as Existence','Practice Set','Existence Checkpoint']],
      [8,'Counting & Combinatorial Proofs',['Combinatorial Identities','Double Counting','Bijective Proofs','Vandermonde\'s Identity','Hockey Stick Identity','Binomial Theorem Proof','Inclusion-Exclusion','Pigeonhole Principle Proofs','Ramsey-Type Arguments','Counting in Two Ways','Generating Functions (Intro)','Catalan Numbers','Stirling Numbers','Practice Set','Combinatorial Checkpoint']],
      [9,'Proof in Number Theory',['Division Algorithm','GCD & Euclidean Algorithm','Bézout\'s Identity','Fundamental Theorem of Arithmetic','Modular Arithmetic Proofs','Fermat\'s Little Theorem','Wilson\'s Theorem','Chinese Remainder Theorem','Quadratic Residues','Euler\'s Totient','Perfect Numbers','Mersenne Primes','Diophantine Equations','Practice Set','Number Theory Checkpoint']],
      [10,'Proof in Analysis',['Epsilon-Delta Proofs','Limit Proofs','Continuity Proofs','Squeeze Theorem Proof','IVT Proof','EVT Proof','Mean Value Theorem Proof','Bolzano-Weierstrass','Cauchy Sequences','Completeness of ℝ','Series Convergence Proofs','Uniform Continuity','Uniform Convergence','Practice Set','Analysis Checkpoint']],
      [11,'Proof in Algebra',['Group Axiom Verification','Subgroup Tests','Lagrange\'s Theorem','Homomorphism Properties','Isomorphism Theorems','Ring Proofs','Ideal Properties','Field Extensions','Vector Space Proofs','Linear Independence','Dimension Theorem','Cayley\'s Theorem','Sylow Theorems (Statements)','Practice Set','Algebra Checkpoint']],
      [12,'Proof in Discrete Math',['Graph Theory Proofs','Euler Paths/Circuits','Tree Properties','Planar Graph Proofs','Coloring Proofs','Matching Proofs','Network Flow','Recurrence Relations','Generating Functions','Burnside\'s Lemma','Pólya Counting','Boolean Algebra Proofs','Lattice Proofs','Practice Set','Discrete Checkpoint']],
      [13,'Advanced Proof Techniques',['Transfinite Induction','Zorn\'s Lemma Applications','Well-Ordering Applications','Diagonal Arguments','Compactness Arguments','Category Theory Proofs','Probabilistic Method','Algebraic Proofs of Combinatorics','Topological Proofs','Analytic Number Theory','Model Theory Proofs','Forcing (Conceptual)','Computer-Assisted Proofs','Four Color Theorem Story','Advanced Checkpoint']],
      [14,'Proof Communication',['Writing Clear Proofs','Logical Flow','Paragraph Proofs','Two-Column Proofs','Proof by Picture','Diagrams & Illustrations','LaTeX for Proofs','Presenting Proofs Orally','Peer Review of Proofs','Referee Reports','Common Style Guides','Journal Standards','Beamer Presentations','Teaching Proofs','Communication Checkpoint']],
      [15,'Mastery',['Proof Strategy Selection','Speed Proofs','Proof Portfolio','Classic Proofs Collection','Open Problems','Competitions — Putnam, IMO','Research-Level Proofs','Self-Assessment','Books & Resources','Online Communities','Creating New Proofs','Mentoring Others','Reflection','Study Plan','Proof Techniques Mastery!']]
    ];
    let n = 0;
    const lessons = [];
    units.forEach(([u, name, titles]) => {
      titles.forEach((t, i) => {
        n++;
        lessons.push({ id: 'pro-'+n, title: t, href: '#', unit: u, unitName: name, category: 'logic', checkpoint: i===titles.length-1 });
      });
    });
    async function loadPath() {
      const container = document.getElementById('learning-path');
      let completed = await getCompletedLessons('proof-techniques');
      renderPath(container, lessons, completed);
      onAuthChange(async (user) => {
        completed = await getCompletedLessons('proof-techniques');
        renderPath(container, lessons, completed);
      });
    }
    loadPath();
  </script>
</body>
</html>
