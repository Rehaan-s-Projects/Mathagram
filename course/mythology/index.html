<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mythology & Folklore — Mathagram</title>
  <link rel="icon" href="../../assets/lighthouse/logo.svg">
  <link rel="stylesheet" href="../../css/global.css">
  <link rel="stylesheet" href="../../css/learning-path.css">
  <style>
    .course-header { padding: 80px 24px 24px; text-align: center; }
    .course-badge { display: inline-block; padding: 4px 14px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #fff; border-radius: 999px; margin-bottom: 12px; }
    .course-header h1 { font-size: 2.5rem; font-weight: 800; margin-bottom: 8px; }
    .course-header p { font-size: 1rem; color: var(--color-text-secondary); max-width: 560px; margin: 0 auto; line-height: 1.6; }
    @media (max-width: 768px) { .course-header h1 { font-size: 2rem; } }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="container">
      <a href="../../index.html" class="nav-logo">
        <img src="../../assets/lighthouse/logo.svg" alt="" width="32" height="32">
        <span>Mathagram</span>
      </a>
      <div class="nav-links">
        <a href="../../courses.html">Courses</a>
        <a href="../../learning-post.html">Posts</a>
        <a href="../../login.html" data-auth="login">Login</a>
      </div>
    </div>
  </nav>
  <header class="course-header">
    <span class="course-badge" style="background:var(--color-others)">Others</span>
    <h1>Mythology &amp; Folklore</h1>
    <p>Gods, heroes, monsters, and legends from every corner of the world — Greek, Norse, Egyptian, Asian, African, Native, and beyond. 150 lessons across 10 units.</p>
  </header>
  <div id="learning-path" class="path-container"></div>
  <footer class="footer"><div class="container"><p class="footer-copy">&copy; <span id="year"></span> Mathagram.org — All Rights Reserved.</p></div></footer>
  <script type="module">
    import { initNav } from '../../js/nav.js';
    initNav('../../');
    import { renderPath, getCompletedLessons } from '../../js/learning-path.js';
    import { onAuthChange } from '../../js/auth.js';
    document.getElementById('year').textContent = new Date().getFullYear();
    const units = [
      [1,"Greek Mythology",["Creation Myth","Titans & Olympians","Zeus","Poseidon","Hades","Athena","Apollo & Artemis","Aphrodite","Hermes","Dionysus","Heracles","Perseus","Theseus","The Trojan War","Greek Mythology Checkpoint"]],
      [2,"Roman Mythology",["Jupiter & the Pantheon","Mars","Venus & Cupid","Minerva","Neptune","Mercury","Vulcan","Romulus & Remus","Aeneas","Lares & Penates","Vestal Virgins","Roman Heroes","Saturnalia","Roman vs Greek Gods","Roman Mythology Checkpoint"]],
      [3,"Norse Mythology",["Yggdrasil — The World Tree","Odin","Thor","Loki","Freyja","Tyr","Heimdall","Baldur","The Nine Realms","Ragnarok","Valkyries","Fenrir & Jormungandr","The Eddas","Sagas of Iceland","Norse Mythology Checkpoint"]],
      [4,"Egyptian Mythology",["Creation at Heliopolis","Ra","Osiris","Isis","Horus","Set","Anubis","Thoth","Bastet","Sekhmet","Ma'at & Balance","The Book of the Dead","Pharaoh as God","Afterlife Journey","Egyptian Mythology Checkpoint"]],
      [5,"Celtic & Slavic Mythology",["The Tuatha Dé Danann","Cú Chulainn","The Morrigan","Brigid","Cernunnos","King Arthur Legends","Merlin","The Holy Grail","Perun","Veles","Baba Yaga","Leshy & Domovoi","Firebird","Rusalka","Celtic & Slavic Checkpoint"]],
      [6,"Asian Mythology",["Chinese Creation — Pan Gu","Jade Emperor","Sun Wukong — Monkey King","Chang'e & the Moon","Dragons East","Japanese Kami","Amaterasu","Izanagi & Izanami","Yokai Spirits","Korean Mythology","Indian Vedic Gods","Shiva","Vishnu","Krishna & Mahabharata","Asian Mythology Checkpoint"]],
      [7,"African Mythology",["Yoruba Orishas","Anansi the Spider","Mami Wata","Egungun Masquerade","Dogon Cosmology","Bantu Creation","Ancestor Veneration","Zulu Legends","Ethiopian Myths","Kemetic Traditions","Trickster Tales","Oral Storytelling","African Diaspora Myths","Modern African Mythology","African Mythology Checkpoint"]],
      [8,"Native American & Oceanic",["Great Spirit Beliefs","Coyote the Trickster","Raven Legends","Thunderbird","Sedna — Inuit Sea Goddess","Quetzalcoatl","Aztec Gods","Mayan Creation","Inca Viracocha","Polynesian Maui","Hawaiian Pele","Maori Legends","Australian Dreamtime","Rainbow Serpent","Native & Oceanic Checkpoint"]],
      [9,"Monsters & Creatures",["Dragons","Griffins","Unicorns","Werewolves","Vampires","Phoenixes","Centaurs","Minotaur","Cyclops","Medusa","Kraken","Banshees","Chimera","Basilisk","Monsters Checkpoint"]],
      [10,"Myth in Modern Culture",["Campbell's Hero's Journey","Archetypes","Tolkien's Legendarium","Star Wars Myth Structure","Marvel & Comic Gods","Neil Gaiman's American Gods","Rick Riordan Series","Modern Folk Horror","Urban Legends","Cryptids","Internet Mythology","Myths vs Facts","Preserving Oral Tradition","Studying Mythology","Mythology Grand Mastery!"]]
    ];
    let n = 0;
    const lessons = [];
    units.forEach(([u, name, titles]) => {
      titles.forEach((t, i) => {
        n++;
        lessons.push({ id: 'myth-'+n, title: t, href: '#', unit: u, unitName: name, category: 'others', checkpoint: i===titles.length-1 });
      });
    });
    async function loadPath() {
      const container = document.getElementById('learning-path');
      let completed = await getCompletedLessons('mythology');
      renderPath(container, lessons, completed);
      onAuthChange(async (user) => {
        completed = await getCompletedLessons('mythology');
        renderPath(container, lessons, completed);
      });
    }
    loadPath();
  </script>
</body>
</html>
