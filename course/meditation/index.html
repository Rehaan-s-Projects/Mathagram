<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meditation & Mindfulness — Mathagram</title>
  <link rel="icon" href="../../assets/lighthouse/logo.svg">
  <link rel="stylesheet" href="../../css/global.css">
  <link rel="stylesheet" href="../../css/learning-path.css">
  <style>
    .course-header { padding: 80px 24px 24px; text-align: center; }
    .course-badge { display: inline-block; padding: 4px 14px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #fff; border-radius: 999px; margin-bottom: 12px; }
    .course-header h1 { font-size: 2.5rem; font-weight: 800; margin-bottom: 8px; }
    .course-header p { font-size: 1rem; color: var(--color-text-secondary); max-width: 560px; margin: 0 auto; line-height: 1.6; }
    @media (max-width: 768px) { .course-header h1 { font-size: 2rem; } }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="container">
      <a href="../../index.html" class="nav-logo">
        <img src="../../assets/lighthouse/logo.svg" alt="" width="32" height="32">
        <span>Mathagram</span>
      </a>
      <div class="nav-links">
        <a href="../../courses.html">Courses</a>
        <a href="../../learning-post.html">Posts</a>
        <a href="../../login.html" data-auth="login">Login</a>
      </div>
    </div>
  </nav>
  <header class="course-header">
    <span class="course-badge" style="background:var(--color-others)">Others</span>
    <h1>Meditation &amp; Mindfulness</h1>
    <p>Practical meditation — breath, body, loving-kindness, movement, Zen, mantra, and daily habits for a clearer, calmer mind. 150 lessons across 10 units.</p>
  </header>
  <div id="learning-path" class="path-container"></div>
  <footer class="footer"><div class="container"><p class="footer-copy">&copy; <span id="year"></span> Mathagram.org — All Rights Reserved.</p></div></footer>
  <script type="module">
    import { initNav } from '../../js/nav.js';
    initNav('../../');
    import { renderPath, getCompletedLessons } from '../../js/learning-path.js';
    import { onAuthChange } from '../../js/auth.js';
    document.getElementById('year').textContent = new Date().getFullYear();
    const units = [
      [1,"Meditation Foundations",["What Is Meditation?","History of Meditation","Why Meditate?","The Science of Meditation","Common Misconceptions","Choosing a Posture","Sitting on a Cushion","Chair Meditation","Lying Meditation","Walking Meditation","Duration & Frequency","Creating a Space","Setting Intentions","Tracking Practice","Foundations Checkpoint"]],
      [2,"Breath Awareness",["Anatomy of Breath","Diaphragmatic Breathing","Counting Breaths","Box Breathing","4-7-8 Technique","Alternate Nostril","Kapalabhati","Ujjayi Breath","Following the Breath","Sensing the Breath","Breath & Attention","Working with Distraction","Short Breath Sessions","Long Breath Sessions","Breath Awareness Checkpoint"]],
      [3,"Body Scan & Awareness",["Introduction to Body Scan","Head & Face Scan","Shoulders & Neck","Arms & Hands","Chest & Heart","Belly & Abdomen","Back & Spine","Legs","Feet","Full Body Integration","Sensing Sensations","Releasing Tension","Working with Pain","Body Gratitude","Body Scan Checkpoint"]],
      [4,"Loving-Kindness (Metta)",["What Is Metta?","Classical Metta Phrases","Self-Compassion","For Loved Ones","For Neutral People","For Difficult People","For All Beings","Tonglen Practice","Forgiveness Meditation","Compassion vs Empathy","Dealing with Resistance","Building Warmth","Daily Metta","Sharing Metta","Metta Checkpoint"]],
      [5,"Mindful Movement",["Mindful Walking","Mindful Yoga Basics","Tai Chi Introduction","Qigong Basics","Stretching with Awareness","Mindful Eating","Mindful Chores","Everyday Mindfulness","Walking in Nature","Sensory Walking","Hand Mudras","Mindful Commute","Mindful Gardening","Mindful Exercise","Movement Checkpoint"]],
      [6,"Mantra & Sound",["What Is a Mantra?","Om","So Hum","Sanskrit Mantras","Christian Centering Prayer","Sufi Zikr","Tibetan Mantras","Silent Repetition","Aloud Repetition","Beads & Malas","Sound Baths","Chanting","Music for Meditation","Silence as Sound","Mantra Checkpoint"]],
      [7,"Visualization & Imagination",["What Is Visualization?","Safe Place Meditation","Light Meditation","Color Visualization","Mountain Meditation","Ocean Meditation","Tree of Life","Inner Mentor","Healing Visualization","Goal Visualization","Guided Imagery","Working with Memories","Visualizing Compassion","Dream Visualization","Visualization Checkpoint"]],
      [8,"Zen & Contemplative Traditions",["What Is Zen?","Zazen Basics","Shikantaza — Just Sitting","Koan Practice","Sesshin Retreats","Tea Ceremony","Soto vs Rinzai","Vipassana","Theravada Practice","Mahamudra","Dzogchen","Christian Contemplation","Sufi Meditation","Jewish Hitbonenut","Traditions Checkpoint"]],
      [9,"Mindfulness in Daily Life",["Morning Practice","Evening Reflection","Mindful Listening","Mindful Speech","Mindful Tech Use","Work Mindfulness","Parenting Mindfully","Relationships & Presence","Handling Difficult Emotions","Working with Anxiety","Meditation for Sleep","Meditation for Focus","Digital Mindfulness","Retreats","Daily Life Checkpoint"]],
      [10,"Advanced & Mastery",["Long Sittings","Silent Retreats","Teachers & Sanghas","Finding Your Lineage","Journaling Practice","Insight vs Concentration","Jhanas","Non-Dual Awareness","Ethics in Meditation","Common Pitfalls","Dark Night Experiences","Teaching Others","Lifelong Practice","Community & Belonging","Meditation Grand Mastery!"]]
    ];
    let n = 0;
    const lessons = [];
    units.forEach(([u, name, titles]) => {
      titles.forEach((t, i) => {
        n++;
        lessons.push({ id: 'med-'+n, title: t, href: '#', unit: u, unitName: name, category: 'others', checkpoint: i===titles.length-1 });
      });
    });
    async function loadPath() {
      const container = document.getElementById('learning-path');
      let completed = await getCompletedLessons('meditation');
      renderPath(container, lessons, completed);
      onAuthChange(async (user) => {
        completed = await getCompletedLessons('meditation');
        renderPath(container, lessons, completed);
      });
    }
    loadPath();
  </script>
</body>
</html>
