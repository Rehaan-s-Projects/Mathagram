<body>
<nav class="nav"><div class="container">
  <a href="../../index.html" class="nav-logo"><img src="../../assets/lighthouse/logo.svg" alt="" width="32" height="32"><span>Mathagram</span></a>
  <div class="nav-links"><a href="../../courses.html">Courses</a><a href="../../login.html" data-auth="login">Login</a></div>
</div></nav>
<header class="course-header">
  <span class="course-badge" style="background:var(--color-logic)">Logic</span>
  <h1>Logical Reasoning</h1>
  <p>Master deductive and inductive reasoning, spot fallacies, and build airtight arguments. 135 lessons across 9 units.</p>
</header>
<div id="learning-path" class="path-container"></div>
<footer class="footer"><div class="container"><p class="footer-copy">&copy; <span id="year"></span> Mathagram.org — All Rights Reserved.</p></div></footer>
<script>
if ('caches' in window) { caches.keys().then(function(n){n.forEach(function(k){caches.delete(k)})}); }
</script>
<script type="module">
import { initNav } from '../../js/nav.js'; initNav('../../');
import { renderPath, getCompletedLessons } from '../../js/learning-path.js?v=3';
import { onAuthChange } from '../../js/auth.js?v=3';
document.getElementById('year').textContent = new Date().getFullYear();

const units = [
  [1,'Propositions & Logic Basics',['What is a Proposition?','True & False Statements','Negation','Conjunction (AND)','Disjunction (OR)','Conditional (IF-THEN)','Biconditional (IF AND ONLY IF)','Logical Equivalence','Tautologies','Contradictions','Contingencies','Truth Values','Propositional Variables','Symbolic Logic Notation','Logic Basics Review']],
  [2,'Truth Tables',['Building Truth Tables','NOT Truth Table','AND Truth Table','OR Truth Table','Conditional Truth Table','Biconditional Truth Table','Complex Truth Tables','Evaluating Arguments with Truth Tables','Tautology Check','Contradiction Check','Logical Equivalence Check','De Morgans Laws','Distributive Laws','Absorption Laws','Truth Tables Review']],
  [3,'Deductive Reasoning',['What is Deductive Reasoning?','Validity vs Soundness','Modus Ponens','Modus Tollens','Hypothetical Syllogism','Disjunctive Syllogism','Constructive Dilemma','Destructive Dilemma','Categorical Syllogisms','Venn Diagrams for Syllogisms','Valid Argument Forms','Invalid Argument Forms','Formal Proofs Introduction','Direct Proof','Deductive Review']],
  [4,'Inductive Reasoning',['What is Inductive Reasoning?','Strong vs Weak Arguments','Enumerative Induction','Statistical Generalization','Analogical Arguments','Causal Reasoning','Mills Methods (Agreement)','Mills Methods (Difference)','Mills Methods (Concomitant Variation)','Correlation vs Causation','Inductive Strength','Sample Size & Representativeness','Hasty Generalization','Anecdotal Evidence','Inductive Review']],
  [5,'Logical Fallacies Deep Dive',['Formal vs Informal Fallacies','Affirming the Consequent','Denying the Antecedent','Undistributed Middle','Four Terms Fallacy','Ad Hominem Variations','Genetic Fallacy','Appeal to Ignorance','False Cause Fallacies','Composition & Division','Equivocation & Ambiguity','No True Scotsman','Moving the Goalposts','Gish Gallop','Fallacies Deep Dive Review']],
  [6,'Arguments & Counterarguments',['Identifying Premises & Conclusions','Argument Mapping','Hidden Premises','Enthymemes','Counterexamples','Reductio Ad Absurdum','Thought Experiments','Steelmanning Arguments','Weakest Link Analysis','Burden of Proof','Standards of Evidence','Occams Razor','Principle of Charity','Argument Evaluation Rubric','Arguments Review']],
  [7,'Predicate Logic',['Predicates & Quantifiers','Universal Quantifier (For All)','Existential Quantifier (There Exists)','Translating English to Predicate Logic','Negating Quantified Statements','Multiply Quantified Statements','Bound & Free Variables','Universe of Discourse','Valid Arguments in Predicate Logic','Universal Instantiation','Existential Generalization','Predicate Logic Proofs','Identity in Logic','Definite Descriptions','Predicate Logic Review']],
  [8,'Modal & Nonclassical Logic',['Modal Logic Introduction','Necessity & Possibility','Possible Worlds','Epistemic Logic (Knowledge)','Deontic Logic (Obligation)','Temporal Logic','Fuzzy Logic','Many-Valued Logic','Intuitionistic Logic','Paraconsistent Logic','Relevance Logic','Default Reasoning','Nonmonotonic Logic','Logic in AI','Nonclassical Review']],
  [9,'Applied Reasoning & Mastery',['Critical Reading Skills','Evaluating News Articles','Detecting Propaganda','Advertising & Persuasion','Political Rhetoric Analysis','Scientific Reasoning','Legal Reasoning','Ethical Reasoning','Philosophical Arguments','Debate Techniques','Socratic Method','Reasoning Under Uncertainty','Logic Puzzles Challenge','Applied Logic Test','Logical Reasoning Mastery!']]
];
let n = 0;
const lessons = [];
units.forEach(([u, name, titles]) => {
  titles.forEach((t, i) => {
    n++;
    lessons.push({ id: 'lr-'+n, title: t, href: '#', unit: u, unitName: name, category: 'logic', checkpoint: i===titles.length-1 });
  });
});
const container = document.getElementById('learning-path');
renderPath(container, lessons, new Set());
try {
  onAuthChange(async (user) => {
    if (user) {
      const completed = await getCompletedLessons('logical-reasoning');
      renderPath(container, lessons, completed);
    }
  });
} catch(e) {}
</script>
</body>
</html>
