<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AP Chemistry — Mathagram</title>
  <link rel="icon" href="../../assets/lighthouse/logo.svg">
  <link rel="stylesheet" href="../../css/global.css">
  <link rel="stylesheet" href="../../css/learning-path.css">
  <style>
    .course-header { padding: 80px 24px 24px; text-align: center; }
    .course-badge { display: inline-block; padding: 4px 14px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #fff; border-radius: 999px; margin-bottom: 12px; }
    .course-header h1 { font-size: 2.5rem; font-weight: 800; margin-bottom: 8px; }
    .course-header p { font-size: 1rem; color: var(--color-text-secondary); max-width: 560px; margin: 0 auto; line-height: 1.6; }
    @media (max-width: 768px) { .course-header h1 { font-size: 2rem; } }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="container">
      <a href="../../index.html" class="nav-logo">
        <img src="../../assets/lighthouse/logo.svg" alt="" width="32" height="32">
        <span>Mathagram</span>
      </a>
      <div class="nav-links">
        <a href="../../courses.html">Courses</a>
        <a href="../../login.html" data-auth="login">Login</a>
      </div>
    </div>
  </nav>

  <header class="course-header">
    <span class="course-badge" style="background:var(--color-science)">Science</span>
    <h1>AP Chemistry</h1>
    <p>Master atomic structure, bonding, reactions, kinetics, thermodynamics, equilibrium, and acids &amp; bases. 45 lessons across 9 units.</p>
  </header>

  <div id="learning-path" class="path-container"></div>

  <footer class="footer">
    <div class="container">
      <p class="footer-copy">&copy; <span id="year"></span> Mathagram.org — All Rights Reserved.</p>
    </div>
  </footer>

  <script type="module">
    import { initNav } from '../../js/nav.js';
    initNav('../../');
    import { renderPath, getCompletedLessons } from '../../js/learning-path.js';
    import { onAuthChange } from '../../js/auth.js';
    document.getElementById('year').textContent = new Date().getFullYear();

    const lessons = [
      { id: 'lesson-1', title: 'Atomic Models & Isotopes', href: 'lesson-1.html', unit: 1, unitName: 'Atomic Structure', category: 'science' },
      { id: 'lesson-2', title: 'Electron Configuration', href: 'lesson-2.html', unit: 1, unitName: 'Atomic Structure', category: 'science' },
      { id: 'lesson-3', title: 'Periodic Trends', href: 'lesson-3.html', unit: 1, unitName: 'Atomic Structure', category: 'science' },
      { id: 'lesson-4', title: 'Quantum Numbers', href: 'lesson-4.html', unit: 1, unitName: 'Atomic Structure', category: 'science' },
      { id: 'lesson-5', title: 'Photoelectron Spectroscopy', href: 'lesson-5.html', unit: 1, unitName: 'Atomic Structure', category: 'science', checkpoint: true },
      { id: 'lesson-6', title: 'Lewis Structures', href: 'lesson-6.html', unit: 2, unitName: 'Bonding', category: 'science' },
      { id: 'lesson-7', title: 'VSEPR & Geometry', href: 'lesson-7.html', unit: 2, unitName: 'Bonding', category: 'science' },
      { id: 'ch-8', title: 'Ionic vs Covalent', href: '#', unit: 2, unitName: 'Bonding', category: 'science' },
      { id: 'ch-9', title: 'Formal Charge', href: '#', unit: 2, unitName: 'Bonding', category: 'science' },
      { id: 'ch-10', title: 'Resonance Structures', href: '#', unit: 2, unitName: 'Bonding', category: 'science', checkpoint: true },
      { id: 'ch-11', title: 'Types of IMFs', href: '#', unit: 3, unitName: 'Intermolecular Forces', category: 'science' },
      { id: 'ch-12', title: 'States of Matter', href: '#', unit: 3, unitName: 'Intermolecular Forces', category: 'science' },
      { id: 'ch-13', title: 'Solubility Rules', href: '#', unit: 3, unitName: 'Intermolecular Forces', category: 'science', checkpoint: true },
      { id: 'ch-14', title: 'Balancing Equations', href: '#', unit: 4, unitName: 'Chemical Reactions', category: 'science' },
      { id: 'ch-15', title: 'Types of Reactions', href: '#', unit: 4, unitName: 'Chemical Reactions', category: 'science' },
      { id: 'ch-16', title: 'Oxidation-Reduction', href: '#', unit: 4, unitName: 'Chemical Reactions', category: 'science' },
      { id: 'ch-17', title: 'Stoichiometry', href: '#', unit: 4, unitName: 'Chemical Reactions', category: 'science', checkpoint: true },
      { id: 'ch-18', title: 'Reaction Rates', href: '#', unit: 5, unitName: 'Kinetics', category: 'science' },
      { id: 'ch-19', title: 'Rate Laws', href: '#', unit: 5, unitName: 'Kinetics', category: 'science' },
      { id: 'ch-20', title: 'Half-Life', href: '#', unit: 5, unitName: 'Kinetics', category: 'science', checkpoint: true },
      { id: 'ch-21', title: 'Enthalpy', href: '#', unit: 6, unitName: 'Thermodynamics', category: 'science' },
      { id: 'ch-22', title: 'Hess\'s Law', href: '#', unit: 6, unitName: 'Thermodynamics', category: 'science' },
      { id: 'ch-23', title: 'Gibbs Free Energy', href: '#', unit: 6, unitName: 'Thermodynamics', category: 'science', checkpoint: true },
      { id: 'ch-24', title: 'Equilibrium Constants', href: '#', unit: 7, unitName: 'Equilibrium', category: 'science' },
      { id: 'ch-25', title: 'Le Chatelier\'s Principle', href: '#', unit: 7, unitName: 'Equilibrium', category: 'science' },
      { id: 'ch-26', title: 'ICE Tables', href: '#', unit: 7, unitName: 'Equilibrium', category: 'science', checkpoint: true },
      { id: 'ch-27', title: 'pH & Strong Acids', href: '#', unit: 8, unitName: 'Acids & Bases', category: 'science' },
      { id: 'ch-28', title: 'Weak Acids & Buffers', href: '#', unit: 8, unitName: 'Acids & Bases', category: 'science' },
      { id: 'ch-29', title: 'Titrations', href: '#', unit: 8, unitName: 'Acids & Bases', category: 'science', checkpoint: true },
      { id: 'ch-30', title: 'AP Chemistry Mastery!', href: '#', unit: 9, unitName: 'Electrochemistry', category: 'science', checkpoint: true },
    ];

    async function loadPath() {
      const container = document.getElementById('learning-path');
      let completed = new Set();
      onAuthChange(async (user) => {
        if (user) completed = await getCompletedLessons('ap-chemistry');
        renderPath(container, lessons, completed);
      });
      renderPath(container, lessons, completed);
    }
    loadPath();
  </script>
</body>
</html>
