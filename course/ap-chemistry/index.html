      [10,'Electrochemistry',['Oxidation & Reduction Review','Galvanic Cells','Cell Notation','Standard Reduction Potentials','Calculating Cell Potential (E\u00b0)','Spontaneity & Cell Potential','Electrolytic Cells','Electrolysis of Molten Salts','Electrolysis of Aqueous Solutions','Faradays Law','Calculating Mass from Current','Nernst Equation','Concentration Cells','Batteries & Fuel Cells','Corrosion','Electrochemistry Review']],
      [11,'Nuclear Chemistry',['Nuclear Stability','Types of Radioactive Decay (Alpha)','Types of Radioactive Decay (Beta)','Types of Radioactive Decay (Gamma)','Positron Emission','Electron Capture','Half-Life Calculations','Radioactive Dating (Carbon-14)','Nuclear Fission','Nuclear Fusion','Mass Defect & Binding Energy','E=mc\u00b2','Nuclear Power Plants','Nuclear Medicine','Nuclear Chemistry Review']],
      [12,'Organic Chemistry Introduction',['Carbon Bonding','Alkanes & Nomenclature','Alkenes & Alkynes','Isomers (Structural)','Isomers (Geometric cis/trans)','Functional Groups Overview','Alcohols','Aldehydes & Ketones','Carboxylic Acids','Esters','Amines','Polymers (Addition)','Polymers (Condensation)','Organic Reactions Overview','Organic Chemistry Review']],

    ];

    let n = 0;
    const lessons = [];
    units.forEach(([u, name, titles]) => {
      titles.forEach((t, i) => {
        n++;
        lessons.push({ id: 'ch-'+n, title: t, href: '#', unit: u, unitName: name, category: 'science', checkpoint: i===titles.length-1 });
      });
    });
    // Make first 7 lessons playable
    const playable = {1:'lesson-1.html',2:'lesson-2.html',3:'lesson-3.html',4:'lesson-4.html',5:'lesson-5.html',6:'lesson-6.html',7:'lesson-7.html'};
    lessons.forEach((l,i) => { if (playable[i+1]) l.href = playable[i+1]; });

    async function loadPath() {
      const container = document.getElementById('learning-path');
      let completed = await getCompletedLessons('ap-chemistry');
      renderPath(container, lessons, completed);
      onAuthChange(async (user) => {
        completed = await getCompletedLessons('ap-chemistry');
        renderPath(container, lessons, completed);
      });
    }
    loadPath();
  </script>
