    let lessonNum = 0;
    const lessons = [];
    units.forEach(([unitNum, unitName, titles]) => {
      titles.forEach((title, i) => {
        lessonNum++;
        lessons.push({
          id: 'ss-' + lessonNum,
          title: title,
          href: '#',
          unit: unitNum,
          unitName: unitName,
          category: 'others',
          checkpoint: i === titles.length - 1
        });
      });
    });

    async function loadPath() {
      const container = document.getElementById('learning-path');
      let completed = await getCompletedLessons('study-skills');
      renderPath(container, lessons, completed);
      onAuthChange(async (user) => {
        completed = await getCompletedLessons('study-skills');
        renderPath(container, lessons, completed);
      });
    }
    loadPath();
  </script>
