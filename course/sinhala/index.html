<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sinhala — Mathagram</title>
  <link rel="icon" href="../../assets/lighthouse/logo.svg">
  <link rel="stylesheet" href="../../css/global.css">
  <link rel="stylesheet" href="../../css/learning-path.css">
  <style>
    .course-header { padding: 80px 24px 24px; text-align: center; }
    .course-badge { display: inline-block; padding: 4px 14px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #fff; border-radius: 999px; margin-bottom: 12px; }
    .course-header h1 { font-size: 2.5rem; font-weight: 800; margin-bottom: 8px; }
    .course-header p { font-size: 1rem; color: var(--color-text-secondary); max-width: 560px; margin: 0 auto; line-height: 1.6; }
    @media (max-width: 768px) { .course-header h1 { font-size: 2rem; } }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="container">
      <a href="../../index.html" class="nav-logo">
        <img src="../../assets/lighthouse/logo.svg" alt="" width="32" height="32">
        <span>Mathagram</span>
      </a>
      <div class="nav-links">
        <a href="../../courses.html">Courses</a>
        <a href="../../login.html" data-auth="login">Login</a>
      </div>
    </div>
  </nav>
  <header class="course-header">
    <span class="course-badge" style="background:var(--color-language)">Language</span>
    <h1>Sinhala</h1>
    <p>Learn Sinhala — the language of Sri Lanka, with a unique rounded script. 93 lessons across 7 units.</p>
  </header>
  <div id="learning-path" class="path-container"></div>
  <footer class="footer">
    <div class="container">
      <p class="footer-copy">&copy; <span id="year"></span> Mathagram.org — All Rights Reserved.</p>
    </div>
  </footer>
  <script type="module">
    import { initNav } from '../../js/nav.js';
    initNav('../../');
    import { renderPath, getCompletedLessons } from '../../js/learning-path.js';
    import { onAuthChange } from '../../js/auth.js';
    document.getElementById('year').textContent = new Date().getFullYear();
    const units = [
      [1,'Sinhala Script',['Rounded Script Overview','Vowels (Svarayanna)','Consonants (Vyanjana) Group 1','Consonants (Vyanjana) Group 2','Vowel Signs (Pili)','Conjunct Consonants','Numbers in Sinhala Script','Writing Direction & Spacing','Reading Simple Words','Handwriting Practice','Common Letter Combinations','Reading Signs & Labels','Script Review']],
      [2,'Greetings & Basics',['Ayubowan (Long Life Greeting)','Kohomada? (How Are You?)','Mama ... (I Am)','Mage nama ... (My Name Is)','Isthuthi (Thank You)','Karunakara (Please)','Ow / Nehe (Yes / No)','Numbers 1-20','Numbers 20-100','Days of the Week','Months & Calendar','Telling Time','Greetings Review']],
      [3,'Grammar Foundations',['Nouns & Gender (Masculine Feminine Neuter)','Plural Formation','Postpositions','Word Order (SOV)','Subject Markers','Object Markers','Possessive Forms','Question Words (Mokakda Koheda Kavuda)','Adjectives','Demonstratives (Meya Eya Araka)','Conjunctions','Sentence Building','Grammar Review']],
      [4,'Verbs & Tenses',['Verb Roots in Sinhala','Present Tense Formation','Karanawa (To Do)','Yanawa (To Go)','Enawa (To Come)','Kanawa (To Eat)','Bonawa (To Drink)','Kiyanawa (To Say)','Past Tense Formation','Future Tense Formation','Negative Verbs','Polite vs Informal Forms','Verbs Review']],
      [5,'Daily Life',['Kema (Food)','Bath (Rice) & Curry','Pol Sambol (Coconut Relish)','Hoppers & String Hoppers','Thambili (King Coconut)','Tea (Thay) Culture','Family Members','At the Market','Clothing & Colors','Home & Rooms','Transportation','Asking Directions','Weather & Seasons','Daily Life Review']],
      [6,'Culture & Sri Lanka',['Sri Lanka Overview','Buddhism in Sri Lanka','Vesak Festival','Kandy & Temple of the Tooth','Sigiriya Rock Fortress','Ceylon Tea Heritage','Sinhalese New Year (Avurudu)','Perahera Festival','Traditional Dance & Drumming','Colombo City Life','Wildlife & Nature','Sinhala Literature','Traditional Medicine (Ayurveda)','Culture Review']],
      [7,'Fluency & Mastery',['Conversation Starters','Small Talk & Weather','Expressing Opinions','Agreeing & Disagreeing','Storytelling in Sinhala','Idioms & Proverbs','Sinhala Song Lyrics','Listening Practice 1','Listening Practice 2','Writing a Paragraph','Formal & Informal Register','Role Play Scenarios','Final Sinhala Challenge']]
    ];
    let n = 0;
    const lessons = [];
    units.forEach(([u, name, titles]) => {
      titles.forEach((t, i) => {
        n++;
        lessons.push({ id: 'si-'+n, title: t, href: '#', unit: u, unitName: name, category: 'language', checkpoint: i===titles.length-1 });
      });
    });
    async function loadPath() {
      const container = document.getElementById('learning-path');
      let completed = await getCompletedLessons('sinhala');
      renderPath(container, lessons, completed);
      onAuthChange(async (user) => {
        completed = await getCompletedLessons('sinhala');
        renderPath(container, lessons, completed);
      });
    }
    loadPath();
  </script>
</body>
</html>
