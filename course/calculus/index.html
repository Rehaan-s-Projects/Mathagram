<body>
  <nav class="nav">

    <p>A complete calculus course — limits, differentiation, integration, vectors, and multivariable calculus. 268 lessons across 12 units.</p>

    document.getElementById('year').textContent = new Date().getFullYear();

    const lessons = [

      { id: 'c-5', title: 'Limits at Essential Discontinuities', href: '#', unit: 1, unitName: 'Limits', category: 'math' },
      { id: 'c-6', title: 'Limits at Infinity', href: '#', unit: 1, unitName: 'Limits', category: 'math' },

      { id: 'c-9', title: 'Average Rates of Change', href: '#', unit: 2, unitName: 'Differentiation Basics', category: 'math' },
      { id: 'lesson-8', title: 'Definition of the Derivative', href: 'lesson-8.html', unit: 2, unitName: 'Differentiation Basics', category: 'math' },

      { id: 'lesson-9', title: 'Power, Constant & Sum Rules', href: 'lesson-9.html', unit: 2, unitName: 'Differentiation Basics', category: 'math' },

      { id: 'c-14', title: 'Product Rule', href: '#', unit: 2, unitName: 'Differentiation Basics', category: 'math' },

      { id: 'c-40', title: 'Calculus Mastery!', href: '#', unit: 12, unitName: 'Multivariable', category: 'math', checkpoint: true },
    ];

    async function loadPath() {
      const container = document.getElementById('learning-path');
      let completed = new Set();
      onAuthChange(async (user) => {
        if (user) completed = await getCompletedLessons('calculus');
        renderPath(container, lessons, completed);
      });
      renderPath(container, lessons, completed);
    }
    loadPath();
  </script>
