<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>International Phonetic Alphabet — Mathagram</title>
  <link rel="icon" href="../../assets/lighthouse/logo.svg">
  <link rel="stylesheet" href="../../css/global.css">
  <link rel="stylesheet" href="../../css/learning-path.css">
  <style>
    .course-header { padding: 80px 24px 24px; text-align: center; }
    .course-badge { display: inline-block; padding: 4px 14px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #fff; border-radius: 999px; margin-bottom: 12px; }
    .course-header h1 { font-size: 2.5rem; font-weight: 800; margin-bottom: 8px; }
    .course-header p { font-size: 1rem; color: var(--color-text-secondary); max-width: 560px; margin: 0 auto; line-height: 1.6; }
    @media (max-width: 768px) { .course-header h1 { font-size: 2rem; } }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="container">
      <a href="../../index.html" class="nav-logo">
        <img src="../../assets/lighthouse/logo.svg" alt="" width="32" height="32">
        <span>Mathagram</span>
      </a>
      <div class="nav-links">
        <a href="../../courses.html">Courses</a>
        <a href="../../login.html" data-auth="login">Login</a>
      </div>
    </div>
  </nav>
  <header class="course-header">
    <span class="course-badge" style="background:var(--color-language)">Language</span>
    <h1>International Phonetic Alphabet</h1>
    <p>Read and write the sounds of any language.</p>
  </header>
  <div id="learning-path" class="path-container"></div>
  <footer class="footer">
    <div class="container">
      <p class="footer-copy">&copy; <span id="year"></span> Mathagram.org — All Rights Reserved.</p>
    </div>
  </footer>
  <script type="module">
    import { initNav } from '../../js/nav.js';
    initNav('../../');
    import { renderPath, getCompletedLessons } from '../../js/learning-path.js';
    import { onAuthChange } from '../../js/auth.js';
    document.getElementById('year').textContent = new Date().getFullYear();
    const units = [
      [1, 'IPA Foundations', ['What Is the IPA?', 'History of the International Phonetic Alphabet', 'Why Learn the IPA?', 'Reading IPA Charts', 'Broad vs Narrow Transcription', 'Phonemes vs Allophones', 'Using Square Brackets vs Slashes', 'IPA Foundations Checkpoint']],
      [2, 'Pulmonic Consonants — Place', ['Bilabial Consonants — p, b, m', 'Labiodental — f, v', 'Dental — θ, ð', 'Alveolar — t, d, n, s, z, l, r', 'Postalveolar — ʃ, ʒ, tʃ, dʒ', 'Retroflex — ʈ, ɖ, ɳ, ɽ', 'Palatal — c, ɟ, ɲ, j', 'Velar — k, ɡ, ŋ, x, ɣ', 'Uvular — q, ɢ, ɴ, ʀ', 'Place of Articulation Checkpoint']],
      [3, 'Pulmonic Consonants — Manner', ['Plosives (Stops) — p, t, k, b, d, ɡ', 'Nasals — m, n, ŋ, ɲ, ɴ', 'Trills — r, ʀ, ʙ', 'Taps & Flaps — ɾ, ɽ', 'Fricatives — f, v, s, z, ʃ, ʒ, x, h', 'Lateral Fricatives — ɬ, ɮ', 'Approximants — ɹ, j, w, ɰ', 'Lateral Approximants — l, ɭ, ʎ, ʟ', 'Manner of Articulation Checkpoint']],
      [4, 'Non-Pulmonic Consonants', ['Clicks — ǀ, ǃ, ǂ, ǁ', 'Implosives — ɓ, ɗ, ʄ, ɠ, ʛ', 'Ejectives — p\', t\', k\', s\'', 'Clicks in Zulu & Xhosa', 'Implosives in Sindhi & Hausa', 'Ejectives in Georgian & Amharic', 'Glottal Stop & Pharyngeals', 'Non-Pulmonic Consonants Checkpoint']],
      [5, 'Voicing & Airstream', ['Voiced vs Voiceless Distinction', 'Aspiration — pʰ, tʰ, kʰ', 'Breathy Voice & Creaky Voice', 'Voice Onset Time (VOT)', 'Prenasalized Stops', 'Geminate Consonants', 'Airstream Mechanisms Overview', 'Voicing & Airstream Checkpoint']],
      [6, 'Front & Central Vowels', ['Close Front — i, y', 'Near-Close Front — ɪ, ʏ', 'Close-Mid Front — e, ø', 'Open-Mid Front — ɛ, œ', 'Near-Open & Open Front — æ, a, ɶ', 'Central Vowels — ə, ɐ, ɜ, ɨ, ʉ', 'The Schwa — The Most Common Vowel', 'Front & Central Vowels Checkpoint']],
      [7, 'Back Vowels & Diphthongs', ['Close Back — u, ɯ', 'Near-Close & Close-Mid Back — ʊ, o, ɤ', 'Open-Mid & Open Back — ɔ, ʌ, ɑ, ɒ', 'Rounded vs Unrounded Back Vowels', 'Diphthongs — aɪ, aʊ, eɪ, oʊ, ɔɪ', 'Triphthongs', 'Back Vowels & Diphthongs Checkpoint']],
      [8, 'Vowel Features', ['The IPA Vowel Trapezoid', 'Tongue Height — Close to Open', 'Tongue Position — Front to Back', 'Lip Rounding', 'Nasalized Vowels — ã, ẽ, õ', 'Long vs Short Vowels — ː', 'Vowel Reduction & Harmony', 'Vowel Features Checkpoint']],
      [9, 'Suprasegmentals — Stress', ['Primary & Secondary Stress Marks', 'Word Stress in English', 'Stress in Spanish & Italian', 'Stress in Russian — Unpredictable', 'Stress-Timed vs Syllable-Timed Languages', 'Contrastive Stress & Meaning', 'Stress & Vowel Quality Changes', 'Stress Checkpoint']],
      [10, 'Suprasegmentals — Tone & Intonation', ['Tone Languages Overview', 'Mandarin Tones — 4 + Neutral', 'Cantonese — 6 Tones', 'Thai — 5 Tones', 'African Tone Systems — Yoruba & Igbo', 'Tone Marks in IPA — ˥˦˧˨˩', 'Intonation in English — Rising & Falling', 'Tone & Intonation Checkpoint']],
      [11, 'Diacritics', ['Voiceless & Voiced Diacritics', 'Aspirated & Dental Marks', 'Nasalization & Syllabicity', 'Rhoticity — ɚ, ɝ', 'Labialization & Palatalization', 'Velarization & Pharyngealization', 'Advanced & Retracted Tongue Root', 'Combining Multiple Diacritics', 'Diacritics Checkpoint']],
      [12, 'Transcribing English', ['RP (Received Pronunciation) Transcription', 'General American Transcription', 'Australian English Transcription', 'Scottish & Irish English Features', 'South African & Indian English', 'Cockney & Estuary English', 'Comparing English Accents in IPA', 'Transcribing English Checkpoint']],
      [13, 'Transcribing World Languages', ['French Transcription', 'German Transcription', 'Spanish Transcription', 'Mandarin Chinese Transcription', 'Japanese Transcription', 'Arabic Transcription', 'Hindi & Russian Transcription', 'World Languages Checkpoint']],
      [14, 'IPA Mastery & Practice', ['Transcription from Audio', 'Reverse Transcription — IPA to Sound', 'Minimal Pair Identification', 'Cross-Language Comparison', 'IPA in Dictionaries & Resources', 'IPA for Singing & Voice Acting', 'IPA in Speech Therapy', 'Cumulative Transcription Challenge', 'IPA Mastery!']],
    ];
    let n = 0;
    const lessons = [];
    units.forEach(([u, name, titles]) => {
      titles.forEach((t, i) => {
        n++;
        lessons.push({ id: 'ipa-'+n, title: t, href: '#', unit: u, unitName: name, category: 'language', checkpoint: i===titles.length-1 });
      });
    });
    async function loadPath() {
      const container = document.getElementById('learning-path');
      let completed = new Set();
      onAuthChange(async (user) => {
        if (user) completed = await getCompletedLessons('ipa');
        renderPath(container, lessons, completed);
      });
      renderPath(container, lessons, completed);
    }
    loadPath();
  </script>
</body>
</html>
