<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>International Phonetic Alphabet — Mathagram</title>
  <link rel="icon" href="../../assets/lighthouse/logo.svg">
  <link rel="stylesheet" href="../../css/global.css">
  <link rel="stylesheet" href="../../css/learning-path.css">
  <style>
    .course-header { padding: 80px 24px 24px; text-align: center; }
    .course-badge { display: inline-block; padding: 4px 14px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #fff; border-radius: 999px; margin-bottom: 12px; }
    .course-header h1 { font-size: 2.5rem; font-weight: 800; margin-bottom: 8px; }
    .course-header p { font-size: 1rem; color: var(--color-text-secondary); max-width: 560px; margin: 0 auto; line-height: 1.6; }
    @media (max-width: 768px) { .course-header h1 { font-size: 2rem; } }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="container">
      <a href="../../index.html" class="nav-logo">
        <img src="../../assets/lighthouse/logo.svg" alt="" width="32" height="32">
        <span>Mathagram</span>
      </a>
      <div class="nav-links">
        <a href="../../courses.html">Courses</a>
        <a href="../../login.html" data-auth="login">Login</a>
      </div>
    </div>
  </nav>
  <header class="course-header">
    <span class="course-badge" style="background:var(--color-language)">Language</span>
    <h1>International Phonetic Alphabet</h1>
    <p>Read and write the sounds of any language.</p>
  </header>
  <div id="learning-path" class="path-container"></div>
  <footer class="footer">
    <div class="container">
      <p class="footer-copy">&copy; <span id="year"></span> Mathagram.org — All Rights Reserved.</p>
    </div>
  </footer>
  <script type="module">
    import { initNav } from '../../js/nav.js';
    initNav('../../');
    import { renderPath, getCompletedLessons } from '../../js/learning-path.js';
    import { onAuthChange } from '../../js/auth.js';
    document.getElementById('year').textContent = new Date().getFullYear();
    const lessons = [{"id": "ipa-introduction", "title": "IPA Introduction", "unit": "Consonants", "href": "#"}, {"id": "reading-symbols", "title": "Reading Symbols", "unit": "Consonants", "href": "#"}, {"id": "consonants-place", "title": "Consonants Place", "unit": "Consonants", "href": "#"}, {"id": "consonants-manner", "title": "Consonants Manner", "unit": "Consonants", "href": "#"}, {"id": "voicing", "title": "Voicing", "unit": "Consonants", "href": "#", "checkpoint": true}, {"id": "front-vowels", "title": "Front Vowels", "unit": "Vowels", "href": "#"}, {"id": "back-vowels", "title": "Back Vowels", "unit": "Vowels", "href": "#"}, {"id": "diphthongs", "title": "Diphthongs", "unit": "Vowels", "href": "#", "checkpoint": true}, {"id": "stress", "title": "Stress", "unit": "Prosody", "href": "#"}, {"id": "intonation", "title": "Intonation", "unit": "Prosody", "href": "#"}, {"id": "tone", "title": "Tone", "unit": "Prosody", "href": "#", "checkpoint": true}, {"id": "diacritics", "title": "Diacritics", "unit": "Mastery", "href": "#"}, {"id": "english-transcription", "title": "English Transcription", "unit": "Mastery", "href": "#"}, {"id": "accents", "title": "Accents", "unit": "Mastery", "href": "#"}, {"id": "ipa-mastery", "title": "IPA Mastery!", "unit": "Mastery", "href": "#", "checkpoint": true}];
    async function loadPath() {
      const container = document.getElementById('learning-path');
      let completed = new Set();
      onAuthChange(async (user) => {
        if (user) completed = await getCompletedLessons('ipa');
        renderPath(container, lessons, completed);
      });
      renderPath(container, lessons, completed);
    }
    loadPath();
  </script>
</body>
</html>
