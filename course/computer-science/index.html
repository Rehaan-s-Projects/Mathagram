  <header class="course-header">
    <span class="course-badge" style="background:#8b5cf6">Programming &amp; CS</span>
    <h1>Computer Science Fundamentals</h1>
    <p>How computers actually work — binary, logic gates, memory, CPU, operating systems, networking, cryptography, and computational thinking. 300 lessons across 20 units.</p>
  </header>
  <div id="learning-path" class="path-container"></div>
  <footer class="footer">
    <div class="container">
      <p class="footer-copy">&copy; <span id="year"></span> Mathagram.org — All Rights Reserved.</p>
    </div>
  </footer>
  <script type="module">
    import { initNav } from '../../js/nav.js';
    initNav('../../');
    import { renderPath, getCompletedLessons } from '../../js/learning-path.js';
    import { onAuthChange } from '../../js/auth.js';
    document.getElementById('year').textContent = new Date().getFullYear();
    const units = [
      [1,"What Is Computer Science?",["CS vs Programming","History of Computing","Ada Lovelace & Charles Babbage","Alan Turing & the Turing Machine","Grace Hopper & COBOL","The First Computers — ENIAC","Generations of Computers","Moores Law","Abstraction in CS","Computational Thinking","Decomposition","Pattern Recognition","Algorithm Design","CS Career Paths","CS Intro Checkpoint"]],
      [2,"Binary & Number Systems",["Why Binary?","Bits & Bytes","Counting in Binary","Binary to Decimal Conversion","Decimal to Binary Conversion","Binary Addition","Binary Subtraction","Twos Complement — Negative Numbers","Hexadecimal — Base 16","Hex to Binary","Octal — Base 8","Binary Multiplication","Overflow & Underflow","Floating Point Numbers","Number Systems Checkpoint"]],
      [3,"Logic & Boolean Algebra",["Boolean Values — True False","AND Gate","OR Gate","NOT Gate","NAND & NOR Gates","XOR Gate","Truth Tables","Boolean Expressions","De Morgans Laws","Logic Circuit Diagrams","Simplifying Expressions","Half Adder from Gates","Full Adder from Gates","Logic in Programming","Logic Checkpoint"]],
      [4,"Data Representation",["ASCII — Text as Numbers","Unicode & UTF-8","Representing Images — Pixels","Color Depth — Bit Depth","RGB Color Model","Image Resolution","Representing Sound — Sampling","Sample Rate & Bit Depth","MIDI vs WAV","Video — Frames & Codecs","Compression — Lossy vs Lossless","Run-Length Encoding","Huffman Coding","File Formats","Data Representation Checkpoint"]],
      [5,"Computer Architecture",["Von Neumann Architecture","CPU Components — ALU CU Registers","Fetch-Decode-Execute Cycle","Clock Speed — GHz","Instruction Set — RISC vs CISC","Registers — Program Counter","Cache Memory — L1 L2 L3","RAM vs ROM","Bus — Address Data Control","Pipelining","Multicore Processors","GPU vs CPU","Embedded Systems","System on Chip (SoC)","Architecture Checkpoint"]],
      [6,"Memory & Storage",["Memory Hierarchy","Registers","Cache","RAM — DRAM SRAM","Virtual Memory","Page Tables","Hard Drives — HDD","Solid State Drives — SSD","Flash Memory — NAND","Cloud Storage","File Systems — FAT NTFS ext4","Sectors & Clusters","Fragmentation","Memory Management","Memory Checkpoint"]],
      [7,"Operating Systems",["What Is an OS?","History of Operating Systems","Process Management","Threads","Scheduling Algorithms — FCFS SJF","Deadlock","Memory Management in OS","Virtual Memory & Paging","File System Management","I/O Management","User vs Kernel Mode","Shell & Command Line","Windows vs Linux vs macOS","Mobile OS — Android iOS","OS Checkpoint"]],
      [8,"Networking Fundamentals",["What Is a Network?","LAN WAN MAN","Network Topologies","OSI Model — 7 Layers","TCP/IP Model","IP Addresses — IPv4 IPv6","Subnetting Basics","MAC Addresses","DNS — Domain Name System","HTTP & HTTPS","TCP vs UDP","Ports & Sockets","Routers & Switches","Wi-Fi & Ethernet","Networking Checkpoint"]],
      [9,"Internet & Web",["How the Internet Works","Packets & Routing","URL Structure","HTTP Request/Response","HTML — Markup Language","CSS — Styling","JavaScript — Interactivity","Web Servers","Databases on the Web","APIs — Application Programming Interface","Cloud Computing","CDN — Content Delivery","Cookies & Sessions","Web Security Basics","Internet Checkpoint"]],
      [10,"Cybersecurity Basics",["What Is Cybersecurity?","CIA Triad — Confidentiality Integrity Availability","Threats — Malware Viruses Worms","Phishing & Social Engineering","Passwords & Authentication","Encryption — Symmetric vs Asymmetric","Hashing — SHA MD5","Digital Signatures","Firewalls","VPN — Virtual Private Network","Public Key Infrastructure","SQL Injection","Cross-Site Scripting (XSS)","Ethical Hacking","Cybersecurity Checkpoint"]],
      [11,"Cryptography",["History of Cryptography","Caesar Cipher","Substitution Ciphers","Vigenere Cipher","One-Time Pad","Symmetric Encryption — AES","Asymmetric Encryption — RSA","Key Exchange — Diffie-Hellman","Digital Certificates","HTTPS & TLS","Blockchain Basics","Hash Functions","Password Hashing — bcrypt","Quantum Cryptography","Cryptography Checkpoint"]],
      [12,"Databases",["What Is a Database?","Relational Databases","Tables Rows Columns","Primary & Foreign Keys","SQL — Structured Query Language","SELECT INSERT UPDATE DELETE","JOIN Operations","Normalization","NoSQL Databases","Document Stores — MongoDB","Key-Value Stores — Redis","Graph Databases","ACID Properties","Database Indexing","Databases Checkpoint"]],
      [13,"Software Engineering",["What Is Software Engineering?","Software Development Life Cycle","Requirements Gathering","System Design","Implementation","Testing","Deployment","Maintenance","Agile Methodology","Scrum Framework","Kanban","Version Control — Git","Code Reviews","Documentation","Software Engineering Checkpoint"]],
      [14,"Programming Paradigms",["What Is a Paradigm?","Imperative Programming","Procedural Programming","Object-Oriented Programming","Functional Programming","Declarative Programming","Event-Driven Programming","Logic Programming","Scripting Languages","Compiled vs Interpreted","Static vs Dynamic Typing","Garbage Collection","Concurrency Models","Multi-Paradigm Languages","Paradigms Checkpoint"]],
      [15,"Theory of Computation",["Formal Languages","Alphabets & Strings","Regular Expressions","Finite Automata — DFA NFA","Context-Free Grammars","Pushdown Automata","Turing Machines","Church-Turing Thesis","Decidability","Halting Problem","P vs NP","NP-Complete Problems","Complexity Classes","Computability Limits","Theory Checkpoint"]],
      [16,"Artificial Intelligence Overview",["What Is AI?","History of AI","Machine Learning vs AI","Supervised Learning","Unsupervised Learning","Reinforcement Learning","Neural Networks","Deep Learning","Natural Language Processing","Computer Vision","Expert Systems","AI Ethics","Bias in AI","AI in Society","AI Checkpoint"]],
      [17,"Computer Graphics",["What Is Computer Graphics?","Pixels & Resolution","Vector vs Raster","2D Coordinate Systems","Transformations — Translate Rotate Scale","3D Coordinate Systems","3D Rendering Pipeline","Polygons & Meshes","Lighting Models","Textures & UV Mapping","Ray Tracing","Anti-Aliasing","GPU & Graphics Cards","Real-Time vs Offline Rendering","Graphics Checkpoint"]],
      [18,"Human-Computer Interaction",["What Is HCI?","Usability Principles","User Interface Design","User Experience (UX)","Interaction Design","Prototyping","Wireframes & Mockups","Heuristic Evaluation","User Testing","Accessibility","Mobile UX","Voice Interfaces","Gesture Interfaces","AR/VR Interfaces","HCI Checkpoint"]],
      [19,"Emerging Technologies",["Internet of Things (IoT)","Smart Home Devices","Wearable Technology","5G Networks","Edge Computing","Autonomous Vehicles","Drone Technology","3D Printing","Biotechnology & Computing","Quantum Computing Preview","Brain-Computer Interfaces","Space Computing","Green Computing","Ethics of Technology","Emerging Tech Checkpoint"]],
      [20,"CS Mastery",["Binary & Number Systems Review","Logic & Architecture Review","Memory & Storage Review","Operating Systems Review","Networking Review","Security & Cryptography Review","Databases Review","Software Engineering Review","Programming Paradigms Review","Theory of Computation Review","AI & Machine Learning Review","Graphics Review","HCI Review","Emerging Tech Review","CS Grand Mastery!"]],
    ];
    let n = 0;
    const lessons = [];
    units.forEach(([u, name, titles]) => {
      titles.forEach((t, i) => {
        n++;
        lessons.push({ id: 'cs-'+n, title: t, href: '#', unit: u, unitName: name, category: 'programming', checkpoint: i===titles.length-1 });
      });
    });
    async function loadPath() {
      const container = document.getElementById('learning-path');
      let completed = await getCompletedLessons('computer-science');
      renderPath(container, lessons, completed);
      onAuthChange(async (user) => {
        completed = await getCompletedLessons('computer-science');
        renderPath(container, lessons, completed);
      });
    }
    loadPath();
  </script>
</body>
