    import { initNav } from '../../js/nav.js';

    import { onAuthChange } from '../../js/auth.js';
    document.getElementById('year').textContent = new Date().getFullYear();
    const lessons = [{"id": "forces-and-motion", "title": "Forces & Motion", "unit": "Foundations", "href": "#"}, {"id": "newtons-laws", "title": "Newton's Laws", "unit": "Foundations", "href": "#"}, {"id": "friction-and-drag", "title": "Friction & Drag", "unit": "Foundations", "href": "#"}, {"id": "work-and-energy", "title": "Work & Energy", "unit": "Foundations", "href": "#"}, {"id": "mechanics-checkpoint", "title": "Mechanics Checkpoint", "unit": "Foundations", "href": "#", "checkpoint": true}, {"id": "levers-and-pulleys", "title": "Levers & Pulleys", "unit": "Simple Machines", "href": "#"}, {"id": "inclined-planes-and-wedges", "title": "Inclined Planes & Wedges", "unit": "Simple Machines", "href": "#"}, {"id": "screws-and-wheels", "title": "Screws & Wheels", "unit": "Simple Machines", "href": "#"}, {"id": "mechanical-advantage", "title": "Mechanical Advantage", "unit": "Simple Machines", "href": "#"}, {"id": "simple-machines-checkpoint", "title": "Simple Machines Checkpoint", "unit": "Simple Machines", "href": "#", "checkpoint": true}, {"id": "gear-ratios", "title": "Gear Ratios", "unit": "Gears & Systems", "href": "#"}, {"id": "torque-and-rotation", "title": "Torque & Rotation", "unit": "Gears & Systems", "href": "#"}, {"id": "gear-trains", "title": "Gear Trains", "unit": "Gears & Systems", "href": "#"}, {"id": "real-world-mechanisms", "title": "Real-World Mechanisms", "unit": "Gears & Systems", "href": "#"}, {"id": "gears-and-mechanics-mastery", "title": "Gears & Mechanics Mastery!", "unit": "Gears & Systems", "href": "#", "checkpoint": true}];
    async function loadPath() {
      const container = document.getElementById('learning-path');
      let completed = new Set();
      onAuthChange(async (user) => {
        if (user) completed = await getCompletedLessons('gears-and-mechanics');
        renderPath(container, lessons, completed);
      });
      renderPath(container, lessons, completed);
    }
    loadPath();
  </script>
