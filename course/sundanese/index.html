<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sundanese — Mathagram</title>
  <link rel="icon" href="../../assets/lighthouse/logo.svg">
  <link rel="stylesheet" href="../../css/global.css">
  <link rel="stylesheet" href="../../css/learning-path.css">
  <style>
    .course-header { padding: 80px 24px 24px; text-align: center; }
    .course-badge { display: inline-block; padding: 4px 14px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #fff; border-radius: 999px; margin-bottom: 12px; }
    .course-header h1 { font-size: 2.5rem; font-weight: 800; margin-bottom: 8px; }
    .course-header p { font-size: 1rem; color: var(--color-text-secondary); max-width: 560px; margin: 0 auto; line-height: 1.6; }
    @media (max-width: 768px) { .course-header h1 { font-size: 2rem; } }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="container">
      <a href="../../index.html" class="nav-logo">
        <img src="../../assets/lighthouse/logo.svg" alt="" width="32" height="32">
        <span>Mathagram</span>
      </a>
      <div class="nav-links">
        <a href="../../courses.html">Courses</a>
        <a href="../../learning-post.html">Posts</a>
        <a href="../../login.html" data-auth="login">Login</a>
      </div>
    </div>
  </nav>
  <header class="course-header">
    <span class="course-badge" style="background:var(--color-language)">Language</span>
    <h1>Sundanese</h1>
    <p>Learn Sundanese — spoken by 40 million people in West Java, Indonesia. Rich in tradition, music, and wayang culture. 108 lessons across 8 units.</p>
  </header>
  <div id="learning-path" class="path-container"></div>
  <footer class="footer">
    <div class="container">
      <p class="footer-copy">&copy; <span id="year"></span> Mathagram.org — All Rights Reserved.</p>
    </div>
  </footer>
  <script type="module">
    import { initNav } from '../../js/nav.js';
    initNav('../../');
    import { renderPath, getCompletedLessons } from '../../js/learning-path.js';
    import { onAuthChange } from '../../js/auth.js';
    document.getElementById('year').textContent = new Date().getFullYear();
    const units = [
      [1,'Sundanese Script & Sounds',['Sundanese Alphabet Overview','Aksara Sunda (Traditional Script)','Latin Alphabet for Sundanese','Vowels (a e i o u eu)','Consonants','Nasal Sounds (ng ny)','Pronunciation Rules','Numbers 1-10','Numbers 11-100','Days of the Week','Months & Seasons','Colors (Warna)','Greetings (Sampurasun)','Script Review']],
      [2,'Greetings & Basics',['Sampurasun (Hello)','Hatur Nuhun (Thank You)','Muhun/Henteu (Yes/No)','Kumaha Damang? (How Are You?)','Nami Abdi... (My Name Is)','Ti Mana? (Where From?)','Wilujeng Enjing (Good Morning)','Wilujeng Wengi (Good Night)','Punten (Excuse Me)','Hapunten (Sorry)','Emergency Phrases','Formal vs Informal (Undak Usuk)','Speech Levels (Lemes Sedeng Kasar)','Greetings Review']],
      [3,'Grammar Foundations',['Word Order','Nouns','Pronouns (Abdi Anjeun Manehna)','Speech Level Pronouns','Possessives','Affixes (Prefixes & Suffixes)','Prefix N- & Nga-','Suffix -an & -keun','Adjectives','Negation (Henteu Teu)','Question Words (Naon Saha Dimana Iraha Kunaon Kumaha)','Sentence Patterns','Conjunctions','Grammar Review']],
      [4,'Verb System',['Verb Roots','Active Voice (N- prefix)','Passive Voice (Di- prefix)','Present Tense','Past Tense (Parantos/Enggeus)','Future Tense (Bade/Rek)','Imperative','Common Verbs (Dahar Leumpang Nyarios)','Modal Verbs (Tiasa Kedah)','Negative Verbs','Verb + Object Patterns','Compound Verbs','Verb Practice','Verbs Review']],
      [5,'Daily Life & Family',['Family (Kulawarga)','Father (Bapa) Mother (Ibu)','Siblings','Extended Family','Home (Bumi/Imah)','Kitchen & Cooking','Clothing (Baju Kebaya)','Daily Routine','At School (Sakola)','At Work','Health & Body','At the Doctor','Shopping at Pasar','Daily Life Review']],
      [6,'Food & Sundanese Cuisine',['Rice (Sangu)','Nasi Timbel','Nasi Liwet','Sayur Asem','Karedok','Lotek','Sate Maranggi','Gurame Bakar','Surabi','Bandrek & Bajigur','Peuyeum (Fermented Cassava)','Cooking Verbs','At the Warung','Food Review']],
      [7,'Travel & West Java',['Bandung (Paris van Java)','Gedung Sate','Tangkuban Perahu','Kawah Putih','Garut','Pangandaran Beach','Cirebon','Tasikmalaya','Ciwidey','Tea Plantations','At the Station','Angkot & Ojek','Hotel Vocabulary','Travel Review']],
      [8,'Culture & Traditions',['Sundanese Culture Overview','Wayang Golek (Puppet Theater)','Gamelan Degung','Jaipongan Dance','Pencak Silat','Kacapi Suling Music','Angklung (UNESCO Heritage)','Sundanese Wedding','Seren Taun Harvest Festival','Islamic Traditions','Pantun Sunda (Poetry)','Proverbs (Paribasa)','Sundanese Humor','Culture Review']]
    ];
    let n = 0;
    const lessons = [];
    units.forEach(([u, name, titles]) => {
      titles.forEach((t, i) => {
        n++;
        lessons.push({ id: 'su-'+n, title: t, href: '#', unit: u, unitName: name, category: 'language', checkpoint: i===titles.length-1 });
      });
    });
    async function loadPath() {
      const container = document.getElementById('learning-path');
      let completed = await getCompletedLessons('sundanese');
      renderPath(container, lessons, completed);
      onAuthChange(async (user) => {
        completed = await getCompletedLessons('sundanese');
        renderPath(container, lessons, completed);
      });
    }
    loadPath();
  </script>
</body>
</html>
