  <script type="module">
    import { initNav } from '../../js/nav.js';
    initNav('../../');
    import { renderPath, getCompletedLessons } from '../../js/learning-path.js';
    import { onAuthChange } from '../../js/auth.js';
    document.getElementById('year').textContent = new Date().getFullYear();
    const units = [
      [1, 'Molecular Geometry Foundations', ['VSEPR Theory Refresher', 'Hybridization — sp, sp2, sp3', 'Sigma & Pi Bonds', 'Bond Angles & Shape Prediction', 'Molecular Orbital Theory Basics', 'Bonding vs Antibonding Orbitals', 'Delocalization & Resonance', 'Conjugated Systems', 'Aromaticity — Huckel\'s Rule', 'Polarity & Dipole Moments', 'Intermolecular Forces Review', 'Geometry Foundations Checkpoint']],

      [4, 'Metalloenzymes & Cofactors', ['Hemoglobin — Iron Porphyrin Complex', 'Myoglobin — Oxygen Storage', 'Chlorophyll — Magnesium Porphyrin', 'Vitamin B12 — Cobalamin Complexity', 'Cytochrome c — Electron Transfer', 'Nitrogenase — Fixing Nitrogen', 'Catalase — Decomposing Peroxide', 'Superoxide Dismutase', 'Carbonic Anhydrase — Zinc Enzyme', 'Ferritin — Iron Storage Cage', 'Metalloporphyrin Synthesis', 'Heme Degradation & Bilirubin', 'Metalloenzymes Checkpoint']],
      [5, 'Nucleic Acids', ['DNA Double Helix — Watson & Crick', 'Base Pairing — A-T, G-C', 'DNA Backbone — Sugar-Phosphate', 'B-DNA, A-DNA, Z-DNA Forms', 'RNA Structure — Single Stranded', 'tRNA — The Cloverleaf', 'Ribosomal RNA — The Ribosome Machine', 'mRNA — Codons & Translation', 'G-Quadruplex Structures', 'Nucleotide Analogs — Acyclovir, AZT', 'Aptamers & Ribozymes', 'Nucleic Acids Checkpoint']],
      [6, 'Protein Architecture', ['Amino Acid Structures — All 20', 'Peptide Bond Formation', 'Primary Structure — Sequence', 'Alpha Helix — Hydrogen Bond Spiral', 'Beta Sheet — Pleated Patterns', 'Tertiary Structure — 3D Folding', 'Quaternary Structure — Subunit Assembly', 'Prions — Misfolded Proteins', 'Amyloid Fibrils — Alzheimer\'s Plaques', 'Protein Folding Problem', 'AlphaFold & Computational Prediction', 'Disulfide Bridges & Stability', 'Protein Architecture Checkpoint']],
      [7, 'Lipids & Membranes', ['Fatty Acid Structure — Saturated & Unsaturated', 'Phospholipid Bilayer Assembly', 'Cholesterol — Membrane Modulator', 'Sphingolipids & Ceramides', 'Glycolipids & Cell Recognition', 'Lipid Rafts in Membranes', 'Prostaglandins — Signaling Lipids', 'Leukotrienes & Thromboxanes', 'Waxes — Long-Chain Esters', 'Terpenes & Terpenoids', 'Steroids — Ring System Architecture', 'Lipids & Membranes Checkpoint']],
      [8, 'Energy Molecules', ['ATP — Adenosine Triphosphate Structure', 'GTP — Guanosine Triphosphate', 'NAD+ & NADH — Electron Carriers', 'FAD & FADH2', 'Coenzyme A — Acetyl Carrier', 'Creatine Phosphate — Muscle Energy', 'Phosphoenolpyruvate — Glycolysis Key', 'Citric Acid — Krebs Cycle Hub', 'Ubiquinone — Coenzyme Q10', 'Cytochrome c Oxidase Complex', 'ATP Synthase — Molecular Motor', 'Glucose & Fructose — Sugar Energetics', 'Energy Molecules Checkpoint']],

      [14, 'Frontiers & Applications', ['CRISPR-Cas9 — Molecular Scissors', 'mRNA Vaccine — Lipid Nanoparticle Design', 'PET Tracers — Fluorodeoxyglucose', 'Organic Solar Cell Molecules', 'OLED Emitter Molecules', 'Molecular Motors — Nobel Prize 2016', 'DNA Origami — Nanoscale Folding', 'Artificial Enzymes — Nanozymes', 'Carbon Capture Molecules — MOFs & Amines', 'Drug Delivery Nanoparticles', 'Quantum Dot Chemistry', 'Perovskite Solar Materials', 'Difficult Molecules Mastery!']],
    ];
    let n = 0;
    const lessons = [];
    units.forEach(([u, name, titles]) => {
      titles.forEach((t, i) => {
        n++;
        lessons.push({ id: 'dm-'+n, title: t, href: '#', unit: u, unitName: name, category: 'science', checkpoint: i===titles.length-1 });
      });
    });
    async function loadPath() {
      const container = document.getElementById('learning-path');
      let completed = await getCompletedLessons('difficult-molecules');
      renderPath(container, lessons, completed);
      onAuthChange(async (user) => {
        completed = await getCompletedLessons('difficult-molecules');
        renderPath(container, lessons, completed);
      });
    }
    loadPath();
  </script>
