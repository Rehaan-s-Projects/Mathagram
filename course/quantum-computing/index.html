<body>
  <nav class="nav">
    <div class="container">

    <p>Qubits, superposition, entanglement, and quantum algorithms.</p>
  </header>
  <div id="learning-path" class="path-container"></div>
  <footer class="footer">
    <div class="container">
      <p class="footer-copy">&copy; <span id="year"></span> Mathagram.org — All Rights Reserved.</p>
    </div>

  <script type="module">
    import { initNav } from '../../js/nav.js';
    initNav('../../');
    import { renderPath, getCompletedLessons } from '../../js/learning-path.js';
    import { onAuthChange } from '../../js/auth.js';
    document.getElementById('year').textContent = new Date().getFullYear();
    const lessons = [{"id": "classical-vs-quantum", "title": "Classical vs Quantum", "unit": "Quantum Basics", "href": "#"}, {"id": "qubits-and-states", "title": "Qubits & States", "unit": "Quantum Basics", "href": "#"}, {"id": "superposition", "title": "Superposition", "unit": "Quantum Basics", "href": "#"}, {"id": "measurement", "title": "Measurement", "unit": "Quantum Basics", "href": "#"}, {"id": "quantum-basics-checkpoint", "title": "Quantum Basics Checkpoint", "unit": "Quantum Basics", "href": "#", "checkpoint": true}, {"id": "entanglement", "title": "Entanglement", "unit": "Quantum Phenomena", "href": "#"}, {"id": "quantum-gates", "title": "Quantum Gates", "unit": "Quantum Phenomena", "href": "#"}, {"id": "quantum-circuits", "title": "Quantum Circuits", "unit": "Quantum Phenomena", "href": "#"}, {"id": "no-cloning-theorem", "title": "No-Cloning Theorem", "unit": "Quantum Phenomena", "href": "#"}, {"id": "phenomena-checkpoint", "title": "Phenomena Checkpoint", "unit": "Quantum Phenomena", "href": "#", "checkpoint": true}, {"id": "deutschs-algorithm", "title": "Deutsch's Algorithm", "unit": "Quantum Algorithms", "href": "#"}, {"id": "grovers-search", "title": "Grover's Search", "unit": "Quantum Algorithms", "href": "#"}, {"id": "shors-factoring", "title": "Shor's Factoring", "unit": "Quantum Algorithms", "href": "#"}, {"id": "quantum-error-correction", "title": "Quantum Error Correction", "unit": "Quantum Algorithms", "href": "#"}, {"id": "quantum-computing-mastery", "title": "Quantum Computing Mastery!", "unit": "Quantum Algorithms", "href": "#", "checkpoint": true}];
    async function loadPath() {
      const container = document.getElementById('learning-path');
      let completed = new Set();
      onAuthChange(async (user) => {
        if (user) completed = await getCompletedLessons('quantum-computing');
        renderPath(container, lessons, completed);
      });
      renderPath(container, lessons, completed);
    }
    loadPath();
  </script>
