<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Predicting with Probability — Mathagram</title>
  <link rel="icon" href="../../assets/lighthouse/logo.svg">
  <link rel="stylesheet" href="../../css/global.css">
  <link rel="stylesheet" href="../../css/learning-path.css">
  <style>
    .course-header { padding: 80px 24px 24px; text-align: center; }
    .course-badge { display: inline-block; padding: 4px 14px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #fff; border-radius: 999px; margin-bottom: 12px; }
    .course-header h1 { font-size: 2.5rem; font-weight: 800; margin-bottom: 8px; }
    .course-header p { font-size: 1rem; color: var(--color-text-secondary); max-width: 560px; margin: 0 auto; line-height: 1.6; }
    @media (max-width: 768px) { .course-header h1 { font-size: 2rem; } }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="container">
      <a href="../../index.html" class="nav-logo">
        <img src="../../assets/lighthouse/logo.svg" alt="" width="32" height="32">
        <span>Mathagram</span>
      </a>
      <div class="nav-links">
        <a href="../../courses.html">Courses</a>
        <a href="../../login.html" data-auth="login">Login</a>
      </div>
    </div>
  </nav>
  <header class="course-header">
    <span class="course-badge" style="background:var(--color-data)">Data Analysis</span>
    <h1>Predicting with Probability</h1>
    <p>Bayesian thinking and predictive modeling. 63 lessons across 7 units.</p>
  </header>
  <div id="learning-path" class="path-container"></div>
  <footer class="footer">
    <div class="container">
      <p class="footer-copy">&copy; <span id="year"></span> Mathagram.org — All Rights Reserved.</p>
    </div>
  </footer>
  <script type="module">
    import { initNav } from '../../js/nav.js';
    initNav('../../');
    import { renderPath, getCompletedLessons } from '../../js/learning-path.js';
    import { onAuthChange } from '../../js/auth.js';
    document.getElementById('year').textContent = new Date().getFullYear();
    const units = [
      [1,'Frequentist vs Bayesian',['Two Schools of Thought','Frequentist Interpretation','Bayesian Interpretation','Prior Beliefs','Updating with Evidence','Subjectivity in Priors','Objective Priors','Comparing Approaches','When to Use Which']],
      [2,'Bayesian Updating',['Prior Distribution','Likelihood Function','Posterior Distribution','Conjugate Priors','Beta-Binomial Model','Normal-Normal Model','Sequential Updating','Multiple Evidence','Bayesian Updating Review']],
      [3,'Predictive Models',['What is a Predictive Model?','Training Data','Validation Data','Test Data','Overfitting','Underfitting','Bias-Variance Tradeoff','Model Selection','Cross-Validation']],
      [4,'Decision Theory',['Expected Utility','Loss Functions','Minimax Decisions','Bayesian Decisions','Risk Assessment','Cost-Benefit Analysis','Decision Trees','Sensitivity Analysis','Decision Theory Review']],
      [5,'Time Series Forecasting',['What is a Time Series?','Trend Analysis','Seasonality','Moving Averages','Exponential Smoothing','ARIMA Introduction','Forecasting Accuracy','MAE & RMSE','Time Series Review']],
      [6,'Risk & Uncertainty',['Quantifying Uncertainty','Confidence vs Credible Intervals','Prediction Intervals','Scenario Analysis','Monte Carlo Simulation','Value at Risk','Black Swan Events','Tail Risk','Risk Review']],
      [7,'Real-World Forecasting',['Weather Prediction','Election Forecasting','Economic Forecasting','Sports Predictions','Pandemic Modeling','Stock Market','Demand Forecasting','Insurance Pricing','Forecasting Review']]
    ];

    let n = 0;
    const lessons = [];
    units.forEach(([u, name, titles]) => {
      titles.forEach((t, i) => {
        n++;
        lessons.push({ id: 'pp-'+n, title: t, href: '#', unit: u, unitName: name, category: 'data', checkpoint: i===titles.length-1 });
      });
    });

    async function loadPath() {
      const container = document.getElementById('learning-path');
      let completed = await getCompletedLessons('predicting-with-probability');
      renderPath(container, lessons, completed);
      onAuthChange(async (user) => {
        completed = await getCompletedLessons('predicting-with-probability');
        renderPath(container, lessons, completed);
      });
    }
    loadPath();
  </script>
</body>
</html>
