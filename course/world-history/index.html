    let lessonNum = 0;

    units.forEach(([unitNum, unitName, titles]) => {

        lessons.push({
          id: 'wh-' + lessonNum,
          title: title,
          href: '#',

          unitName: unitName,
          category: 'others',

        });
      });
    });

    async function loadPath() {
      const container = document.getElementById('learning-path');
      let completed = await getCompletedLessons('world-history');
      renderPath(container, lessons, completed);
      onAuthChange(async (user) => {
        completed = await getCompletedLessons('world-history');
        renderPath(container, lessons, completed);
