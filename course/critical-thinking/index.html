<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Critical Thinking — Mathagram</title>
  <link rel="icon" href="../../assets/lighthouse/logo.svg">
  <link rel="stylesheet" href="../../css/global.css">
  <link rel="stylesheet" href="../../css/learning-path.css">
  <style>
    .course-header { padding: 80px 24px 24px; text-align: center; }
    .course-badge { display: inline-block; padding: 4px 14px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #fff; border-radius: 999px; margin-bottom: 12px; }
    .course-header h1 { font-size: 2.5rem; font-weight: 800; margin-bottom: 8px; }
    .course-header p { font-size: 1rem; color: var(--color-text-secondary); max-width: 560px; margin: 0 auto; line-height: 1.6; }
    @media (max-width: 768px) { .course-header h1 { font-size: 2rem; } }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="container">
      <a href="../../index.html" class="nav-logo">
        <img src="../../assets/lighthouse/logo.svg" alt="" width="32" height="32">
        <span>Mathagram</span>
      </a>
      <div class="nav-links">
        <a href="../../courses.html">Courses</a>
        <a href="../../login.html" data-auth="login">Login</a>
      </div>
    </div>
  </nav>

  <header class="course-header">
    <span class="course-badge" style="background:var(--color-others)">Others</span>
    <h1>Critical Thinking</h1>
    <p>Sharpen your reasoning — logic, fallacies, and evidence analysis. 98 lessons across 7 units.</p>
  </header>

  <div id="learning-path" class="path-container"></div>

  <footer class="footer">
    <div class="container">
      <p class="footer-copy">&copy; <span id="year"></span> Mathagram.org — All Rights Reserved.</p>
    </div>
  </footer>

  <script type="module">
    import { initNav } from '../../js/nav.js';
    initNav('../../');
    import { renderPath, getCompletedLessons } from '../../js/learning-path.js';
    import { onAuthChange } from '../../js/auth.js';
    document.getElementById('year').textContent = new Date().getFullYear();

    const units = [
      [1, 'What Is Critical Thinking?', ['Defining Critical Thinking','Why Critical Thinking Matters','Traits of a Critical Thinker','Asking Good Questions','Assumptions & Perspectives','Fact vs Opinion','Observation vs Inference','Intellectual Humility','Open-Mindedness','Socratic Questioning','Thinking About Thinking','Common Thinking Errors','Barriers to Clear Thinking','Critical Thinking in Daily Life']],
      [2, 'Logical Arguments', ['What Is an Argument?','Premises & Conclusions','Identifying Arguments in Text','Deductive Reasoning','Inductive Reasoning','Abductive Reasoning','Validity vs Soundness','Strong vs Weak Arguments','Evaluating Argument Structure','Counterarguments','Syllogisms','Conditional Statements','Necessary vs Sufficient Conditions','Logical Arguments Review']],
      [3, 'Logical Fallacies', ['What Is a Fallacy?','Ad Hominem','Straw Man','False Dichotomy','Appeal to Authority','Appeal to Emotion','Red Herring','Slippery Slope','Circular Reasoning','Hasty Generalization','Post Hoc Ergo Propter Hoc','Bandwagon Fallacy','Tu Quoque','Logical Fallacies Review']],
      [4, 'Evidence & Sources', ['What Counts as Evidence?','Primary vs Secondary Sources','Evaluating Source Credibility','Author Expertise & Bias','Peer-Reviewed Research','Understanding Statistics in Claims','Sample Size & Representation','Correlation vs Causation','Fact-Checking Methods','Cross-Referencing Sources','Recognizing Misinformation','Evaluating Websites','Citation & Attribution','Evidence & Sources Review']],
      [5, 'Media Literacy', ['What Is Media Literacy?','Types of Media','How News Is Produced','Identifying Bias in News','Loaded Language & Framing','Propaganda Techniques','Advertising & Persuasion','Social Media & Echo Chambers','Clickbait & Sensationalism','Deepfakes & Manipulated Media','Evaluating Online Information','News vs Opinion vs Analysis','Building a Balanced Media Diet','Media Literacy Review']],
      [6, 'Decision Making', ['How We Make Decisions','Cost-Benefit Analysis','Opportunity Cost','Risk Assessment Basics','Probability in Decisions','Cognitive Biases Overview','Confirmation Bias','Anchoring Bias','Availability Heuristic','Sunk Cost Fallacy','Framing Effects','Group Decision Making','Ethical Decision Frameworks','Decision Making Review']],
      [7, 'Problem Solving & Creativity', ['Defining the Problem','Breaking Down Complex Problems','Root Cause Analysis','Brainstorming Techniques','Lateral Thinking','Mind Mapping for Solutions','SCAMPER Method','Design Thinking Basics','Prototyping & Testing Ideas','Evaluating Solutions','Creative Constraints','Analogical Reasoning','Systems Thinking Intro','Problem Solving Review']]
    ];

    let lessonNum = 0;
    const lessons = [];
    units.forEach(([unitNum, unitName, titles]) => {
      titles.forEach((title, i) => {
        lessonNum++;
        lessons.push({
          id: 'ct-' + lessonNum,
          title: title,
          href: '#',
          unit: unitNum,
          unitName: unitName,
          category: 'others',
          checkpoint: i === titles.length - 1
        });
      });
    });

    async function loadPath() {
      const container = document.getElementById('learning-path');
      let completed = await getCompletedLessons('critical-thinking');
      renderPath(container, lessons, completed);
      onAuthChange(async (user) => {
        completed = await getCompletedLessons('critical-thinking');
        renderPath(container, lessons, completed);
      });
    }
    loadPath();
  </script>
</body>
</html>
