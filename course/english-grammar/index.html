<body>
  <nav class="nav">
    <div class="container">

  <header class="course-header">
    <span class="course-badge" style="background:var(--color-language)">Language</span>
    <h1>English Grammar & Difficult Words</h1>
    <p>Master the rules and quirks of English.</p>
  </header>
  <div id="learning-path" class="path-container"></div>
  <footer class="footer">
    <div class="container">
      <p class="footer-copy">&copy; <span id="year"></span> Mathagram.org — All Rights Reserved.</p>

  <script type="module">
    import { initNav } from '../../js/nav.js';
    initNav('../../');
    import { renderPath, getCompletedLessons } from '../../js/learning-path.js';
    import { onAuthChange } from '../../js/auth.js';
    document.getElementById('year').textContent = new Date().getFullYear();
    const lessons = [{"id": "parts-of-speech", "title": "Parts of Speech", "unit": "Foundations", "href": "#"}, {"id": "verb-tenses", "title": "Verb Tenses", "unit": "Foundations", "href": "#"}, {"id": "sentence-structure", "title": "Sentence Structure", "unit": "Foundations", "href": "#"}, {"id": "punctuation", "title": "Punctuation", "unit": "Foundations", "href": "#"}, {"id": "confused-words", "title": "Confused Words", "unit": "Foundations", "href": "#", "checkpoint": true}, {"id": "spelling", "title": "Spelling", "unit": "Vocabulary", "href": "#"}, {"id": "vocabulary", "title": "Vocabulary", "unit": "Vocabulary", "href": "#"}, {"id": "idioms", "title": "Idioms", "unit": "Vocabulary", "href": "#", "checkpoint": true}, {"id": "phrasal-verbs", "title": "Phrasal Verbs", "unit": "Advanced", "href": "#"}, {"id": "writing", "title": "Writing", "unit": "Advanced", "href": "#"}, {"id": "grammar-mistakes", "title": "Grammar Mistakes", "unit": "Advanced", "href": "#", "checkpoint": true}, {"id": "advanced-grammar", "title": "Advanced Grammar", "unit": "Mastery", "href": "#"}, {"id": "pronunciation", "title": "Pronunciation", "unit": "Mastery", "href": "#"}, {"id": "word-games", "title": "Word Games", "unit": "Mastery", "href": "#"}, {"id": "english-mastery", "title": "English Mastery!", "unit": "Mastery", "href": "#", "checkpoint": true}];
    async function loadPath() {
      const container = document.getElementById('learning-path');
      let completed = new Set();
      onAuthChange(async (user) => {
        if (user) completed = await getCompletedLessons('english-grammar');
        renderPath(container, lessons, completed);
      });
      renderPath(container, lessons, completed);
    }
    loadPath();
  </script>
