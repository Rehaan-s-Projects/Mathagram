      [10,'Trees',['What Is a Tree?','Tree Terminology — Root, Node, Leaf','Parent, Child, Sibling','Depth & Height','Binary Trees','Full, Complete & Perfect Trees','Tree Traversal — Preorder','Tree Traversal — Inorder','Tree Traversal — Postorder','Level-Order Traversal','Recursive Tree Walks','Iterative Traversal with Stack','Serializing a Tree','N-ary Trees','Trees Checkpoint']],

      [17,'Dynamic Programming',['What Is Dynamic Programming?','Overlapping Subproblems','Optimal Substructure','Memoization — Top-Down','Tabulation — Bottom-Up','Fibonacci with DP','Climbing Stairs','0/1 Knapsack','Unbounded Knapsack','Coin Change','Longest Common Subsequence','Longest Increasing Subsequence','Edit Distance','Matrix Chain Multiplication','DP Checkpoint']],
      [18,'Greedy Algorithms',['Greedy Strategy — Local Best','When Greedy Works','Activity Selection','Fractional Knapsack','Huffman Coding','Job Sequencing','Interval Scheduling','Coin Change — Greedy Cases','Gas Station Problem','Minimum Platforms','Greedy vs DP — Differences','Proof Techniques — Exchange Argument','Scheduling Problems','Counter-Examples to Greedy','Greedy Checkpoint']],

    ];
    let n = 0;
    const lessons = [];
    units.forEach(([u, name, titles]) => {
      titles.forEach((t, i) => {
        n++;
        lessons.push({ id: 'alg-'+n, title: t, href: '#', unit: u, unitName: name, category: 'others', checkpoint: i===titles.length-1 });
      });
    });
    async function loadPath() {
      const container = document.getElementById('learning-path');
      let completed = await getCompletedLessons('algorithmic');
      renderPath(container, lessons, completed);
      onAuthChange(async (user) => {
        completed = await getCompletedLessons('algorithmic');
        renderPath(container, lessons, completed);
      });
    }
    loadPath();
  </script>
