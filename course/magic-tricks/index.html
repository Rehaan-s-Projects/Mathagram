<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Magic Tricks — Mathagram</title>
  <link rel="icon" href="../../assets/lighthouse/logo.svg">
  <link rel="stylesheet" href="../../css/global.css">
  <link rel="stylesheet" href="../../css/learning-path.css">
  <style>
    .course-header { padding: 80px 24px 24px; text-align: center; }
    .course-badge { display: inline-block; padding: 4px 14px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #fff; border-radius: 999px; margin-bottom: 12px; }
    .course-header h1 { font-size: 2.5rem; font-weight: 800; margin-bottom: 8px; }
    .course-header p { font-size: 1rem; color: var(--color-text-secondary); max-width: 560px; margin: 0 auto; line-height: 1.6; }
    @media (max-width: 768px) { .course-header h1 { font-size: 2rem; } }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="container">
      <a href="../../index.html" class="nav-logo">
        <img src="../../assets/lighthouse/logo.svg" alt="" width="32" height="32">
        <span>Mathagram</span>
      </a>
      <div class="nav-links">
        <a href="../../courses.html">Courses</a>
        <a href="../../learning-post.html">Posts</a>
        <a href="../../login.html" data-auth="login">Login</a>
      </div>
    </div>
  </nav>
  <header class="course-header">
    <span class="course-badge" style="background:var(--color-others)">Others</span>
    <h1>Magic Tricks</h1>
    <p>Learn the art of illusion — sleight of hand, card tricks, mentalism, stagecraft, misdirection, and how to amaze any audience. 150 lessons across 10 units.</p>
  </header>
  <div id="learning-path" class="path-container"></div>
  <footer class="footer"><div class="container"><p class="footer-copy">&copy; <span id="year"></span> Mathagram.org — All Rights Reserved.</p></div></footer>
  <script type="module">
    import { initNav } from '../../js/nav.js';
    initNav('../../');
    import { renderPath, getCompletedLessons } from '../../js/learning-path.js';
    import { onAuthChange } from '../../js/auth.js';
    document.getElementById('year').textContent = new Date().getFullYear();
    const units = [
      [1,"Magic Foundations",["History of Magic","Types of Magic","The Magicians Code","The Magician Persona","Practice Routines","Mirror Work","Body Language","Eye Contact","Pacing a Trick","Handling Nerves","Performance Ethics","Building a Repertoire","The Reveal","Audience Rapport","Foundations Checkpoint"]],
      [2,"Sleight of Hand",["Finger Positions","The Finger Palm","The Thumb Palm","The Classic Palm","The French Drop","The Retention Vanish","Pass Techniques","The Hindu Shuffle","The Riffle Shuffle","Controlled Shuffles","Hand Discipline","Angles & Sightlines","Daily Practice Routine","Common Mistakes","Sleight of Hand Checkpoint"]],
      [3,"Card Tricks",["Deck Types & Care","The Force","The Glide","The Double Lift","The Bottom Deal","The Riffle Force","Ambitious Card Routine","Card to Pocket","Sandwich Trick","Four Aces","The Tornado Shuffle","Mental Card Tricks","Card Restoration","Card Flourishes","Card Tricks Checkpoint"]],
      [4,"Coin Magic",["Coin Anatomy","The French Drop Coin","The Retention Pass","The Muscle Pass","Coin Productions","Coin Vanishes","Coin Across","Matrix Routine","Shell Coins","Bobo Book Routines","Shell & Lap","Expanded Shell","Close-Up Coin Work","Coin Sleight Flow","Coin Magic Checkpoint"]],
      [5,"Mentalism",["What Is Mentalism?","Cold Reading","Hot Reading","Mnemonics for Mentalism","Prediction Tricks","The Center Tear","Book Tests","Billet Work","Mind Reading Basics","Pendulum Work","Rapid Calculation","Memorizing Cards","Number Force","The Magic Square","Mentalism Checkpoint"]],
      [6,"Close-Up Magic",["Restaurant Magic","Table Hopping","Pocket Tricks","Silk & Thimble","Sponge Balls","Rubber Bands","Rings & Ropes","Cups & Balls","Chop Cup","Bill Magic","Hit the Deck","Table Etiquette","Close-Up Mats","Close-Up Kit","Close-Up Magic Checkpoint"]],
      [7,"Stage Magic",["Stage Presence","Volunteer Management","Microphone Work","Stage Lighting","Costume & Style","Big Box Illusions","Levitation","Vanishing Acts","Sawing in Half","Production Tricks","Mental Stage Routines","Patter & Script","Closing the Act","Standing Ovation Tricks","Stage Magic Checkpoint"]],
      [8,"Misdirection & Psychology",["Attention Theory","Peripheral Vision","Verbal Misdirection","Physical Misdirection","Time Misdirection","Pattern Interrupt","Implicit Framing","Dual Reality","Natural Actions","The Art of Looking Away","Audience Focus Points","Psychology of Surprise","Memory Manipulation","Forgetting Points","Misdirection Checkpoint"]],
      [9,"Famous Magicians",["Houdini","Dai Vernon","Cardini","David Copperfield","Penn & Teller","David Blaine","Criss Angel","Dynamo","Derren Brown","Shin Lim","Siegfried & Roy","Lance Burton","Teller","Derek DelGaudio","Magicians Checkpoint"]],
      [10,"Performance & Mastery",["Booking Gigs","Building an Act","Performing for Kids","Corporate Events","Weddings & Parties","Street Magic","Creating Original Tricks","Magic Conventions","Magic Clubs","Magic Shops","Magic Online","Filming Tricks","Teaching Magic","Career Paths","Magic Grand Mastery!"]]
    ];
    let n = 0;
    const lessons = [];
    units.forEach(([u, name, titles]) => {
      titles.forEach((t, i) => {
        n++;
        lessons.push({ id: 'mag-'+n, title: t, href: '#', unit: u, unitName: name, category: 'others', checkpoint: i===titles.length-1 });
      });
    });
    async function loadPath() {
      const container = document.getElementById('learning-path');
      let completed = await getCompletedLessons('magic-tricks');
      renderPath(container, lessons, completed);
      onAuthChange(async (user) => {
        completed = await getCompletedLessons('magic-tricks');
        renderPath(container, lessons, completed);
      });
    }
    loadPath();
  </script>
</body>
</html>
