  <!-- Neck -->
  <rect x="42" y="66" width="16" height="12" rx="3" fill="#C09060"/>
  <!-- Head -->
  <ellipse cx="50" cy="42" rx="24" ry="27" fill="#C09060"/>
  <!-- Hair -->
  <ellipse cx="50" cy="20" rx="24" ry="10" fill="#2D2D2D"/>
  <rect x="26" y="18" width="6" height="14" rx="3" fill="#2D2D2D"/>
  <rect x="68" y="18" width="6" height="14" rx="3" fill="#2D2D2D"/>
  <!-- Glasses -->
  <rect x="30" y="36" width="16" height="12" rx="4" fill="none" stroke="#4A5568" stroke-width="2"/>
  <rect x="54" y="36" width="16" height="12" rx="4" fill="none" stroke="#4A5568" stroke-width="2"/>
  <line x1="46" y1="42" x2="54" y2="42" stroke="#4A5568" stroke-width="2"/>
  <!-- Eyes behind glasses -->
  <circle cx="38" cy="42" r="3" fill="#1a1a2e"/>
  <circle cx="62" cy="42" r="3" fill="#1a1a2e"/>
  <circle cx="39" cy="41" r="1" fill="#fff"/>
  <circle cx="63" cy="41" r="1" fill="#fff"/>
  <!-- Nose -->
