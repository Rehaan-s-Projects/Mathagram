<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Old Man: William — beard, wise -->
  <!-- Collar -->
  <rect x="28" y="78" width="44" height="18" rx="8" fill="#6B4C3B"/>
  <!-- Neck -->
  <rect x="42" y="70" width="16" height="12" rx="3" fill="#D4A880"/>
  <!-- Head -->
  <ellipse cx="50" cy="42" rx="25" ry="28" fill="#D4A880"/>
  <!-- Bald top + side hair -->
  <ellipse cx="50" cy="18" rx="22" ry="7" fill="#D4A880"/>
  <rect x="26" y="22" width="8" height="18" rx="4" fill="#C0C0C0"/>
  <rect x="66" y="22" width="8" height="18" rx="4" fill="#C0C0C0"/>
  <!-- Eyebrows (bushy) -->
  <ellipse cx="37" cy="34" rx="7" ry="2.5" fill="#C0C0C0"/>
  <ellipse cx="63" cy="34" rx="7" ry="2.5" fill="#C0C0C0"/>
  <!-- Eyes (kind, slightly squinted) -->
  <ellipse cx="37" cy="40" rx="3.5" ry="3" fill="#1a1a2e"/>
  <ellipse cx="63" cy="40" rx="3.5" ry="3" fill="#1a1a2e"/>
  <circle cx="38" cy="39" r="1.2" fill="#fff"/>
  <circle cx="64" cy="39" r="1.2" fill="#fff"/>
  <!-- Nose -->
  <ellipse cx="50" cy="50" rx="4" ry="3.5" fill="#C09068"/>
  <!-- Beard -->
  <ellipse cx="50" cy="66" rx="18" ry="12" fill="#C0C0C0"/>
  <!-- Mouth (hidden in beard, just a hint) -->
  <path d="M44 58 Q50 62 56 58" stroke="#A08060" stroke-width="1.5" fill="none" stroke-linecap="round"/>
</svg>
