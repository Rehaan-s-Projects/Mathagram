<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Strong Man: James — broad shoulders, muscular -->
  <!-- Neck / shoulders -->
  <rect x="20" y="76" width="60" height="20" rx="10" fill="#4A90D9"/>
  <rect x="38" y="68" width="24" height="16" rx="4" fill="#D4956A"/>
  <!-- Head -->
  <ellipse cx="50" cy="42" rx="26" ry="28" fill="#D4956A"/>
  <!-- Hair (flat top) -->
  <rect x="26" y="14" width="48" height="14" rx="6" fill="#2D1810"/>
  <!-- Eyes -->
  <rect x="35" y="38" width="7" height="5" rx="2.5" fill="#1a1a2e"/>
  <rect x="58" y="38" width="7" height="5" rx="2.5" fill="#1a1a2e"/>
  <circle cx="37" cy="39" r="1.2" fill="#fff"/>
  <circle cx="60" cy="39" r="1.2" fill="#fff"/>
  <!-- Eyebrows -->
  <rect x="34" y="33" width="9" height="2.5" rx="1" fill="#2D1810"/>
  <rect x="57" y="33" width="9" height="2.5" rx="1" fill="#2D1810"/>
  <!-- Nose -->
  <path d="M48 46 L50 52 L53 46" stroke="#B07850" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Mouth (confident grin) -->
  <path d="M40 56 Q50 64 60 56" stroke="#8B5040" stroke-width="2" fill="none" stroke-linecap="round"/>
</svg>
