<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Kid: Sam — small, energetic -->
  <!-- Body (t-shirt) -->
  <rect x="28" y="74" width="44" height="22" rx="10" fill="#3b82f6"/>
  <!-- Neck -->
  <rect x="42" y="68" width="16" height="10" rx="3" fill="#E8C4A0"/>
  <!-- Head (slightly larger for kid proportions) -->
  <circle cx="50" cy="42" r="28" fill="#E8C4A0"/>
  <!-- Hair (messy/spiky) -->
  <ellipse cx="50" cy="18" rx="22" ry="8" fill="#F5A623"/>
  <circle cx="34" cy="20" r="6" fill="#F5A623"/>
  <circle cx="66" cy="20" r="6" fill="#F5A623"/>
  <circle cx="50" cy="14" r="7" fill="#F5A623"/>
  <!-- Eyes (big, expressive) -->
  <circle cx="38" cy="40" r="6" fill="#fff"/>
  <circle cx="62" cy="40" r="6" fill="#fff"/>
  <circle cx="39" cy="41" r="3.5" fill="#1a1a2e"/>
  <circle cx="63" cy="41" r="3.5" fill="#1a1a2e"/>
  <circle cx="40" cy="39.5" r="1.5" fill="#fff"/>
  <circle cx="64" cy="39.5" r="1.5" fill="#fff"/>
  <!-- Nose -->
  <circle cx="50" cy="50" r="2.5" fill="#D4A478"/>
  <!-- Mouth (big smile) -->
  <path d="M40 56 Q50 66 60 56" stroke="#C0845C" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Freckles -->
  <circle cx="34" cy="50" r="1.2" fill="#D4A478"/>
  <circle cx="37" cy="52" r="1.2" fill="#D4A478"/>
  <circle cx="63" cy="50" r="1.2" fill="#D4A478"/>
  <circle cx="66" cy="52" r="1.2" fill="#D4A478"/>
</svg>
