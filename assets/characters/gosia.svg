<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Girl: Gosia — hair, friendly smile -->
  <!-- Hair (long, flowing) -->
  <ellipse cx="50" cy="40" rx="34" ry="36" fill="#8B4513"/>
  <ellipse cx="30" cy="60" rx="12" ry="20" fill="#8B4513"/>
  <ellipse cx="70" cy="60" rx="12" ry="20" fill="#8B4513"/>
  <!-- Neck -->
  <rect x="42" y="68" width="16" height="10" rx="3" fill="#E8C4A0"/>
  <!-- Collar -->
  <rect x="30" y="76" width="40" height="20" rx="8" fill="#E855A0"/>
  <!-- Head -->
  <ellipse cx="50" cy="44" rx="24" ry="26" fill="#E8C4A0"/>
  <!-- Hair bangs -->
  <ellipse cx="50" cy="22" rx="26" ry="10" fill="#8B4513"/>
  <path d="M28 24 Q34 34 40 26" fill="#8B4513"/>
  <path d="M60 26 Q66 34 72 24" fill="#8B4513"/>
  <!-- Eyes -->
  <circle cx="39" cy="42" r="4.5" fill="#fff"/>
  <circle cx="61" cy="42" r="4.5" fill="#fff"/>
  <circle cx="40" cy="43" r="3" fill="#6B4513"/>
  <circle cx="62" cy="43" r="3" fill="#6B4513"/>
  <circle cx="41" cy="41.5" r="1.3" fill="#fff"/>
  <circle cx="63" cy="41.5" r="1.3" fill="#fff"/>
  <!-- Eyelashes -->
  <line x1="35" y1="38" x2="34" y2="36" stroke="#5C3D2E" stroke-width="1" stroke-linecap="round"/>
  <line x1="43" y1="38" x2="44" y2="36" stroke="#5C3D2E" stroke-width="1" stroke-linecap="round"/>
  <line x1="57" y1="38" x2="56" y2="36" stroke="#5C3D2E" stroke-width="1" stroke-linecap="round"/>
  <line x1="65" y1="38" x2="66" y2="36" stroke="#5C3D2E" stroke-width="1" stroke-linecap="round"/>
  <!-- Nose -->
  <circle cx="50" cy="50" r="2" fill="#D4A478"/>
  <!-- Mouth (friendly smile) -->
  <path d="M42 56 Q50 64 58 56" stroke="#C0845C" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Cheek blush -->
  <ellipse cx="32" cy="52" rx="5" ry="3" fill="#FFB0B0" opacity="0.5"/>
  <ellipse cx="68" cy="52" rx="5" ry="3" fill="#FFB0B0" opacity="0.5"/>
</svg>
