<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Cat: Rita — whiskers, tail -->
  <!-- Ears -->
  <polygon points="22,12 16,38 36,32" fill="#7C7C9C"/>
  <polygon points="78,12 84,38 64,32" fill="#7C7C9C"/>
  <polygon points="24,18 20,34 33,30" fill="#FFD4E8"/>
  <polygon points="76,18 80,34 67,30" fill="#FFD4E8"/>
  <!-- Tail -->
  <path d="M82 70 Q96 50 88 34 Q84 26 90 20" stroke="#7C7C9C" stroke-width="6" fill="none" stroke-linecap="round"/>
  <!-- Head -->
  <circle cx="50" cy="52" r="30" fill="#7C7C9C"/>
  <!-- Face patch -->
  <ellipse cx="50" cy="58" rx="18" ry="14" fill="#E8E0F0"/>
  <!-- Eyes -->
  <ellipse cx="38" cy="46" rx="4" ry="5" fill="#44CC88"/>
  <ellipse cx="62" cy="46" rx="4" ry="5" fill="#44CC88"/>
  <ellipse cx="38" cy="47" rx="2.5" ry="4" fill="#1a1a2e"/>
  <ellipse cx="62" cy="47" rx="2.5" ry="4" fill="#1a1a2e"/>
  <circle cx="39" cy="45" r="1.5" fill="#fff"/>
  <circle cx="63" cy="45" r="1.5" fill="#fff"/>
  <!-- Nose -->
  <ellipse cx="50" cy="55" rx="3.5" ry="2.5" fill="#FFB0C8"/>
  <!-- Whiskers -->
  <line x1="20" y1="54" x2="36" y2="56" stroke="#9090A8" stroke-width="1" stroke-linecap="round"/>
  <line x1="20" y1="60" x2="36" y2="60" stroke="#9090A8" stroke-width="1" stroke-linecap="round"/>
  <line x1="64" y1="56" x2="80" y2="54" stroke="#9090A8" stroke-width="1" stroke-linecap="round"/>
  <line x1="64" y1="60" x2="80" y2="60" stroke="#9090A8" stroke-width="1" stroke-linecap="round"/>
  <!-- Mouth -->
  <path d="M46 60 Q50 64 54 60" stroke="#C88098" stroke-width="1.5" fill="none" stroke-linecap="round"/>
</svg>
