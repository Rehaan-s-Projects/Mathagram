<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#141a2e"/>
      <stop offset="1" stop-color="#0c1020"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00e5c8"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- soft glow -->
  <circle cx="980" cy="120" r="320" fill="#00e5c8" opacity="0.10"/>
  <circle cx="160" cy="560" r="260" fill="#22d3ee" opacity="0.08"/>

  <!-- Lighthouse logo, scaled up (64 -> 200) -->
  <g transform="translate(96,210) scale(3.2)">
    <rect x="16" y="56" width="32" height="6" rx="2" fill="#ffffff"/>
    <polygon points="24,56 22,28 42,28 40,56" fill="#ffffff"/>
    <rect x="23" y="36" width="18" height="4" rx="1" fill="#00e5c8" opacity="0.6"/>
    <rect x="22.5" y="46" width="19" height="4" rx="1" fill="#00e5c8" opacity="0.6"/>
    <rect x="20" y="22" width="24" height="8" rx="2" fill="#ffffff"/>
    <rect x="24" y="24" width="16" height="4" rx="1" fill="#00e5c8"/>
    <polygon points="28,14 32,8 36,14" fill="#ffffff"/>
    <rect x="26" y="14" width="12" height="8" rx="2" fill="#ffffff"/>
    <polygon points="40,25 80,9 80,41" fill="#00e5c8" opacity="0.45"/>
  </g>

  <!-- Wordmark + tagline -->
  <text x="360" y="270" font-family="Verdana, 'DejaVu Sans', sans-serif" font-size="92" font-weight="bold" fill="#ffffff">Mathagram</text>
  <rect x="362" y="300" width="150" height="8" rx="4" fill="url(#teal)"/>
  <text x="360" y="372" font-family="Verdana, 'DejaVu Sans', sans-serif" font-size="40" fill="#cbd5e1">Learn math, science &amp; languages —</text>
  <text x="360" y="424" font-family="Verdana, 'DejaVu Sans', sans-serif" font-size="40" fill="#cbd5e1">free, interactive, your way.</text>

  <!-- Footer chips -->
  <text x="360" y="520" font-family="Verdana, 'DejaVu Sans', sans-serif" font-size="30" font-weight="bold" fill="#00e5c8">300+ courses</text>
  <text x="600" y="520" font-family="Verdana, 'DejaVu Sans', sans-serif" font-size="30" fill="#64748b">·  AI voice lessons  ·  mathagram.org</text>
</svg>
