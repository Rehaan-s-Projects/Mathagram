<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Base / platform -->
  <rect x="16" y="56" width="32" height="6" rx="2" fill="#1a1a2e"/>

  <!-- Tower body -->
  <polygon points="24,56 22,28 42,28 40,56" fill="#1a1a2e"/>

  <!-- Horizontal stripes on tower -->
  <rect x="23" y="36" width="18" height="4" rx="1" fill="#00e5c8" opacity="0.5"/>
  <rect x="22.5" y="46" width="19" height="4" rx="1" fill="#00e5c8" opacity="0.5"/>

  <!-- Lamp house -->
  <rect x="20" y="22" width="24" height="8" rx="2" fill="#1a1a2e"/>

  <!-- Lamp glow -->
  <rect x="24" y="24" width="16" height="4" rx="1" fill="#00e5c8"/>

  <!-- Dome / top -->
  <polygon points="28,14 32,8 36,14" fill="#1a1a2e"/>
  <rect x="26" y="14" width="12" height="8" rx="2" fill="#1a1a2e"/>

  <!-- Light beam (right) -->
  <polygon points="40,25 62,16 62,34" fill="#00e5c8" opacity="0.35"/>
</svg>
